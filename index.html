<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,"> <title>DanChat Ultimate v6.3 Mega-Extreme Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        /* Глобальные переменные темы - НЕ МЕНЯЕМ ИНТЕРФЕЙС */
        :root { 
            --bg: #0b0d0f; 
            --panel: #16191d; 
            --accent: #00ff88; 
            --text: #ffffff; 
            --side-w: 320px; 
            --error: #ff4444; 
            --blue: #0078ff; 
            --warn: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; outline: none; }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }

        /* Красивый скроллбар в стиле Discord */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        /* --- БОКОВАЯ ПАНЕЛЬ --- */
        #sidebar { 
            width: var(--side-w); 
            background: var(--panel); 
            border-right: 1px solid #2d3239; 
            display: flex; 
            flex-direction: column; 
            z-index: 100; 
        }

        .top-nav { 
            padding: 20px; 
            display: flex; 
            gap: 18px; 
            border-bottom: 1px solid #2d3239; 
            align-items: center; 
            background: rgba(0,0,0,0.2);
        }

        .nav-icon { 
            font-size: 20px; 
            cursor: pointer; 
            opacity: 0.7; 
            transition: all 0.3s ease; 
        }

        .nav-icon:hover { 
            opacity: 1; 
            transform: scale(1.2) rotate(15deg); 
            color: var(--accent);
        }

        #contact-list { flex: 1; overflow-y: auto; }

        .contact-item { 
            padding: 15px 20px; 
            border-bottom: 1px solid #1f2329; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            transition: 0.2s;
        }

        .contact-item:hover { background: #1c2127; border-left: 3px solid var(--accent); }

        .contact-item img { 
            width: 46px; 
            height: 46px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid #2d3239; 
            background: #000;
        }

        .contact-info { flex: 1; min-width: 0; }
        .contact-info b { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 15px; }

        .status-dot { 
            font-size: 10px; 
            font-weight: bold; 
            margin-top: 4px; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
        }
        .status-dot::before { content: '●'; }
        .on { color: var(--accent); text-shadow: 0 0 5px var(--accent); } 
        .off { color: #555; }

        /* --- ОСНОВНАЯ ОБЛАСТЬ ЧАТА --- */
        #main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #0f1216; 
            position: relative; 
        }

        header { 
            background: var(--panel); 
            padding: 15px 30px; 
            border-bottom: 1px solid #2d3239; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); 
            z-index: 50;
        }

        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            scroll-behavior: smooth;
        }

        /* Сообщения */
        .msg-row { display: flex; gap: 12px; max-width: 80%; animation: msgSlide 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .msg-row.me { flex-direction: row-reverse; align-self: flex-end; }
        
        .msg-av { 
            width: 40px; 
            height: 40px; 
            border-radius: 12px; 
            cursor: pointer; 
            object-fit: cover; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .msg-content { 
            padding: 12px 18px; 
            border-radius: 18px; 
            background: #23282e; 
            position: relative; 
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            font-size: 14.5px;
            line-height: 1.5;
        }

        .me .msg-content { background: var(--blue); color: #fff; border-bottom-right-radius: 2px; }
        .msg-row:not(.me) .msg-content { border-bottom-left-radius: 2px; }

        .admin-msg { border: 2px solid var(--error) !important; animation: borderPulse 2s infinite; }
        .admin-tag { background: var(--error); color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }

        /* --- ГОЛОСОВЫЕ ЗВОНКИ 2.0 (СЕТКА) --- */
        #voice-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 20px; 
            padding: 20px; 
            background: #12161b; 
            border-bottom: 2px solid var(--accent);
            max-height: 280px; 
            overflow-y: auto;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.3);
        }

        .voice-card { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            position: relative; 
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .voice-av { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid #2d3239; 
            transition: 0.3s;
            background: #000;
        }

        /* Зеленая рамка при разговоре */
        .speaking .voice-av { 
            border-color: var(--accent); 
            box-shadow: 0 0 20px var(--accent); 
            transform: scale(1.1); 
        }

        .mic-status-icon { 
            position: absolute; 
            top: 10px; 
            right: 15px; 
            background: var(--error); 
            border-radius: 50%; 
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 2px solid var(--panel);
        }

        .voice-nick { font-size: 13px; font-weight: bold; color: #ccc; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; }

        /* --- МОДАЛЬНЫЕ ОКНА --- */
        .custom-modal { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            z-index: 5000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(10px); 
        }

        .win-frame { 
            background: var(--panel); 
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid var(--accent); 
            text-align: center; 
            width: 420px; 
            box-shadow: 0 0 60px rgba(0,255,136,0.1);
        }

        /* --- ПАНЕЛЬ ВВОДА --- */
        #input-area { 
            padding: 20px; 
            background: var(--panel); 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-top: 1px solid #2d3239; 
        }

        .inp { 
            flex: 1; 
            padding: 14px 20px; 
            background: #0b0d0f; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 12px; 
            font-size: 15px;
            transition: 0.3s;
        }

        .inp:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,255,136,0.1); }

        .btn { 
            padding: 12px 25px; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.95); }

        /* Контекстное меню */
        #ctx-menu { 
            position: fixed; 
            background: #1c2127; 
            border: 1px solid #444; 
            border-radius: 12px; 
            z-index: 10000; 
            display: none; 
            min-width: 200px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            overflow: hidden;
        }

        .ctx-item { padding: 14px 20px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #2d3239; }
        .ctx-item:hover { background: var(--accent); color: #000; font-weight: bold; }

        /* Анимации */
        @keyframes msgSlide { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes borderPulse { 0% { border-color: var(--error); } 50% { border-color: #500; } 100% { border-color: var(--error); } }
        
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="closeCtx()" oncontextmenu="return false;">

    <script>
        /* --- КОНФИГУРАЦИЯ БАЗЫ ДАННЫХ --- */
        const firebaseConfig = { 
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE", 
            authDomain: "danblox-e209f.firebaseapp.com", 
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com", 
            projectId: "danblox-e209f" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const defAv = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        /* --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ СОСТОЯНИЯ --- */
        let myData = null, curChat = 'global', curPeer = '', selId = null, selData = null;
        let isEditing = false, replyData = null;
        let myStream = null, audioCtx = null, analyser = null, micMuted = false;
        let inVoice = false;

        /* --- ФУНКЦИИ АВТОРИЗАЦИИ --- */
        async function auth() {
            const n = document.getElementById('auth-n').value.trim();
            const p = document.getElementById('auth-p').value.trim();
            if(!n || !p) return;
            
            const snap = await db.ref('users/'+n).get();
            if(!snap.exists()) {
                // Регистрация нового
                myData = { nick: n, pass: p, av: defAv, color: '#ffffff', admin: false };
                await db.ref('users/'+n).set(myData);
            } else {
                // Проверка пароля
                if(snap.val().pass !== p) return alert("ОШИБКА: НЕВЕРНЫЙ ПАРОЛЬ");
                myData = snap.val();
            }
            startApplication();
        }

        function startApplication() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            
            refreshProfileUI();
            
            // Presence System
            db.ref('presence/'+myData.nick).set(true);
            db.ref('presence/'+myData.nick).onDisconnect().remove();
            
            initContactListener();
            initPrivateCallListener();
            switchChat('global', 'Глобальный чат');
        }

        function refreshProfileUI() {
            const display = document.getElementById('my-name-display');
            display.innerText = myData.nick; 
            display.style.color = myData.color;
            document.getElementById('admin-indicator').classList.toggle('hidden', !myData.admin);
        }

        /* --- КОНТАКТЫ И ДРУЗЬЯ --- */
        function initContactListener() {
            db.ref(`users/${myData.nick}/friends`).on('value', async snap => {
                const list = document.getElementById('contact-list');
                list.innerHTML = `<div class="contact-item" onclick="switchChat('global','Глобальный чат')">
                    <div style="font-size:24px; width:46px; text-align:center;">🌍</div>
                    <div class="contact-info"><b>Глобальный чат</b></div>
                </div>`;
                
                const friends = snap.val() || {};
                for(let fid in friends) {
                    const isGroup = friends[fid] === 'group';
                    const infoSnap = await db.ref(isGroup ? 'groups/'+fid : 'users/'+fid).get();
                    if(!infoSnap.exists()) continue;
                    const info = infoSnap.val();
                    
                    const item = document.createElement('div');
                    item.className = 'contact-item';
                    item.onclick = () => isGroup ? switchChat(fid, info.name) : startPrivateChat(fid);
                    
                    item.innerHTML = `
                        <img src="${isGroup ? (info.av || defAv) : (info.av || defAv)}">
                        <div class="contact-info">
                            <b style="color:${isGroup ? '#fff' : (info.color || '#fff')}">${isGroup ? info.name : info.nick}</b>
                            <div class="status-dot" id="dot-${fid}">${isGroup ? 'GROUP' : '...'}</div>
                        </div>
                        <span onclick="event.stopPropagation(); removeFriend('${fid}')" style="color:var(--error); font-weight:bold; padding:10px;">🗑️</span>
                    `;
                    list.appendChild(item);
                    
                    if(!isGroup) {
                        db.ref('presence/'+fid).on('value', p => {
                            const d = document.getElementById('dot-'+fid);
                            if(d) {
                                d.innerText = p.exists() ? 'В СЕТИ' : 'ОФФЛАЙН';
                                d.className = 'status-dot ' + (p.exists() ? 'on' : 'off');
                            }
                        });
                    }
                }
            });
        }

        async function removeFriend(id) {
            if(confirm("Удалить из списка?")) {
                await db.ref(`users/${myData.nick}/friends/${id}`).remove();
                if(curChat === id || (curPeer === id)) switchChat('global', 'Глобальный чат');
            }
        }

        async function startPrivateChat(targetNick) {
            if(targetNick === myData.nick) return;
            // Взаимное добавление
            await db.ref(`users/${myData.nick}/friends/${targetNick}`).set('user');
            await db.ref(`users/${targetNick}/friends/${myData.nick}`).set('user');
            
            const chatID = myData.nick < targetNick ? myData.nick+'_'+targetNick : targetNick+'_'+myData.nick;
            switchChat(chatID, targetNick);
        }

        /* --- СИСТЕМА ЧАТА --- */
        function switchChat(id, title) {
            // Если переходим из чата, где были в голосе - выходим
            if(inVoice) leaveVoiceChannel();
            
            curChat = id;
            const isBroad = id === 'global' || id.startsWith('group');
            curPeer = isBroad ? '' : title;
            
            document.getElementById('chat-title').innerText = title;
            document.getElementById('chat-window').innerHTML = '';
            document.getElementById('call-btn').classList.toggle('hidden', isBroad);
            
            // Слушатели сообщений
            db.ref('messages/'+id).off();
            db.ref('messages/'+id).on('child_added', s => renderMessage(s.key, s.val()));
            db.ref('messages/'+id).on('child_changed', s => {
                const el = document.getElementById('m-'+s.key);
                if(el) el.querySelector('.txt-node-body').innerText = s.val().txt;
            });
            db.ref('messages/'+id).on('child_removed', s => {
                const el = document.getElementById('m-'+s.key);
                if(el) el.remove();
            });

            // Слушатель голосовой сетки для текущего чата
            db.ref(`voice_rooms/${curChat}`).on('value', updateVoiceGrid);
            
            updateHeaderStatus();
        }

        function updateHeaderStatus() {
            const stat = document.getElementById('chat-stat');
            db.ref('presence').off();
            if(curPeer) {
                db.ref('presence/'+curPeer).on('value', p => {
                    stat.innerText = p.exists() ? "В СЕТИ" : "ОФФЛАЙН";
                    stat.style.color = p.exists() ? "var(--accent)" : "#555";
                });
            } else {
                db.ref('presence').on('value', s => {
                    let count = 0; s.forEach(() => count++);
                    stat.innerText = "УЧАСТНИКОВ ОНЛАЙН: " + count;
                    stat.style.color = "var(--accent)";
                });
            }
        }

        async function renderMessage(mid, m) {
            const win = document.getElementById('chat-window');
            const row = document.createElement('div');
            row.id = 'm-'+mid;
            row.className = `msg-row ${m.sn === myData.nick ? 'me' : ''}`;
            
            const uSnap = await db.ref('users/'+m.sn).get();
            const u = uSnap.val() || { av: defAv, color: '#fff' };

            row.oncontextmenu = (e) => {
                e.preventDefault();
                e.stopPropagation();
                showContextMenu(e, mid, m);
            };

            let contentHTML = '';
            if(m.type === 'img') {
                contentHTML = `<img src="${m.txt}" style="max-width:300px; border-radius:10px; cursor:zoom-in;" onclick="window.open(this.src)">`;
            } else {
                contentHTML = `<div class="txt-node-body">${m.txt}</div>`;
            }

            row.innerHTML = `
                <img src="${u.av || defAv}" class="msg-av" onclick="startPrivateChat('${m.sn}')">
                <div class="msg-content ${u.admin ? 'admin-msg' : ''}">
                    <b style="color:${u.color}; font-size:12px;">${m.sn} ${u.admin ? '<span class="admin-tag">ADMIN</span>' : ''}</b>
                    ${m.rp ? `<div style="font-size:11px; opacity:0.6; border-left:2px solid var(--accent); padding-left:8px; margin: 4px 0;">↪ ${m.rp}</div>` : ''}
                    <div style="margin-top:4px;">${contentHTML}</div>
                </div>
            `;
            
            win.appendChild(row);
            win.scrollTop = win.scrollHeight;
        }

        function send() {
            const input = document.getElementById('msg-in');
            const val = input.value.trim();
            if(!val && !isEditing) return;

            if(isEditing) {
                db.ref(`messages/${curChat}/${selId}`).update({ txt: val });
            } else {
                db.ref('messages/'+curChat).push({
                    sn: myData.nick,
                    txt: val,
                    type: 'text',
                    rp: replyData ? (replyData.txt.substring(0, 30) + '...') : null,
                    ts: Date.now()
                });
            }
            
            input.value = '';
            cancelAction();
        }

        /* --- ГОЛОСОВЫЕ КАНАЛЫ (ГРУППОВЫЕ) --- */
        async function toggleVoiceJoin() {
            if(!inVoice) {
                try {
                    myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    inVoice = true;
                    
                    const btn = document.getElementById('v-join-btn');
                    btn.innerText = "ВЫЙТИ";
                    btn.style.background = "var(--error)";
                    document.getElementById('voice-grid').classList.remove('hidden');

                    // Регистрация в Firebase Room
                    const vRef = db.ref(`voice_rooms/${curChat}/${myData.nick}`);
                    vRef.set({
                        av: myData.av || defAv,
                        muted: micMuted,
                        speaking: false
                    });
                    vRef.onDisconnect().remove();

                    startVoiceAnalyser();
                } catch(e) {
                    alert("ОШИБКА: Микрофон не доступен или отклонен.");
                }
            } else {
                leaveVoiceChannel();
            }
        }

        function leaveVoiceChannel() {
            if(!inVoice) return;
            inVoice = false;
            
            if(myStream) {
                myStream.getTracks().forEach(t => t.stop());
                myStream = null;
            }
            
            db.ref(`voice_rooms/${curChat}/${myData.nick}`).remove();
            
            const btn = document.getElementById('v-join-btn');
            btn.innerText = "ВОЙТИ В ГОЛОС";
            btn.style.background = "var(--blue)";
            document.getElementById('voice-grid').classList.add('hidden');
            
            if(audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }
        }

        function updateVoiceGrid(snap) {
            const grid = document.getElementById('voice-grid');
            if(!snap.exists() || !inVoice) {
                grid.innerHTML = '';
                return;
            }

            grid.innerHTML = '';
            snap.forEach(child => {
                const name = child.key;
                const data = child.val();
                
                const card = document.createElement('div');
                card.className = `voice-card ${data.speaking ? 'speaking' : ''}`;
                card.innerHTML = `
                    ${data.muted ? '<div class="mic-status-icon">🎙️❌</div>' : ''}
                    <img src="${data.av || defAv}" class="voice-av">
                    <div class="voice-nick">${name === myData.nick ? 'Я ('+name+')' : name}</div>
                    ${name === myData.nick ? `<button onclick="toggleMicMute()" style="font-size:10px; background:var(--panel); border:1px solid #444; color:#fff; border-radius:5px; cursor:pointer; padding:2px 8px;">${micMuted ? 'ВКЛ' : 'ВЫКЛ'}</button>` : ''}
                `;
                grid.appendChild(card);
            });
        }

        function toggleMicMute() {
            micMuted = !micMuted;
            if(myStream) {
                myStream.getAudioTracks()[0].enabled = !micMuted;
            }
            db.ref(`voice_rooms/${curChat}/${myData.nick}/muted`).set(micMuted);
        }

        function startVoiceAnalyser() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(myStream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            let lastSpeakingState = false;

            function updateLoop() {
                if(!inVoice) return;
                analyser.getByteFrequencyData(dataArray);
                
                let sum = 0;
                for(let i=0; i<bufferLength; i++) sum += dataArray[i];
                let average = sum / bufferLength;

                let isSpeaking = (average > 15) && !micMuted;
                
                if(isSpeaking !== lastSpeakingState) {
                    lastSpeakingState = isSpeaking;
                    db.ref(`voice_rooms/${curChat}/${myData.nick}/speaking`).set(isSpeaking);
                }
                
                requestAnimationFrame(updateLoop);
            }
            updateLoop();
        }

        /* --- ЛИЧНЫЕ ЗВОНКИ (P2P ЛОГИКА) --- */
        async function makePrivateCall() {
            const target = curPeer;
            const tSnap = await db.ref('users/'+target).get();
            const tData = tSnap.val();
            
            document.getElementById('call-av').src = tData.av || defAv;
            document.getElementById('call-nick').innerText = target;
            document.getElementById('call-status').innerText = "ВЫЗОВ...";
            showModal('call-modal');
            
            const callRef = db.ref(`calls/${target}`);
            callRef.set({
                from: myData.nick,
                status: 'calling',
                ts: Date.now()
            });
            callRef.onDisconnect().remove();

            const actions = document.getElementById('p-call-actions');
            actions.innerHTML = `<button class="btn" style="background:var(--error); color:#fff;" onclick="terminateCall('${target}')">ОТМЕНА</button>`;
            
            setupP2PDetector();
        }

        function initPrivateCallListener() {
            db.ref(`calls/${myData.nick}`).on('value', async snap => {
                const c = snap.val();
                if(!c) {
                    hideModal('call-modal');
                    if(!inVoice) closeAllMedia();
                    return;
                }

                const other = c.from;
                const uSnap = await db.ref('users/'+other).get();
                const u = uSnap.val();

                document.getElementById('call-av').src = u.av || defAv;
                document.getElementById('call-nick').innerText = other;
                showModal('call-modal');

                const actions = document.getElementById('p-call-actions');
                
                if(c.status === 'calling') {
                    document.getElementById('call-status').innerText = "ВХОДЯЩИЙ ВЫЗОВ";
                    actions.innerHTML = `
                        <button class="btn" style="background:var(--accent); color:#000;" onclick="acceptCall('${other}')">ОТВЕТИТЬ</button>
                        <button class="btn" style="background:var(--error); color:#fff;" onclick="terminateCall('${other}')">СБРОС</button>
                    `;
                } else if(c.status === 'active') {
                    document.getElementById('call-status').innerText = "ИДЕТ РАЗГОВОР";
                    actions.innerHTML = `<button class="btn" style="background:var(--error); color:#fff;" onclick="terminateCall('${other}')">ЗАВЕРШИТЬ</button>`;
                    
                    // Слушаем рамку говорящего
                    db.ref(`voice_rooms/p2p_${myData.nick}`).on('value', s => {
                        const d = s.val();
                        document.getElementById('call-av').parentElement.classList.toggle('speaking', d && d.speaking);
                    });
                }
            });
        }

        async function acceptCall(from) {
            await db.ref(`calls/${myData.nick}`).update({ status: 'active' });
            await db.ref(`calls/${from}`).set({ from: myData.nick, status: 'active' });
            setupP2PDetector();
        }

        function terminateCall(target) {
            db.ref(`calls/${myData.nick}`).remove();
            db.ref(`calls/${target}`).remove();
            db.ref(`voice_rooms/p2p_${myData.nick}`).remove();
            db.ref(`voice_rooms/p2p_${target}`).remove();
            closeAllMedia();
            hideModal('call-modal');
        }

        async function setupP2PDetector() {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new AudioContext();
                const src = audioCtx.createMediaStreamSource(myStream);
                analyser = audioCtx.createAnalyser();
                src.connect(analyser);
                
                const data = new Uint8Array(analyser.frequencyBinCount);
                function check() {
                    if(!analyser) return;
                    analyser.getByteFrequencyData(data);
                    let sum = 0; for(let v of data) sum += v;
                    let isSp = (sum/data.length) > 15;
                    db.ref(`voice_rooms/p2p_${myData.nick}/speaking`).set(isSp);
                    requestAnimationFrame(check);
                }
                check();
            } catch(e) {}
        }

        function closeAllMedia() {
            if(myStream) { myStream.getTracks().forEach(t => t.stop()); myStream = null; }
            if(audioCtx) { audioCtx.close(); audioCtx = null; }
            analyser = null;
        }

        /* --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ --- */
        async function saveSettings() {
            const key = document.getElementById('admin-key').value;
            const isAdmin = (key === "DanAdminPanel"); // ПАРОЛЬ ПРОВЕРЕН
            
            const updates = { 
                av: document.getElementById('set-pre').src, 
                color: document.getElementById('set-color').value,
                admin: isAdmin
            };
            
            await db.ref('users/'+myData.nick).update(updates);
            myData = (await db.ref('users/'+myData.nick).get()).val();
            refreshProfileUI();
            hideModal('settings-modal');
        }

        function openSearch() {
            db.ref('users').once('value', s => {
                const list = document.getElementById('mem-list');
                list.innerHTML = '';
                document.getElementById('mem-h').innerText = "ПОИСК ПОЛЬЗОВАТЕЛЕЙ";
                s.forEach(u => {
                    if(u.key === myData.nick) return;
                    list.innerHTML += `<div onclick="startPrivateChat('${u.key}'); hideModal('members-modal')" style="padding:15px; border-bottom:1px solid #333; cursor:pointer; display:flex; align-items:center; gap:10px;">
                        <img src="${u.val().av || defAv}" style="width:30px; height:30px; border-radius:50%;">
                        <span>${u.key}</span>
                    </div>`;
                });
                showModal('members-modal');
            });
        }

        async function createGroup() {
            const name = document.getElementById('g-name').value.trim();
            if(!name) return;
            const gid = 'group_' + Date.now();
            await db.ref('groups/'+gid).set({
                name: name,
                owner: myData.nick,
                av: defAv,
                members: { [myData.nick]: true }
            });
            await db.ref(`users/${myData.nick}/friends/${gid}`).set('group');
            hideModal('group-modal');
        }

        async function openChatInfo() {
            const list = document.getElementById('mem-list');
            list.innerHTML = 'Загрузка данных...';
            showModal('members-modal');
            
            if(curChat === 'global') {
                document.getElementById('mem-h').innerText = "В СЕТИ СЕЙЧАС";
                db.ref('presence').once('value', s => {
                    list.innerHTML = '';
                    s.forEach(u => {
                        list.innerHTML += `<div style="padding:12px; border-bottom:1px solid #222;">👤 ${u.key} <span style="float:right; color:var(--accent)">ONLINE</span></div>`;
                    });
                });
            } else if(curChat.startsWith('group')) {
                const gSnap = await db.ref('groups/'+curChat).get();
                const g = gSnap.val();
                document.getElementById('mem-h').innerText = g.name.toUpperCase();
                list.innerHTML = '';
                
                // Список участников
                const members = g.members || {};
                for(let mName in members) {
                    list.innerHTML += `
                        <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #222;">
                            <span>👤 ${mName} ${mName === g.owner ? '<b style="color:var(--accent)">(Admin)</b>' : ''}</span>
                            ${g.owner === myData.nick && mName !== myData.nick ? `<button onclick="kickFromGroup('${mName}')" style="color:red; background:none; border:none; cursor:pointer;">Кик</button>` : ''}
                        </div>`;
                }
            }
        }

        async function kickFromGroup(nick) {
            if(confirm(`Исключить ${nick} из группы?`)) {
                await db.ref(`groups/${curChat}/members/${nick}`).remove();
                await db.ref(`users/${nick}/friends/${curChat}`).remove();
                openChatInfo();
            }
        }

        function showContextMenu(e, mid, m) {
            selId = mid; selData = m;
            const menu = document.getElementById('ctx-menu');
            document.getElementById('owner-tools').classList.toggle('hidden', !(m.sn === myData.nick || myData.admin));
            menu.style.display = 'block'; 
            menu.style.left = e.pageX + 'px'; 
            menu.style.top = e.pageY + 'px';
        }

        function replyMessage() { 
            replyData = selData; 
            showActionPanel("ОТВЕТИТЬ: " + selData.sn, "Ответ"); 
        }
        
        function editMessage() { 
            isEditing = true; 
            document.getElementById('msg-in').value = selData.txt; 
            showActionPanel(selData.txt, "Редактирование"); 
        }
        
        function deleteMessage() { 
            if(confirm("Удалить это сообщение?")) db.ref(`messages/${curChat}/${selId}`).remove(); 
        }
        
        function showActionPanel(txt, type) {
            document.getElementById('action-bar').classList.remove('hidden');
            document.getElementById('action-type').innerText = type;
            document.getElementById('action-text').innerText = txt;
        }
        
        function cancelAction() { 
            isEditing = false; 
            replyData = null; 
            document.getElementById('action-bar').classList.add('hidden'); 
            document.getElementById('msg-in').value = ''; 
        }

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeCtx() { document.getElementById('ctx-menu').style.display = 'none'; }
        function addEmoji(e) { document.getElementById('msg-in').value += e; }
        
        function preview(input, targetID) {
            const reader = new FileReader();
            reader.onload = e => document.getElementById(targetID).src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        function uploadImage(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                db.ref('messages/'+curChat).push({
                    sn: myData.nick,
                    txt: e.target.result,
                    type: 'img',
                    ts: Date.now()
                });
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
