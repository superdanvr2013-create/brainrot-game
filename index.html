<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox - Ultra Tycoon Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; touch-action: none; }
        #stats-ui { position: absolute; top: 10px; left: 10px; font-size: 24px; color: #0f0; z-index: 10; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
        #menu { position: absolute; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #000; }
        .window { background: #111; padding: 30px; border: 3px solid #0f0; border-radius: 20px; text-align: center; color: #fff; }
        #interaction-ui { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); z-index: 100; text-align: center; pointer-events: none; display: none; }
        .prompt-btn { background: #0f0; color: black; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 20px; border: 2px solid white; pointer-events: auto; cursor: pointer; }
        #mobile-ui { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        #jump-btn { width: 80px; height: 80px; background: rgba(0, 136, 255, 0.5); border-radius: 50%; position: absolute; bottom: 40px; right: 40px; border: 2px solid #fff; pointer-events: auto; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #sidebar { position: absolute; right: 10px; top: 10px; width: 220px; z-index: 10; pointer-events: none; }
        .panel { background: rgba(0,0,0,0.8); border: 1px solid #0f0; padding: 10px; color: #0f0; pointer-events: auto; margin-bottom: 5px; border-radius: 10px; }
        #player-list { max-height: 100px; overflow-y: auto; font-size: 13px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="stats-ui" class="hidden">CASH: <span id="cash-val">25</span>$</div>

<div id="menu">
    <div class="window">
        <h1 style="color: #0f0;">DANBLOX TYCOON</h1>
        <input type="text" id="nick-input" placeholder="НИК..." style="padding:10px; width:200px;"><br><br>
        <button id="start-btn">ИГРАТЬ</button>
    </div>
</div>

<div id="interaction-ui">
    <div id="interact-text" style="color: white; margin-bottom: 5px; font-weight: bold; text-shadow: 2px 2px #000;"></div>
    <button id="main-act-btn" class="prompt-btn">ДЕЙСТВИЕ (E)</button>
</div>

<div id="mobile-ui" class="hidden">
    <div id="jump-btn">JUMP</div>
</div>

<div id="sidebar" class="hidden">
    <div class="panel"><b>ИГРОКИ:</b> <div id="player-list"></div></div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }}
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const firebaseConfig = {
        apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
        authDomain: "danblox-e209f.firebaseapp.com",
        databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
        projectId: "danblox-e209f",
        storageBucket: "danblox-e209f.firebasestorage.app",
        messagingSenderId: "828099060847",
        appId: "1:828099060847:web:9bb0bebc8c02833ce7d99a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let scene, camera, renderer, controls, myModel;
    let myID = 'u' + Math.floor(Math.random() * 1000000);
    let myNick, myCash = 25, otherPlayers = {}, otherBases = {}, robots = {};
    let moveDir = new THREE.Vector3(), velocity = new THREE.Vector3(), canJump = true;
    let myBaseObj = null, activeInteractBot = null, myBasePos = {x:0, z:0};
    let colliders = [];

    const BOT_TYPES = {
        blue: { color: 0x00aaff, price: 25, income: 1, name: "Обычный" },
        green: { color: 0x00ff00, price: 100, income: 5, name: "Зеленый" },
        red: { color: 0xff0000, price: 250, income: 10, name: "Красный" },
        purple: { color: 0xaa00ff, price: 500, income: 20, name: "Фиолетовый" }
    };

    function createTextSprite(text) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 64;
        ctx.fillStyle = 'white'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
        ctx.fillText(text, 128, 32);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
        sprite.scale.set(3, 0.75, 1);
        return sprite;
    }

    function createBox(w, h, d, x, y, z, color, opacity = 1) {
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(w, h, d),
            new THREE.MeshStandardMaterial({ color, transparent: opacity < 1, opacity })
        );
        mesh.position.set(x, y, z);
        scene.add(mesh);
        return mesh;
    }

    function createBase(nick, pos) {
        const group = new THREE.Group(); group.position.set(pos.x, 0, pos.z);
        const floor = createBox(20, 0.2, 20, 0, 0, 0, 0x222222); group.add(floor);
        
        const walls = [
            createBox(20, 5, 0.5, 0, 2.5, -10, 0x444444),
            createBox(0.5, 5, 20, -10, 2.5, 0, 0x444444),
            createBox(0.5, 5, 20, 10, 2.5, 0, 0x444444)
        ];
        walls.forEach(w => { group.add(w); colliders.push(w); });

        const laser = createBox(19, 5, 0.1, 0, 2.5, 10, 0xff0000, 0);
        group.add(laser);

        const slots = [];
        for(let i=0; i<5; i++) {
            slots.push({ pos: new THREE.Vector3(pos.x - 6 + (i*3), 0.5, pos.z - 5), occupied: false, botID: null });
        }
        scene.add(group);
        return { group, slots, laser, laserActive: false };
    }

    function initGame() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const gr = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x1a5e1a}));
        gr.rotation.x = -Math.PI/2; scene.add(gr);

        createBox(12, 0.1, 200, 0, 0.05, 0, 0x333333); // Дорога

        controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(20, 20, 20);

        myModel = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x00ff00}));
        scene.add(myModel);

        // Позиция базы
        myBasePos.x = (Math.random() > 0.5 ? 25 : -25);
        myBasePos.z = (Math.random() - 0.5) * 80;
        myBaseObj = createBase(myNick, myBasePos);
        myModel.position.set(myBasePos.x, 1, myBasePos.z + 5);

        // Firebase
        db.ref('players').child(myID).onDisconnect().remove();
        db.ref('players').on('value', s => {
            const data = s.val() || {};
            const list = document.getElementById('player-list'); list.innerHTML = '';
            Object.keys(data).forEach(id => {
                list.innerHTML += `<div>${data[id].n}: ${data[id].c}$</div>`;
                if(id !== myID && !otherPlayers[id]) {
                    otherPlayers[id] = createBox(1, 2, 1, 0, 1, 0, 0x0088ff);
                    otherBases[id] = createBase(data[id].n, data[id].bp);
                }
                if(id !== myID) otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
            });
            Object.keys(otherPlayers).forEach(id => { if(!data[id]) { scene.remove(otherPlayers[id]); scene.remove(otherBases[id].group); delete otherPlayers[id]; }});
        });

        db.ref('robots').on('value', s => {
            const data = s.val() || {};
            Object.keys(data).forEach(id => {
                if(!robots[id]) {
                    const b = BOT_TYPES[data[id].type];
                    const mesh = createBox(0.8, 1.5, 0.5, 0, 0.75, 0, b.color);
                    const info = createTextSprite(`${b.name} | ${b.price}$`); info.position.y = 2; mesh.add(info);
                    robots[id] = { mesh, info: b, ...data[id] };
                }
                robots[id].mesh.position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
            });
            Object.keys(robots).forEach(id => { if(!data[id]) { scene.remove(robots[id].mesh); delete robots[id]; }});
        });

        // Создание роботов
        setInterval(() => {
            if (Object.keys(otherPlayers).length === 0 || Math.random() > 0.8) {
                const id = 'bot' + Date.now();
                const type = Object.keys(BOT_TYPES)[Math.floor(Math.random()*4)];
                db.ref('robots/' + id).set({ x: 0, y: 0, z: -80, type, owner: null });
            }
        }, 8000);

        loop();
    }

    function loop() {
        requestAnimationFrame(loop);
        if(!myBaseObj) return;

        // Движение
        moveDir.set(0,0,0);
        if(keys['KeyW']) moveDir.z = -1; if(keys['KeyS']) moveDir.z = 1;
        if(keys['KeyA']) moveDir.x = -1; if(keys['KeyD']) moveDir.x = 1;
        moveDir.applyQuaternion(camera.quaternion);
        moveDir.y = 0; moveDir.normalize();
        
        const nextPos = myModel.position.clone().add(moveDir.multiplyScalar(0.2));
        let canMove = true;
        colliders.forEach(c => { if(new THREE.Box3().setFromObject(c).containsPoint(nextPos)) canMove = false; });
        if(canMove) myModel.position.copy(nextPos);

        myModel.position.y += velocity.y;
        if(myModel.position.y > 1) velocity.y -= 0.01; else { myModel.position.y = 1; velocity.y = 0; canJump = true; }

        // Роботы
        Object.keys(robots).forEach(id => {
            const b = robots[id];
            if(!b.owner) {
                b.z += 0.1;
                db.ref('robots/' + id).update({ z: b.z });
                if(b.z > 80) db.ref('robots/' + id).remove();
            }
            if(myModel.position.distanceTo(b.mesh.position) < 5) {
                activeInteractBot = id;
                document.getElementById('interaction-ui').style.display = 'block';
                document.getElementById('interact-text').innerText = b.owner === myID ? "ВАШ РОБОТ" : "РОБОТ (" + b.info.price + "$)";
            }
        });

        db.ref('players/' + myID).update({
            x: myModel.position.x, y: myModel.position.y, z: myModel.position.z,
            c: myCash, n: myNick, bp: myBasePos
        });

        controls.update();
        renderer.render(scene, camera);
    }

    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    document.getElementById('start-btn').onclick = () => {
        myNick = document.getElementById('nick-input').value || "Noob";
        document.getElementById('menu').classList.add('hidden');
        ['stats-ui', 'mobile-ui', 'sidebar'].forEach(id => document.getElementById(id).classList.remove('hidden'));
        initGame();
    };

    document.getElementById('main-act-btn').onclick = () => {
        const bot = robots[activeInteractBot];
        if(!bot.owner && myCash >= bot.info.price) {
            const slot = myBaseObj.slots.find(s => !s.occupied);
            if(slot) {
                myCash -= bot.info.price;
                slot.occupied = true; slot.botID = activeInteractBot;
                db.ref('robots/' + activeInteractBot).update({ owner: myID, x: slot.pos.x, z: slot.pos.z });
            }
        }
        document.getElementById('cash-val').innerText = myCash;
    };
</script>
</body>
</html>
