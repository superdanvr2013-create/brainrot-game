<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DanBlox - Ultimate Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #menu { position: absolute; width: 100%; height: 100%; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #000; }
        .window { background: #111; padding: 30px; border: 3px solid #00ff00; border-radius: 20px; text-align: center; color: #fff; }
        input { padding: 12px; margin: 10px; width: 250px; background: #222; color: #0f0; border: 1px solid #0f0; outline: none; }
        button { padding: 12px 30px; background: #0f0; color: #000; border: none; cursor: pointer; font-weight: bold; }
        #sidebar { position: absolute; right: 10px; top: 10px; bottom: 10px; width: 260px; z-index: 500; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .panel { background: rgba(0, 0, 0, 0.8); border: 2px solid #00ff00; border-radius: 10px; padding: 10px; color: #0f0; pointer-events: auto; }
        #player-list { max-height: 150px; overflow-y: auto; }
        #chat-messages { height: 250px; overflow-y: auto; color: #fff; margin-bottom: 5px;}
        #buy-ui { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="window">
            <h1 style="color: #0f0;">DANBLOX: ONLINE</h1>
            <input type="text" id="nick-input" placeholder="НИК..." maxlength="12"><br>
            <button id="start-btn">ИГРАТЬ</button>
        </div>
    </div>

    <div id="buy-ui" class="panel">
        <button id="buy-bot-btn">КУПИТЬ РОБОТА (E)</button>
    </div>

    <div id="sidebar" class="hidden">
        <div class="panel">
            <b>ОНЛАЙН: <span id="online-count">0</span></b>
            <div id="player-list"></div>
        </div>
        <div class="panel">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" style="width:90%; background:#222; color:#fff; border:1px solid #0f0;" placeholder="Напиши...">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r158/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // Код БЕЗ импортов
        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f",
            storageBucket: "danblox-e209f.firebasestorage.app",
            messagingSenderId: "828099060847",
            appId: "1:828099060847:web:9bb0bebc8c02833ce7d99a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const playersRef = db.ref('players');
        const chatRef = db.ref('chat');

        let scene, camera, renderer, controls, pivot, myModel;
        let myID = 'u' + Math.floor(Math.random() * 1000000);
        let myNick, otherPlayers = {}, otherBases = {};
        let moveForward, moveBackward, moveLeft, moveRight, canJump = true;
        let velocity = new THREE.Vector3(), camDist = 12;
        let myBaseData = { x: 0, z: 0 }, robots = [];

        function createHuman(color, isRobot = false) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: isRobot ? 0xff0000 : color });
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6), mat); head.position.y = 1.6; group.add(head);
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8,1,0.4), mat); body.position.y = 0.8; group.add(body);
            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), mat); legL.position.set(-0.25,0,0); group.add(legL);
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), mat); legR.position.set(0.25,0,0); group.add(legR);
            return group;
        }

        function createBase(pos) {
            const group = new THREE.Group();
            group.position.set(pos.x, 0, pos.z);
            const wall = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 0.5), new THREE.MeshStandardMaterial({color:0x333333}));
            wall.position.z = -5; group.add(wall);
            scene.add(group);
            return group;
        }

        function initNet(nick) {
            myNick = nick;
            playersRef.once('value', (snap) => {
                const all = snap.val() || {};
                let pos = { x: (Math.random()-0.5)*200, z: (Math.random()-0.5)*200 };
                myBaseData = pos;
                createBase(myBaseData);
                pivot.position.set(pos.x, 0, pos.z + 10);
            });

            playersRef.on('value', (snap) => {
                const data = snap.val() || {};
                const list = document.getElementById('player-list');
                list.innerHTML = '';
                Object.keys(data).forEach(id => {
                    list.innerHTML += `<div>${data[id].nick || 'Dan'}</div>`;
                    if(id === myID) return;
                    if(!otherPlayers[id]) {
                        otherPlayers[id] = createHuman(0x0088ff);
                        scene.add(otherPlayers[id]);
                        if(data[id].bx !== undefined) otherBases[id] = createBase({x: data[id].bx, z: data[id].bz});
                    }
                    otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
                });
                document.getElementById('online-count').innerText = Object.keys(data).length;
            });

            chatRef.limitToLast(10).on('child_added', (s) => {
                const m = s.val();
                const box = document.getElementById('chat-messages');
                box.innerHTML += `<div><b>${m.u}:</b> ${m.t}</div>`;
                box.scrollTop = box.scrollHeight;
            });
            playersRef.child(myID).onDisconnect().remove();
        }

        function initGame() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const gr = new THREE.Mesh(new THREE.PlaneGeometry(1000,1000), new THREE.MeshStandardMaterial({color:0x228B22}));
            gr.rotation.x = -Math.PI/2; scene.add(gr);
            const road = new THREE.Mesh(new THREE.PlaneGeometry(10, 1000), new THREE.MeshBasicMaterial({color:0xff0000}));
            road.rotation.x = -Math.PI/2; road.position.set(0, 0.01, 0); scene.add(road);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            pivot = new THREE.Group(); scene.add(pivot);
            myModel = createHuman(0x00ff00); scene.add(myModel);
            
            // Внимание: теперь вызываем через THREE
            controls = new THREE.PointerLockControls(pivot, document.body);

            setInterval(() => {
                const bot = createHuman(0xff0000, true);
                bot.position.set(0, 0, -500);
                bot.targetBase = null;
                scene.add(bot);
                robots.push(bot);
            }, 5000);

            window.onkeydown = (e) => {
                if(document.activeElement.id==='chat-input') return;
                if(e.code==='KeyW') moveForward=true; if(e.code==='KeyS') moveBackward=true;
                if(e.code==='KeyA') moveLeft=true; if(e.code==='KeyD') moveRight=true;
                if(e.code==='Space' && canJump) { velocity.y = 0.25; canJump = false; }
                if(e.code==='KeyE' && window.currentNearBot) {
                    window.currentNearBot.targetBase = new THREE.Vector3(myBaseData.x, 0, myBaseData.z);
                    document.getElementById('buy-ui').style.display = 'none';
                }
            };
            window.onkeyup = (e) => {
                if(e.code==='KeyW') moveForward=false; if(e.code==='KeyS') moveBackward=false;
                if(e.code==='KeyA') moveLeft=false; if(e.code==='KeyD') moveRight=false;
            };

            document.getElementById('chat-input').onkeydown = (e) => {
                if(e.code==='Enter' && e.target.value.trim()){
                    chatRef.push({ u: myNick, t: e.target.value }); e.target.value = '';
                }
            };

            function animate() {
                requestAnimationFrame(animate);
                if(controls.isLocked) {
                    const s = 0.2;
                    if(moveForward) controls.moveForward(s); if(moveBackward) controls.moveForward(-s);
                    if(moveLeft) controls.moveRight(-s); if(moveRight) controls.moveRight(s);
                    pivot.position.y += velocity.y;
                    if(pivot.position.y > 0) velocity.y -= 0.01; else { pivot.position.y=0; canJump=true; velocity.y=0; }
                    
                    myModel.position.copy(pivot.position);
                    playersRef.child(myID).update({
                        x: pivot.position.x, y: pivot.position.y, z: pivot.position.z,
                        nick: myNick, bx: myBaseData.x, bz: myBaseData.z
                    });

                    document.getElementById('buy-ui').style.display = 'none';
                    window.currentNearBot = null;
                    robots.forEach((bot, i) => {
                        if(!bot.targetBase) {
                            bot.position.z += 0.5;
                            if(bot.position.z > 500) { scene.remove(bot); robots.splice(i,1); }
                            if(pivot.position.distanceTo(bot.position) < 5) {
                                document.getElementById('buy-ui').style.display = 'block';
                                window.currentNearBot = bot;
                            }
                        } else {
                            bot.position.lerp(bot.targetBase, 0.01);
                        }
                    });
                }
                const cPos = new THREE.Vector3(0, camDist/2, camDist).applyMatrix4(pivot.matrixWorld);
                camera.position.copy(cPos); camera.lookAt(pivot.position);
                renderer.render(scene, camera);
            }
            animate();
        }

        document.getElementById('start-btn').onclick = () => {
            const nick = document.getElementById('nick-input').value.trim();
            if(!nick) return;
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            initGame(); initNet(nick);
        };
    </script>
</body>
</html>
