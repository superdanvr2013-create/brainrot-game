<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanChat Ultimate v7 MEGA</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #050608; --panel: #121418; --accent: #00ff88; --text: #ffffff; 
            --side-w: 350px; --error: #ff3333; --blue: #0084ff; --msg-bg: #1e2229;
        }
        * { box-sizing: border-box; outline: none; }
        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; 
        }

        /* --- ЛЕВАЯ ПАНЕЛЬ (КОНТАКТЫ) --- */
        #sidebar { 
            width: var(--side-w); background: var(--panel); border-right: 1px solid #222; 
            display: flex; flex-direction: column; z-index: 100; transition: 0.3s;
        }
        .sidebar-header { 
            padding: 20px; border-bottom: 1px solid #222; display: flex; 
            align-items: center; justify-content: space-between; background: #161a20;
        }
        .nav-icons { display: flex; gap: 15px; }
        .nav-btn { cursor: pointer; font-size: 20px; filter: grayscale(1); transition: 0.2s; }
        .nav-btn:hover { filter: grayscale(0); transform: scale(1.1); }

        #contact-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .contact-item { 
            padding: 15px 20px; display: flex; align-items: center; gap: 15px; 
            cursor: pointer; transition: 0.2s; border-left: 3px solid transparent;
        }
        .contact-item:hover { background: rgba(255,255,255,0.05); }
        .contact-item.active { background: rgba(0, 255, 136, 0.1); border-left-color: var(--accent); }
        .contact-item img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #333; }
        .contact-meta { flex: 1; min-width: 0; }
        .contact-meta b { display: block; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-text { font-size: 11px; font-weight: bold; margin-top: 3px; display: flex; align-items: center; gap: 5px; }
        .status-text.online { color: var(--accent); }
        .status-text.offline { color: #666; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .online .status-dot { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
        .offline .status-dot { background: #444; }

        /* --- ОСНОВНАЯ ЗОНА ЧАТА --- */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #0a0c10; position: relative; }
        
        header { 
            padding: 15px 30px; background: var(--panel); border-bottom: 1px solid #222; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 10;
        }
        .header-info h2 { margin: 0; font-size: 18px; }
        .header-info span { font-size: 12px; color: var(--accent); font-weight: bold; }

        #chat-window { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        
        .msg { display: flex; gap: 12px; max-width: 75%; position: relative; animation: fadeIn 0.3s ease; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; cursor: pointer; border: 1px solid #444; }
        .msg-bubble { 
            padding: 12px 16px; border-radius: 18px; background: var(--msg-bg); 
            line-height: 1.5; position: relative; box-shadow: 0 3px 10px rgba(0,0,0,0.2); 
        }
        .me .msg-bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 2px; }
        .msg.me + .msg.me { margin-top: -10px; }
        
        .admin-bubble { border: 2px solid var(--error); }
        .admin-label { 
            background: var(--error); color: #fff; font-size: 9px; padding: 2px 6px; 
            border-radius: 4px; font-weight: 900; margin-left: 8px; vertical-align: middle; 
        }

        .reply-box { 
            background: rgba(0,0,0,0.2); border-left: 3px solid var(--accent); 
            padding: 5px 10px; margin-bottom: 8px; border-radius: 4px; font-size: 12px; opacity: 0.8;
        }

        /* --- ПАНЕЛЬ ГОЛОСА --- */
        #voice-bar { 
            background: linear-gradient(to right, #1a1e23, #050608); 
            padding: 12px 30px; border-bottom: 2px solid var(--accent); 
            display: flex; align-items: center; justify-content: space-between;
        }
        .voice-info { display: flex; align-items: center; gap: 15px; }
        .pulse { 
            width: 12px; height: 12px; background: var(--accent); border-radius: 50%; 
            animation: pulse-ring 1.5s infinite; 
        }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.8; } }

        /* --- ОКНО ЗВОНКА --- */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 5000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .call-card { 
            background: var(--panel); border: 2px solid var(--accent); 
            width: 380px; padding: 40px; border-radius: 30px; text-align: center;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.15);
        }
        .call-avatar { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--accent); margin-bottom: 20px; object-fit: cover; }
        .call-nick { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .call-timer { color: var(--accent); font-family: monospace; font-size: 20px; margin-bottom: 30px; }
        .btn-row { display: flex; gap: 15px; justify-content: center; }
        
        .btn { 
            padding: 12px 25px; border-radius: 12px; border: none; cursor: pointer; 
            font-weight: bold; transition: 0.2s; text-transform: uppercase;
        }
        .btn-accept { background: var(--accent); color: #000; }
        .btn-decline { background: var(--error); color: #fff; }
        .btn-mute { background: #444; color: #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ВВОД --- */
        #input-area { 
            padding: 20px 30px; background: var(--panel); border-top: 1px solid #222; 
            display: flex; align-items: center; gap: 15px; 
        }
        .chat-input { 
            flex: 1; background: #08090b; border: 1px solid #333; color: #fff; 
            padding: 14px 20px; border-radius: 15px; font-size: 15px; transition: 0.3s;
        }
        .chat-input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,255,136,0.1); }
        .send-btn { background: var(--accent); border: none; width: 50px; height: 50px; border-radius: 15px; cursor: pointer; font-size: 20px; }

        /* --- АДМИН ПАНЕЛЬ --- */
        #admin-actions { display: flex; gap: 10px; }
        .admin-only { color: var(--error); border: 1px solid var(--error); padding: 5px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; }

        #action-notify { 
            background: #1c2127; padding: 10px 30px; border-top: 2px solid var(--accent); 
            display: flex; justify-content: space-between; font-size: 13px;
        }

        .ctx-menu { 
            position: fixed; background: #181b21; border: 1px solid #333; 
            border-radius: 10px; z-index: 10000; display: none; min-width: 180px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .ctx-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #252a33; }
        .ctx-item:hover { background: var(--accent); color: #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="hideCtx()" oncontextmenu="return false;">

    <div id="auth-overlay" style="position:fixed; inset:0; background:var(--bg); z-index:20000; display:flex; align-items:center; justify-content:center;">
        <div class="call-card">
            <h1 style="color:var(--accent); letter-spacing: 3px;">DANCHAT V7</h1>
            <input type="text" id="login-n" class="chat-input" placeholder="Никнейм" style="margin-bottom:10px; width:100%">
            <input type="password" id="login-p" class="chat-input" placeholder="Пароль" style="width:100%">
            <button class="btn btn-accept" style="width:100%; margin-top:20px;" onclick="doLogin()">Войти / Создать</button>
        </div>
    </div>

    <div id="modal-settings" class="modal">
        <div class="call-card">
            <h3>ПРОФИЛЬ</h3>
            <img id="set-av-preview" class="call-avatar" src="">
            <input type="file" id="file-av" class="hidden" onchange="previewFile(this, 'set-av-preview')">
            <button class="btn btn-mute" style="margin-bottom:15px; width:100%" onclick="document.getElementById('file-av').click()">Загрузить аватар</button>
            <input type="text" id="admin-code-input" class="chat-input" placeholder="Админ-код (буквы видны)" style="margin-bottom:15px; width:100%">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span>Цвет ника:</span>
                <input type="color" id="set-nick-color">
            </div>
            <button class="btn btn-accept" style="width:100%" onclick="saveProfile()">Сохранить</button>
            <button class="btn btn-decline" style="width:100%; margin-top:10px;" onclick="closeModal('modal-settings')">Закрыть</button>
        </div>
    </div>

    <div id="modal-call" class="modal">
        <div class="call-card">
            <div id="horror-ui" class="hidden" style="color:red; font-weight:900; margin-bottom:15px; animation: pulse-ring 0.2s infinite;">НЕ ОТВЕЧАЙ! НЕ ОТВЕЧАЙ!</div>
            <img id="c-av" class="call-avatar" src="">
            <div id="c-nick" class="call-nick">---</div>
            <div id="c-status" class="call-timer">Звонок...</div>
            <div id="c-mic-label" style="margin-bottom:20px; font-size:12px; color:var(--accent);">МИКРОФОН: ВКЛ</div>
            <div id="c-btns" class="btn-row"></div>
        </div>
    </div>

    <div id="sidebar" class="hidden">
        <div class="sidebar-header">
            <div class="nav-icons">
                <span class="nav-btn" onclick="openSettings()">⚙️</span>
                <span class="nav-btn" onclick="globalUserSearch()">🔍</span>
                <span class="nav-btn" onclick="showGroupCreate()">👥</span>
            </div>
            <div id="my-nick-display" style="font-weight:bold; color:var(--accent);"></div>
        </div>
        <div id="contact-list"></div>
    </div>

    <div id="chat-area" class="hidden">
        <header onclick="openInfoMenu()">
            <div class="header-info">
                <h2 id="chat-name">Глобальный чат</h2>
                <span id="chat-status-sub">Загрузка...</span>
            </div>
            <div id="admin-actions">
                <button id="btn-wipe" class="hidden" onclick="event.stopPropagation(); wipeChat()" style="background:none; border:none; cursor:pointer; font-size:22px;">🧹</button>
                <button id="btn-call" class="hidden" onclick="event.stopPropagation(); initCallFlow()" style="background:var(--accent); color:#000; border:none; padding:8px 18px; border-radius:8px; font-weight:bold; cursor:pointer;">ПОЗВОНИТЬ</button>
            </div>
        </header>

        <div id="voice-bar" class="hidden">
            <div class="voice-info">
                <div class="pulse"></div>
                <div>
                    <b>ГОЛОСОВОЙ КАНАЛ</b><br>
                    <small id="voice-list">Участники: ---</small>
                </div>
            </div>
            <button class="btn btn-decline" style="font-size:10px; padding:5px 15px;" onclick="exitVoice()">ВЫЙТИ</button>
        </div>

        <div id="chat-window"></div>

        <div id="action-notify" class="hidden">
            <span id="action-desc"></span>
            <span onclick="resetActions()" style="color:var(--error); cursor:pointer; font-weight:bold;">ОТМЕНА ✕</span>
        </div>

        <div id="input-area">
            <span class="nav-btn" onclick="toggleEmoji()">😊</span>
            <input type="file" id="file-msg" class="hidden" onchange="sendImage(this)">
            <span class="nav-btn" onclick="document.getElementById('file-msg').click()">🖼️</span>
            <input type="text" id="msg-input" class="chat-input" placeholder="Напишите что-нибудь..." onkeydown="if(event.key==='Enter') dispatchSend()">
            <button class="send-btn" onclick="dispatchSend()">➤</button>
        </div>
    </div>

    <div id="ctx-menu" class="ctx-menu">
        <div class="ctx-item" onclick="prepareReply()">Ответить</div>
        <div id="admin-tools" class="hidden">
            <div class="ctx-item" onclick="prepareEdit()">Изменить</div>
            <div class="ctx-item" style="color:var(--error)" onclick="deleteMessage()">Удалить</div>
        </div>
    </div>

    <script>
        // Инициализация Firebase
        const firebaseConfig = { 
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE", 
            authDomain: "danblox-e209f.firebaseapp.com", 
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com", 
            projectId: "danblox-e209f" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const defAvatar = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        let user = null, currentChatID = 'global', currentPeer = '', selectedMsgID = null, selectedMsgData = null;
        let isEditMode = false, replyMsgData = null, micActive = true, mediaStream = null;

        // --- ЛОГИКА ВХОДА ---
        async function doLogin() {
            const n = document.getElementById('login-n').value.trim();
            const p = document.getElementById('login-p').value.trim();
            if(!n || !p) return alert("Заполни поля!");

            const snap = await db.ref('users/' + n).get();
            if(!snap.exists()) {
                user = { nick: n, pass: p, av: defAvatar, color: '#ffffff', admin: false, id: Date.now() };
                await db.ref('users/' + n).set(user);
            } else {
                if(snap.val().pass !== p) return alert("Пароль неверный!");
                user = snap.val();
            }
            launchApp();
        }

        function launchApp() {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('chat-area').classList.remove('hidden');
            
            document.getElementById('my-nick-display').innerText = user.nick;
            document.getElementById('my-nick-display').style.color = user.color;

            // Статус Online
            db.ref('presence/' + user.nick).set(true);
            db.ref('presence/' + user.nick).onDisconnect().remove();

            syncContacts();
            listenToCalls();
            loadChat('global', 'Глобальный чат');
        }

        // --- КОНТАКТЫ (ПРОВЕРКА НА ДУБЛИ) ---
        function syncContacts() {
            db.ref(`users/${user.nick}/friends`).on('value', async snap => {
                const container = document.getElementById('contact-list');
                container.innerHTML = `
                    <div class="contact-item" onclick="loadChat('global', 'Глобальный чат')">
                        <img src="https://cdn-icons-png.flaticon.com/512/814/814513.png">
                        <div class="contact-meta"><b>Глобальный чат</b></div>
                    </div>`;
                
                const data = snap.val() || {};
                const uniqueIds = [...new Set(Object.keys(data))];

                for(let id of uniqueIds) {
                    const type = data[id];
                    const isGroup = type === 'group';
                    const info = (await db.ref((isGroup ? 'groups/' : 'users/') + id).get()).val();
                    if(!info) continue;

                    const el = document.createElement('div');
                    el.className = 'contact-item';
                    el.onclick = () => isGroup ? loadChat(id, info.name) : startPrivate(info.nick);
                    el.innerHTML = `
                        <img src="${info.av || defAvatar}">
                        <div class="contact-meta">
                            <b style="color:${isGroup ? '#fff' : info.color}">${isGroup ? info.name : info.nick}</b>
                            <div class="status-text" id="stat-${id}">...</div>
                        </div>
                        <span onclick="event.stopPropagation(); dropContact('${id}')" style="color:red">✕</span>`;
                    container.appendChild(el);

                    if(!isGroup) db.ref('presence/' + id).on('value', p => {
                        const target = document.getElementById('stat-'+id);
                        if(target) {
                            target.innerText = p.exists() ? 'В СЕТИ' : 'OFFLINE';
                            target.className = 'status-text ' + (p.exists() ? 'online' : 'offline');
                        }
                    });
                }
            });
        }

        async function startPrivate(targetNick) {
            if(targetNick === user.nick) return;
            // Двустороннее добавление
            await db.ref(`users/${user.nick}/friends/${targetNick}`).set('user');
            await db.ref(`users/${targetNick}/friends/${user.nick}`).set('user');
            
            const id = user.nick < targetNick ? user.nick+'_'+targetNick : targetNick+'_'+user.nick;
            loadChat(id, targetNick);
        }

        // --- ЧАТ И СООБЩЕНИЯ ---
        function loadChat(id, name) {
            currentChatID = id;
            const isWide = id === 'global' || id.startsWith('group');
            currentPeer = isWide ? '' : name;

            document.getElementById('chat-name').innerText = name;
            document.getElementById('chat-window').innerHTML = '';
            document.getElementById('btn-call').classList.remove('hidden');
            document.getElementById('voice-bar').classList.add('hidden');

            db.ref('messages/' + id).off();
            db.ref('messages/' + id).on('child_added', s => drawMessage(s.key, s.val()));
            db.ref('messages/' + id).on('child_changed', s => {
                const m = document.getElementById('msg-'+s.key);
                if(m) m.querySelector('.text-node').innerText = s.val().txt;
            });
            db.ref('messages/' + id).on('child_removed', s => document.getElementById('msg-'+s.key)?.remove());

            updateHeader();
            if(isWide) monitorVoiceRoom();
        }

        function updateHeader() {
            const sub = document.getElementById('chat-status-sub');
            if(currentPeer) {
                db.ref('presence/' + currentPeer).on('value', p => {
                    sub.innerText = p.exists() ? "Online" : "Offline";
                    sub.style.color = p.exists() ? "var(--accent)" : "#666";
                });
            } else {
                db.ref('presence').on('value', s => {
                    let count = 0; s.forEach(() => count++);
                    sub.innerText = "Участников онлайн: " + count;
                });
            }
            document.getElementById('btn-wipe').classList.toggle('hidden', !user.admin);
        }

        async function drawMessage(id, data) {
            const container = document.getElementById('chat-window');
            const row = document.createElement('div');
            const uInfo = (await db.ref('users/'+data.sn).get()).val() || {av: defAvatar, color: '#fff'};

            row.id = 'msg-' + id;
            row.className = `msg ${data.sn === user.nick ? 'me' : ''}`;
            row.oncontextmenu = (e) => { e.preventDefault(); showCtx(e, id, data); };

            let content = data.type === 'img' ? `<img src="${data.txt}" style="max-width:300px; border-radius:10px; margin-top:5px;">` : `<div class="text-node">${data.txt}</div>`;
            
            row.innerHTML = `
                <img src="${uInfo.av}" class="msg-avatar" onclick="startPrivate('${data.sn}')">
                <div class="msg-bubble ${uInfo.admin ? 'admin-bubble' : ''}">
                    <b style="color:${uInfo.color}">${data.sn} ${uInfo.admin ? '<span class="admin-label">ADMIN</span>' : ''}</b>
                    ${data.rp ? `<div class="reply-box">↪ ${data.rp}</div>` : ''}
                    ${content}
                </div>`;
            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        function dispatchSend() {
            const inp = document.getElementById('msg-input');
            const val = inp.value.trim();
            if(!val && !isEditMode) return;

            if(isEditMode) {
                db.ref(`messages/${currentChatID}/${selectedMsgID}`).update({ txt: val });
            } else {
                db.ref('messages/' + currentChatID).push({
                    sn: user.nick, txt: val, type: 'text',
                    rp: replyMsgData ? (replyMsgData.txt.substring(0,30) + '...') : null
                });
                // Обновляем список контактов у получателя в ЛС
                if(currentPeer) db.ref(`users/${currentPeer}/friends/${user.nick}`).set('user');
            }
            inp.value = '';
            resetActions();
        }

        // --- СИНХРОННЫЕ ЗВОНКИ (ИСПРАВЛЕННЫЙ БАГ) ---
        async function initCallFlow() {
            if(!currentPeer) {
                // Групповой голос
                await db.ref(`voice_rooms/${currentChatID}/${user.nick}`).set(true);
                startMedia();
                return;
            }

            // Личный звонок
            const target = currentPeer;
            const tInfo = (await db.ref('users/'+target).get()).val();
            
            document.getElementById('c-av').src = tInfo.av;
            document.getElementById('c-nick').innerText = target;
            document.getElementById('c-status').innerText = "Исходящий вызов...";
            document.getElementById('c-btns').innerHTML = `<button class="btn btn-decline" onclick="killCall()">ОТМЕНА</button>`;
            
            showModal('modal-call');
            // Создаем запись звонка
            await db.ref(`calls/${target}`).set({ from: user.nick, status: 'ringing', ts: Date.now() });
            startMedia();
        }

        function listenToCalls() {
            // Слушаем входящие
            db.ref(`calls/${user.nick}`).on('value', async snap => {
                const call = snap.val();
                if(!call) {
                    // Если запись пропала - завершаем всё у себя
                    stopMedia();
                    closeModal('modal-call');
                    return;
                }

                // Проверка на "протухший" звонок (более 45 сек)
                if(Date.now() - call.ts > 45000) { killCall(); return; }

                const senderInfo = (await db.ref('users/'+call.from).get()).val();
                const isDeath = (call.from === "Смерть_в_нищете");

                document.getElementById('c-av').src = senderInfo.av;
                document.getElementById('c-nick').innerText = call.from;
                document.getElementById('horror-ui').classList.toggle('hidden', !isDeath);
                
                const btns = document.getElementById('c-btns');
                btns.innerHTML = '';

                if(call.status === 'ringing') {
                    document.getElementById('c-status').innerText = "Входящий вызов...";
                    if(isDeath) {
                        btns.innerHTML = `<button class="btn btn-accept" onclick="acceptCall()">ОТВЕТИТЬ</button><button class="btn btn-accept" onclick="acceptCall()">ОТВЕТИТЬ</button>`;
                    } else {
                        btns.innerHTML = `<button class="btn btn-accept" onclick="acceptCall()">ПРИНЯТЬ</button><button class="btn btn-decline" onclick="killCall()">ОТКЛОНИТЬ</button>`;
                    }
                } else if(call.status === 'active') {
                    document.getElementById('c-status').innerText = "Разговор...";
                    btns.innerHTML = `<button class="btn btn-mute" id="m-toggle" onclick="toggleMic()">ВЫКЛ МИК</button><button class="btn btn-decline" onclick="killCall()">ЗАВЕРШИТЬ</button>`;
                }
                showModal('modal-call');
            });

            // Слушаем изменения своих исходящих звонков (если мы звонили)
            db.ref('calls').on('child_changed', snap => {
                const c = snap.val();
                if(c.from === user.nick && c.status === 'active') {
                    document.getElementById('c-status').innerText = "Разговор...";
                    document.getElementById('c-btns').innerHTML = `<button class="btn btn-mute" id="m-toggle" onclick="toggleMic()">ВЫКЛ МИК</button><button class="btn btn-decline" onclick="killCall()">ЗАВЕРШИТЬ</button>`;
                }
            });

            // КРИТИЧЕСКИЙ ФИКС: Если запись звонка удалена (кто-то нажал сброс), закрываем у всех
            db.ref('calls').on('child_removed', snap => {
                const c = snap.val();
                if(c.from === user.nick || snap.key === user.nick) {
                    stopMedia();
                    closeModal('modal-call');
                }
            });
        }

        async function acceptCall() {
            await db.ref(`calls/${user.nick}`).update({ status: 'active' });
            startMedia();
        }

        async function killCall() {
            stopMedia();
            // Удаляем свою запись (если мы получатель)
            await db.ref(`calls/${user.nick}`).remove();
            // Ищем запись, где мы отправитель
            const s = await db.ref('calls').get();
            s.forEach(c => {
                if(c.val().from === user.nick) db.ref('calls/' + c.key).remove();
            });
            closeModal('modal-call');
        }

        async function startMedia() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log("Mic connected");
            } catch(e) { console.warn("No mic access"); }
        }

        function stopMedia() {
            if(mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            micActive = true;
            document.getElementById('c-mic-label').innerText = "МИКРОФОН: ВКЛ";
        }

        function toggleMic() {
            micActive = !micActive;
            if(mediaStream) mediaStream.getAudioTracks()[0].enabled = micActive;
            document.getElementById('c-mic-label').innerText = "МИКРОФОН: " + (micActive ? "ВКЛ" : "ВЫКЛ");
            document.getElementById('m-toggle').innerText = micActive ? "ВЫКЛ МИК" : "ВКЛ МИК";
        }

        function monitorVoiceRoom() {
            db.ref(`voice_rooms/${currentChatID}`).on('value', s => {
                const members = s.val() || {};
                const list = Object.keys(members);
                const bar = document.getElementById('voice-bar');
                if(list.length > 0) {
                    bar.classList.remove('hidden');
                    document.getElementById('voice-list').innerText = "Участники: " + list.join(', ');
                } else {
                    bar.classList.add('hidden');
                }
            });
        }

        async function exitVoice() {
            await db.ref(`voice_rooms/${currentChatID}/${user.nick}`).remove();
            stopMedia();
        }

        // --- ПРОФИЛЬ И АДМИНКА ---
        function openSettings() {
            document.getElementById('set-av-preview').src = user.av;
            document.getElementById('admin-code-input').value = user.admin ? "DanAdmin777" : "";
            document.getElementById('set-nick-color').value = user.color;
            showModal('modal-settings');
        }

        async function saveProfile() {
            const code = document.getElementById('admin-code-input').value;
            const updates = {
                av: document.getElementById('set-av-preview').src,
                color: document.getElementById('set-nick-color').value,
                admin: (code === "DanAdmin777")
            };
            await db.ref('users/'+user.nick).update(updates);
            user = (await db.ref('users/'+user.nick).get()).val();
            document.getElementById('my-nick-display').innerText = user.nick;
            document.getElementById('my-nick-display').style.color = user.color;
            closeModal('modal-settings');
        }

        // --- ГРУППЫ ---
        async function showGroupCreate() {
            const name = prompt("Название группы:");
            if(!name) return;
            const gid = 'group_' + Date.now();
            await db.ref('groups/' + gid).set({
                name: name, av: "https://cdn-icons-png.flaticon.com/512/6387/6387947.png",
                owner: user.nick, members: { [user.nick]: true }
            });
            await db.ref(`users/${user.nick}/friends/${gid}`).set('group');
        }

        async function openInfoMenu() {
            if(currentChatID === 'global') return;
            if(currentChatID.startsWith('group')) {
                const g = (await db.ref('groups/'+currentChatID).get()).val();
                let msg = "Участники группы:\n";
                for(let m in g.members) msg += "- " + m + (m === g.owner ? " (Admin)\n" : "\n");
                
                if(g.owner === user.nick) {
                    const act = confirm(msg + "\nХотите добавить кого-то?");
                    if(act) {
                        const target = prompt("Ник игрока:");
                        if(target) {
                            await db.ref(`groups/${currentChatID}/members/${target}`).set(true);
                            await db.ref(`users/${target}/friends/${currentChatID}`).set('group');
                        }
                    }
                } else { alert(msg); }
            }
        }

        // --- СЛУЖЕБНЫЕ ---
        function showCtx(e, id, data) {
            selectedMsgID = id; selectedMsgData = data;
            const menu = document.getElementById('ctx-menu');
            document.getElementById('admin-tools').classList.toggle('hidden', !(data.sn === user.nick || user.admin));
            menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
        }

        function prepareReply() { replyMsgData = selectedMsgData; showNotif("Ответ на: " + selectedMsgData.txt); }
        function prepareEdit() { isEditMode = true; document.getElementById('msg-input').value = selectedMsgData.txt; showNotif("Редактирование..."); }
        function deleteMessage() { if(confirm("Удалить?")) db.ref(`messages/${currentChatID}/${selectedMsgID}`).remove(); }
        function wipeChat() { if(confirm("Очистить историю?")) db.ref('messages/'+currentChatID).remove(); }

        function showNotif(t) { document.getElementById('action-notify').classList.remove('hidden'); document.getElementById('action-desc').innerText = t; }
        function resetActions() { isEditMode = false; replyMsgData = null; document.getElementById('action-notify').classList.add('hidden'); document.getElementById('msg-input').value = ''; }
        
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function hideCtx() { document.getElementById('ctx-menu').style.display = 'none'; }
        function previewFile(inp, id) { const r = new FileReader(); r.onload = e => document.getElementById(id).src = e.target.result; r.readAsDataURL(inp.files[0]); }
        
        async function dropContact(id) { if(confirm("Удалить контакт?")) await db.ref(`users/${user.nick}/friends/${id}`).remove(); }
        function sendImage(inp) {
            const f = inp.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = e => db.ref('messages/'+currentChatID).push({ sn: user.nick, txt: e.target.result, type: 'img' });
            r.readAsDataURL(f);
        }

        function globalUserSearch() {
            db.ref('users').once('value', s => {
                let list = "Найденные пользователи:\n";
                s.forEach(u => { if(u.key !== user.nick) list += u.key + "\n"; });
                const res = prompt(list + "\nВведите ник для ЛС:");
                if(res) startPrivate(res);
            });
        }
    </script>
</body>
</html>
