<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox: Fixed Sync & Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; touch-action: none; user-select: none; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); color: white; }
        .auth-box { background: #222; padding: 25px; border-radius: 20px; border: 1px solid #444; text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; text-align: center; font-size: 14px; box-sizing: border-box; background: #333; color: #fff; }
        .btn-main { width: 100%; padding: 12px; background: #ff0000; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #leaderboard { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); color: gold; padding: 10px; border-radius: 8px; border: 1px solid gold; font-size: 12px; z-index: 500; min-width: 130px; }
        #admin-menu { position: absolute; left: 15px; top: 15px; background: rgba(60,0,0,0.9); padding: 15px; border-radius: 10px; border: 2px solid red; z-index: 1500; color: white; display: flex; flex-direction: column; gap: 8px; }
        .adm-btn { background: #444; color: white; border: 1px solid #fff; padding: 5px; font-size: 11px; cursor: pointer; }
        
        #mobile-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .joy-pad { position: absolute; bottom: 30px; left: 30px; display: grid; grid-template-columns: repeat(3, 65px); gap: 8px; pointer-events: auto; }
        .act-pad { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .ctrl-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.15); border: 2px solid #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        
        .hidden { display: none !important; }
        #respawn-btn { display: none; position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); padding: 20px; background: red; color: white; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; z-index: 3000; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="leaderboard"><b>TOP KILLS</b><div id="lb-inner"></div></div>
    <button id="respawn-btn">ВОЗРОДИТЬСЯ</button>

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h2 id="auth-title">РЕГИСТРАЦИЯ</h2>
            <input type="text" id="adm-pass" placeholder="СЕКРЕТНЫЙ КОД АДМИНА (ОПЦИЯ)">
            <input type="text" id="auth-nick" placeholder="Никнейм">
            <input type="password" id="auth-pass" placeholder="Пароль">
            <button class="btn-main" onclick="window.handleAuth()">ВОЙТИ В МИР</button>
            <p style="font-size: 11px; cursor: pointer; color: #aaa; margin-top:15px;" onclick="window.toggleAuthMode()" id="auth-toggle">Нужен новый аккаунт?</p>
        </div>
    </div>

    <div id="admin-menu" class="hidden">
        <b style="color:red; font-size:12px;">ADMIN PANEL</b>
        <button class="adm-btn" id="fly-btn" onclick="window.toggleFly()">FLY: OFF</button>
        <div style="font-size:10px;">SPD: <span id="v-spd">0.3</span></div>
        <div style="display:flex; gap:4px;">
            <button class="adm-btn" onclick="window.adjS(0.1)">S+</button><button class="adm-btn" onclick="window.adjS(-0.1)">S-</button>
        </div>
        <button class="adm-btn" style="background:maroon" onclick="window.clearLB()">СБРОСИТЬ ТОП</button>
    </div>

    <div id="mobile-ui" class="hidden">
        <div class="joy-pad">
            <div></div><div class="ctrl-btn" id="m-w">W</div><div></div>
            <div class="ctrl-btn" id="m-a">A</div><div class="ctrl-btn" id="m-s">S</div><div class="ctrl-btn" id="m-d">D</div>
        </div>
        <div class="act-pad">
            <div class="ctrl-btn" id="m-jump">JUMP</div>
            <div class="ctrl-btn" id="m-atk" style="background:rgba(255,0,0,0.4); width:80px; height:80px;">ATK</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const REF = db.ref('world_v8'); 

        let scene, camera, renderer, myModel, mySword;
        let myID = "", myNick = "", myHP = 100, inGame = false, isDead = false;
        let isRegMode = true, isAtk = false, isFly = false, isRClick = false;
        let moveSpd = 0.32, jumpPwr = 0.45;
        let otherPlayers = {}, colliders = [];
        let keys = { f:false, b:false, l:false, r:false };
        let vy = 0, canJ = true, camAz = 0, camDist = 20;

        function create3DUI(name) {
            const g = new THREE.Group();
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white'; ctx.font = 'bold 36px Arial'; ctx.textAlign = 'center';
            ctx.fillText(name || "Player", 128, 45);
            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: tex}));
            sprite.position.y = 3; sprite.scale.set(3, 0.75, 1);
            g.add(sprite);

            const hpBar = new THREE.Mesh(new THREE.PlaneGeometry(2, 0.2), new THREE.MeshBasicMaterial({color: 0x00ff00}));
            hpBar.position.y = 2.4;
            g.add(hpBar);
            g.hpBar = hpBar;
            return g;
        }

        function createHuman(color, name) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.4, 0.6), new THREE.MeshStandardMaterial({color}));
            body.position.y = 0.7;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 1.75;
            g.add(body, head);
            const ui = create3DUI(name);
            g.add(ui); g.ui = ui;
            return g;
        }

        function buildMap() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87ceeb);
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x2d4c1e}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);

            const mat = new THREE.MeshStandardMaterial({color: 0x666666});
            for(let i=0; i<40; i++){
                const x = (Math.random()-0.5)*200, z = (Math.random()-0.5)*200;
                if(Math.hypot(x,z) < 15) continue;
                const h = 2 + Math.random()*5;
                const m = new THREE.Mesh(new THREE.BoxGeometry(4, h, 4), mat);
                m.position.set(x, h/2, z); scene.add(m);
                colliders.push(new THREE.Box3().setFromObject(m));
            }
        }

        function initGame() {
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            
            myModel = createHuman(0x0066ff, myNick);
            myModel.ui.visible = false;
            mySword = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.8, 0.05), new THREE.MeshStandardMaterial({color:0xffffff}));
            blade.position.y = 0.9; mySword.add(blade);
            mySword.rotation.x = Math.PI/2; mySword.position.set(0.7, 0.8, 0.3);
            myModel.add(mySword);
            scene.add(myModel);

            REF.child('players').on('value', snap => {
                const data = snap.val() || {};
                const now = Date.now();
                Object.keys(otherPlayers).forEach(id => { if(!data[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }});
                Object.keys(data).forEach(id => {
                    if(id === myID) { 
                        myHP = data[id].hp; 
                        if(myHP <= 0 && !isDead) die(); 
                        return; 
                    }
                    if(now - data[id].ls > 10000) return;
                    if(!otherPlayers[id]) {
                        otherPlayers[id] = createHuman(0xff3300, data[id].n);
                        const s = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.5, 0.05), new THREE.MeshStandardMaterial());
                        s.rotation.x = Math.PI/2; s.position.set(0.7, 0.8, 0.3);
                        otherPlayers[id].add(s); scene.add(otherPlayers[id]);
                    }
                    const p = otherPlayers[id];
                    p.position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
                    p.rotation.y = data[id].ry;
                    p.children[3].position.z = data[id].at ? 1.5 : 0.3;
                    
                    if(data[id].dead) p.rotation.z = Math.PI/2; else p.rotation.z = 0;
                    const hF = (data[id].hp || 0) / 100;
                    p.ui.hpBar.scale.x = hF;
                    p.ui.hpBar.material.color.setHex(hF > 0.3 ? 0x00ff00 : 0xff0000);
                });
            });

            db.ref('leaderboard').orderByValue().limitToLast(5).on('value', s => {
                let h = ""; s.forEach(v => { h = `<div>${v.key}: ${v.val()}</div>` + h; });
                document.getElementById('lb-inner').innerHTML = h;
            });

            animate();
        }

        function die() {
            isDead = true;
            myModel.rotation.z = Math.PI/2;
            document.getElementById('respawn-btn').style.display = 'block';
            REF.child('players/'+myID).update({ dead: true });
        }

        window.respawn = () => {
            isDead = false;
            myHP = 100;
            myModel.rotation.z = 0;
            myModel.position.set(0,0,0);
            document.getElementById('respawn-btn').style.display = 'none';
            REF.child('players/'+myID).update({ hp: 100, dead: false, x:0, y:0, z:0 });
        };
        document.getElementById('respawn-btn').onclick = window.respawn;

        function attack() {
            if(isDead || isAtk) return;
            isAtk = true;
            new TWEEN.Tween(mySword.position).to({z: 1.6}, 70).chain(
                new TWEEN.Tween(mySword.position).to({z: 0.3}, 100).onComplete(() => isAtk = false)
            ).start();
            REF.child('players/'+myID).update({ at: true });
            setTimeout(() => REF.child('players/'+myID).update({ at: false }), 150);

            Object.keys(otherPlayers).forEach(id => {
                if(myModel.position.distanceTo(otherPlayers[id].position) < 5) {
                    REF.child('players/'+id).transaction(p => {
                        if(p && p.hp > 0) {
                            p.hp -= 20;
                            if(p.hp <= 0) { p.hp = 0; p.dead = true; db.ref('leaderboard/'+myNick).transaction(k => (k||0)+1); }
                        }
                        return p;
                    });
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(inGame && !isDead) {
                const prev = myModel.position.clone();
                const dir = new THREE.Vector3();
                if(keys.f) dir.z -= 1; if(keys.b) dir.z += 1;
                if(keys.l) dir.x -= 1; if(keys.r) dir.x += 1;
                if(dir.length() > 0) {
                    dir.applyAxisAngle(new THREE.Vector3(0,1,0), camAz);
                    myModel.position.add(dir.normalize().multiplyScalar(moveSpd));
                    myModel.rotation.y = Math.atan2(dir.x, dir.z);
                }
                const box = new THREE.Box3().setFromObject(myModel);
                colliders.forEach(c => { if(box.intersectsBox(c)) myModel.position.copy(prev); });

                if(!isFly) {
                    myModel.position.y += vy;
                    if(myModel.position.y > 0) { vy -= 0.02; canJ = false; }
                    else { myModel.position.y = 0; vy = 0; canJ = true; }
                }
                REF.child('players/'+myID).update({ x: myModel.position.x, y: myModel.position.y, z: myModel.position.z, ry: myModel.rotation.y, ls: Date.now(), hp: myHP, n: myNick, dead: false });
            }
            camera.position.set(myModel.position.x + camDist * Math.sin(camAz), myModel.position.y + 10, myModel.position.z + camDist * Math.cos(camAz));
            camera.lookAt(myModel.position.x, myModel.position.y + 1, myModel.position.z);
            TWEEN.update(); renderer.render(scene, camera);
        }

        // --- GLOBAL EXPORTS ---
        window.toggleAuthMode = () => {
            isRegMode = !isRegMode;
            document.getElementById('auth-title').innerText = isRegMode ? "РЕГИСТРАЦИЯ" : "ВХОД";
            document.getElementById('auth-toggle').innerText = isRegMode ? "Уже есть аккаунт? Войти" : "Нужен новый аккаунт?";
        };

        window.handleAuth = () => {
            const adm = document.getElementById('adm-pass').value.trim();
            const n = document.getElementById('auth-nick').value.trim();
            if(n.length < 2) return;
            if(adm.toLowerCase() === "la ginger sekolah") document.getElementById('admin-menu').classList.remove('hidden');
            myNick = n; myID = 'u' + Math.random().toString(36).substr(2, 6);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('mobile-ui').classList.remove('hidden');
            inGame = true; buildMap(); initGame();
            REF.child('players/'+myID).set({ n: myNick, hp: 100, x: 0, y: 0, z: 0, ls: Date.now(), dead: false });
            REF.child('players/'+myID).onDisconnect().remove();
        };

        window.toggleFly = () => { isFly = !isFly; document.getElementById('fly-btn').innerText = isFly ? "FLY: ON" : "FLY: OFF"; };
        window.adjS = (v) => { moveSpd += v; document.getElementById('v-spd').innerText = moveSpd.toFixed(1); };
        window.clearLB = () => { if(confirm("Сбросить топ?")) db.ref('leaderboard').remove(); };

        // --- CONTROLS ---
        window.onkeydown = (e) => {
            const k = e.code;
            if(k==='KeyW') keys.f=true; if(k==='KeyS') keys.b=true;
            if(k==='KeyA') keys.l=true; if(k==='KeyD') keys.r=true;
            if(k==='Space' && canJ && !isDead) vy = jumpPwr;
        };
        window.onkeyup = (e) => {
            const k = e.code;
            if(k==='KeyW') keys.f=false; if(k==='KeyS') keys.b=false;
            if(k==='KeyA') keys.l=false; if(k==='KeyD') keys.r=false;
        };
        window.onmousedown = (e) => { if(e.button===2) isRClick=true; if(e.button===0 && inGame) attack(); };
        window.onmouseup = (e) => { if(e.button===2) isRClick=false; };
        window.onmousemove = (e) => { if(isRClick) camAz -= e.movementX * 0.01; };
        window.addEventListener('wheel', e => camDist = Math.max(10, Math.min(60, camDist + e.deltaY * 0.05)), {passive:true});

        const bind = (id, k) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); keys[k]=true; };
            el.onpointerup = () => keys[k]=false;
            el.onpointerleave = () => keys[k]=false;
        };
        bind('m-w','f'); bind('m-s','b'); bind('m-a','l'); bind('m-d','r');
        document.getElementById('m-jump').onpointerdown = (e) => { e.preventDefault(); if(canJ && !isDead) vy = jumpPwr; };
        document.getElementById('m-atk').onpointerdown = (e) => { e.preventDefault(); attack(); };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/20.0.0/tween.umd.js"></script>
</body>
</html>
