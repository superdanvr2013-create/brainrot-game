<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox: Account & World Update</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; touch-action: none; user-select: none; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); color: white; }
        .auth-box { background: #222; padding: 30px; border-radius: 20px; border: 1px solid #444; text-align: center; width: 280px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; text-align: center; }
        .btn-main { width: 100%; padding: 12px; background: #ff0000; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .info-panel { position: absolute; background: rgba(0,0,0,0.6); color: #fff; padding: 10px; border-radius: 8px; font-size: 12px; z-index: 500; pointer-events: none; }
        #leaderboard { top: 15px; right: 15px; border: 1px solid gold; }
        
        #admin-menu { position: absolute; left: 10px; top: 150px; background: rgba(255,0,0,0.2); padding: 10px; border-radius: 8px; border: 1px solid red; z-index: 1000; }
        .hp-bar-3d { background: rgba(0,0,0,0.5); border: 1px solid white; width: 60px; height: 6px; position: relative; }
        .hp-fill-3d { background: #f00; height: 100%; }

        #mobile-controls { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .joy-pad { position: absolute; bottom: 30px; left: 30px; display: grid; grid-template-columns: repeat(3, 65px); gap: 8px; pointer-events: auto; }
        .act-pad { position: absolute; bottom: 30px; right: 30px; pointer-events: auto; display: flex; flex-direction: column; gap: 15px; }
        .ctrl-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.15); border: 2px solid #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="leaderboard" class="info-panel"><b>TOP KILLS</b><div id="lb-inner"></div></div>

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h2 id="auth-title">РЕГИСТРАЦИЯ</h2>
            <input type="text" id="auth-nick" placeholder="Никнейм">
            <input type="password" id="auth-pass" placeholder="Пароль">
            <button class="btn-main" id="auth-action-btn" onclick="handleAuth()">СОЗДАТЬ АККАУНТ</button>
            <p style="font-size: 12px; cursor: pointer; color: #aaa;" onclick="toggleAuthMode()" id="auth-toggle">Уже есть аккаунт? Войти</p>
        </div>
    </div>

    <div id="admin-menu" class="hidden">
        <div style="font-size:10px; color:red; font-weight:bold;">ADM MODE</div>
        <button onclick="toggleFly()" id="fly-btn" style="font-size:10px;">FLY: OFF</button>
        <button onclick="clearLB()" style="font-size:10px; background:maroon; color:white;">RESET LB</button>
    </div>

    <div id="mobile-controls" class="hidden">
        <div class="joy-pad">
            <div></div><div class="ctrl-btn" id="m-w">W</div><div></div>
            <div class="ctrl-btn" id="m-a">A</div><div class="ctrl-btn" id="m-s">S</div><div class="ctrl-btn" id="m-d">D</div>
        </div>
        <div class="act-pad">
            <div class="ctrl-btn" id="m-jump" style="background:rgba(0,150,255,0.4)">JUMP</div>
            <div class="ctrl-btn" id="m-atk" style="background:rgba(255,0,0,0.4); width:85px; height:85px;">ATK</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const WORLD_REF = db.ref('world_v5'); 

        let scene, camera, renderer, myModel, mySword;
        let myID = "", myNick = "", myHP = 100, inGame = false, isDead = false;
        let isRegMode = true, isAdmin = false, isFlying = false;
        let otherPlayers = {}, colliders = [];
        let moveState = { f:false, b:false, l:false, r:false };
        let vy = 0, canJump = true, camAzimuth = 0, camDist = 16;

        function createSword() {
            const g = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.8, 0.05), new THREE.MeshStandardMaterial({color: 0xdddddd}));
            blade.position.y = 0.9;
            const guard = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 0.2), new THREE.MeshStandardMaterial({color: 0xffd700}));
            g.add(blade, guard); g.rotation.x = Math.PI/2; g.position.set(0.7, 0.8, 0.3); return g;
        }

        function createPlayerObject(color, name) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.4, 0.6), new THREE.MeshStandardMaterial({color}));
            body.position.y = 0.7;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 1.75;
            group.add(body, head);
            
            // Навешиваем ник (Canvas Texture)
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white'; ctx.font = 'Bold 32px Arial'; ctx.textAlign = 'center';
            ctx.fillText(name, 128, 40);
            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: tex}));
            sprite.position.y = 2.5; sprite.scale.set(3, 0.75, 1);
            group.add(sprite);

            return group;
        }

        function buildWorld() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87ceeb);
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x447722}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);
            
            // Декорации с коллизией
            const addObj = (geo, mat, x, z, scaleY = 1) => {
                const m = new THREE.Mesh(geo, mat);
                m.position.set(x, (geo.parameters.height * scaleY)/2, z);
                m.scale.y = scaleY;
                scene.add(m);
                colliders.push(new THREE.Box3().setFromObject(m));
            };

            const stoneMat = new THREE.MeshStandardMaterial({color: 0x777777});
            const treeMat = new THREE.MeshStandardMaterial({color: 0x114411});

            for(let i=0; i<40; i++) {
                const rx = (Math.random()-0.5)*200, rz = (Math.random()-0.5)*200;
                if(Math.abs(rx) < 10) continue;
                if(Math.random() > 0.5) addObj(new THREE.BoxGeometry(4, 3, 4), stoneMat, rx, rz, Math.random()+0.5);
                else addObj(new THREE.CylinderGeometry(0.2, 2, 5), treeMat, rx, rz);
            }
        }

        function initGame() {
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.8); light.position.set(50, 100, 50); scene.add(light);

            myModel = createPlayerObject(0x0066ff, myNick);
            mySword = createSword(); myModel.add(mySword);
            scene.add(myModel);

            WORLD_REF.child('players').on('value', snap => {
                const data = snap.val() || {};
                const now = Date.now();
                Object.keys(otherPlayers).forEach(id => { if(!data[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }});
                Object.keys(data).forEach(id => {
                    if(id === myID) { 
                        myHP = data[id].hp; 
                        if(myHP <= 0 && !isDead) { isDead = true; myModel.rotation.z = Math.PI/2; }
                        return; 
                    }
                    if(now - data[id].ls > 10000) return;
                    if(!otherPlayers[id]) {
                        otherPlayers[id] = createPlayerObject(0xff3300, data[id].n);
                        otherPlayers[id].add(createSword());
                        scene.add(otherPlayers[id]);
                    }
                    const p = otherPlayers[id];
                    p.position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
                    p.rotation.y = data[id].ry;
                    // Анимация меча других игроков
                    p.children[2].position.z = data[id].at ? 1.5 : 0.3; 
                    if(data[id].hp <= 0) p.rotation.z = Math.PI/2; else p.rotation.z = 0;
                });
            });

            db.ref('leaderboard').orderByValue().limitToLast(5).on('value', snap => {
                let h = ""; snap.forEach(s => { h = `<div>${s.key}: ${s.val()}</div>` + h; });
                document.getElementById('lb-inner').innerHTML = h;
            });

            animate();
        }

        function attack() {
            if(isDead) return;
            // Анимация ВПЕРЕД
            new TWEEN.Tween(mySword.position).to({z: 1.5}, 100).chain(
                new TWEEN.Tween(mySword.position).to({z: 0.3}, 100)
            ).start();

            WORLD_REF.child('players/'+myID).update({ at: true });
            setTimeout(() => WORLD_REF.child('players/'+myID).update({ at: false }), 200);

            Object.keys(otherPlayers).forEach(id => {
                if(myModel.position.distanceTo(otherPlayers[id].position) < 5) {
                    WORLD_REF.child('players/'+id).transaction(p => {
                        if(p && p.hp > 0) {
                            p.hp -= 20;
                            if(p.hp <= 0) { p.hp = 0; db.ref('leaderboard/'+myNick).transaction(k => (k||0)+1); }
                        }
                        return p;
                    });
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(inGame && !isDead) {
                const prevPos = myModel.position.clone();
                const move = new THREE.Vector3();
                if(moveState.f) move.z -= 1; if(moveState.b) move.z += 1;
                if(moveState.l) move.x -= 1; if(moveState.r) move.x += 1;
                
                if(move.length() > 0) {
                    move.applyAxisAngle(new THREE.Vector3(0,1,0), camAzimuth);
                    myModel.position.add(move.normalize().multiplyScalar(0.3));
                    myModel.rotation.y = Math.atan2(move.x, move.z);
                }

                // Проверка коллизий
                const myBox = new THREE.Box3().setFromObject(myModel);
                colliders.forEach(c => { if(myBox.intersectsBox(c)) myModel.position.copy(prevPos); });

                if(!isFlying) {
                    myModel.position.y += vy;
                    if(myModel.position.y > 0) { vy -= 0.02; canJump = false; }
                    else { myModel.position.y = 0; vy = 0; canJump = true; }
                }

                WORLD_REF.child('players/'+myID).update({ x: myModel.position.x, y: myModel.position.y, z: myModel.position.z, ry: myModel.rotation.y, ls: Date.now() });
            }

            camera.position.set(myModel.position.x + camDist * Math.sin(camAzimuth), myModel.position.y + 10, myModel.position.z + camDist * Math.cos(camAzimuth));
            camera.lookAt(myModel.position.x, myModel.position.y + 1, myModel.position.z);
            TWEEN.update();
            renderer.render(scene, camera);
        }

        // --- AUTH LOGIC ---
        window.toggleAuthMode = () => {
            isRegMode = !isRegMode;
            document.getElementById('auth-title').innerText = isRegMode ? "РЕГИСТРАЦИЯ" : "ВХОД";
            document.getElementById('auth-action-btn').innerText = isRegMode ? "СОЗДАТЬ АККАУНТ" : "ВОЙТИ";
            document.getElementById('auth-toggle').innerText = isRegMode ? "Уже есть аккаунт? Войти" : "Нет аккаунта? Регистрация";
        };

        window.handleAuth = async () => {
            const nick = document.getElementById('auth-nick').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            if(nick.length < 3 || pass.length < 4) return alert("Слишком короткий ник или пароль");

            const userRef = db.ref('users/' + nick);
            const snap = await userRef.once('value');

            if(isRegMode) {
                if(snap.exists()) return alert("Ник занят");
                await userRef.set({ pass: pass, kills: 0 });
                loginSuccess(nick);
            } else {
                if(!snap.exists() || snap.val().pass !== pass) return alert("Неверный ник или пароль");
                loginSuccess(nick);
            }
        };

        function loginSuccess(nick) {
            myNick = nick; myID = 'u' + Math.random().toString(36).substr(2, 9);
            const pass = document.getElementById('auth-pass').value.trim().toLowerCase();
            if(pass === "la ginger sekolah") { isAdmin = true; document.getElementById('admin-menu').classList.remove('hidden'); }
            
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('mobile-controls').classList.remove('hidden');
            inGame = true;
            buildWorld();
            initGame();
            WORLD_REF.child('players/'+myID).set({ n: myNick, hp: 100, x: 0, y: 0, z: 0, ls: Date.now() });
            WORLD_REF.child('players/'+myID).onDisconnect().remove();
        }

        // --- CONTROLS ---
        window.addEventListener('wheel', e => camDist = Math.max(5, Math.min(40, camDist + e.deltaY * 0.05)));
        
        let lastTouchDist = 0;
        window.addEventListener('touchmove', e => {
            if(e.touches.length === 2) {
                const d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                if(lastTouchDist) camDist = Math.max(5, Math.min(40, camDist + (lastTouchDist - d) * 0.1));
                lastTouchDist = d;
            }
        });
        window.addEventListener('touchend', () => lastTouchDist = 0);

        const setup = (id, k) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); moveState[k] = true; };
            el.onpointerup = () => moveState[k] = false;
        };
        setup('m-w','f'); setup('m-s','b'); setup('m-a','l'); setup('m-d','r');
        document.getElementById('m-jump').onpointerdown = () => { if(canJump) vy = 0.45; };
        document.getElementById('m-atk').onpointerdown = attack;

        window.onkeydown = (e) => { if(e.code==='KeyW')moveState.f=true; if(e.code==='Space'&&canJump)vy=0.45; };
        window.onkeyup = (e) => { if(e.code==='KeyW')moveState.f=false; };
        window.onmousedown = (e) => { if(e.button===0) attack(); if(e.button===2) window.isR=true; };
        window.onmousemove = (e) => { if(window.isR) camAzimuth -= e.movementX * 0.01; };
        window.onmouseup = () => window.isR = false;
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/20.0.0/tween.umd.js"></script>
</body>
</html>
