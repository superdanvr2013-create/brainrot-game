<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox PVP: Arena Guarded</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; background: #000; touch-action: none; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1000; background: rgba(0,0,0,0.85); }
        
        #leaderboard { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 12px; border: 2px solid #ffd700; font-size: 14px; min-width: 180px; z-index: 500; }
        #leaderboard h4 { margin: 0 0 10px 0; text-align: center; color: #ffd700; border-bottom: 1px solid #ffd700; }

        #ui-layer { position: absolute; top: 15px; left: 15px; z-index: 100; pointer-events: none; }
        .bar-container { width: 250px; height: 25px; border: 3px solid #000; background: #222; border-radius: 5px; overflow: hidden; }
        #hp-bar { background: #ff3333; width: 100%; height: 100%; transition: 0.3s; }
        
        #mobile-controls { position: absolute; bottom: 40px; left: 40px; display: grid; grid-template-columns: repeat(3, 75px); gap: 12px; }
        .m-btn { width: 75px; height: 75px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; }
        
        #action-btns { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 15px; }
        .action-circle { width: 85px; height: 85px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        
        #death-screen { display: none; background: rgba(139,0,0,0.95); flex-direction: column; text-align: center; }
        .btn-main { padding: 18px 40px; background: #e63946; color: #fff; border: none; cursor: pointer; border-radius: 12px; font-weight: bold; font-size: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="leaderboard"><h4>🏆 KILL LEADERS</h4><div id="lb-list">...</div></div>

    <div id="login-screen" class="screen">
        <div style="background:white; padding:40px; border-radius:25px; text-align:center;">
            <h1 style="color:#e63946; margin:0 0 20px 0;">ARENA PVP</h1>
            <input type="text" id="nick-input" placeholder="НИК..." maxlength="10" style="padding:15px; width:200px; font-size:20px; text-align:center;"><br><br>
            <button class="btn-main" onclick="checkAndStart()">ИГРАТЬ</button>
        </div>
    </div>

    <div id="death-screen" class="screen">
        <h1 style="color:white; font-size:56px; margin-bottom:30px;">ВЫ УБИТЫ</h1>
        <button class="btn-main" style="background:white; color:#e63946;" onclick="respawn()">ВОЗРОДИТЬСЯ</button>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="bar-container"><div id="hp-bar"></div></div>
    </div>

    <div id="mobile-controls" class="hidden">
        <div></div><div class="m-btn" id="btn-w">W</div><div></div>
        <div class="m-btn" id="btn-a">A</div><div class="m-btn" id="btn-s">S</div><div class="m-btn" id="btn-d">D</div>
    </div>

    <div id="action-btns" class="hidden">
        <div class="action-circle" style="background:#457b9d;" id="btn-jump">JUMP</div>
        <div class="action-circle" style="background:#e63946;" id="btn-attack">ATTACK</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let scene, camera, renderer, myModel, mySwordPivot;
        let myID = 'u' + Math.floor(Math.random() * 1000000);
        let myNick = "", myHP = 100, inGame = false, isDead = false;
        let otherPlayers = {}, moveState = { f: false, b: false, l: false, r: false };
        let vy = 0, canJump = true, camAzimuth = 0, camElevation = 0.5, camDist = 12;
        let isAttacking = false;
        const MAP_SIZE = 200; // Половина размера карты для границ

        function createSword() {
            const group = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.5, 0.05), new THREE.MeshStandardMaterial({color: 0xdddddd, metalness: 0.9}));
            blade.position.y = 0.75;
            const guard = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.2), new THREE.MeshStandardMaterial({color: 0xffd700}));
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.5), new THREE.MeshStandardMaterial({color: 0x442200}));
            handle.position.y = -0.2;
            group.add(blade, guard, handle);
            group.rotation.x = Math.PI / 2; // Исправлено направление
            group.position.set(0.65, 0.8, 0.1); 
            return group;
        }

        function createPlayerModel(color) {
            const group = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({color: color}));
            torso.position.y = 0.6;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 1.5;
            const armL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), new THREE.MeshStandardMaterial({color: color}));
            armL.position.set(-0.6, 0.6, 0);
            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), new THREE.MeshStandardMaterial({color: color}));
            armR.position.set(0.6, 0.6, 0);
            group.add(torso, head, armL, armR);
            return group;
        }

        function createTag(name, hp) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.roundRect(0,0,512,128,20); ctx.fill();
            ctx.fillStyle = hp > 0 ? '#0f0' : '#f00';
            ctx.font = 'bold 50px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(`${name} [${hp}%]`, 256, 85);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            sprite.scale.set(4, 1, 1); sprite.position.y = 2.7;
            return sprite;
        }

        function buildMap() {
            // Пол
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(MAP_SIZE*2, MAP_SIZE*2), new THREE.MeshStandardMaterial({color: 0x1a472a}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);

            // Стены (Границы)
            const wallMat = new THREE.MeshStandardMaterial({color: 0x00ffff, transparent: true, opacity: 0.2, side: THREE.DoubleSide});
            const walls = [
                {p: [0, 5, MAP_SIZE], s: [MAP_SIZE*2, 10, 0.1]}, // North
                {p: [0, 5, -MAP_SIZE], s: [MAP_SIZE*2, 10, 0.1]}, // South
                {p: [MAP_SIZE, 5, 0], s: [0.1, 10, MAP_SIZE*2]}, // East
                {p: [-MAP_SIZE, 5, 0], s: [0.1, 10, MAP_SIZE*2]} // West
            ];
            walls.forEach(w => {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(...w.s), wallMat);
                wall.position.set(...w.p); scene.add(wall);
            });
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            buildMap();

            myModel = createPlayerModel(0x2196f3);
            mySwordPivot = new THREE.Group();
            mySwordPivot.add(createSword());
            myModel.add(mySwordPivot);
            scene.add(myModel);

            db.ref('leaderboard').orderByValue().limitToLast(10).on('value', snap => {
                const list = document.getElementById('lb-list');
                let items = [];
                snap.forEach(s => items.push({n: s.key, k: s.val()}));
                list.innerHTML = items.reverse().map(i => `<div>${i.n}: ${i.k}</div>`).join('');
            });

            db.ref('players/' + myID).onDisconnect().remove();
            db.ref('players').on('value', snap => {
                const data = snap.val() || {};
                Object.keys(otherPlayers).forEach(id => { if(!data[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }});
                Object.keys(data).forEach(id => {
                    if(id === myID) { myHP = data[id].hp; if(myHP <= 0 && !isDead && inGame) triggerDeath(); return; }
                    if(!otherPlayers[id]) {
                        const g = createPlayerModel(0xf44336);
                        const sp = new THREE.Group(); sp.add(createSword()); g.add(sp);
                        scene.add(g); otherPlayers[id] = g;
                    }
                    const p = otherPlayers[id];
                    p.position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
                    p.rotation.y = data[id].ry || 0;
                    const sp = p.children.find(c => c.type === "Group");
                    if(sp) sp.position.z = data[id].at ? -1.3 : 0;
                    if(data[id].hp <= 0) { p.rotation.z = Math.PI/2; p.position.y = 0.4; } else { p.rotation.z = 0; p.position.y = data[id].y; }
                    const tag = p.children.find(c => c.type === "Sprite");
                    if(tag) p.remove(tag);
                    p.add(createTag(data[id].n, data[id].hp));
                });
            });

            animate();
        }

        function triggerDeath() {
            isDead = true;
            document.getElementById('death-screen').style.display = 'flex';
            myModel.rotation.z = Math.PI/2;
        }

        window.respawn = () => {
            isDead = false; myHP = 100;
            document.getElementById('death-screen').style.display = 'none';
            myModel.rotation.z = 0;
            myModel.position.set(0, 0, 0);
            db.ref('players/' + myID).update({hp: 100, x: 0, z: 0});
        };

        function attack() {
            if(isDead || isAttacking) return;
            isAttacking = true;
            mySwordPivot.position.z = -1.2;
            db.ref('players/' + myID + '/at').set(true);

            setTimeout(() => { 
                mySwordPivot.position.z = 0; isAttacking = false; 
                db.ref('players/' + myID + '/at').set(false);
            }, 180);

            Object.keys(otherPlayers).forEach(id => {
                if(myModel.position.distanceTo(otherPlayers[id].position) < 4.2) {
                    db.ref('players/' + id).once('value', s => {
                        const target = s.val();
                        if(target && target.hp > 0) {
                            db.ref('players/' + id + '/hp').transaction(h => {
                                let newHP = (h || 100) - 15;
                                if(newHP <= 0) {
                                    // Засчитываем убийство ТОЛЬКО если HP упало до 0 сейчас
                                    db.ref('leaderboard/' + myNick).transaction(k => (k || 0) + 1);
                                }
                                return Math.max(0, newHP);
                            });
                        }
                    });
                }
            });
        }

        function animate() {
            if(!inGame) return;
            requestAnimationFrame(animate);

            if(!isDead) {
                const dir = new THREE.Vector3();
                if(moveState.f) dir.z -= 1; if(moveState.b) dir.z += 1;
                if(moveState.l) dir.x -= 1; if(moveState.r) dir.x += 1;
                if(dir.length() > 0) {
                    dir.applyAxisAngle(new THREE.Vector3(0,1,0), camAzimuth);
                    const speed = 0.25;
                    const nextX = myModel.position.x + dir.normalize().x * speed;
                    const nextZ = myModel.position.z + dir.z * speed;
                    
                    // Физика границ (стены)
                    if(Math.abs(nextX) < MAP_SIZE - 0.5) myModel.position.x = nextX;
                    if(Math.abs(nextZ) < MAP_SIZE - 0.5) myModel.position.z = nextZ;
                    
                    myModel.rotation.y = Math.atan2(dir.x, dir.z);
                }
                myModel.position.y += vy;
                if(myModel.position.y > 0) { vy -= 0.018; canJump = false; }
                else { myModel.position.y = 0; vy = 0; canJump = true; }
            }

            camera.position.x = myModel.position.x + camDist * Math.sin(camAzimuth) * Math.cos(camElevation);
            camera.position.y = myModel.position.y + camDist * Math.sin(camElevation) + 1.8;
            camera.position.z = myModel.position.z + camDist * Math.cos(camAzimuth) * Math.cos(camElevation);
            
            if(camDist < 1) { camera.position.copy(myModel.position).add(new THREE.Vector3(0, 1.6, 0)); myModel.visible = false; } 
            else { myModel.visible = true; }
            camera.lookAt(myModel.position.x, myModel.position.y + 1.5, myModel.position.z);

            const oldTag = myModel.children.find(c => c.type === "Sprite");
            if(oldTag) myModel.remove(oldTag);
            if(camDist >= 1) myModel.add(createTag(myNick, myHP));

            document.getElementById('hp-bar').style.width = myHP + "%";
            db.ref('players/' + myID).update({ x: myModel.position.x, y: myModel.position.y, z: myModel.position.z, ry: myModel.rotation.y, n: myNick, hp: myHP, at: isAttacking, lastSeen: Date.now() });
            renderer.render(scene, camera);
        }

        window.checkAndStart = () => {
            const val = document.getElementById('nick-input').value.trim();
            if(!val) return; myNick = val;
            document.getElementById('login-screen').classList.add('hidden');
            ['ui-layer', 'mobile-controls', 'action-btns'].forEach(id => document.getElementById(id).classList.remove('hidden'));
            inGame = true; init();
        };

        window.onmousedown = (e) => { if(e.button === 0 && inGame) attack(); if(e.button === 2) window.isR = true; };
        window.onmouseup = () => window.isR = false;
        window.onmousemove = (e) => { if(window.isR) { camAzimuth -= e.movementX * 0.008; camElevation = Math.max(-0.4, Math.min(1.4, camElevation + e.movementY * 0.008)); }};
        window.onwheel = (e) => camDist = Math.max(0, Math.min(30, camDist + e.deltaY * 0.02));
        window.oncontextmenu = (e) => e.preventDefault();

        const handleKeys = (c, v) => {
            if(c === 'KeyW') moveState.f = v; if(c === 'KeyS') moveState.b = v;
            if(c === 'KeyA') moveState.l = v; if(c === 'KeyD') moveState.r = v;
            if(c === 'Space' && v && canJump && !isDead) vy = 0.4;
        };
        window.onkeydown = (e) => handleKeys(e.code, true);
        window.onkeyup = (e) => handleKeys(e.code, false);

        const bindMob = (id, k) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); if(!isDead) moveState[k] = true; };
            el.onpointerup = () => moveState[k] = false;
        };
        bindMob('btn-w','f'); bindMob('btn-s','b'); bindMob('btn-a','l'); bindMob('btn-d','r');
        document.getElementById('btn-jump').onpointerdown = () => { if(canJump && !isDead) vy = 0.4; };
        document.getElementById('btn-attack').onpointerdown = attack;
    </script>
</body>
</html>
