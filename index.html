<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox PVP - Death System</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; background: #000; touch-action: none; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1000; background: rgba(0,0,0,0.8); }
        .window { background: #fff; padding: 30px; border-radius: 20px; border: 5px solid #f00; text-align: center; width: 320px; }
        
        /* Экран смерти */
        #death-screen { background: rgba(139, 0, 0, 0.9); display: none; flex-direction: column; }
        #death-screen h1 { color: #fff; font-size: 40px; text-shadow: 2px 2px #000; margin-bottom: 20px; }

        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 100; pointer-events: none; }
        .bar { width: 220px; height: 20px; border: 3px solid #000; background: #333; }
        #hp-bar { background: #ff3333; width: 100%; height: 100%; transition: 0.3s; }
        
        #mobile-controls { position: absolute; bottom: 30px; left: 30px; display: grid; grid-template-columns: repeat(3, 75px); gap: 10px; z-index: 2000; }
        .m-btn { width: 75px; height: 75px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 24px; user-select: none; }
        
        #action-btns { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 2000; }
        .action-circle { width: 85px; height: 85px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; cursor: pointer; }
        
        .hidden { display: none !important; }
        .btn-main { padding: 15px 30px; background: #f00; color: #fff; border: none; cursor: pointer; font-weight: bold; border-radius: 10px; font-size: 18px; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="window">
            <h1 style="color:#f00">DANBLOX PVP</h1>
            <input type="text" id="nick-input" placeholder="НИК..." maxlength="10" style="padding:10px; width:80%; font-size:18px; text-align:center;"><br><br>
            <button class="btn-main" onclick="checkAndStart()">ИГРАТЬ</button>
        </div>
    </div>

    <div id="death-screen" class="screen">
        <h1>ВЫ ПОГИБЛИ!</h1>
        <button class="btn-main" style="background: #fff; color: #f00;" onclick="respawn()">ВОЗРОДИТЬСЯ</button>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="bar"><div id="hp-bar"></div></div>
    </div>

    <div id="mobile-controls" class="hidden">
        <div></div><div class="m-btn" id="btn-w">W</div><div></div>
        <div class="m-btn" id="btn-a">A</div><div class="m-btn" id="btn-s">S</div><div class="m-btn" id="btn-d">D</div>
    </div>

    <div id="action-btns" class="hidden">
        <div class="action-circle" style="background:#2196f3;" id="btn-jump">JUMP</div>
        <div class="action-circle" style="background:#f44336;" id="btn-e">ATTACK</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f",
            storageBucket: "danblox-e209f.firebasestorage.app",
            messagingSenderId: "828099060847",
            appId: "1:828099060847:web:9bb0bebc8c02833ce7d99a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let scene, camera, renderer, myModel, mySword;
        let myID = 'u' + Math.floor(Math.random() * 1000000);
        let myNick = "", myHP = 100, inGame = false, isDead = false;
        let otherPlayers = {}, moveState = { f: false, b: false, l: false, r: false };
        let vy = 0, canJump = true, camAzimuth = 0, camElevation = 0.5, camDist = 12;

        function createTag(name, hp) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.roundRect(0, 0, 512, 128, 20); ctx.fill();
            ctx.fillStyle = hp > 0 ? (hp > 30 ? '#0f0' : '#ff0') : '#f00';
            ctx.font = 'bold 44px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(hp > 0 ? `${name} [${hp} HP]` : `${name} [DEAD]`, 256, 80);
            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            sprite.scale.set(4, 1, 1);
            sprite.position.y = 2.8;
            return sprite;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x2e7d32}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(12, 500), new THREE.MeshStandardMaterial({color: 0xd32f2f}));
            road.rotation.x = -Math.PI/2; road.position.y = 0.01; scene.add(road);

            myModel = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.5), new THREE.MeshStandardMaterial({color: 0x2196f3}));
            body.position.y = 1; myModel.add(body);
            
            mySword = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.5, 0.2), new THREE.MeshStandardMaterial({color: 0xcccccc}));
            mySword.position.set(0.7, 1, -0.6); mySword.rotation.x = Math.PI/2;
            myModel.add(mySword);
            scene.add(myModel);

            db.ref('players/' + myID).onDisconnect().remove();
            db.ref('players').on('value', snap => {
                const data = snap.val() || {};
                Object.keys(otherPlayers).forEach(id => {
                    if(!data[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }
                });

                Object.keys(data).forEach(id => {
                    if(id === myID) {
                        myHP = data[id].hp || 0;
                        if(myHP <= 0 && !isDead && inGame) triggerDeath();
                        return;
                    }
                    if(!otherPlayers[id]) {
                        const g = new THREE.Group();
                        const b = new THREE.Mesh(new THREE.BoxGeometry(1,2,0.5), new THREE.MeshStandardMaterial({color: 0xf44336}));
                        b.position.y = 1; g.add(b);
                        scene.add(g); otherPlayers[id] = g;
                    }
                    const p = otherPlayers[id];
                    p.position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
                    p.rotation.y = data[id].ry || 0;
                    
                    // Анимация смерти для других
                    if(data[id].hp <= 0) {
                        p.rotation.z = Math.PI/2; p.position.y = 0.3;
                    } else {
                        p.rotation.z = 0;
                    }

                    const tag = p.children.find(c => c.type === "Sprite");
                    if(tag) p.remove(tag);
                    p.add(createTag(data[id].n, data[id].hp));
                });
            });

            animate();
        }

        function triggerDeath() {
            isDead = true;
            document.getElementById('death-screen').style.display = 'flex';
            myModel.rotation.z = Math.PI/2; // Падаем на бок
            myModel.position.y = 0.3;
        }

        window.respawn = () => {
            isDead = false;
            myHP = 100;
            document.getElementById('death-screen').style.display = 'none';
            myModel.rotation.z = 0;
            myModel.position.set((Math.random()-0.5)*20, 0, (Math.random()-0.5)*20);
            db.ref('players/' + myID).update({ hp: 100, x: myModel.position.x, z: myModel.position.z });
        };

        function attack() {
            if(isDead) return;
            mySword.position.z = -1.5;
            setTimeout(() => mySword.position.z = -0.6, 150);
            Object.keys(otherPlayers).forEach(id => {
                if(myModel.position.distanceTo(otherPlayers[id].position) < 4) {
                    db.ref('players/' + id + '/hp').transaction(h => (h || 100) - 10);
                }
            });
        }

        function animate() {
            if(!inGame) return;
            requestAnimationFrame(animate);

            if(!isDead) {
                const dir = new THREE.Vector3();
                if(moveState.f) dir.z -= 1; if(moveState.b) dir.z += 1;
                if(moveState.l) dir.x -= 1; if(moveState.r) dir.x += 1;

                if(dir.length() > 0) {
                    dir.applyAxisAngle(new THREE.Vector3(0,1,0), camAzimuth);
                    myModel.position.add(dir.normalize().multiplyScalar(0.2));
                    myModel.rotation.y = Math.atan2(dir.x, dir.z);
                }

                myModel.position.y += vy;
                if(myModel.position.y > 0) { vy -= 0.015; canJump = false; }
                else { myModel.position.y = 0; vy = 0; canJump = true; }
            }

            // Камера всегда следит за игроком
            camera.position.x = myModel.position.x + camDist * Math.sin(camAzimuth) * Math.cos(camElevation);
            camera.position.y = myModel.position.y + camDist * Math.sin(camElevation) + 2;
            camera.position.z = myModel.position.z + camDist * Math.cos(camAzimuth) * Math.cos(camElevation);
            camera.lookAt(myModel.position.x, myModel.position.y + 1, myModel.position.z);

            // Обновляем свой тег
            const oldTag = myModel.children.find(c => c.type === "Sprite");
            if(oldTag) myModel.remove(oldTag);
            myModel.add(createTag(myNick, myHP));

            document.getElementById('hp-bar').style.width = myHP + "%";
            db.ref('players/' + myID).update({ 
                x: myModel.position.x, y: myModel.position.y, z: myModel.position.z, 
                ry: myModel.rotation.y, n: myNick, hp: myHP, lastSeen: Date.now() 
            });
            renderer.render(scene, camera);
        }

        window.checkAndStart = async () => {
            const input = document.getElementById('nick-input').value.trim();
            if(!input) return;
            myNick = input;
            document.getElementById('login-screen').classList.add('hidden');
            ['ui-layer', 'mobile-controls', 'action-btns'].forEach(id => document.getElementById(id).classList.remove('hidden'));
            inGame = true;
            init();
        };

        // --- УПРАВЛЕНИЕ ---
        window.onkeydown = (e) => {
            if(isDead) return;
            if(e.code === 'KeyW') moveState.f = true; if(e.code === 'KeyS') moveState.b = true;
            if(e.code === 'KeyA') moveState.l = true; if(e.code === 'KeyD') moveState.r = true;
            if(e.code === 'Space' && canJump) vy = 0.35;
            if(e.code === 'KeyE') attack();
        };
        window.onkeyup = (e) => {
            if(e.code === 'KeyW') moveState.f = false; if(e.code === 'KeyS') moveState.b = false;
            if(e.code === 'KeyA') moveState.l = false; if(e.code === 'KeyD') moveState.r = false;
        };

        const bind = (id, k) => { 
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { if(!isDead) moveState[k] = true; };
            el.onpointerup = el.onpointercancel = () => { moveState[k] = false; };
        };
        bind('btn-w','f'); bind('btn-s','b'); bind('btn-a','l'); bind('btn-d','r');
        document.getElementById('btn-jump').onpointerdown = () => { if(canJump && !isDead) vy = 0.35; };
        document.getElementById('btn-e').onpointerdown = attack;

        let isR = false;
        window.onmousedown = (e) => { if(e.button === 2) isR = true; };
        window.onmouseup = () => isR = false;
        window.onmousemove = (e) => { if(isR) { camAzimuth -= e.movementX * 0.01; camElevation = Math.max(0.1, Math.min(1.4, camElevation + e.movementY * 0.01)); }};
        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>
