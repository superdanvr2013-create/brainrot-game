<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:,"> 
    <title>DanChat Ultimate v9.9 | DanVR2013 Dev Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        /* ДИЗАЙН-КОД DANCHAT (CSS CORE v9.9)
           Используем CSS-переменные для легкой кастомизации.
        */
        :root { 
            --bg: #0b0d0f; 
            --panel: #16191d; 
            --accent: #00ff88; 
            --accent-glow: rgba(0, 255, 136, 0.4);
            --text: #ffffff; 
            --side-w: 320px; 
            --error: #ff4444; 
            --blue: #0078ff; 
            --blue-glow: rgba(0, 120, 255, 0.4);
            --warn: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
            --trans-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --trans-slow: 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            --border: #2d3239;
        }

        /* Reset & Base */
        * { box-sizing: border-box; outline: none; margin: 0; padding: 0; }

        body { 
            font-family: 'Segoe UI', 'SF Pro Display', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* КАСТОМНЫЙ СКРОЛЛБАР (Webkit) */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2d3239; border-radius: 10px; border: 2px solid var(--bg); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* --- SIDEBAR (ЛЕВАЯ ПАНЕЛЬ) --- */
        #sidebar { 
            width: var(--side-w); 
            background: var(--panel); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .side-header { 
            padding: 25px 20px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent); 
            border-bottom: 1px solid var(--border); 
        }

        .my-info { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }

        .my-av { 
            width: 55px; height: 55px; border-radius: 18px; 
            object-fit: cover; border: 2px solid var(--accent); 
            box-shadow: 0 0 15px var(--accent-glow);
            cursor: pointer; transition: var(--trans-fast);
            background: #000;
        }
        .my-av:hover { transform: scale(1.05) rotate(2deg); filter: brightness(1.2); }

        .my-details b { font-size: 16px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .my-details span { font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .side-nav { display: flex; justify-content: space-around; align-items: center; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 5px; }

        .nav-ico { 
            font-size: 20px; cursor: pointer; opacity: 0.6; 
            padding: 10px; border-radius: 12px; transition: var(--trans-fast);
            display: flex; align-items: center; justify-content: center;
        }
        .nav-ico:hover { opacity: 1; background: var(--glass); color: var(--accent); transform: translateY(-2px); }

        /* Список контактов */
        #contact-list { flex: 1; overflow-y: auto; padding-top: 10px; }

        .contact { 
            padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.02); 
            cursor: pointer; display: flex; align-items: center; 
            gap: 15px; transition: var(--trans-fast);
            position: relative;
        }
        .contact:hover { background: rgba(255,255,255,0.03); }
        .contact.active { background: rgba(0, 255, 136, 0.05); border-left: 4px solid var(--accent); }

        .av-wrap { position: relative; width: 50px; height: 50px; flex-shrink: 0; }
        .av-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #000; border: 1px solid #333; }
        
        .dot { 
            position: absolute; bottom: 2px; right: 2px; 
            width: 14px; height: 14px; border-radius: 50%; 
            border: 3px solid var(--panel); background: #444; 
            transition: 0.3s;
        }
        .dot.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .c-info { flex: 1; min-width: 0; }
        .c-info b { display: block; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
        .c-info p { font-size: 11px; color: #8b949e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .typing-indicator { color: var(--accent); font-size: 10px; font-weight: bold; font-style: italic; display: none; margin-top: 3px; }

        /* --- ОКНО ЧАТА (MAIN WINDOW) --- */
        #chat-window { 
            flex: 1; display: flex; 
            flex-direction: column; 
            background: #0f1216; 
            position: relative;
        }

        .chat-head { 
            height: 80px; background: var(--panel); 
            padding: 0 30px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; 
            align-items: center; z-index: 50;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .head-user { display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .head-user:hover { opacity: 0.8; }
        .head-user b { font-size: 18px; letter-spacing: 0.5px; }
        .head-user p { font-size: 11px; color: var(--accent); font-weight: bold; margin-top: 2px; }

        .head-btns { display: flex; gap: 15px; align-items: center; }

        /* Кнопки в шапке */
        .h-btn { 
            background: none; border: none; font-size: 22px; 
            cursor: pointer; opacity: 0.7; transition: 0.3s;
            padding: 8px; border-radius: 50%;
        }
        .h-btn:hover { opacity: 1; background: var(--glass); transform: scale(1.1); }
        #admin-clear:hover { color: var(--error); }

        /* ЗОНА СООБЩЕНИЙ */
        #messages { 
            flex: 1; overflow-y: auto; padding: 25px; 
            display: flex; flex-direction: column; gap: 15px;
            background: linear-gradient(rgba(11, 13, 15, 0.94), rgba(11, 13, 15, 0.94)), url('https://i.postimg.cc/qR08VfPz/Dan-Chat.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .msg-row { display: flex; gap: 12px; max-width: 85%; animation: msgSlide 0.35s ease; position: relative; }
        .msg-row.me { flex-direction: row-reverse; align-self: flex-end; }
        
        @keyframes msgSlide { from { opacity: 0; transform: translateY(15px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .bubble { 
            padding: 14px 18px; border-radius: 20px; 
            background: #252b32; position: relative; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            max-width: 100%; transition: 0.2s;
        }
        .me .bubble { background: var(--blue); border-bottom-right-radius: 4px; box-shadow: 0 5px 15px var(--blue-glow); }
        .not-me .bubble { background: #1e2329; border-bottom-left-radius: 4px; }

        .sender { font-size: 11px; font-weight: 900; margin-bottom: 6px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
        .txt { font-size: 15px; line-height: 1.6; word-wrap: break-word; white-space: pre-wrap; color: #eee; }
        .time { font-size: 10px; opacity: 0.5; display: block; text-align: right; margin-top: 8px; }

        /* Ответы (Reply UI) */
        .reply-box { 
            font-size: 12px; opacity: 0.7; 
            border-left: 3px solid var(--accent); 
            padding: 5px 10px; background: rgba(0,0,0,0.2); 
            border-radius: 4px; margin-bottom: 10px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* --- СИСТЕМА УВЕДОМЛЕНИЙ (NOTIFHUB) --- */
        #notif-box {
            position: fixed; bottom: 100px; right: 20px;
            width: 320px; background: rgba(22, 25, 29, 0.98);
            border: 1px solid var(--accent); border-radius: 18px;
            padding: 15px; display: none; align-items: center;
            gap: 15px; cursor: pointer; z-index: 10000;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            animation: notifSlide var(--trans-slow);
        }
        @keyframes notifSlide { from { transform: translateX(400px); } to { transform: translateX(0); } }

        .n-av { width: 50px; height: 50px; border-radius: 14px; object-fit: cover; border: 1px solid #444; }
        .n-body b { display: block; font-size: 14px; color: var(--accent); margin-bottom: 3px; }
        .n-body p { font-size: 12px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        /* --- ПАНЕЛЬ ВВОДА --- */
        #input-panel { position: relative; background: var(--panel); border-top: 1px solid var(--border); padding: 5px 0; }

        #action-bar { 
            background: #1c2127; padding: 12px 30px; 
            border-left: 5px solid var(--accent); 
            display: none; justify-content: space-between; align-items: center;
            animation: actionIn 0.3s ease;
        }
        @keyframes actionIn { from { height: 0; opacity: 0; } to { height: auto; opacity: 1; } }

        .input-container { padding: 15px 25px; display: flex; align-items: center; gap: 12px; }

        #msg-in { 
            flex: 1; padding: 15px 25px; background: #0b0d0f; 
            border: 1.5px solid #2d3239; color: #fff; border-radius: 30px; 
            font-size: 15px; transition: 0.3s;
        }
        #msg-in:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 255, 136, 0.15); background: #000; }

        .btn-send { 
            background: var(--accent); color: #000; 
            border: none; width: 50px; height: 50px; 
            border-radius: 50%; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            transition: 0.3s; font-size: 22px; box-shadow: 0 4px 15px var(--accent-glow);
        }
        .btn-send:hover { transform: scale(1.1) rotate(-10deg); box-shadow: 0 6px 20px var(--accent-glow); }
        .btn-send:active { transform: scale(0.9); }

        /* --- VOIP DANVOICE UI --- */
        #voip-ui { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1a222a 0%, #080a0c 100%); 
            z-index: 9000; display: none; flex-direction: column; 
            align-items: center; justify-content: center;
            text-align: center;
        }
        .voip-header { position: absolute; top: 40px; color: var(--accent); letter-spacing: 4px; font-weight: 900; font-size: 24px; }
        
        .call-av { 
            width: 200px; height: 200px; border-radius: 50%; 
            border: 6px solid var(--accent); margin-bottom: 30px; 
            object-fit: cover; animation: callPulse 1.8s infinite ease-in-out;
            background: #000;
        }
        @keyframes callPulse { 
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 
            70% { transform: scale(1.05); box-shadow: 0 0 0 50px rgba(0, 255, 136, 0); } 
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } 
        }

        .voip-btns { display: flex; gap: 50px; margin-top: 50px; }
        .v-btn { 
            width: 80px; height: 80px; border-radius: 50%; border: none; 
            cursor: pointer; font-size: 35px; display: flex; 
            align-items: center; justify-content: center; transition: 0.3s; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .v-accept { background: var(--accent); color: #000; }
        .v-decline { background: var(--error); color: #fff; }
        .v-btn:hover { transform: scale(1.15); }

        /* --- MODALS (ПОП-АПЫ) --- */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 5000; display: none; align-items: center; 
            justify-content: center; backdrop-filter: blur(12px);
            padding: 20px;
        }
        .modal-card { 
            background: var(--panel); width: 100%; max-width: 460px; 
            max-height: 85vh; padding: 40px; border-radius: 30px; 
            border: 1.5px solid #333; position: relative; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,1);
        }
        .modal-card h2 { text-align: center; color: var(--accent); margin-bottom: 25px; font-size: 24px; letter-spacing: 1px; }

        .m-input { 
            width: 100%; padding: 15px; background: #0b0d0f; 
            border: 1px solid #333; color: #fff; border-radius: 15px; 
            margin-bottom: 20px; font-size: 16px;
        }
        .m-input:focus { border-color: var(--accent); }

        .m-btn { 
            width: 100%; padding: 16px; border: none; border-radius: 15px; 
            cursor: pointer; font-weight: 800; font-size: 15px; 
            transition: 0.3s; margin-bottom: 12px;
        }
        .btn-prime { background: var(--accent); color: #000; }
        .btn-prime:hover { background: #00e67a; box-shadow: 0 0 20px var(--accent-glow); }
        .btn-ghost { background: #2d3239; color: #fff; }
        .btn-ghost:hover { background: #3d444d; }

        /* CONTEXT MENU */
        #ctx-menu { 
            position: fixed; background: #1e2329; border: 1px solid #444; 
            border-radius: 15px; display: none; z-index: 11000; 
            min-width: 200px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); 
            overflow: hidden;
        }
        .ctx-item { padding: 14px 20px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #2d3239; transition: 0.2s; }
        .ctx-item:hover { background: var(--accent); color: #000; font-weight: bold; }
        .ctx-item:last-child { border: none; }

        .hidden { display: none !important; }
    </style>
</head>
<body onclick="closeCtx()" oncontextmenu="return false;">

    <audio id="snd-msg" src="https://www.soundjay.com/buttons/beep-07a.mp3"></audio>
    <audio id="snd-ring" loop src="https://www.soundjay.com/phone/telephone-ring-03a.mp3"></audio>

    <div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:15000; display:flex; align-items:center; justify-content:center;">
        <div class="modal-card" style="border-color: var(--accent); text-align: center;">
            <img src="https://i.postimg.cc/qR08VfPz/Dan-Chat.jpg" style="width:110px; height:110px; border-radius:30px; border:3px solid var(--accent); margin-bottom:25px;">
            <h1 style="color:var(--accent); letter-spacing:5px; margin-bottom:5px;">DANCHAT</h1>
            <p style="font-size:11px; opacity:0.4; margin-bottom:35px; text-transform:uppercase;">Encryption: AES-256 Enabled</p>
            
            <input type="text" id="login-nick" class="m-input" placeholder="Введите никнейм">
            <input type="password" id="login-pass" class="m-input" placeholder="Пароль">
            
            <button class="m-btn btn-prime" onclick="handleLogin()">АВТОРИЗАЦИЯ</button>
            <p id="auth-err" style="color:var(--error); font-size:12px; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <div id="main-app" class="hidden" style="display:flex; width:100%; height:100%;">
        
        <aside id="sidebar">
            <div class="side-header">
                <div class="my-info">
                    <img id="my-avatar" src="" class="my-av" onclick="showModal('settings-modal')">
                    <div class="my-details">
                        <b id="display-nick">...</b>
                        <span>Online Presence</span>
                    </div>
                </div>
                <div class="side-nav">
                    <div class="nav-ico" title="Настройки" onclick="showModal('settings-modal')">⚙️</div>
                    <div class="nav-ico" title="Поиск" onclick="triggerSearch()">🔍</div>
                    <div class="nav-ico" title="Группы" onclick="showModal('create-group-modal')">👥</div>
                    <div class="nav-ico" title="Выход" onclick="location.reload()">🚪</div>
                </div>
            </div>

            <div id="contact-list">
                <div class="contact" id="contact-global" onclick="switchChat('global', 'Глобальный Чат')">
                    <div class="av-wrap">
                        <img src="https://i.postimg.cc/qR08VfPz/Dan-Chat.jpg" class="av-img">
                        <div class="dot online"></div>
                    </div>
                    <div class="c-info">
                        <b>Глобальный Чат</b>
                        <p id="last-global">Добро пожаловать!</p>
                        <div id="type-global" class="typing-indicator">печатает...</div>
                    </div>
                </div>
                <div id="contacts-container"></div>
            </div>
        </aside>

        <main id="chat-window">
            <header class="chat-head">
                <div class="head-user" onclick="handleHeaderClick()">
                    <div id="head-av-box" class="av-wrap" style="width:45px; height:45px;">
                        <img id="head-av" src="" class="av-img">
                    </div>
                    <div>
                        <b id="active-chat-title">Выберите диалог</b>
                        <p id="active-chat-status">ожидание...</p>
                    </div>
                </div>
                <div class="head-btns">
                    <button id="admin-clear" class="h-btn hidden" onclick="confirmWipeChat()">🧹</button>
                    <button id="btn-voip" class="h-btn hidden" onclick="initiateVoiceCall()">📞</button>
                    <button class="h-btn" onclick="toggleSidebar()">📱</button>
                </div>
            </header>

            <div id="messages"></div>

            <div id="input-panel">
                <div id="notif-box" onclick="jumpToChat()">
                    <img id="notif-img" src="" class="n-av">
                    <div class="n-body">
                        <b id="notif-title">Заголовок</b>
                        <p id="notif-text">Текст сообщения...</p>
                    </div>
                </div>

                <div id="action-bar">
                    <div style="min-width: 0;">
                        <b id="action-label" style="color:var(--accent); font-size:10px; text-transform:uppercase;">ОТВЕТ</b>
                        <p id="action-preview" style="font-size:13px; opacity:0.6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></p>
                    </div>
                    <span onclick="resetInputMode()" style="cursor:pointer; color:var(--error); font-size:20px; font-weight:bold; padding-left:15px;">✕</span>
                </div>

                <div class="input-container">
                    <span class="nav-ico" style="opacity:1" onclick="insertEmoji('🔥')">🔥</span>
                    <input type="file" id="image-upload" class="hidden" accept="image/*" onchange="processImageMessage(this)">
                    <span class="nav-ico" style="opacity:1" onclick="document.getElementById('image-upload').click()">🖼️</span>
                    
                    <input type="text" id="msg-in" placeholder="Введите сообщение..." 
                           oninput="broadcastTyping()" 
                           onkeydown="if(event.key==='Enter') pushMessage()">
                    
                    <button class="btn-send" onclick="pushMessage()">➤</button>
                </div>
            </div>
        </main>
    </div>

    <div id="voip-ui">
        <div class="voip-header">DANVOICE SECURE</div>
        <img id="call-partner-av" src="" class="call-av">
        <h2 id="call-partner-name" style="font-size:32px; margin-bottom:10px;">User</h2>
        <p id="call-status" style="opacity:0.6; font-size:14px; letter-spacing:2px;">ВЫЗОВ...</p>
        
        <div class="voip-btns">
            <button id="v-btn-accept" class="v-btn v-accept hidden" onclick="voipAccept()">📞</button>
            <button class="v-btn v-decline" onclick="voipHangUp()">🛑</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-card">
            <h2>НАСТРОЙКИ</h2>
            <div style="text-align:center; margin-bottom:25px;">
                <img id="pref-av-preview" src="" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:3px solid var(--accent); padding:5px;">
            </div>
            <input type="file" id="pref-file" class="hidden" onchange="updatePreview(this, 'pref-av-preview')">
            <button class="m-btn btn-ghost" onclick="document.getElementById('pref-file').click()">ВЫБРАТЬ ФОТО</button>
            
            <label style="font-size:12px; opacity:0.5; margin-bottom:5px; display:block;">ЦВЕТ НИКНЕЙМА:</label>
            <input type="color" id="pref-color" class="m-input" style="height:60px; cursor:pointer;">
            
            <input type="password" id="admin-key" class="m-input" placeholder="Master Admin Key">
            
            <button class="m-btn btn-prime" onclick="applyUserPrefs()">СОХРАНИТЬ</button>
            <button class="m-btn btn-ghost" onclick="hideModal('settings-modal')">ОТМЕНА</button>
        </div>
    </div>

    <div id="create-group-modal" class="modal">
        <div class="modal-card">
            <h2>НОВАЯ ГРУППА</h2>
            <input type="text" id="new-group-name" class="m-input" placeholder="Название группы">
            <button class="m-btn btn-prime" onclick="handleGroupCreation()">СОЗДАТЬ</button>
            <button class="m-btn btn-ghost" onclick="hideModal('create-group-modal')">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="member-manager-modal" class="modal">
        <div class="modal-card">
            <h2 id="mm-title">УЧАСТНИКИ</h2>
            <div id="mm-list" style="margin-bottom:20px; max-height:300px; overflow-y:auto;">
                </div>
            <button id="mm-add-trigger" class="m-btn btn-prime hidden" onclick="showAddableUsers()">ДОБАВИТЬ УЧАСТНИКА</button>
            <button class="m-btn btn-ghost" onclick="hideModal('member-manager-modal')">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="ctx-menu">
        <div class="ctx-item" onclick="initiateReply()">Ответить 💬</div>
        <div id="ctx-admin-zone" class="hidden">
            <div class="ctx-item" onclick="initiateEdit()">Изменить 📝</div>
            <div class="ctx-item" style="color:var(--error)" onclick="execDeleteMsg()">Удалить 🗑️</div>
        </div>
    </div>

    <script>
        /**
         * 1. DATABASE CONFIGURATION
         */
        const firebaseConfig = { 
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE", 
            authDomain: "danblox-e209f.firebaseapp.com", 
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com", 
            projectId: "danblox-e209f" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        /**
         * 2. GLOBAL STATE
         */
        let myData = null;
        let currentChatID = 'global';
        let currentPeerNick = null;
        let isEditing = false;
        let replyRef = null;
        let selectedMsgKey = null;
        let typingTimeout = null;
        let notifQueue = null;

        const DEFAULT_AV = "https://i.postimg.cc/qR08VfPz/Dan-Chat.jpg";
        const DAN_LOCAL_AV = "C:\\Users\\super\\Downloads\\DanChat ава.jpg";

        /**
         * 3. AUTHENTICATION MODULE
         */
        async function handleLogin() {
            const nick = document.getElementById('login-nick').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const err = document.getElementById('auth-err');

            if(!nick || !pass) {
                err.innerText = "Заполните все поля!";
                err.style.display = 'block';
                return;
            }

            try {
                const snapshot = await db.ref('users/' + nick).get();
                if(snapshot.exists()) {
                    const user = snapshot.val();
                    if(user.pass !== pass) {
                        err.innerText = "Неверный пароль!";
                        err.style.display = 'block';
                        return;
                    }
                    myData = user;
                } else {
                    // Регистрация нового пользователя
                    myData = {
                        nick: nick,
                        pass: pass,
                        av: (nick === "super" || nick === "DanVR2013") ? DAN_LOCAL_AV : DEFAULT_AV,
                        color: "#00ff88",
                        admin: false,
                        friends: { 'global': 'group' }
                    };
                    await db.ref('users/' + nick).set(myData);
                }

                launchApp();
            } catch (e) {
                console.error(e);
                alert("Ошибка БД. Проверьте консоль.");
            }
        }

        function launchApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');

            // UI Setup
            document.getElementById('display-nick').innerText = myData.nick;
            document.getElementById('display-nick').style.color = myData.color;
            const avImg = document.getElementById('my-avatar');
            avImg.src = myData.av;
            avImg.onerror = () => avImg.src = DEFAULT_AV;

            // Presence
            db.ref('presence/' + myData.nick).set(true);
            db.ref('presence/' + myData.nick).onDisconnect().remove();

            // Init Modules
            renderContactList();
            switchChat('global', 'Глобальный Чат');
            startVoipListener();
            startNotificationListener();
        }

        /**
         * 4. NOTIFICATION HUB (NEW v9.9)
         */
        function startNotificationListener() {
            // Следим за сообщениями во всех чатах пользователя
            db.ref(`users/${myData.nick}/friends`).on('value', snap => {
                const list = snap.val() || {};
                Object.keys(list).forEach(id => {
                    db.ref(`messages/${id}`).limitToLast(1).on('child_added', s => {
                        const m = s.val();
                        // Не уведомляем если: сообщение от меня ИЛИ чат уже открыт
                        if(m.sn === myData.nick || currentChatID === id) return;
                        triggerUIPopup(id, m);
                    });
                });
            });
        }

        async function triggerUIPopup(chatId, msg) {
            const box = document.getElementById('notif-box');
            const t = document.getElementById('notif-title');
            const txt = document.getElementById('notif-text');
            const img = document.getElementById('notif-img');

            let senderData;
            if(chatId === 'global') {
                t.innerText = "Глобальный Чат";
                img.src = DEFAULT_AV;
            } else if(chatId.startsWith('group_')) {
                const g = (await db.ref('groups/' + chatId).get()).val();
                t.innerText = g.name;
                img.src = g.av || DEFAULT_AV;
            } else {
                senderData = (await db.ref('users/' + msg.sn).get()).val();
                t.innerText = msg.sn;
                img.src = senderData.av || DEFAULT_AV;
            }

            txt.innerText = msg.type === 'img' ? '📷 Изображение' : msg.txt;
            notifQueue = { id: chatId, title: t.innerText };
            
            box.style.display = 'flex';
            document.getElementById('snd-msg').play();

            setTimeout(() => { box.style.display = 'none'; }, 5000);
        }

        function jumpToChat() {
            if(notifQueue) {
                switchChat(notifQueue.id, notifQueue.title);
                document.getElementById('notif-box').style.display = 'none';
            }
        }

        /**
         * 5. CHAT LOGIC & RENDERING
         */
        function switchChat(id, title) {
            // Отключаем старые слушатели
            db.ref(`messages/${currentChatID}`).off();
            db.ref(`typing/${currentChatID}`).off();
            
            currentChatID = id;
            currentPeerNick = (id === 'global' || id.startsWith('group_')) ? null : title;

            // UI Reset
            document.getElementById('active-chat-title').innerText = title;
            document.getElementById('messages').innerHTML = '';
            document.getElementById('btn-voip').classList.toggle('hidden', !currentPeerNick);
            document.getElementById('admin-clear').classList.toggle('hidden', !myData.admin);

            // Подгрузка сообщений
            db.ref(`messages/${id}`).on('child_added', s => renderSingleMessage(s.key, s.val()));
            db.ref(`messages/${id}`).on('child_removed', s => document.getElementById('msg-'+s.key)?.remove());
            db.ref(`messages/${id}`).on('child_changed', s => {
                const el = document.getElementById('msg-'+s.key);
                if(el) el.querySelector('.txt').innerText = s.val().txt;
            });

            // Статусы
            initTypingWatcher(id);
            updateHeaderStatus();
            renderContactList(); // Обновить активный класс
            
            if(window.innerWidth < 800) toggleSidebar(); 
        }

        async function renderSingleMessage(key, data) {
            const container = document.getElementById('messages');
            const isMe = data.sn === myData.nick;
            const sender = (await db.ref('users/' + data.sn).get()).val() || { av: DEFAULT_AV, color: '#fff' };

            const row = document.createElement('div');
            row.id = 'msg-' + key;
            row.className = `msg-row ${isMe ? 'me' : 'not-me'}`;
            row.oncontextmenu = (e) => triggerContextMenu(e, key, data);

            let body = data.type === 'img' 
                ? `<img src="${data.txt}" style="max-width:300px; border-radius:15px; cursor:pointer;" onclick="window.open(this.src)">`
                : `<div class="txt">${data.txt}</div>`;

            row.innerHTML = `
                <img src="${sender.av || DEFAULT_AV}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;" onerror="this.src='${DEFAULT_AV}'">
                <div class="bubble">
                    <div class="sender" style="color:${sender.color}">${data.sn}</div>
                    ${data.reply ? `<div class="reply-box">↪ ${data.reply}</div>` : ''}
                    ${body}
                    <span class="time">${new Date(data.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                </div>
            `;
            
            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        function pushMessage() {
            const input = document.getElementById('msg-in');
            const val = input.value.trim();
            if(!val && !isEditing) return;

            if(isEditing) {
                db.ref(`messages/${currentChatID}/${selectedMsgKey}`).update({ txt: val });
            } else {
                const payload = {
                    sn: myData.nick,
                    txt: val,
                    ts: Date.now(),
                    type: 'text'
                };
                if(replyRef) {
                    payload.reply = `${replyRef.sn}: ${replyRef.txt.substring(0, 30)}...`;
                }
                db.ref(`messages/${currentChatID}`).push(payload);
            }

            input.value = '';
            resetInputMode();
            db.ref(`typing/${currentChatID}/${myData.nick}`).remove();
        }

        /**
         * 6. TYPING SYSTEM (LPM)
         */
        function broadcastTyping() {
            db.ref(`typing/${currentChatID}/${myData.nick}`).set(true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                db.ref(`typing/${currentChatID}/${myData.nick}`).remove();
            }, 3000);
        }

        function initTypingWatcher(id) {
            db.ref(`typing/${id}`).on('value', s => {
                const active = s.val() || {};
                const users = Object.keys(active).filter(n => n !== myData.nick);
                const indicator = (id === currentChatID) ? document.getElementById('active-chat-status') : null;
                const contactInd = document.getElementById('type-' + id);

                if(users.length > 0) {
                    const str = id.includes('group') || id === 'global' ? `${users[0]} печатает...` : `печатает...`;
                    if(indicator && id === currentChatID) indicator.innerText = str;
                    if(contactInd) { contactInd.innerText = str; contactInd.style.display = 'block'; }
                } else {
                    if(indicator && id === currentChatID) updateHeaderStatus();
                    if(contactInd) contactInd.style.display = 'none';
                }
            });
        }

        /**
         * 7. DANVOICE VoIP MODULE
         */
        async function initiateVoiceCall() {
            if(!currentPeerNick) return;
            const ui = document.getElementById('voip-ui');
            const peer = (await db.ref('users/' + currentPeerNick).get()).val();
            
            document.getElementById('call-partner-name').innerText = currentPeerNick;
            document.getElementById('call-partner-av').src = peer.av || DEFAULT_AV;
            document.getElementById('call-status').innerText = "ВЫЗОВ...";
            
            ui.style.display = 'flex';
            document.getElementById('snd-ring').play();

            // Создаем запись звонка в БД
            await db.ref(`calls/${currentPeerNick}`).set({ from: myData.nick, status: 'ringing' });

            // Слушаем ответ
            db.ref(`calls/${currentPeerNick}`).on('value', s => {
                const c = s.val();
                if(c && c.status === 'accepted') {
                    document.getElementById('call-status').innerText = "СОЕДИНЕНИЕ УСТАНОВЛЕНО";
                    document.getElementById('snd-ring').pause();
                }
                if(!s.exists()) voipHangUp();
            });
        }

        function startVoipListener() {
            db.ref(`calls/${myData.nick}`).on('value', async s => {
                if(!s.exists()) return voipHangUp();
                const call = s.val();
                if(call.status === 'accepted') return;

                const ui = document.getElementById('voip-ui');
                const p = (await db.ref('users/' + call.from).get()).val();

                document.getElementById('call-partner-name').innerText = call.from;
                document.getElementById('call-partner-av').src = p.av || DEFAULT_AV;
                document.getElementById('call-status').innerText = "ВХОДЯЩИЙ ЗВОНОК";
                document.getElementById('v-btn-accept').classList.remove('hidden');

                ui.style.display = 'flex';
                document.getElementById('snd-ring').play();
            });
        }

        function voipAccept() {
            db.ref(`calls/${myData.nick}`).update({ status: 'accepted' });
            document.getElementById('v-btn-accept').classList.add('hidden');
            document.getElementById('call-status').innerText = "РАЗГОВОР...";
            document.getElementById('snd-ring').pause();
        }

        function voipHangUp() {
            db.ref(`calls/${myData.nick}`).remove();
            if(currentPeerNick) db.ref(`calls/${currentPeerNick}`).remove();
            
            document.getElementById('voip-ui').style.display = 'none';
            document.getElementById('snd-ring').pause();
            document.getElementById('v-btn-accept').classList.add('hidden');
        }

        /**
         * 8. ADMIN & GROUP FEATURES (RESTORED)
         */
        async function handleHeaderClick() {
            if(currentChatID === 'global') return;
            const list = document.getElementById('mm-list');
            list.innerHTML = '<p style="text-align:center; opacity:0.5;">Загрузка данных...</p>';
            
            if(currentChatID.startsWith('group_')) {
                const snap = await db.ref('groups/' + currentChatID).get();
                const g = snap.val();
                document.getElementById('mm-title').innerText = g.name;
                document.getElementById('mm-add-trigger').classList.toggle('hidden', g.owner !== myData.nick);
                
                list.innerHTML = '';
                for(let uid in g.members) {
                    list.innerHTML += `
                        <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333;">
                            <span>👤 ${uid} ${uid === g.owner ? '<b style="color:var(--accent)">[ADMIN]</b>' : ''}</span>
                            ${(g.owner === myData.nick && uid !== myData.nick) ? `<button onclick="kickUser('${uid}')" style="color:red; background:none; border:none; cursor:pointer;">Исключить</button>` : ''}
                        </div>`;
                }
            } else {
                document.getElementById('mm-title').innerText = "ИНФО";
                document.getElementById('mm-add-trigger').classList.add('hidden');
                list.innerHTML = `<div style="padding:20px; text-align:center;">Приватный чат с <b>${currentPeerNick}</b></div>`;
            }
            showModal('member-manager-modal');
        }

        async function showAddableUsers() {
            const list = document.getElementById('mm-list');
            list.innerHTML = '<p>Выберите пользователя:</p>';
            const users = await db.ref('users').get();
            users.forEach(u => {
                list.innerHTML += `<div onclick="addUserToGroup('${u.key}')" style="padding:15px; background:#111; margin:5px 0; border-radius:10px; cursor:pointer; color:var(--accent);">➕ ${u.key}</div>`;
            });
        }

        async function addUserToGroup(uid) {
            await db.ref(`groups/${currentChatID}/members/${uid}`).set(true);
            await db.ref(`users/${uid}/friends/${currentChatID}`).set('group');
            alert(uid + " добавлен в группу!");
            handleHeaderClick();
        }

        async function kickUser(uid) {
            if(confirm(`Удалить ${uid}?`)) {
                await db.ref(`groups/${currentChatID}/members/${uid}`).remove();
                await db.ref(`users/${uid}/friends/${currentChatID}`).remove();
                handleHeaderClick();
            }
        }

        function confirmWipeChat() {
            if(confirm("ВЫ УВЕРЕНЫ? Это удалит ВСЕ сообщения в этом чате для ВСЕХ.")) {
                db.ref(`messages/${currentChatID}`).remove();
            }
        }

        /**
         * 9. USER SETTINGS & AVATARS
         */
        async function applyUserPrefs() {
            const master = document.getElementById('admin-key').value;
            const updates = {
                av: document.getElementById('pref-av-preview').src,
                color: document.getElementById('pref-color').value,
                admin: (master === "DanVR_Master") 
            };
            await db.ref('users/' + myData.nick).update(updates);
            location.reload();
        }

        /**
         * 10. HELPER UTILITIES
         */
        async function renderContactList() {
            const container = document.getElementById('contacts-container');
            container.innerHTML = '';
            
            const snap = await db.ref(`users/${myData.nick}/friends`).get();
            const friends = snap.val() || {};

            for(let id in friends) {
                if(id === 'global') continue;
                const type = friends[id];
                const isGroup = type === 'group';
                const info = (await db.ref(`${isGroup ? 'groups' : 'users'}/${id}`).get()).val();
                
                if(!info) continue;

                const name = isGroup ? info.name : info.nick;
                const contactDiv = document.createElement('div');
                contactDiv.className = `contact ${currentChatID === id ? 'active' : ''}`;
                contactDiv.onclick = () => switchChat(id, name);
                
                contactDiv.innerHTML = `
                    <div class="av-wrap">
                        <img src="${info.av || DEFAULT_AV}" class="av-img" onerror="this.src='${DEFAULT_AV}'">
                        <div id="dot-${id}" class="dot"></div>
                    </div>
                    <div class="c-info">
                        <b style="color:${info.color || '#fff'}">${name}</b>
                        <p id="last-${id}">...</p>
                        <div id="type-${id}" class="typing-indicator">печатает...</div>
                    </div>
                `;
                container.appendChild(contactDiv);

                // Слушатель онлайна
                if(!isGroup) {
                    db.ref('presence/' + id).on('value', s => {
                        document.getElementById('dot-'+id)?.classList.toggle('online', s.exists());
                    });
                }
                initTypingWatcher(id);
            }
        }

        function updateHeaderStatus() {
            const el = document.getElementById('active-chat-status');
            if(!currentPeerNick) {
                db.ref('presence').on('value', s => {
                    let count = 0; s.forEach(() => count++);
                    el.innerText = `В сети: ${count}`;
                    el.style.color = "var(--accent)";
                });
            } else {
                db.ref('presence/' + currentPeerNick).on('value', s => {
                    el.innerText = s.exists() ? 'В СЕТИ' : 'БЫЛ(А) НЕДАВНО';
                    el.style.color = s.exists() ? "var(--accent)" : "#777";
                });
            }
        }

        function processImageMessage(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                db.ref(`messages/${currentChatID}`).push({
                    sn: myData.nick,
                    txt: e.target.result,
                    type: 'img',
                    ts: Date.now()
                });
            };
            reader.readAsDataURL(file);
        }

        function triggerSearch() {
            db.ref('users').once('value', s => {
                const list = document.getElementById('mm-list');
                document.getElementById('mm-title').innerText = "ПОИСК ЛЮДЕЙ";
                document.getElementById('mm-add-trigger').classList.add('hidden');
                list.innerHTML = '';
                s.forEach(u => {
                    if(u.key === myData.nick) return;
                    list.innerHTML += `<div onclick="initPrivate('${u.key}')" style="padding:15px; background:#1a1a1a; margin:5px 0; border-radius:12px; cursor:pointer; color:var(--accent);">💬 Написать ${u.key}</div>`;
                });
                showModal('member-manager-modal');
            });
        }

        async function initPrivate(peer) {
            await db.ref(`users/${myData.nick}/friends/${peer}`).set('user');
            await db.ref(`users/${peer}/friends/${myData.nick}`).set('user');
            const combo = [myData.nick, peer].sort().join('_');
            hideModal('member-manager-modal');
            switchChat(combo, peer);
        }

        async function handleGroupCreation() {
            const name = document.getElementById('new-group-name').value.trim();
            if(!name) return;
            const gid = 'group_' + Date.now();
            const gdata = { name: name, owner: myData.nick, members: { [myData.nick]: true }, av: DEFAULT_AV };
            
            await db.ref('groups/' + gid).set(gdata);
            await db.ref(`users/${myData.nick}/friends/${gid}`).set('group');
            
            hideModal('create-group-modal');
            switchChat(gid, name);
        }

        // Context Menu Ops
        function triggerContextMenu(e, key, data) {
            e.preventDefault();
            selectedMsgKey = key;
            replyRef = data;
            const menu = document.getElementById('ctx-menu');
            document.getElementById('ctx-admin-zone').classList.toggle('hidden', !(data.sn === myData.nick || myData.admin));
            
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }

        function closeCtx() { document.getElementById('ctx-menu').style.display = 'none'; }

        function initiateReply() {
            isEditing = false;
            const bar = document.getElementById('action-bar');
            document.getElementById('action-label').innerText = "ОТВЕТИТЬ";
            document.getElementById('action-preview').innerText = replyRef.txt;
            bar.style.display = 'flex';
            document.getElementById('msg-in').focus();
        }

        function initiateEdit() {
            isEditing = true;
            const bar = document.getElementById('action-bar');
            document.getElementById('action-label').innerText = "ИЗМЕНИТЬ";
            document.getElementById('action-preview').innerText = replyRef.txt;
            document.getElementById('msg-in').value = replyRef.txt;
            bar.style.display = 'flex';
            document.getElementById('msg-in').focus();
        }

        function resetInputMode() {
            isEditing = false;
            replyRef = null;
            document.getElementById('action-bar').style.display = 'none';
            document.getElementById('msg-in').value = '';
        }

        function execDeleteMsg() {
            if(confirm("Удалить сообщение?")) db.ref(`messages/${currentChatID}/${selectedMsgKey}`).remove();
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.style.transform = sb.style.transform === 'translateX(-100%)' ? 'translateX(0)' : 'translateX(-100%)';
        }

        function updatePreview(input, id) {
            const r = new FileReader();
            r.onload = e => document.getElementById(id).src = e.target.result;
            r.readAsDataURL(input.files[0]);
        }

        function insertEmoji(e) { document.getElementById('msg-in').value += e; document.getElementById('msg-in').focus(); }
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
