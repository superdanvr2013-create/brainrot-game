<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanChat Elite</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0d0f; --panel: #16191d; --accent: #00ff88; --text: #ffffff; --side-w: 300px; --error: #ff4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        .admin-msg { border: 2px solid var(--error) !important; box-shadow: 0 0 10px rgba(255, 68, 68, 0.4); }
        .admin-tag { color: var(--error); font-weight: bold; margin-left: 5px; font-size: 9px; border: 1px solid var(--error); padding: 1px 3px; border-radius: 4px; }

        #sidebar { width: var(--side-w); background: var(--panel); border-right: 1px solid #2d3239; display: flex; flex-direction: column; }
        .top-nav { padding: 15px; display: flex; gap: 12px; border-bottom: 1px solid #333; align-items: center; }
        .nav-icon { font-size: 18px; cursor: pointer; opacity: 0.7; }
        .nav-icon:hover { opacity: 1; transform: scale(1.1); }

        #contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 15px; border-bottom: 1px solid #1f2329; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .contact-item img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #333; }
        .group-tools { margin-left: auto; display: flex; gap: 5px; }

        #main-content { flex: 1; display: flex; flex-direction: column; background: #0f1216; }
        header { background: var(--panel); padding: 15px 25px; border-bottom: 1px solid #2d3239; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

        .msg-row { display: flex; gap: 10px; max-width: 85%; margin-bottom: 5px; }
        .msg-row.me { flex-direction: row-reverse; align-self: flex-end; }
        .msg-av { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; object-fit: cover; }
        .msg { padding: 10px 15px; border-radius: 18px; background: #23282e; border: 1px solid transparent; word-wrap: break-word; }
        .me .msg { background: #0078ff; }

        .custom-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .win-frame { background: var(--panel); padding: 25px; border-radius: 20px; border: 2px solid var(--accent); text-align: center; width: 350px; box-shadow: 0 0 20px var(--accent); }
        
        #ctx-menu { position: fixed; background: #1c2127; border: 1px solid #444; border-radius: 10px; z-index: 5000; display: none; min-width: 180px; overflow: hidden; }
        .ctx-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #333; font-size: 14px; }
        .ctx-item:hover { background: var(--accent); color: #000; }

        .inp { width: 90%; padding: 10px; margin: 8px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; }
        .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body onclick="closeCtx()" oncontextmenu="return false;">

    <div id="group-modal" class="custom-modal">
        <div class="win-frame">
            <h3>Создание группы</h3>
            <img id="group-pre" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid var(--accent); margin-bottom:10px;" src="https://cdn-icons-png.flaticon.com/512/6387/6387947.png">
            <input type="file" id="g-file" class="hidden" onchange="previewImg(this, 'group-pre')">
            <br><button class="btn" onclick="document.getElementById('g-file').click()">Выбрать аватар</button>
            <input type="text" id="g-name" class="inp" placeholder="Название группы">
            <button class="btn" style="background:var(--accent); color:#000; width:100%" onclick="createGroup()">Создать</button>
            <button class="btn" style="margin-top:10px" onclick="toggleModal('group-modal', false)">Отмена</button>
        </div>
    </div>

    <div id="members-modal" class="custom-modal">
        <div class="win-frame">
            <h3 id="m-title">Участники</h3>
            <div id="m-list" style="max-height:300px; overflow-y:auto; text-align:left; margin-bottom:15px;"></div>
            <button class="btn" onclick="toggleModal('members-modal', false)">Закрыть</button>
        </div>
    </div>

    <div id="users-modal" class="custom-modal">
        <div class="win-frame">
            <h3>Все люди</h3>
            <div id="all-u-list" style="max-height:350px; overflow-y:auto; text-align:left;"></div>
            <button class="btn" style="margin-top:15px" onclick="toggleModal('users-modal', false)">Закрыть</button>
        </div>
    </div>

    <div id="call-modal" class="custom-modal">
        <div class="win-frame" id="call-box">
            <div id="scary-ui" class="hidden" style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <b style="color:red; animation: blink 0.3s infinite;">НЕ БЕРИ!!!</b>
                <b style="color:red; animation: blink 0.3s infinite;">НЕ БЕРИ!!!</b>
            </div>
            <img id="call-av" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--accent); object-fit:cover;">
            <h2 id="call-nick" style="margin:15px 0;">...</h2>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:var(--accent); color:#000; flex:1" onclick="acceptCall()">ОТВЕТИТЬ</button>
                <button id="call-reject" class="btn" style="background:var(--error); color:white; flex:1" onclick="endCall()">СБРОСИТЬ</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="custom-modal">
        <div class="win-frame">
            <h3>Настройки</h3>
            <img id="set-pre" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid var(--accent)">
            <input type="file" id="f-file" class="hidden" onchange="previewImg(this, 'set-pre')">
            <br><button class="btn" onclick="document.getElementById('f-file').click()">Сменить фото</button>
            <input type="text" id="set-nick" class="inp" placeholder="Ник">
            <input type="color" id="set-color" style="width:100%; height:40px; margin:5px 0; border:none; background:none; cursor:pointer">
            <input type="password" id="set-code" class="inp" placeholder="Админ-код">
            <button class="btn" style="background:var(--accent); color:#000; width:100%" onclick="saveSettings()">Сохранить</button>
            <button class="btn" style="margin-top:10px" onclick="toggleModal('settings-modal', false)">Назад</button>
        </div>
    </div>

    <div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:20000; display:flex; align-items:center; justify-content:center;">
        <div class="win-frame">
            <h1 style="color:var(--accent)">DanChat</h1>
            <input type="text" id="auth-n" class="inp" placeholder="Ник">
            <input type="password" id="auth-p" class="inp" placeholder="Пароль">
            <button class="btn" style="background:var(--accent); color:#000; width:100%" onclick="auth()">Войти</button>
        </div>
    </div>

    <div id="sidebar" class="hidden">
        <div class="top-nav">
            <span class="nav-icon" onclick="toggleModal('settings-modal', true)">⚙️</span>
            <span class="nav-icon" onclick="openUsersList()">👤</span>
            <span class="nav-icon" onclick="toggleModal('group-modal', true)">➕</span>
            <div id="my-name" style="margin-left:auto; font-weight:bold; font-size:14px;"></div>
        </div>
        <div id="contact-list"></div>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <div id="chat-info">
                <b id="chat-title">Глобальный чат</b><br>
                <small id="chat-sub" style="color:var(--accent)"></small>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <button id="clear-db-btn" class="hidden" onclick="fullClearDB()" style="background:none; border:none; font-size:20px; cursor:pointer;">🗑️</button>
                <button id="call-btn" class="hidden" onclick="startCall()" style="background:var(--accent); color:#000; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">📞</button>
            </div>
        </header>
        <div id="chat-window"></div>
        <div id="reply-bar" class="hidden" style="background:#222; padding:10px; border-top:2px solid var(--accent); display:flex; justify-content:space-between;">
            <span id="reply-txt" style="font-size:12px; opacity:0.8"></span><span onclick="cancelReply()" style="cursor:pointer">✕</span>
        </div>
        <div style="padding:15px; background:var(--panel); display:flex; gap:10px;">
            <input type="text" id="msg-in" class="inp" style="margin:0" placeholder="Сообщение..." maxlength="100" onkeydown="if(event.key==='Enter') send()">
            <button class="btn" style="background:var(--accent); color:#000" onclick="send()">➤</button>
        </div>
    </div>

    <div id="ctx-menu">
        <div id="msg-ctx">
            <div class="ctx-item" onclick="prepReply()">Ответить</div>
            <div id="admin-ctx" class="hidden">
                <div class="ctx-item" onclick="prepEdit()">Изменить</div>
                <div class="ctx-item" style="color:var(--error)" onclick="deleteMsg()">Удалить</div>
            </div>
        </div>
        <div id="user-ctx" class="hidden">
            <div class="ctx-item" style="color:var(--error)" onclick="deleteAccount()">Удалить аккаунт</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE", authDomain: "danblox-e209f.firebaseapp.com", databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com", projectId: "danblox-e209f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const defAv = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        let myData = null, curChat = 'global', curPeer = '', pc = null, localStream = null;
        let selId = null, selData = null, isEdit = false, replyData = null;

        async function auth() {
            const n = document.getElementById('auth-n').value.trim(), p = document.getElementById('auth-p').value.trim();
            if(!n) return;
            const s = await db.ref('users/'+n).get();
            if(!s.exists()) {
                const id = Math.floor(100000+Math.random()*899999);
                const u = { nick: n, pass: p, av: defAv, id: id, color: '#ffffff' };
                await db.ref('users/'+n).set(u); await db.ref('id_map/'+id).set(n); start(u);
            } else if(s.val().pass === p) start(s.val());
            else alert("Пароль неверный!");
        }

        function start(u) {
            myData = u;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            updateMyProfile();
            db.ref('presence/'+u.nick).set(true); db.ref('presence/'+u.nick).onDisconnect().remove();
            loadContacts(); listenCalls(); switchChat('global', 'Глобальный чат');
            setInterval(updateStatus, 2000);
        }

        function updateMyProfile() {
            const el = document.getElementById('my-name');
            el.innerText = myData.nick; el.style.color = myData.color;
            document.getElementById('clear-db-btn').classList.toggle('hidden', !myData.admin);
        }

        // --- КОНТАКТЫ И ГРУППЫ ---
        function loadContacts() {
            db.ref(`users/${myData.nick}/friends`).on('value', async s => {
                const list = document.getElementById('contact-list');
                list.innerHTML = `<div class="contact-item" onclick="switchChat('global','Глобальный чат')"><b>🌍 Глобальный чат</b></div>`;
                const data = s.val() || {};
                for(let key in data) {
                    if(data[key] === 'group') {
                        const g = (await db.ref('groups/'+key).get()).val();
                        if(!g) continue;
                        const item = document.createElement('div'); item.className = 'contact-item';
                        item.onclick = () => switchChat(key, g.name);
                        item.innerHTML = `<img src="${g.av}"><div><b>${g.name}</b><br><small>Группа</small></div>`;
                        if(g.owner === myData.nick) {
                            const tools = document.createElement('div'); tools.className = 'group-tools';
                            tools.innerHTML = `<span onclick="event.stopPropagation(); manageGroup('${key}')">➕</span><span onclick="event.stopPropagation(); deleteGroup('${key}')" style="color:red">🗑️</span>`;
                            item.appendChild(tools);
                        }
                        list.appendChild(item);
                    } else {
                        const u = (await db.ref('users/'+key).get()).val();
                        if(!u) continue;
                        const item = document.createElement('div'); item.className = 'contact-item';
                        item.onclick = () => openPrivate(u.nick);
                        item.oncontextmenu = (e) => { e.preventDefault(); if(myData.admin) openUserMenu(e, u.nick); };
                        item.innerHTML = `<img src="${u.av || defAv}"><div><b style="color:${u.color}">${u.nick}</b>${u.admin?'<span class="admin-tag">Admin</span>':''}<br><small>ЛС</small></div>`;
                        list.appendChild(item);
                    }
                }
            });
        }

        async function createGroup() {
            const name = document.getElementById('g-name').value.trim();
            if(!name) return;
            const gid = 'group_' + Date.now();
            const gdata = { name: name, av: document.getElementById('group-pre').src, owner: myData.nick, members: { [myData.nick]: true } };
            await db.ref('groups/'+gid).set(gdata);
            await db.ref(`users/${myData.nick}/friends/${gid}`).set('group');
            toggleModal('group-modal', false);
        }

        async function manageGroup(gid) {
            const g = (await db.ref('groups/'+gid).get()).val();
            const list = document.getElementById('m-list');
            list.innerHTML = '<b>Добавить контакт:</b><br>';
            const friends = (await db.ref(`users/${myData.nick}/friends`).get()).val();
            for(let f in friends) {
                if(friends[f] !== 'group' && !g.members[f]) {
                    list.innerHTML += `<div style="padding:5px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">${f} <button onclick="addToGroup('${gid}','${f}')">Добавить</button></div>`;
                }
            }
            list.innerHTML += '<br><b>Участники (удалить):</b><br>';
            for(let m in g.members) {
                if(m !== myData.nick) {
                    list.innerHTML += `<div style="padding:5px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">${m} <button style="color:red" onclick="removeFromGroup('${gid}','${m}')">Удалить</button></div>`;
                }
            }
            toggleModal('members-modal', true);
        }

        async function addToGroup(gid, nick) {
            await db.ref(`groups/${gid}/members/${nick}`).set(true);
            await db.ref(`users/${nick}/friends/${gid}`).set('group');
            manageGroup(gid);
        }

        async function removeFromGroup(gid, nick) {
            await db.ref(`groups/${gid}/members/${nick}`).remove();
            await db.ref(`users/${nick}/friends/${gid}`).remove();
            manageGroup(gid);
        }

        async function deleteGroup(gid) {
            if(!confirm("Удалить группу полностью?")) return;
            const g = (await db.ref('groups/'+gid).get()).val();
            for(let m in g.members) await db.ref(`users/${m}/friends/${gid}`).remove();
            await db.ref('groups/'+gid).remove();
            await db.ref('messages/'+gid).remove();
        }

        // --- ЧАТ ---
        function switchChat(id, title) {
            curChat = id; curPeer = (id.startsWith('group_') || id==='global') ? '' : title;
            document.getElementById('chat-title').innerText = title;
            document.getElementById('call-btn').classList.toggle('hidden', id==='global' || id.startsWith('group_'));
            document.getElementById('chat-window').innerHTML = '';
            db.ref('messages/'+id).off();
            db.ref('messages/'+id).on('child_added', s => drawMsg(s.key, s.val()));
            db.ref('messages/'+id).on('child_removed', s => document.getElementById('m-'+s.key)?.remove());
        }

        async function drawMsg(mid, m) {
            const win = document.getElementById('chat-window'), row = document.createElement('div');
            const u = (await db.ref('users/'+m.sn).get()).val() || { av: defAv, color: '#fff' };
            row.id = 'm-'+mid; row.className = `msg-row ${m.sn===myData.nick?'me':''}`;
            row.oncontextmenu = (e) => { e.preventDefault(); e.stopPropagation(); openMsgMenu(e, mid, m); };
            row.innerHTML = `<img src="${u.av || defAv}" class="msg-av" onclick="openPrivate('${m.sn}')">
                <div class="msg ${u.admin?'admin-msg':''}">
                    <b style="color:${u.color}; font-size:11px; cursor:pointer" onclick="openPrivate('${m.sn}')">${m.sn}</b>${u.admin?'<span class="admin-tag">Admin</span>':''}
                    ${m.rp ? `<div style="font-size:10px; opacity:0.6; border-left:2px solid var(--accent); padding-left:5px; margin:4px 0;">↪ ${m.rp}</div>` : ''}
                    <div class="txt-c">${m.txt}</div>
                </div>`;
            win.appendChild(row); win.scrollTop = win.scrollHeight;
        }

        function send() {
            const i = document.getElementById('msg-in'), txt = i.value.trim();
            if(!txt && !isEdit) return;
            if(isEdit) db.ref('messages/'+curChat+'/'+selId).update({txt: txt});
            else db.ref('messages/'+curChat).push({ sn: myData.nick, txt: txt, rp: replyData ? replyData.txt : null });
            i.value = ''; cancelReply();
        }

        // --- ЗВОНКИ ---
        async function startCall() {
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); localStream.getTracks().forEach(t => pc.addTrack(t, localStream)); } catch(e) {}
            const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
            db.ref(`calls/${curPeer}`).set({ from: myData.nick, offer: offer });
            document.getElementById('call-nick').innerText = "Звонок " + curPeer + "...";
            document.getElementById('call-modal').style.display = 'flex';
        }

        function listenCalls() {
            db.ref(`calls/${myData.nick}`).on('value', async s => {
                const c = s.val();
                if(!c) { toggleModal('call-modal', false); return; }
                if(c.offer && !pc) {
                    const u = (await db.ref('users/'+c.from).get()).val();
                    document.getElementById('call-av').src = u.av || defAv;
                    document.getElementById('call-nick').innerText = c.from;
                    const isDeath = (c.from === "Смерть_в_нищете");
                    document.getElementById('scary-ui').classList.toggle('hidden', !isDeath);
                    document.getElementById('call-reject').classList.toggle('hidden', isDeath);
                    document.getElementById('call-nick').style.color = isDeath ? 'red' : 'white';
                    document.getElementById('call-box').style.borderColor = isDeath ? 'red' : 'var(--accent)';
                    toggleModal('call-modal', true);
                }
            });
        }

        async function acceptCall() {
            const s = await db.ref(`calls/${myData.nick}`).get();
            const c = s.val();
            if(!c || !c.offer) return;
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            await pc.setRemoteDescription(new RTCSessionDescription(c.offer));
            const ans = await pc.createAnswer(); await pc.setLocalDescription(ans);
            db.ref(`calls/${c.from}/answer`).set(ans);
            document.getElementById('call-nick').innerText = "В разговоре...";
        }

        function endCall() {
            db.ref(`calls/${myData.nick}`).remove();
            if(curPeer) db.ref(`calls/${curPeer}`).remove();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(pc) pc.close(); pc = null;
        }

        // --- ВСПОМОГАТЕЛЬНЫЕ ---
        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
        function previewImg(i, targetId) { const r = new FileReader(); r.onload = e => document.getElementById(targetId).src = e.target.result; r.readAsDataURL(i.files[0]); }
        function openUsersList() {
            db.ref('users').once('value', s => {
                const list = document.getElementById('all-u-list'); list.innerHTML = '';
                s.forEach(snap => {
                    const d = snap.val(); if(d.nick === myData.nick) return;
                    const row = document.createElement('div'); row.style = "padding:8px; border-bottom:1px solid #333; cursor:pointer;";
                    row.innerHTML = `👤 ${d.nick}`;
                    row.onclick = () => { db.ref(`users/${myData.nick}/friends/${d.nick}`).set('user'); alert("Добавлен!"); };
                    list.appendChild(row);
                });
                toggleModal('users-modal', true);
            });
        }
        function openPrivate(n) { const id = myData.nick < n ? myData.nick+'_'+n : n+'_'+myData.nick; switchChat(id, n); }
        function closeCtx() { document.getElementById('ctx-menu').style.display='none'; }
        function openMsgMenu(e, id, m) {
            selId = id; selData = m; closeCtx();
            const menu = document.getElementById('ctx-menu');
            document.getElementById('msg-ctx').classList.remove('hidden');
            document.getElementById('user-ctx').classList.add('hidden');
            document.getElementById('admin-ctx').className = (myData.admin || m.sn === myData.nick) ? "" : "hidden";
            menu.style.display = 'block'; menu.style.left = e.pageX+'px'; menu.style.top = e.pageY+'px';
        }
        function openUserMenu(e, nick) {
            selPeer = nick; closeCtx();
            const menu = document.getElementById('ctx-menu');
            document.getElementById('msg-ctx').classList.add('hidden');
            document.getElementById('user-ctx').classList.remove('hidden');
            menu.style.display = 'block'; menu.style.left = e.pageX+'px'; menu.style.top = e.pageY+'px';
        }
        function prepReply() { replyData = selData; document.getElementById('reply-bar').classList.remove('hidden'); document.getElementById('reply-txt').innerText = "Ответ: "+selData.txt; closeCtx(); }
        function cancelReply() { isEdit = false; replyData = null; document.getElementById('reply-bar').classList.add('hidden'); document.getElementById('msg-in').value = ''; }
        function deleteMsg() { db.ref('messages/'+curChat+'/'+selId).remove(); closeCtx(); }
        function fullClearDB() { if(confirm("Очистить ВЕСЬ чат из базы?")) db.ref('messages/'+curChat).remove(); }
        function saveSettings() {
            const upd = { av: document.getElementById('set-pre').src, color: document.getElementById('set-color').value };
            if(document.getElementById('set-code').value === "DanAdminPanel") upd.admin = true;
            db.ref('users/'+myData.nick).update(upd); Object.assign(myData, upd);
            updateMyProfile(); toggleModal('settings-modal', false);
        }
        async function updateStatus() {
            const s = await db.ref('presence').get(); let c = 0; s.forEach(() => c++);
            document.getElementById('chat-sub').innerText = "Онлайн: " + c;
        }
    </script>
</body>
</html>
