<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanChat WebRTC Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0d0f; --panel: #16191d; --accent: #00a2ff; --text: #ffffff; --side-w: 300px; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        /* Стили из прошлой версии сохранены для удобства */
        #sidebar { width: var(--side-w); background: var(--panel); border-right: 1px solid #2d3239; display: flex; flex-direction: column; }
        .my-profile { padding: 20px; background: #1c2127; border-bottom: 1px solid #2d3239; text-align: center; }
        .my-id-label { font-size: 32px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        #contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 15px; border-bottom: 1px solid #1f2329; cursor: pointer; display: flex; align-items: center; gap: 12px; position: relative; }
        .contact-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; margin-right: 5px; display: inline-block; }
        .status-online { background: #00ff88; box-shadow: 0 0 5px #00ff88; }

        #main-content { flex: 1; display: flex; flex-direction: column; background: #0f1216; position: relative; }
        header { background: var(--panel); padding: 15px 25px; border-bottom: 1px solid #2d3239; display: flex; justify-content: space-between; align-items: center; }
        .call-btn { background: #2d3239; border: 1px solid #00ff88; color: #00ff88; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; gap: 10px; align-items: flex-end; max-width: 85%; margin-bottom: 5px; }
        .msg-row.me { flex-direction: row-reverse; align-self: flex-end; }
        .msg-av { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .msg { padding: 10px 14px; border-radius: 15px; background: #23282e; position: relative; }
        .me .msg { background: #005bb5; border-bottom-right-radius: 2px; }

        /* Окно звонка */
        #call-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .call-av-big { width: 140px; height: 140px; border-radius: 50%; border: 4px solid #00ff88; margin-bottom: 20px; object-fit: cover; }

        .input-area { background: var(--panel); padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #2d3239; position: relative; }
        .hidden { display: none !important; }
        #emoji-picker { position: absolute; bottom: 80px; left: 10px; background: #1c2127; border: 1px solid #444; border-radius: 10px; padding: 10px; display: none; grid-template-columns: repeat(5, 1fr); gap: 5px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="call-modal">
        <img id="call-av-img" class="call-av-big" src="">
        <h2 id="call-peer-name">Загрузка...</h2>
        <p id="call-status-text">Вызов...</p>
        <div style="display:flex; gap:30px; margin-top:30px;">
            <button onclick="toggleMic()" id="mic-btn" style="padding:20px; border-radius:50%; background:#444; border:none; cursor:pointer; font-size:24px;">🎙️</button>
            <button onclick="hangUp()" style="padding:20px; border-radius:50%; background:#ff4444; border:none; cursor:pointer; font-size:24px;">📞</button>
        </div>
    </div>

    <div id="auth-screen" style="position:fixed; inset:0; background:#0b0d0f; z-index:20000; display:flex; align-items:center; justify-content:center;">
        <div style="background:var(--panel); padding:40px; border-radius:24px; text-align:center; width:340px;">
            <h1 style="color:var(--accent);">DanChat</h1>
            <div id="reg-box">
                <img id="preview-av" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--accent);">
                <br><label style="color:var(--accent); cursor:pointer; font-size:12px;">АВАТАРКА<input type="file" id="av-file" class="hidden" onchange="previewFile(this, 'preview-av')"></label>
            </div>
            <input type="text" id="nick" placeholder="Ник" style="width:100%; padding:14px; margin:15px 0 5px; background:#000; border:1px solid #333; color:white; border-radius:10px;">
            <input type="password" id="pass" placeholder="Пароль" style="width:100%; padding:14px; margin:5px 0 15px; background:#000; border:1px solid #333; color:white; border-radius:10px;">
            <button onclick="handleAuth()" style="width:100%; padding:16px; background:var(--accent); color:white; border:none; border-radius:12px; cursor:pointer; font-weight:bold;">ВОЙТИ</button>
        </div>
    </div>

    <div id="sidebar" class="hidden">
        <div class="my-profile">
            <div id="my-id-display" class="my-id-label">000000</div>
            <b id="my-nick-label"></b>
        </div>
        <div id="contact-list"></div>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <div><b id="chat-title">Выберите чат</b><br><small id="chat-status"></small></div>
            <button class="call-btn" id="call-btn-ui" onclick="startCall()" style="display:none;">📞 ЗВОНОК</button>
        </header>
        <div id="chat-window"></div>
        <div id="emoji-picker"></div>
        <div class="input-area">
            <span onclick="toggleEmoji()" style="cursor:pointer; font-size:28px;">😊</span>
            <label style="cursor:pointer; font-size:28px;">📷<input type="file" class="hidden" onchange="sendImage(this)"></label>
            <input type="text" id="msg-input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; border-radius:10px; padding:12px 25px; color:white; cursor:pointer;">></button>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE", 
            authDomain: "danblox-e209f.firebaseapp.com", 
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com", 
            projectId: "danblox-e209f" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myData = {}, activeChatId = "global", activePeerNick = "";
        let pc, localStream;
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        function previewFile(inp, id) { const r = new FileReader(); r.onload=e=>document.getElementById(id).src=e.target.result; r.readAsDataURL(inp.files[0]); }

        async function handleAuth() {
            const n=document.getElementById('nick').value.trim(), p=document.getElementById('pass').value.trim();
            if(!n) return;
            const s = await db.ref('users/'+n).get();
            if(!s.exists()) {
                const id=Math.floor(100000+Math.random()*899999);
                const user={nick:n, pass:p, av:document.getElementById('preview-av').src, id:id};
                await db.ref('users/'+n).set(user); await db.ref('id_map/'+id).set(n); enter(user);
            } else {
                if(s.val().pass===p) enter(s.val()); else alert("Неверный пароль");
            }
        }

        function enter(data) {
            myData=data;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden'); 
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('my-id-display').innerText=data.id; 
            document.getElementById('my-nick-label').innerText=data.nick;
            
            db.ref('presence/'+myData.nick).set(true);
            db.ref('presence/'+myData.nick).onDisconnect().remove();
            
            loadFriends();
            listenForCalls();
            switchChat('global', 'Глобальный чат');
            initEmojis();
        }

        // --- ЛОГИКА WEBRTC ЗВОНКОВ ЧЕРЕЗ FIREBASE ---

        async function initWebRTC() {
            pc = new RTCPeerConnection(servers);
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.ontrack = (event) => {
                const audio = new Audio();
                audio.srcObject = event.streams[0];
                audio.play();
                document.getElementById('call-status-text').innerText = "В звонке";
            };

            pc.onicecandidate = (event) => {
                if (event.candidate && activePeerNick) {
                    db.ref(`calls/${activePeerNick}/candidates/${myData.nick}`).push(event.candidate.toJSON());
                }
            };
        }

        async function startCall() {
            if (!activePeerNick) return;
            await initWebRTC();
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            const callData = {
                offer: { type: offer.type, sdp: offer.sdp },
                from: myData.nick,
                status: 'calling'
            };

            await db.ref(`calls/${activePeerNick}`).set(callData);
            showCallUI(activePeerNick, "Вызов...");

            // Ждем ответа
            db.ref(`calls/${myData.nick}/answer`).on('value', async s => {
                if (s.exists() && pc.signalingState !== "stable") {
                    await pc.setRemoteDescription(new RTCSessionDescription(s.val()));
                }
            });

            // Слушаем кандидатов
            db.ref(`calls/${myData.nick}/candidates/${activePeerNick}`).on('child_added', s => {
                pc.addIceCandidate(new RTCIceCandidate(s.val()));
            });
        }

        function listenForCalls() {
            db.ref(`calls/${myData.nick}`).on('value', async s => {
                const data = s.val();
                if (data && data.offer && data.status === 'calling') {
                    if (confirm(`Звонок от ${data.from}. Принять?`)) {
                        activePeerNick = data.from;
                        await initWebRTC();
                        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                        
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        
                        await db.ref(`calls/${data.from}/answer`).set({ type: answer.type, sdp: answer.sdp });
                        await db.ref(`calls/${myData.nick}`).update({ status: 'connected' });
                        
                        showCallUI(data.from, "В звонке");

                        // Слушаем кандидатов
                        db.ref(`calls/${myData.nick}/candidates/${data.from}`).on('child_added', s => {
                            pc.addIceCandidate(new RTCIceCandidate(s.val()));
                        });
                    } else {
                        hangUp();
                    }
                } else if (!data) {
                    closeCallUI();
                }
            });
        }

        function showCallUI(nick, status) {
            db.ref('users/'+nick).once('value', s => {
                document.getElementById('call-modal').style.display = 'flex';
                document.getElementById('call-av-img').src = s.val().av;
                document.getElementById('call-peer-name').innerText = nick;
                document.getElementById('call-status-text').innerText = status;
            });
        }

        function hangUp() {
            if (activePeerNick) {
                db.ref(`calls/${activePeerNick}`).remove();
                db.ref(`calls/${myData.nick}`).remove();
            }
            closeCallUI();
        }

        function closeCallUI() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (pc) pc.close();
            document.getElementById('call-modal').style.display = 'none';
            pc = null;
        }

        function toggleMic() {
            const enabled = localStream.getAudioTracks()[0].enabled;
            localStream.getAudioTracks()[0].enabled = !enabled;
            document.getElementById('mic-btn').style.background = !enabled ? "#444" : "#ff4444";
        }

        // --- ОСТАЛЬНОЙ ФУНКЦИОНАЛ ---

        function loadFriends() {
            db.ref('users/'+myData.nick+'/friends').on('value', async s => {
                const list = document.getElementById('contact-list');
                list.innerHTML = `<div class="contact-item" onclick="switchChat('global','Глобальный')"><b>🌍 Глобальный чат</b></div>`;
                const friends = s.val() || {};
                for (let f in friends) {
                    const u = await db.ref('users/'+f).get();
                    const d = u.val();
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    div.onclick = () => switchChat(myData.nick < d.nick ? myData.nick+'_'+d.nick : d.nick+'_'+myData.nick, d.nick);
                    div.innerHTML = `<img src="${d.av}"><div><b>${d.nick}</b></div>`;
                    list.appendChild(div);
                }
            });
        }

        function switchChat(id, name) {
            activeChatId = id; activePeerNick = (name === 'Глобальный' ? '' : name);
            document.getElementById('chat-title').innerText = name;
            document.getElementById('call-btn-ui').style.display = activePeerNick ? 'block' : 'none';
            document.getElementById('chat-window').innerHTML = '';
            db.ref('messages/'+id).off();
            db.ref('messages/'+id).on('child_added', s => {
                const m = s.val();
                const row = document.createElement('div');
                row.className = `msg-row ${m.sn === myData.nick ? 'me' : 'other'}`;
                row.innerHTML = `<div class="msg"><b>${m.sn}</b><br>${m.txt}</div>`;
                document.getElementById('chat-window').appendChild(row);
                document.getElementById('chat-window').scrollTop = 99999;
            });
        }

        function sendMsg() {
            const txt = document.getElementById('msg-input').value;
            if (!txt) return;
            db.ref('messages/'+activeChatId).push({ sn: myData.nick, txt: txt });
            document.getElementById('msg-input').value = '';
        }

        function initEmojis() {
            const emojis = ['😀','😂','😍','😎','🔥','👍','💩','🤡'];
            const p = document.getElementById('emoji-picker');
            emojis.forEach(e => {
                const s = document.createElement('span'); s.innerText = e; s.style.cursor='pointer'; s.style.fontSize='24px';
                s.onclick = () => document.getElementById('msg-input').value += e;
                p.appendChild(s);
            });
        }
        function toggleEmoji() { const p = document.getElementById('emoji-picker'); p.style.display = p.style.display==='grid'?'none':'grid'; }
    </script>
</body>
</html>
