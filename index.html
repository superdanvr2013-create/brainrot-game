<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanChat</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0d0f; --panel: #16191d; --accent: #00a2ff; --text: #ffffff; --side-w: 280px; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: var(--side-w); background: var(--panel); border-right: 1px solid #2d3239; display: flex; flex-direction: column; }
        .my-profile { padding: 20px; background: #1c2127; border-bottom: 1px solid #2d3239; text-align: center; }
        .my-id-label { font-size: 24px; font-weight: 900; color: var(--accent); letter-spacing: 2px; margin-top: 5px; }
        
        .sidebar-header { padding: 15px; font-size: 14px; font-weight: bold; color: #888; display: flex; justify-content: space-between; align-items: center; }
        #contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 15px; border-bottom: 1px solid #1f2329; cursor: pointer; display: flex; align-items: center; gap: 12px; position: relative; }
        .contact-item:hover { background: #23282e; }
        .contact-item img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #333; }
        .del-btn { position: absolute; right: 10px; color: #ff4444; font-size: 18px; display: none; }
        .contact-item:hover .del-btn { display: block; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; margin-right: 5px; display: inline-block; }
        .status-online { background: #00ff88; box-shadow: 0 0 5px #00ff88; }

        /* Main Area */
        #main-content { flex: 1; display: flex; flex-direction: column; background: #0f1216; }
        header { background: var(--panel); padding: 15px 25px; border-bottom: 1px solid #2d3239; display: flex; flex-direction: column; }
        #active-chat-info { font-size: 18px; font-weight: bold; }
        #online-count { font-size: 12px; color: #00ff88; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Messages */
        .msg { max-width: 75%; padding: 10px; border-radius: 12px; animation: slideUp 0.2s ease; position: relative; }
        .msg.me { align-self: flex-end; background: #005bb5; }
        .msg.other { align-self: flex-start; background: #23282e; }
        .msg img.chat-img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        .sender-name { font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; color: #8bb9fe; }

        /* Input */
        .input-area { background: var(--panel); padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #2d3239; }
        .file-label { cursor: pointer; color: var(--accent); font-size: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #3d444d; background: #0b0d0f; color: #fff; outline: none; }
        
        /* Auth */
        .screen { position: fixed; inset: 0; background: #0b0d0f; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .auth-box { background: var(--panel); padding: 30px; border-radius: 24px; width: 340px; text-align: center; border: 1px solid #2d3239; }
        .auth-box img#preview-av { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; background: #333; border: 2px solid var(--accent); }
        
        .hidden { display: none !important; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h2 id="auth-title">DanChat</h2>
            <div id="reg-extra">
                <img id="preview-av" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                <br>
                <label class="btn-send" style="cursor:pointer; color:var(--accent); font-size:12px;">
                    ВЫБРАТЬ АВАТАР
                    <input type="file" id="av-file" accept="image/*" class="hidden" onchange="previewFile(this, 'preview-av')">
                </label>
            </div>
            <input type="text" id="nick" placeholder="Ник (макс 20)" maxlength="20">
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="handleAuth()" style="width:100%; padding:14px; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:bold; margin-top:15px; cursor:pointer;">ПРОДОЛЖИТЬ</button>
            <p style="font-size:12px; color:#666; margin-top:15px; cursor:pointer;" onclick="toggleA()" id="a-toggle">Нужен аккаунт?</p>
        </div>
    </div>

    <div id="sidebar" class="hidden">
        <div class="my-profile">
            <div style="font-size:12px; opacity:0.6">ВАШ УНИКАЛЬНЫЙ ID:</div>
            <div class="my-id-label" id="my-id-display">000-000</div>
            <div id="my-nick-label" style="margin-top:5px; font-weight:bold;"></div>
        </div>
        <div class="sidebar-header">
            <span>ДИАЛОГИ</span>
            <button onclick="addFriend()" style="background:var(--accent); border:none; border-radius:50%; width:25px; height:25px; color:white; cursor:pointer;">+</button>
        </div>
        <div class="contact-item" onclick="switchChat('global', 'Глобальный чат')">
            <img src="https://cdn-icons-png.flaticon.com/512/864/864685.png">
            <div><b>Глобальный чат</b><br><span id="global-count">0 человек онлайн</span></div>
        </div>
        <div id="contact-list"></div>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <div id="active-chat-info">DanChat</div>
            <div id="online-count"></div>
        </header>

        <div id="chat-window"></div>

        <div class="input-area">
            <label class="file-label">
                📷
                <input type="file" id="chat-file" accept="image/*" class="hidden" onchange="sendImage(this)">
            </label>
            <input type="text" id="msg-input" placeholder="Введите сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; border-radius:8px; padding:10px 15px; color:white; cursor:pointer; font-weight:bold;">></button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myData = { nick: "", id: "", av: "" };
        let isReg = true;
        let activeChatId = "global";
        let lastSend = 0;

        // Вспомогательные функции
        function toggleA() { 
            isReg = !isReg; 
            document.getElementById('auth-title').innerText = isReg ? "DanChat Регистрация" : "DanChat Вход";
            document.getElementById('reg-extra').style.display = isReg ? 'block' : 'none';
        }

        function previewFile(input, targetId) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById(targetId).src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        async function handleAuth() {
            const nick = document.getElementById('nick').value.trim();
            const pass = document.getElementById('pass').value.trim();
            if(!nick || !pass) return alert("Заполни все!");

            if(isReg) {
                const av = document.getElementById('preview-av').src;
                const newId = Math.floor(100000 + Math.random() * 899999);
                const user = { nick, pass, av, id: newId };
                await db.ref('users/' + nick).set(user);
                await db.ref('id_map/' + newId).set(nick);
                enter(user);
            } else {
                const s = await db.ref('users/' + nick).get();
                if(s.exists() && s.val().pass === pass) enter(s.val());
                else alert("Ошибка!");
            }
        }

        function enter(data) {
            myData = data;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('my-id-display').innerText = data.id;
            document.getElementById('my-nick-label').innerText = data.nick;
            
            // Статус онлайн
            db.ref('presence/' + myData.nick).set(true);
            db.ref('presence/' + myData.nick).onDisconnect().remove();
            
            // Счетчик онлайна в глобале
            db.ref('presence').on('value', s => {
                const count = s.numChildren();
                document.getElementById('global-count').innerText = count + " чел. онлайн";
                if(activeChatId === 'global') document.getElementById('online-count').innerText = count + " онлайн";
            });

            switchChat('global', 'Глобальный чат');
            loadFriends();
        }

        function loadFriends() {
            db.ref('users/' + myData.nick + '/friends').on('value', async s => {
                const list = document.getElementById('contact-list');
                list.innerHTML = "";
                for(let fNick in s.val()) {
                    const info = await db.ref('users/' + fNick).get();
                    if(!info.exists()) continue;
                    const d = info.val();
                    const item = document.createElement('div');
                    item.className = 'contact-item';
                    item.onclick = () => switchChat(getRoomId(myData.nick, fNick), fNick);
                    
                    // Проверка статуса собеседника
                    db.ref('presence/' + fNick).on('value', st => {
                        const isOnline = st.exists();
                        item.innerHTML = `
                            <img src="${d.av}">
                            <div>
                                <b>${d.nick}</b><br>
                                <small><span class="status-dot ${isOnline?'status-online':''}"></span>${isOnline?'В сети':'Не в сети'}</small>
                            </div>
                            <span class="del-btn" onclick="removeFriend(event, '${d.nick}')">✕</span>
                        `;
                    });
                    list.appendChild(item);
                }
            });
        }

        function addFriend() {
            const fid = prompt("Введите ID собеседника:");
            if(!fid || fid == myData.id) return;
            db.ref('id_map/' + fid).once('value', s => {
                if(s.exists()) {
                    const fNick = s.val();
                    // Добавляем обоим пользователям сразу
                    db.ref('users/' + myData.nick + '/friends/' + fNick).set(true);
                    db.ref('users/' + fNick + '/friends/' + myData.nick).set(true);
                } else alert("ID не найден!");
            });
        }

        function removeFriend(e, fNick) {
            e.stopPropagation();
            if(confirm("Удалить из контактов?")) {
                db.ref('users/' + myData.nick + '/friends/' + fNick).remove();
                db.ref('users/' + fNick + '/friends/' + myData.nick).remove();
            }
        }

        function getRoomId(n1, n2) { return [n1, n2].sort().join("_"); }

        function switchChat(id, name) {
            activeChatId = id;
            document.getElementById('active-chat-info').innerText = name;
            document.getElementById('chat-window').innerHTML = "";
            db.ref('messages/' + id).off();
            db.ref('messages/' + id).limitToLast(50).on('child_added', s => drawMsg(s.val()));
        }

        function sendMsg() {
            if(Date.now() - lastSend < 2000) return alert("Жди 2 сек!");
            const inp = document.getElementById('msg-input');
            if(!inp.value.trim()) return;
            db.ref('messages/' + activeChatId).push({ sn: myData.nick, txt: inp.value, ts: Date.now() });
            inp.value = ""; lastSend = Date.now();
        }

        function sendImage(input) {
            if(!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                db.ref('messages/' + activeChatId).push({ 
                    sn: myData.nick, 
                    img: e.target.result, 
                    ts: Date.now() 
                });
            };
            reader.readAsDataURL(input.files[0]);
        }

        function drawMsg(m) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${m.sn === myData.nick ? 'me' : 'other'}`;
            let content = m.txt ? `<div>${m.txt}</div>` : `<img src="${m.img}" class="chat-img" onclick="window.open(this.src)">`;
            div.innerHTML = `<span class="sender-name">${m.sn}</span>${content}`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
