<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanChat Ultra Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0d0f; --panel: #16191d; --accent: #00a2ff; --text: #ffffff; --side-w: 300px; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        #sidebar { width: var(--side-w); background: var(--panel); border-right: 1px solid #2d3239; display: flex; flex-direction: column; }
        .my-profile { padding: 20px; background: #1c2127; border-bottom: 1px solid #2d3239; text-align: center; }
        .my-id-label { font-size: 32px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        
        #contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 15px; border-bottom: 1px solid #1f2329; cursor: pointer; display: flex; align-items: center; gap: 12px; position: relative; }
        .contact-item:hover { background: #23282e; }
        .contact-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .del-btn { position: absolute; right: 15px; color: #ff4444; font-size: 20px; display: none; }
        .contact-item:hover .del-btn { display: block; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; margin-right: 5px; display: inline-block; }
        .status-online { background: #00ff88; box-shadow: 0 0 5px #00ff88; }

        #main-content { flex: 1; display: flex; flex-direction: column; background: #0f1216; position: relative; }
        header { background: var(--panel); padding: 15px 25px; border-bottom: 1px solid #2d3239; display: flex; justify-content: space-between; align-items: center; }
        .call-btn { background: #2d3239; border: 1px solid #00ff88; color: #00ff88; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; gap: 10px; align-items: flex-end; max-width: 85%; }
        .msg-row.me { flex-direction: row-reverse; align-self: flex-end; }
        .msg-av { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .msg { padding: 10px 14px; border-radius: 15px; position: relative; }
        .me .msg { background: #005bb5; border-bottom-right-radius: 2px; }
        .other .msg { background: #23282e; border-bottom-left-radius: 2px; }

        #ctx-menu { position: fixed; background: #1c2127; border: 1px solid #444; border-radius: 8px; z-index: 5000; display: none; box-shadow: 0 5px 15px #000; }
        .ctx-item { padding: 12px 20px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #222; }
        .ctx-item:hover { background: var(--accent); }

        #call-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .call-av-big { width: 140px; height: 140px; border-radius: 50%; border: 4px solid #00ff88; margin-bottom: 20px; object-fit: cover; }
        
        #emoji-picker { position: absolute; bottom: 80px; left: 10px; background: #1c2127; border: 1px solid #444; border-radius: 10px; padding: 10px; display: none; grid-template-columns: repeat(5, 1fr); gap: 5px; z-index: 1000; }
        #reply-preview { position: absolute; top: -45px; left: 0; right: 0; background: #222; padding: 10px 20px; border-top: 2px solid var(--accent); display: none; justify-content: space-between; font-size: 12px; }
        .hidden { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ctx-menu">
        <div class="ctx-item" onclick="prepReply()">Ответить</div>
        <div id="my-options" class="hidden">
            <div class="ctx-item" onclick="prepEdit()">Изменить</div>
            <div class="ctx-item" style="color:red" onclick="deleteMsg()">Удалить</div>
        </div>
    </div>

    <div id="call-modal">
        <img id="call-av-img" class="call-av-big" src="">
        <h2 id="call-peer-name">Загрузка...</h2>
        <p id="call-timer">Вызов...</p>
        <p id="peer-mic-status" style="color:#ffaa00; font-size:13px;"></p>
        <div style="display:flex; gap:30px; margin-top:30px;">
            <button onclick="toggleMic()" id="mic-btn" style="padding:20px; border-radius:50%; background:#444; border:none; cursor:pointer; font-size:24px;">🎙️</button>
            <button onclick="endCallSignal()" style="padding:20px; border-radius:50%; background:#ff4444; border:none; cursor:pointer; font-size:24px;">📞</button>
        </div>
    </div>

    <div id="auth-screen" style="position:fixed; inset:0; background:#0b0d0f; z-index:20000; display:flex; align-items:center; justify-content:center;">
        <div style="background:var(--panel); padding:40px; border-radius:24px; text-align:center; width:340px;">
            <h1 style="color:var(--accent);">DanChat</h1>
            <div id="reg-box">
                <img id="preview-av" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--accent);">
                <br><label style="color:var(--accent); cursor:pointer; font-size:12px;">ВЫБРАТЬ АВАТАРКУ<input type="file" id="av-file" class="hidden" onchange="previewFile(this, 'preview-av')"></label>
            </div>
            <input type="text" id="nick" placeholder="Ник" style="width:100%; padding:14px; margin:15px 0 5px; background:#000; border:1px solid #333; color:white; border-radius:10px;">
            <input type="password" id="pass" placeholder="Пароль" style="width:100%; padding:14px; margin:5px 0 15px; background:#000; border:1px solid #333; color:white; border-radius:10px;">
            <button onclick="handleAuth()" style="width:100%; padding:16px; background:var(--accent); color:white; border:none; border-radius:12px; cursor:pointer; font-weight:bold;">ВОЙТИ</button>
            <p onclick="isRegMode=!isRegMode; document.getElementById('reg-box').style.display=isRegMode?'block':'none'; this.innerText=isRegMode?'Уже есть аккаунт?':'Нужен новый аккаунт?'" style="cursor:pointer; font-size:13px; color:#666; margin-top:20px;">Нужен новый аккаунт?</p>
        </div>
    </div>

    <div id="sidebar" class="hidden">
        <div class="my-profile">
            <div style="font-size:12px; opacity:0.6;">ВАШ ID</div>
            <div id="my-id-display" class="my-id-label">000000</div>
            <b id="my-nick-label"></b>
        </div>
        <div class="sidebar-header"><span>КОНТАКТЫ</span><button onclick="addFriendByID()" style="background:var(--accent); border:none; border-radius:50%; width:28px; height:28px; color:white; cursor:pointer;">+</button></div>
        <div id="contact-list"></div>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <div><b id="chat-title">Выберите чат</b><br><small id="chat-status"></small></div>
            <button class="call-btn" id="call-btn-ui" onclick="startCallSignal()" style="display:none;">📞 ЗВОНОК</button>
        </header>
        <div id="chat-window" onclick="closeCtx()"></div>
        <div id="emoji-picker"></div>
        <div id="reply-preview"><span id="reply-label"></span><span onclick="cancelSpec()" style="cursor:pointer">✕</span></div>
        <div class="input-area">
            <span onclick="toggleEmoji()" style="cursor:pointer; font-size:28px;">😊</span>
            <label style="cursor:pointer; font-size:28px;">📷<input type="file" class="hidden" onchange="sendImage(this)"></label>
            <input type="text" id="msg-input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; border-radius:10px; padding:12px 25px; color:white; cursor:pointer;">></button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE", authDomain: "danblox-e209f.firebaseapp.com", databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com", projectId: "danblox-e209f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myData = {friends:{}}, activeChatId = "global", activePeerNick = "", isRegMode = false;
        let myPeer, localStream, currentCall;
        let selId = null, selData = null, isEdit = false, replyData = null;

        function previewFile(inp, id) { const r = new FileReader(); r.onload=e=>document.getElementById(id).src=e.target.result; r.readAsDataURL(inp.files[0]); }

        async function handleAuth() {
            const n=document.getElementById('nick').value.trim(), p=document.getElementById('pass').value.trim();
            if(!n) return;
            const s = await db.ref('users/'+n).get();
            if(isRegMode) {
                const id=Math.floor(100000+Math.random()*899999);
                const user={nick:n, pass:p, av:document.getElementById('preview-av').src, id:id};
                await db.ref('users/'+n).set(user); await db.ref('id_map/'+id).set(n); enter(user);
            } else {
                if(s.exists() && s.val().pass===p) enter(s.val()); else alert("Ошибка входа!");
            }
        }

        function enter(data) {
            myData=data; document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden'); document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('my-id-display').innerText=data.id; document.getElementById('my-nick-label').innerText=data.nick;
            db.ref('presence/'+myData.nick).set(true); db.ref('presence/'+myData.nick).onDisconnect().remove();
            
            initPeer();
            loadFriends();
            initEmojis();
            listenCalls();
            switchChat('global', 'Глобальный чат');
        }

        function initPeer() {
            myPeer = new Peer(myData.nick, { host: '0.peerjs.com', port: 443, secure: true, debug: 1 });
            myPeer.on('call', call => {
                // Если мы уже в звонке - не принимаем второй
                if (currentCall) return;
            });
        }

        function listenCalls() {
            db.ref('calls/'+myData.nick).on('value', async s => {
                const c = s.val();
                if(!c) { endCallUI(); return; }
                
                // Входящий вызов (сигнал из Firebase)
                if(c.to === myData.nick && c.status === 'calling' && !currentCall) {
                    if(confirm("Вам звонит " + c.from + ". Принять?")) {
                        db.ref('calls/'+myData.nick).update({status: 'connected'});
                        db.ref('calls/'+c.from).update({status: 'connected'});
                        
                        showCallModal(c.from, "Соединение...");
                        localStream = await navigator.mediaDevices.getUserMedia({audio:true});
                        
                        // Слушаем PeerJS вызов
                        myPeer.on('call', call => {
                            call.answer(localStream);
                            currentCall = call;
                            handleCallStream(call);
                        });
                    } else {
                        endCallSignal();
                    }
                }

                if(c.status === 'connected') {
                    const peerNick = (c.from === myData.nick) ? c.to : c.from;
                    db.ref('calls/'+peerNick).on('value', ps => {
                        if(ps.exists()) document.getElementById('peer-mic-status').innerText = ps.val().mic ? "" : "Собеседник выключил микрофон";
                    });
                }
            });
        }

        async function startCallSignal() {
            try {
                const on = await db.ref('presence/'+activePeerNick).get();
                if(!on.exists()) return alert("Собеседник не в сети!");

                localStream = await navigator.mediaDevices.getUserMedia({audio:true});
                currentCall = myPeer.call(activePeerNick, localStream);
                
                if (currentCall) {
                    handleCallStream(currentCall);
                    const callData = { from: myData.nick, to: activePeerNick, status: 'calling', mic: true };
                    db.ref('calls/'+activePeerNick).set(callData);
                    db.ref('calls/'+myData.nick).set(callData);
                    showCallModal(activePeerNick, "Вызов...");
                }
            } catch (err) { alert("Микрофон недоступен: " + err); }
        }

        function handleCallStream(call) {
            if (!call) return;
            call.on('stream', rs => {
                const a = new Audio(); a.srcObject = rs; a.play();
                document.getElementById('call-timer').innerText = "В звонке";
            });
            call.on('close', endCallUI);
        }

        function showCallModal(nick, text) {
            db.ref('users/'+nick).once('value', s => {
                document.getElementById('call-modal').style.display='flex';
                document.getElementById('call-av-img').src = s.val().av;
                document.getElementById('call-peer-name').innerText = s.val().nick;
                document.getElementById('call-timer').innerText = text;
            });
        }

        function endCallSignal() {
            if(activePeerNick) db.ref('calls/'+activePeerNick).remove();
            db.ref('calls/'+myData.nick).remove();
            endCallUI();
        }

        function endCallUI() {
            if(currentCall) currentCall.close();
            if(localStream) localStream.getTracks().forEach(t=>t.stop());
            document.getElementById('call-modal').style.display='none';
            currentCall = null;
        }

        function toggleMic() {
            if(!localStream) return;
            const enabled = localStream.getAudioTracks()[0].enabled;
            localStream.getAudioTracks()[0].enabled = !enabled;
            document.getElementById('mic-btn').style.background = !enabled ? "#444" : "#ff4444";
            db.ref('calls/'+myData.nick).update({mic: !enabled});
        }

        // --- ОСТАЛЬНЫЕ ФУНКЦИИ (ЧАТ, КОНТАКТЫ) ---
        function loadFriends() {
            db.ref('users/'+myData.nick+'/friends').on('value', async s => {
                const list = document.getElementById('contact-list'); 
                list.innerHTML = `<div class="contact-item" onclick="switchChat('global','Глобальный чат')"><img src="https://cdn-icons-png.flaticon.com/512/864/864685.png"><div><b>🌍 Глобальный чат</b></div></div>`;
                myData.friends = s.val() || {};
                for(let fNick in myData.friends){
                    const info = await db.ref('users/'+fNick).get();
                    if(!info.exists()) continue;
                    const d=info.val(), item=document.createElement('div');
                    item.className='contact-item';
                    item.onclick=()=>switchChat(getRoomId(myData.nick, d.nick), d.nick);
                    db.ref('presence/'+d.nick).on('value', st => {
                        const on = st.exists();
                        item.innerHTML=`<img src="${d.av}"><div style="flex:1"><b>${d.nick}</b><br><small><span class="status-dot ${on?'status-online':''}"></span>${on?'В сети':'Оффлайн'}</small></div><span class="del-btn" onclick="removeFriend(event,'${d.nick}')">✕</span>`;
                    });
                    list.appendChild(item);
                }
            });
        }

        function addFriendByID() {
            const id=prompt("ID:"); if(!id || id == myData.id) return;
            db.ref('id_map/'+id).once('value', s => {
                if(s.exists()){
                    const n = s.val();
                    if(myData.friends[n]) return alert("Уже в списке!");
                    db.ref('users/'+myData.nick+'/friends/'+n).set(true);
                    db.ref('users/'+n+'/friends/'+myData.nick).set(true);
                } else alert("Не найден!");
            });
        }

        function removeFriend(e, n) { e.stopPropagation(); if(confirm("Удалить?")){ db.ref('users/'+myData.nick+'/friends/'+n).remove(); db.ref('users/'+n+'/friends/'+myData.nick).remove(); } }

        function switchChat(id, name) {
            activeChatId=id; activePeerNick=(name.includes("Глобальный")?"":name);
            document.getElementById('chat-title').innerText=name;
            document.getElementById('call-btn-ui').style.display = activePeerNick ? "block" : "none";
            document.getElementById('chat-window').innerHTML="";
            db.ref('messages/'+id).off();
            db.ref('messages/'+id).on('child_added', s => drawMsg(s.key, s.val()));
            db.ref('messages/'+id).on('child_changed', s => { const e=document.getElementById('m-'+s.key); if(e) e.querySelector('.txt-c').innerText = s.val().txt + " (изм.)"; });
            db.ref('messages/'+id).on('child_removed', s => { const e=document.getElementById('m-'+s.key); if(e) e.remove(); });
            
            if(id==='global') db.ref('presence').on('value', s=>document.getElementById('chat-status').innerText=s.numChildren()+" онлайн");
            else document.getElementById('chat-status').innerText="";
        }

        async function drawMsg(id, m) {
            const win=document.getElementById('chat-window'), row=document.createElement('div');
            row.id='m-'+id; row.className=`msg-row ${m.sn===myData.nick?'me':'other'}`;
            const sUser = await db.ref('users/'+m.sn).get();
            const av = sUser.exists() ? sUser.val().av : "";
            let rpH = m.rp ? `<div class="reply-box">↪ ${m.rp}</div>` : "";
            let cnt = m.txt ? `<div class="txt-c">${m.txt}</div>` : `<img src="${m.img}" style="max-width:250px;border-radius:10px;cursor:pointer" onclick="window.open(this.src)">`;
            row.innerHTML=`<img src="${av}" class="msg-av"><div class="msg"><span style="font-size:11px;color:#8bb9fe;cursor:pointer" onclick="addFriendByIDDirect('${m.sn}')">${m.sn}</span>${rpH}${cnt}</div>`;
            row.oncontextmenu = (e) => { e.preventDefault(); openCtx(e, id, m); };
            win.appendChild(row); win.scrollTop=win.scrollHeight;
        }

        function openCtx(e, id, m) {
            selId=id; selData=m; const menu=document.getElementById('ctx-menu');
            menu.style.display='block'; menu.style.left=e.pageX+'px'; menu.style.top=e.pageY+'px';
            document.getElementById('my-options').className=(m.sn===myData.nick?"":"hidden");
        }
        function closeCtx(){ document.getElementById('ctx-menu').style.display='none'; }

        function prepReply() { replyData=selData; isEdit=false; document.getElementById('reply-preview').style.display='flex'; document.getElementById('reply-label').innerText="Ответ: "+selData.txt; closeCtx(); }
        function prepEdit() { isEdit=true; document.getElementById('msg-input').value=selData.txt; document.getElementById('reply-preview').style.display='flex'; document.getElementById('reply-label').innerText="Редактирование..."; closeCtx(); }
        function deleteMsg() { if(confirm("Удалить?")) db.ref('messages/'+activeChatId+'/'+selId).remove(); closeCtx(); }
        function cancelSpec(){ isEdit=false; replyData=null; document.getElementById('reply-preview').style.display='none'; document.getElementById('msg-input').value=""; }

        function sendMsg() {
            const inp=document.getElementById('msg-input'), txt=inp.value.trim(); if(!txt) return;
            if(isEdit) db.ref('messages/'+activeChatId+'/'+selId).update({txt:txt});
            else db.ref('messages/'+activeChatId).push({sn:myData.nick, txt:txt, rp:replyData?replyData.txt:null});
            cancelSpec();
        }

        function sendImage(inp) {
            const r=new FileReader(); r.onload=e=>db.ref('messages/'+activeChatId).push({sn:myData.nick, img:e.target.result});
            r.readAsDataURL(inp.files[0]);
        }

        function initEmojis() {
            const emojis=['😀','😂','😍','😎','🔥','👍','🙌','💩','🤡','👾'];
            const p=document.getElementById('emoji-picker');
            emojis.forEach(e=>{
                const s=document.createElement('span'); s.style.cursor='pointer'; s.style.fontSize='24px'; s.innerText=e;
                s.onclick=()=>{document.getElementById('msg-input').value+=e;}; p.appendChild(s);
            });
        }
        function toggleEmoji(){ const p=document.getElementById('emoji-picker'); p.style.display=p.style.display==='grid'?'none':'grid'; }
        function getRoomId(n1,n2){ return [n1,n2].sort().join("_"); }
        async function addFriendByIDDirect(n) { if(n !== myData.nick && !myData.friends[n]) { db.ref('users/'+myData.nick+'/friends/'+n).set(true); db.ref('users/'+n+'/friends/'+myData.nick).set(true); } }
    </script>
</body>
</html>
