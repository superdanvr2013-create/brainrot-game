<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox PVP: Auto-Cleanup</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; background: #1a1a1a; touch-action: none; -webkit-user-select: none; user-select: none; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        
        .info-panel { position: absolute; background: rgba(0,0,0,0.7); color: white; padding: 12px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.1); font-size: 13px; z-index: 500; pointer-events: none; }
        #online-list { top: 15px; left: 15px; min-width: 140px; }
        #leaderboard { top: 15px; right: 15px; min-width: 140px; border-color: #ffd700; }
        
        .hp-ui { position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%); z-index: 100; text-align: center; }
        .hp-bar-bg { width: 280px; height: 25px; background: #333; border: 3px solid #fff; border-radius: 15px; overflow: hidden; }
        #hp-fill { background: linear-gradient(90deg, #ff416c, #ff4b2b); width: 100%; height: 100%; transition: 0.3s; }
        
        #mobile-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .joy-zone { position: absolute; bottom: 40px; left: 40px; display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; pointer-events: auto; }
        .act-zone { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 20px; pointer-events: auto; }
        
        .b-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; }
        .b-atk { width: 90px; height: 90px; border-radius: 50%; background: rgba(255,50,50,0.5); border: 4px solid #fff; }
        
        #death-timer { font-size: 14px; color: #ffeb3b; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="online-list" class="info-panel"><div>ONLINE</div><div id="players-inner"></div></div>
    <div id="leaderboard" class="info-panel"><div style="color:#ffd700">TOP KILLS</div><div id="lb-list"></div></div>

    <div id="login-screen" class="screen">
        <div style="background:#fff; padding:40px; border-radius:30px; text-align:center;">
            <h1 style="margin:0; color:#ff4b2b;">DANBLOX PVP</h1>
            <input type="text" id="nick-input" placeholder="НИКНЕЙМ" maxlength="12" style="padding:15px; width:200px; font-size:18px; text-align:center; margin: 20px 0;"><br>
            <button onclick="startGame()" style="padding:15px 45px; background:#ff4b2b; color:#fff; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">ИГРАТЬ</button>
        </div>
    </div>

    <div id="death-screen" class="screen hidden">
        <div style="text-align:center; color:#fff;">
            <h1 style="font-size:60px; margin:0;">ТЫ ПОГИБ</h1>
            <button onclick="respawn()" style="padding:20px 50px; font-size:24px; background:#fff; color:#ff4b2b; border:none; border-radius:15px; font-weight:bold;">ВОЗРОДИТЬСЯ</button>
            <div id="death-timer">Выход в меню через 5 сек...</div>
        </div>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="hp-ui"><div class="hp-bar-bg"><div id="hp-fill"></div></div></div>
    </div>

    <div id="mobile-ui" class="hidden">
        <div class="joy-zone">
            <div></div><div class="b-btn" id="m-w">W</div><div></div>
            <div class="btn b-btn" id="m-a">A</div><div class="btn b-btn" id="m-s">S</div><div class="btn b-btn" id="m-d">D</div>
        </div>
        <div class="act-zone">
            <div class="b-btn b-atk" id="m-jump" style="background:rgba(50,150,255,0.4); width:70px; height:70px;">JUMP</div>
            <div class="b-btn b-atk" id="m-atk">ATTACK</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let scene, camera, renderer, myModel, mySword, deathTimeout;
        let myID = 'u' + Math.random().toString(36).substr(2, 9);
        let myNick = "", myHP = 100, inGame = false, isDead = false;
        let otherPlayers = {}, moveState = { f:false, b:false, l:false, r:false };
        let vy = 0, canJump = true, camAzimuth = 0, camDist = 15, isAtk = false;

        function createSword() {
            const group = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.7, 0.04), new THREE.MeshStandardMaterial({color: 0xeeeeee, metalness: 0.8}));
            blade.position.y = 0.85;
            const guard = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.08, 0.15), new THREE.MeshStandardMaterial({color: 0xffd700}));
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.5), new THREE.MeshStandardMaterial({color: 0x5d4037}));
            handle.position.y = -0.25;
            group.add(blade, guard, handle);
            group.rotation.x = Math.PI / 2;
            group.position.set(0.65, 0.8, 0.2);
            return group;
        }

        function createPlayer(color) {
            const g = new THREE.Group();
            g.add(new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), new THREE.MeshStandardMaterial({color})));
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.65, 0.65), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 0.95; g.add(head);
            g.position.y = 0.6;
            return g;
        }

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x81d4fa);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x4caf50}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);

            myModel = createPlayer(0x1e88e5);
            mySword = createSword(); myModel.add(mySword);
            scene.add(myModel);

            db.ref('players').on('value', snap => {
                const data = snap.val() || {};
                const now = Date.now();
                let html = "";
                Object.keys(otherPlayers).forEach(id => { if(!data[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }});
                Object.keys(data).forEach(id => {
                    const d = data[id];
                    if (now - d.lastSeen > 8000) return;
                    if(id === myID) { myHP = d.hp; if(myHP <= 0 && !isDead) triggerDeath(); return; }
                    if(!otherPlayers[id]) {
                        otherPlayers[id] = createPlayer(0xe53935);
                        otherPlayers[id].add(createSword());
                        scene.add(otherPlayers[id]);
                    }
                    const p = otherPlayers[id];
                    p.position.lerp(new THREE.Vector3(d.x, d.y, d.z), 0.2);
                    p.rotation.y = d.ry || 0;
                    p.children[2].position.z = d.at ? -1.2 : 0.2;
                    if(d.hp <= 0) { p.rotation.z = Math.PI/2; p.position.y = 0.3; } 
                    else { p.rotation.z = 0; p.position.y = d.y + 0.6; }
                    html += `<div>${d.n}: ${d.hp}%</div>`;
                });
                document.getElementById('players-inner').innerHTML = html;
            });

            db.ref('leaderboard').orderByValue().limitToLast(5).on('value', snap => {
                let h = ""; snap.forEach(s => { h = `<div>${s.key}: ${s.val()}</div>` + h; });
                document.getElementById('lb-list').innerHTML = h;
            });

            setInterval(() => { if(inGame && !isDead) db.ref('players/' + myID).update({ lastSeen: Date.now() }); }, 2000);
            animate();
        }

        function triggerDeath() {
            isDead = true;
            document.getElementById('death-screen').classList.remove('hidden');
            myModel.rotation.z = Math.PI/2;
            
            // АВТО-ВЫХОД ЧЕРЕЗ 5 СЕКУНД
            let timeLeft = 5;
            const timerEl = document.getElementById('death-timer');
            deathTimeout = setInterval(() => {
                timeLeft--;
                timerEl.innerText = `Выход в меню через ${timeLeft} сек...`;
                if(timeLeft <= 0) exitToMenu();
            }, 1000);
        }

        function exitToMenu() {
            clearInterval(deathTimeout);
            inGame = false;
            isDead = false;
            db.ref('players/' + myID).remove(); // Удаляем из базы (и из ONLINE)
            location.reload(); // Самый надежный способ очистить всё и вернуться в меню
        }

        window.respawn = () => {
            clearInterval(deathTimeout);
            isDead = false; myHP = 100;
            document.getElementById('death-screen').classList.add('hidden');
            myModel.rotation.z = 0;
            myModel.position.set((Math.random()-0.5)*20, 0, (Math.random()-0.5)*20);
            db.ref('players/' + myID).update({ hp: 100, x: myModel.position.x, z: myModel.position.z });
        };

        function attack() {
            if(isDead || isAtk) return;
            isAtk = true; mySword.position.z = -1.2;
            db.ref('players/' + myID + '/at').set(true);
            setTimeout(() => { mySword.position.z = 0.2; isAtk = false; db.ref('players/' + myID + '/at').set(false); }, 150);
            Object.keys(otherPlayers).forEach(id => {
                if(myModel.position.distanceTo(otherPlayers[id].position) < 4.5) {
                    db.ref('players/' + id).transaction(p => {
                        if (p && p.hp > 0) { p.hp -= 20; if (p.hp <= 0) db.ref('leaderboard/' + myNick).transaction(k => (k||0)+1); }
                        return p;
                    });
                }
            });
        }

        function animate() {
            if(!inGame) return;
            requestAnimationFrame(animate);
            if(!isDead) {
                const move = new THREE.Vector3();
                if(moveState.f) move.z -= 1; if(moveState.b) move.z += 1;
                if(moveState.l) move.x -= 1; if(moveState.r) move.x += 1;
                if(move.length() > 0) {
                    move.applyAxisAngle(new THREE.Vector3(0,1,0), camAzimuth);
                    myModel.position.add(move.normalize().multiplyScalar(0.25));
                    myModel.rotation.y = Math.atan2(move.x, move.z);
                }
                myModel.position.y += vy;
                if(myModel.position.y > 0) { vy -= 0.02; canJump = false; }
                else { myModel.position.y = 0; vy = 0; canJump = true; }
                db.ref('players/' + myID).update({ x: myModel.position.x, y: myModel.position.y, z: myModel.position.z, ry: myModel.rotation.y, n: myNick, hp: myHP, at: isAtk });
            }
            camera.position.set(myModel.position.x + camDist * Math.sin(camAzimuth), myModel.position.y + 8, myModel.position.z + camDist * Math.cos(camAzimuth));
            camera.lookAt(myModel.position.x, myModel.position.y + 1, myModel.position.z);
            document.getElementById('hp-fill').style.width = myHP + "%";
            renderer.render(scene, camera);
        }

        window.startGame = async () => {
            myNick = document.getElementById('nick-input').value.trim() || "Pro";
            document.getElementById('login-screen').classList.add('hidden');
            ['ui-layer', 'mobile-ui'].forEach(id => document.getElementById(id).classList.remove('hidden'));
            const now = Date.now();
            const snap = await db.ref('players').once('value');
            if(snap.val()) Object.keys(snap.val()).forEach(id => { if(now - snap.val()[id].lastSeen > 10000) db.ref('players/'+id).remove(); });
            inGame = true; init();
            db.ref('players/' + myID).onDisconnect().remove();
        };

        const setupBtn = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', (e) => { e.preventDefault(); if(!isDead) moveState[key] = true; });
            el.addEventListener('pointerup', () => moveState[key] = false);
            el.addEventListener('pointerleave', () => moveState[key] = false);
        };
        setupBtn('m-w','f'); setupBtn('m-s','b'); setupBtn('m-a','l'); setupBtn('m-d','r');
        document.getElementById('m-jump').onpointerdown = (e) => { e.preventDefault(); if(canJump && !isDead) vy = 0.4; };
        document.getElementById('m-atk').onpointerdown = (e) => { e.preventDefault(); attack(); };

        window.onkeydown = (e) => { if(e.code==='KeyW')moveState.f=true; if(e.code==='KeyS')moveState.b=true; if(e.code==='KeyA')moveState.l=true; if(e.code==='KeyD')moveState.r=true; if(e.code==='Space'&&canJump)vy=0.4; };
        window.onkeyup = (e) => { if(e.code==='KeyW')moveState.f=false; if(e.code==='KeyS')moveState.b=false; if(e.code==='KeyA')moveState.l=false; if(e.code==='KeyD')moveState.r=false; };
        window.onmousedown = (e) => { if(e.button===0&&inGame)attack(); if(e.button===2)window.isR=true; };
        window.onmouseup = () => window.isR=false;
        window.onmousemove = (e) => { if(window.isR) camAzimuth -= e.movementX * 0.01; };
        window.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
