<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanChat Brainrot Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0d0f; --panel: #16191d; --accent: #00a2ff; --text: #ffffff; --side-w: 300px; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        #sidebar { width: var(--side-w); background: var(--panel); border-right: 1px solid #2d3239; display: flex; flex-direction: column; }
        .my-profile { padding: 20px; background: #1c2127; border-bottom: 1px solid #2d3239; text-align: center; }
        .my-id-label { font-size: 32px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        #contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 15px; border-bottom: 1px solid #1f2329; cursor: pointer; display: flex; align-items: center; gap: 12px; position: relative; }
        .contact-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; display: inline-block; }
        .status-online { background: #00ff88; box-shadow: 0 0 5px #00ff88; }

        #main-content { flex: 1; display: flex; flex-direction: column; background: #0f1216; position: relative; }
        header { background: var(--panel); padding: 15px 25px; border-bottom: 1px solid #2d3239; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* Сообщения */
        .msg-row { display: flex; gap: 10px; align-items: flex-end; max-width: 85%; }
        .msg-row.me { flex-direction: row-reverse; align-self: flex-end; }
        .msg-av { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .msg { padding: 10px 14px; border-radius: 15px; background: #23282e; position: relative; }
        .me .msg { background: #005bb5; }

        /* Модалки */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .modal-card { background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #444; width: 300px; }
        .online-list-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #333; }

        .hidden { display: none !important; }
        .input-area { background: var(--panel); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #2d3239; }
        #msg-input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="incoming-call-modal" class="modal-overlay">
        <div class="modal-card">
            <img id="inc-av" style="width:100px; height:100px; border-radius:50%; margin-bottom:15px; border:3px solid #00ff88;">
            <h3 id="inc-name">...</h3>
            <p>Входящий звонок</p>
            <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
                <button onclick="acceptCall()" style="background:#00ff88; padding:10px 20px; border-radius:10px; border:none; cursor:pointer; font-weight:bold;">ПРИНЯТЬ</button>
                <button onclick="hangUp()" style="background:#ff4444; padding:10px 20px; border-radius:10px; border:none; cursor:pointer; font-weight:bold; color:white;">СБРОС</button>
            </div>
        </div>
    </div>

    <div id="online-players-modal" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-card" style="max-height: 70vh; overflow-y: auto;" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent)">Сейчас в сети</h3>
            <div id="online-list-content"></div>
            <button onclick="document.getElementById('online-players-modal').style.display='none'" style="margin-top:15px; padding:8px; width:100%">Закрыть</button>
        </div>
    </div>

    <div id="call-modal" class="modal-overlay">
        <img id="call-av-img" style="width:150px; height:150px; border-radius:50%; border:4px solid #00ff88; object-fit:cover;">
        <h2 id="call-peer-name">...</h2>
        <p id="call-status">Соединение...</p>
        <div style="display:flex; gap:20px; margin-top:30px;">
            <button onclick="toggleMic()" id="mic-btn" style="padding:15px; border-radius:50%; font-size:20px; cursor:pointer;">🎙️</button>
            <button onclick="hangUp()" style="padding:15px; border-radius:50%; background:#ff4444; font-size:20px; cursor:pointer;">📞</button>
        </div>
    </div>

    <div id="auth-screen" style="position:fixed; inset:0; background:#0b0d0f; z-index:20000; display:flex; align-items:center; justify-content:center;">
        <div style="background:var(--panel); padding:40px; border-radius:24px; text-align:center; width:320px;">
            <h1 style="color:var(--accent);">DanChat</h1>
            <input type="text" id="nick" placeholder="Ник" style="width:100%; padding:12px; margin-bottom:10px; background:#000; color:white; border:1px solid #333; border-radius:8px;">
            <input type="password" id="pass" placeholder="Пароль" style="width:100%; padding:12px; margin-bottom:15px; background:#000; color:white; border:1px solid #333; border-radius:8px;">
            <button onclick="handleAuth()" style="width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">ВОЙТИ / СОЗДАТЬ</button>
        </div>
    </div>

    <div id="sidebar" class="hidden">
        <div class="my-profile">
            <div class="my-id-label" id="my-id-display">000000</div>
            <b id="my-nick-label"></b>
        </div>
        <div id="contact-list"></div>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <div onclick="showOnlinePlayers()" style="cursor:pointer">
                <b id="chat-title">Загрузка...</b><br>
                <small id="chat-online" style="color:#00ff88"></small>
            </div>
            <button class="call-btn" id="call-btn-ui" onclick="startCall()" style="display:none;">📞 ЗВОНОК</button>
        </header>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Введите сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--accent); color:white; border:none; padding:0 20px; border-radius:10px; cursor:pointer;">➡️</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE", authDomain: "danblox-e209f.firebaseapp.com", databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com", projectId: "danblox-e209f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myData = {}, activeChatId = "global", activePeerNick = "";
        let pc, localStream, incomingData = null;
        const stun = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        async function handleAuth() {
            const n=document.getElementById('nick').value.trim(), p=document.getElementById('pass').value.trim();
            if(!n) return;
            const s = await db.ref('users/'+n).get();
            if(!s.exists()) {
                const id=Math.floor(100000+Math.random()*899999);
                const user={nick:n, pass:p, av:"https://cdn-icons-png.flaticon.com/512/149/149071.png", id:id};
                await db.ref('users/'+n).set(user); await db.ref('id_map/'+id).set(n); enter(user);
            } else if(s.val().pass === p) enter(s.val()); else alert("Ошибка!");
        }

        function enter(data) {
            myData=data; document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden'); document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('my-id-display').innerText=data.id; document.getElementById('my-nick-label').innerText=data.nick;
            db.ref('presence/'+myData.nick).set(true); db.ref('presence/'+myData.nick).onDisconnect().remove();
            db.ref('presence').on('value', s => { if(activeChatId==='global') document.getElementById('chat-online').innerText = s.numChildren() + " онлайн (нажми сюда)"; });
            loadFriends(); listenCalls(); switchChat('global', 'Глобальный чат');
        }

        // --- СПИСОК ИГРОКОВ ОНЛАЙН ---
        async function showOnlinePlayers() {
            if(activeChatId !== 'global') return;
            const modal = document.getElementById('online-players-modal');
            const content = document.getElementById('online-list-content');
            content.innerHTML = "Загрузка...";
            modal.style.display = 'flex';

            const snap = await db.ref('presence').get();
            content.innerHTML = "";
            snap.forEach(child => {
                const nick = child.key;
                db.ref('users/'+nick).once('value', u => {
                    const ud = u.val();
                    if(!ud) return;
                    const item = document.createElement('div');
                    item.className = 'online-list-item';
                    item.innerHTML = `<img src="${ud.av}" style="width:30px;height:30px;border-radius:50%"> <b>${nick}</b>`;
                    item.onclick = () => { if(nick !== myData.nick) addByIDDirect(nick); modal.style.display='none'; };
                    content.appendChild(item);
                });
            });
        }

        // --- WEBRTC ЗВОНКИ ---
        async function initPC(peer) {
            pc = new RTCPeerConnection(stun);
            localStream = await navigator.mediaDevices.getUserMedia({audio:true});
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => { const a = new Audio(); a.srcObject = e.streams[0]; a.play(); document.getElementById('call-status').innerText="В разговоре"; };
            pc.onicecandidate = e => { if(e.candidate) db.ref(`calls/${peer}/ice/${myData.nick}`).push(e.candidate.toJSON()); };
        }

        async function startCall() {
            await initPC(activePeerNick);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            db.ref(`calls/${activePeerNick}`).set({ offer: {type:offer.type, sdp:offer.sdp}, from: myData.nick });
            db.ref(`calls/${myData.nick}`).set({ to: activePeerNick });
            showCallUI(activePeerNick, "Вызов...");
            db.ref(`calls/${myData.nick}/answer`).on('value', async s => { if(s.exists()) await pc.setRemoteDescription(new RTCSessionDescription(s.val())); });
            db.ref(`calls/${myData.nick}/ice/${activePeerNick}`).on('child_added', s => pc.addIceCandidate(new RTCIceCandidate(s.val())));
        }

        function listenCalls() {
            db.ref(`calls/${myData.nick}`).on('value', async s => {
                const c = s.val();
                if(!c) { closeCallUI(); return; }
                if(c.offer && !pc) {
                    incomingData = c;
                    db.ref('users/'+c.from).once('value', u => {
                        document.getElementById('inc-av').src = u.exists() ? u.val().av : "";
                        document.getElementById('inc-name').innerText = c.from;
                        document.getElementById('incoming-call-modal').style.display = 'flex';
                    });
                }
            });
        }

        async function acceptCall() {
            document.getElementById('incoming-call-modal').style.display = 'none';
            const c = incomingData;
            activePeerNick = c.from;
            await initPC(c.from);
            await pc.setRemoteDescription(new RTCSessionDescription(c.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            db.ref(`calls/${c.from}/answer`).set({type:answer.type, sdp:answer.sdp});
            showCallUI(c.from, "В разговоре");
            db.ref(`calls/${myData.nick}/ice/${c.from}`).on('child_added', s => pc.addIceCandidate(new RTCIceCandidate(s.val())));
        }

        function hangUp() { 
            if(activePeerNick) { db.ref(`calls/${activePeerNick}`).remove(); db.ref(`calls/${myData.nick}`).remove(); }
            document.getElementById('incoming-call-modal').style.display = 'none';
            closeCallUI(); 
        }

        function closeCallUI() { 
            if(localStream) localStream.getTracks().forEach(t=>t.stop()); 
            if(pc) pc.close(); pc=null; 
            document.getElementById('call-modal').style.display='none'; 
        }

        function showCallUI(n, t) {
            db.ref('users/'+n).once('value', s => {
                document.getElementById('call-modal').style.display='flex';
                document.getElementById('call-av-img').src = s.exists() ? s.val().av : "";
                document.getElementById('call-peer-name').innerText = n;
                document.getElementById('call-status').innerText = t;
            });
        }

        // --- ЧАТ И КОНТАКТЫ ---
        function switchChat(id, name) {
            activeChatId=id; activePeerNick=(name.includes("Глобальный")?"":name);
            document.getElementById('chat-title').innerText=name;
            document.getElementById('call-btn-ui').style.display = activePeerNick ? 'block' : 'none';
            document.getElementById('chat-window').innerHTML="";
            db.ref('messages/'+id).off();
            db.ref('messages/'+id).on('child_added', s => drawMsg(s.key, s.val()));
        }

        async function drawMsg(id, m) {
            const win=document.getElementById('chat-window'), row=document.createElement('div');
            row.className=`msg-row ${m.sn===myData.nick?'me':'other'}`;
            const sUser = await db.ref('users/'+m.sn).get();
            const av = sUser.exists() ? sUser.val().av : "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            row.innerHTML=`<img src="${av}" class="msg-av"><div class="msg"><b>${m.sn}</b><br>${m.txt}</div>`;
            win.appendChild(row); win.scrollTop=win.scrollHeight;
        }

        function sendMsg() {
            const inp=document.getElementById('msg-input'), txt=inp.value.trim(); if(!txt) return;
            db.ref('messages/'+activeChatId).push({sn:myData.nick, txt:txt});
            inp.value="";
        }

        function loadFriends() {
            db.ref('users/'+myData.nick+'/friends').on('value', async s => {
                const list = document.getElementById('contact-list');
                list.innerHTML = `<div class="contact-item" onclick="switchChat('global','Глобальный чат')"><b>🌍 Глобальный чат</b></div>`;
                const friends = s.val() || {};
                for(let f in friends) {
                    const u = await db.ref('users/'+f).get();
                    if(!u.exists()) continue;
                    const d = u.val(), item = document.createElement('div');
                    item.className = 'contact-item';
                    item.onclick = () => switchChat(myData.nick < d.nick ? myData.nick+'_'+d.nick : d.nick+'_'+myData.nick, d.nick);
                    db.ref('presence/'+d.nick).on('value', st => {
                        const on = st.exists();
                        item.innerHTML = `<img src="${d.av}"><div><b>${d.nick}</b><br><small><span class="status-dot ${on?'status-online':''}"></span>${on?'В сети':'Оффлайн'}</small></div>`;
                    });
                    list.appendChild(item);
                }
            });
        }

        function addByIDDirect(n) {
            db.ref('users/'+myData.nick+'/friends/'+n).set(true);
            db.ref('users/'+n+'/friends/'+myData.nick).set(true);
        }
    </script>
</body>
</html>
