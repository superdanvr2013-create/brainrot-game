<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Brainrot Online - Gun.js Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; }
        #menu { position: absolute; width: 100%; height: 100%; z-index: 100; display: flex; align-items: center; justify-content: center; background: #111; }
        .window { background: #222; padding: 40px; border-radius: 15px; border: 2px solid #00ff88; text-align: center; }
        input { padding: 12px; margin: 10px; border-radius: 5px; width: 250px; background: #000; color: #00ff88; border: 1px solid #444; }
        button { padding: 12px 30px; background: #00ff88; color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #hud { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; z-index: 50; border: 1px solid #00ff88; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="window">
            <h1 style="color: #00ff88;">BRAINROT GUN-EDITION</h1>
            <input type="text" id="nick-input" placeholder="Твой ник (ENG)..."><br>
            <button id="start-btn">ЗАПУСТИТЬ МИР</button>
            <p style="font-size: 11px; color: #666; margin-top: 15px;">PeerJS заменен на Gun.js для стабильности</p>
        </div>
    </div>

    <div id="hud" class="hidden">
        <div>НИК: <span id="display-nick">?</span></div>
        <div id="status">СТАТУС: В СЕТИ</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, pivot, playerModel;
        let gun, playersRef, myID, myNick;
        let otherPlayers = {}; 
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;

        const startBtn = document.getElementById('start-btn');

        // СЕТЬ ЧЕРЕЗ GUN.JS
        function initNet(nick) {
            myNick = nick.replace(/[^a-zA-Z0-9]/g, "");
            myID = 'user_' + Math.random().toString(36).substr(2, 9);
            document.getElementById('display-nick').innerText = myNick;

            // Используем публичные relay-серверы Gun.js
            gun = Gun([
                'https://gun-maniac.herokuapp.com/gun',
                'https://relay.peer.ooo/gun'
            ]);
            playersRef = gun.get('brainrot-world-v1').get('players');

            // Слушаем изменения других игроков
            playersRef.map().on((data, id) => {
                if(!data || id === myID) return;
                syncPlayer(id, data);
            });

            // Отправляем свои координаты каждые 50мс
            setInterval(() => {
                if(pivot) {
                    playersRef.get(myID).put({
                        nick: myNick,
                        x: pivot.position.x,
                        y: pivot.position.y,
                        z: pivot.position.z,
                        ry: pivot.rotation.y,
                        lastSeen: Date.now()
                    });
                }
            }, 50);

            // Удаляем старых игроков (кто вышел)
            setInterval(() => {
                const now = Date.now();
                for(let id in otherPlayers) {
                    if(now - otherPlayers[id].lastUpdate > 5000) {
                        scene.remove(otherPlayers[id].mesh);
                        delete otherPlayers[id];
                    }
                }
            }, 2000);
        }

        function syncPlayer(id, data) {
            if(!otherPlayers[id]) {
                const geometry = new THREE.BoxGeometry(1, 2, 1);
                const material = new THREE.MeshStandardMaterial({color: 0x0088ff});
                const m = new THREE.Mesh(geometry, material);
                m.position.y = 1;
                scene.add(m);
                otherPlayers[id] = { mesh: m, lastUpdate: Date.now() };
            }
            otherPlayers[id].mesh.position.lerp(new THREE.Vector3(data.x, data.y, data.z), 0.2);
            otherPlayers[id].mesh.rotation.y = data.ry;
            otherPlayers[id].lastUpdate = Date.now();
        }

        startBtn.onclick = () => {
            const nick = document.getElementById('nick-input').value.trim();
            if(!nick) return alert("ENTER NICK!");
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            initNet(nick);
            initGame();
        };

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            pivot = new THREE.Group();
            scene.add(pivot);

            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x00ff88}));
            body.position.y = 1;
            playerModel = new THREE.Group(); playerModel.add(body);
            scene.add(playerModel);

            controls = new PointerLockControls(pivot, document.body);
            document.body.addEventListener('click', () => controls.lock());

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            scene.add(new THREE.GridHelper(200, 50, 0x00ff88, 0x222222));

            window.onkeydown = (e) => {
                if(e.code === 'KeyW') moveForward = true;
                if(e.code === 'KeyS') moveBackward = true;
                if(e.code === 'KeyA') moveLeft = true;
                if(e.code === 'KeyD') moveRight = true;
            };
            window.onkeyup = (e) => {
                if(e.code === 'KeyW') moveForward = false;
                if(e.code === 'KeyS') moveBackward = false;
                if(e.code === 'KeyA') moveLeft = false;
                if(e.code === 'KeyD') moveRight = false;
            };

            function animate() {
                requestAnimationFrame(animate);
                if (controls.isLocked) {
                    if (moveForward) controls.moveForward(0.2);
                    if (moveBackward) controls.moveForward(-0.2);
                    if (moveLeft) controls.moveRight(-0.2);
                    if (moveRight) controls.moveRight(0.2);
                    playerModel.position.copy(pivot.position);
                    playerModel.rotation.y = pivot.rotation.y;
                    const camPos = new THREE.Vector3(0, 4, 12).applyMatrix4(pivot.matrixWorld);
                    camera.position.lerp(camPos, 0.1);
                    camera.lookAt(pivot.position.x, pivot.position.y + 1, pivot.position.z);
                }
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
