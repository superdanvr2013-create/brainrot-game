<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Roblox Web: 3rd Person & Zoom</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #222; color: white; -webkit-user-select: none; user-select: none; }
        #auth-screen, #lobby-screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; z-index: 10; }
        .hidden { display: none !important; }
        input { padding: 10px; font-size: 18px; border-radius: 5px; border: none; margin-bottom: 10px; background: #333; color: white; outline: none; }
        button { padding: 10px 25px; font-size: 18px; background: #00b06f; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #00e08c; }
        
        #header { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; box-sizing: border-box; background: rgba(0,0,0,0.5); z-index: 5; }
        
        /* Список игроков */
        #player-list { position: absolute; top: 70px; right: 20px; width: 150px; background: rgba(0,0,0,0.6); border-radius: 8px; padding: 10px; z-index: 5; border: 1px solid #444; }
        .player-entry { font-size: 14px; margin-bottom: 5px; color: #00ff88; }

        #game-ui { position: absolute; bottom: 20px; left: 20px; z-index: 5; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: none; }
        #blocker { position: absolute; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 4; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1>ROBLOX WEB</h1>
        <input type="text" id="username" placeholder="Введите ник..." maxlength="12">
        <button id="login-btn">Войти</button>
    </div>

    <div id="lobby-screen" class="hidden">
        <div id="header">
            <span style="font-weight: bold;">Игры</span>
            <span id="display-name"></span>
        </div>
        <div class="game-card" id="start-game-btn" style="margin-top:20px; cursor:pointer; background:#333; padding:20px; border-radius:10px;">
            <center><span style="font-size:50px;">🧠</span><h3>Steal A Brainrot</h3></center>
        </div>
    </div>

    <div id="player-list" class="hidden">
        <div style="font-weight:bold; border-bottom:1px solid #555; margin-bottom:5px; padding-bottom:3px;">Онлайн</div>
        <div id="online-players"></div>
    </div>

    <div id="blocker" class="hidden">
        <div style="font-size: 24px; text-align: center;">Кликните, чтобы играть<br><span style="font-size: 16px; color: #ccc;">Колесико - Zoom | Мышь - Обзор</span></div>
    </div>

    <div id="game-ui" class="hidden">
        WASD - Движение | Space - Прыжок
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, playerModel, pivot;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let prevTime = performance.now();
        
        let zoomDistance = 10; // Дистанция камеры
        const WORLD_SIZE = 50;
        let myNick = "";

        // UI
        document.getElementById('login-btn').addEventListener('click', () => {
            myNick = document.getElementById('username').value;
            if(!myNick) return alert("Введите ник!");
            document.getElementById('display-name').innerText = "👤 " + myNick;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
        });

        document.getElementById('start-game-btn').addEventListener('click', () => {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('player-list').classList.remove('hidden');
            document.getElementById('blocker').classList.remove('hidden');
            
            // Добавляем себя в список
            document.getElementById('online-players').innerHTML = `<div class="player-entry">● ${myNick} (Вы)</div>`;
            
            init3D();
        });

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 0, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Создаем "стержень" (pivot) для камеры, чтобы она вращалась вокруг игрока
            pivot = new THREE.Group();
            scene.add(pivot);

            // Создаем скин игрока
            playerModel = createBaconSkin();
            scene.add(playerModel);

            controls = new PointerLockControls(pivot, document.body);
            
            document.getElementById('blocker').addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => document.getElementById('blocker').classList.add('hidden'));
            controls.addEventListener('unlock', () => document.getElementById('blocker').classList.remove('hidden'));

            // Свет
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);

            // Мир
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100,100), new THREE.MeshStandardMaterial({color: 0x4caf50}));
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Деревья
            for(let i=0; i<10; i++) {
                const tx = (Math.random()-0.5)*80;
                const tz = (Math.random()-0.5)*80;
                createTree(tx, tz);
            }

            setupControls();
            animate();
        }

        function createBaconSkin() {
            const group = new THREE.Group();
            // Ноги
            const legGeo = new THREE.BoxGeometry(0.4, 0.8, 0.4);
            const legMat = new THREE.MeshStandardMaterial({color: 0x333333});
            const lLeg = new THREE.Mesh(legGeo, legMat);
            lLeg.position.set(-0.25, 0.4, 0);
            const rLeg = new THREE.Mesh(legGeo, legMat);
            rLeg.position.set(0.25, 0.4, 0);
            group.add(lLeg, rLeg);

            // Торс
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1, 0.5), new THREE.MeshStandardMaterial({color: 0xde1b1b}));
            body.position.y = 1.3;
            group.add(body);

            // Голова
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 2.1;
            group.add(head);

            // Волосы (Бекон)
            const hair = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.2, 0.7), new THREE.MeshStandardMaterial({color: 0x3d251e}));
            hair.position.y = 2.45;
            group.add(hair);

            group.traverse(obj => { if(obj.isMesh) obj.castShadow = true; });
            return group;
        }

        function createTree(x, z) {
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.8, 4, 0.8), new THREE.MeshStandardMaterial({color: 0x8b4513}));
            trunk.position.set(x, 2, z);
            const leaves = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), new THREE.MeshStandardMaterial({color: 0x2d5a27}));
            leaves.position.set(x, 5, z);
            scene.add(trunk, leaves);
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') moveForward = true;
                if(e.code === 'KeyS') moveBackward = true;
                if(e.code === 'KeyA') moveLeft = true;
                if(e.code === 'KeyD') moveRight = true;
                if(e.code === 'Space' && canJump) { velocity.y = 10; canJump = false; }
            });
            document.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') moveForward = false;
                if(e.code === 'KeyS') moveBackward = false;
                if(e.code === 'KeyA') moveLeft = false;
                if(e.code === 'KeyD') moveRight = false;
            });

            // --- ПРИБЛИЖЕНИЕ / ОТДАЛЕНИЕ ---
            document.addEventListener('wheel', (e) => {
                zoomDistance += e.deltaY * 0.01;
                zoomDistance = Math.min(Math.max(zoomDistance, 3), 20); // Ограничение от 3 до 20 метров
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked) {
                // Физика
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 25.0 * delta; // Гравитация

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 150.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 150.0 * delta;

                // Двигаем pivot (точку, где находится игрок)
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                pivot.position.y += (velocity.y * delta);

                // Пол
                if (pivot.position.y < 0) {
                    velocity.y = 0;
                    pivot.position.y = 0;
                    canJump = true;
                }

                // Границы
                pivot.position.x = Math.max(-WORLD_SIZE, Math.min(WORLD_SIZE, pivot.position.x));
                pivot.position.z = Math.max(-WORLD_SIZE, Math.min(WORLD_SIZE, pivot.position.z));

                // Привязываем скин к позиции игрока
                playerModel.position.copy(pivot.position);
                
                // Поворачиваем скин в сторону движения камеры (но только по горизонтали)
                playerModel.rotation.y = pivot.rotation.y;

                // Обновляем позицию камеры ОТНОСИТЕЛЬНО игрока (3-е лицо)
                const relativeCameraOffset = new THREE.Vector3(0, 2, zoomDistance);
                const cameraOffset = relativeCameraOffset.applyMatrix4(pivot.matrixWorld);
                camera.position.x = cameraOffset.x;
                camera.position.y = cameraOffset.y;
                camera.position.z = cameraOffset.z;
                camera.lookAt(pivot.position.x, pivot.position.y + 2, pivot.position.z);
            }

            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
