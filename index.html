<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тест: Легенда канала Dan Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* небольшая аккуратность для кнопок, но текст можно копировать */
        }

        body {
            background: linear-gradient(145deg, #10141c 0%, #1a1f2c 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', 'Montserrat', system-ui, -apple-system, 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        /* основной контейнер-карточка */
        .quiz-container {
            max-width: 880px;
            width: 100%;
            background: rgba(22, 26, 38, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* шапка с динамикой */
        .quiz-header {
            background: #2a1e3c;
            background: linear-gradient(135deg, #2a1e3c 0%, #1e2a3a 100%);
            padding: 1.8rem 2rem;
            text-align: center;
            border-bottom: 2px solid #ffd966;
        }

        .quiz-header h1 {
            font-size: 1.9rem;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #FFE6B0, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 3px rgba(0,0,0,0.2);
            margin-bottom: 0.35rem;
        }

        .quiz-header p {
            color: #cdd9ff;
            font-weight: 500;
            margin-top: 8px;
            font-size: 1rem;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        /* карточка вопросов */
        .questions-area {
            padding: 2rem 2rem 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 2.2rem;
        }

        /* каждый отдельный вопрос */
        .question-card {
            background: rgba(18, 22, 32, 0.8);
            border-radius: 2rem;
            padding: 1.5rem 1.8rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,215,100,0.25);
            transition: all 0.2s;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FFEEBB;
            margin-bottom: 1.4rem;
            border-left: 6px solid #ffb347;
            padding-left: 1rem;
            line-height: 1.3;
        }

        /* варианты ответов (список) */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            list-style: none;
        }

        .option-item {
            display: flex;
            align-items: center;
            background: #131a24;
            border-radius: 2.5rem;
            border: 1px solid #2c3545;
            transition: all 0.2s;
            cursor: pointer;
            padding: 0.7rem 1.2rem;
        }

        .option-item:hover {
            background: #1e2a36;
            border-color: #f5b042;
            transform: translateX(5px);
        }

        /* кастомный радио-инпут, скрываем стандартный */
        .option-item input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 1.3rem;
            height: 1.3rem;
            border: 2px solid #9aaec0;
            border-radius: 50%;
            margin-right: 1rem;
            position: relative;
            background: #0f111a;
            transition: 0.1s;
            cursor: pointer;
        }

        .option-item input[type="radio"]:checked {
            border-color: #ffb347;
            background-color: #ffb347;
            box-shadow: 0 0 0 3px rgba(255,180,71,0.3);
        }

        .option-item input[type="radio"]:checked::after {
            content: "";
            position: absolute;
            width: 0.6rem;
            height: 0.6rem;
            background: #1a1a2a;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .option-label {
            font-size: 1.1rem;
            font-weight: 500;
            color: #eef4ff;
            cursor: pointer;
            flex: 1;
            letter-spacing: 0.2px;
        }

        /* блок с кнопкой */
        .action-section {
            padding: 0.2rem 2rem 2rem 2rem;
            display: flex;
            justify-content: center;
        }

        .check-btn {
            background: linear-gradient(95deg, #FF9F3D, #FF7A2F);
            border: none;
            font-size: 1.35rem;
            font-weight: bold;
            padding: 0.9rem 2.2rem;
            border-radius: 4rem;
            color: #1e1a2f;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            box-shadow: 0 6px 0 #9b4a1a;
            transform: translateY(-2px);
            width: 100%;
            max-width: 320px;
            letter-spacing: 1px;
        }

        .check-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #9b4a1a;
        }

        /* результаты */
        .result-area {
            margin: 0 2rem 2rem 2rem;
            background: #0b0f17cc;
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            backdrop-filter: blur(8px);
            border: 1px solid #ffd27a55;
            transition: 0.2s;
        }

        .result-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #FDE5B4;
            text-align: center;
            line-height: 1.4;
        }

        .result-detail {
            font-size: 0.95rem;
            color: #bbccff;
            margin-top: 8px;
            text-align: center;
        }

        /* правильные / неправильные подстветки */
        .option-item.correct-highlight {
            background: #1d5730a0;
            border-color: #6fdf6f;
            box-shadow: 0 0 0 1px #7aff7a;
        }
        .option-item.wrong-highlight {
            background: #641e2aa0;
            border-color: #ff7361;
        }

        .option-item.disabled-opt {
            opacity: 0.9;
            cursor: default;
        }
        .option-item.disabled-opt:hover {
            transform: none;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            color: #6f7d9e;
            border-top: 1px solid #2c3348;
            margin-top: 0.5rem;
        }

        @media (max-width: 600px) {
            .quiz-container {
                border-radius: 1.8rem;
            }
            .question-text {
                font-size: 1.25rem;
            }
            .option-label {
                font-size: 0.95rem;
            }
            .questions-area {
                padding: 1.2rem;
            }
            .question-card {
                padding: 1rem 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="quiz-header">
        <h1>📺 ТЕСТ: ЛЕГЕНДА DAN GAMES</h1>
        <p>Проверь, насколько хорошо ты знаешь историю канала</p>
    </div>

    <div class="questions-area" id="questionsArea">
        <!-- динамически вопросы будут отрисованы через JS, но можно и статически, 
             но чтобы легко править ответы, сделаем через рендер JS. Но напишем встроенный скрипт -->
    </div>

    <div class="action-section">
        <button class="check-btn" id="submitQuiz">✨ ПРОВЕРИТЬ ОТВЕТЫ ✨</button>
    </div>

    <div class="result-area" id="resultArea" style="display: none;">
        <div class="result-text" id="resultMessage"></div>
        <div class="result-detail" id="resultDetail"></div>
    </div>
    <footer>
        ⚡ Только один правильный ответ на вопрос. Удачи!
    </footer>
</div>

<script>
    // --- БАЗА ВОПРОСОВ И ПРАВИЛЬНЫХ ОТВЕТОВ (как в легенде) ---
    const quizData = [
        {
            id: 1,
            question: "С какой игры в роблоксе Dan Games начал свою карьеру?",
            options: ["Doors", "Paradox", "Steal A Brainrot", "Toilet Tower Defense"],
            correct: "Toilet Tower Defense"
        },
        {
            id: 2,
            question: "Какой был канал у Dan кроме Dan Games и NoobikCraft?",
            options: ["NoobikDan", "МегаДэн", "Мега Нубик", "DanTop"],
            correct: "Мега Нубик"      // согласно условию: "Мега нубик" с учётом регистра? Правильный текст "Мега Нубик" (из условия: Мега нубик)
            // В варианте пользователь написал "Мега Нубик" с большой Н? В условии: "Мега нубик" но в вариантах пишу "Мега Нубик" для единообразия.
            // Пользователь указал: варианты: NoobikDan, МегаДэн, Мега Нубик, DanTop. Правильный ответ: Мега нубик.
            // Сделаем проверку по строке "Мега Нубик" - нормализуем сравнение в нижний регистр чтобы учесть возможные опечатки? но варианты точные. 
            // Для надёжности сравниваем .trim().toLowerCase()
        }
    ];

    // для хранения выбранных ответов (ключ: id вопроса, value: текст ответа)
    let userAnswers = {
        1: null,
        2: null
    };

    // флаг, был ли уже сабмит (чтобы подсветить правильно/неправильно)
    let submitted = false;

    // Ссылки на DOM
    const questionsContainer = document.getElementById('questionsArea');
    const submitBtn = document.getElementById('submitQuiz');
    const resultArea = document.getElementById('resultArea');
    const resultMessageSpan = document.getElementById('resultMessage');
    const resultDetailSpan = document.getElementById('resultDetail');

    // Функция для рендера всех вопросов
    function renderQuestions() {
        questionsContainer.innerHTML = '';
        quizData.forEach((item, idx) => {
            const qCard = document.createElement('div');
            qCard.className = 'question-card';
            qCard.setAttribute('data-qid', item.id);

            const questionTitle = document.createElement('div');
            questionTitle.className = 'question-text';
            questionTitle.innerText = `${item.id}. ${item.question}`;
            qCard.appendChild(questionTitle);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            // проходим по вариантам ответов
            item.options.forEach(opt => {
                const li = document.createElement('li');
                li.className = 'option-item';
                // добавим атрибуты
                li.setAttribute('data-qid', item.id);
                li.setAttribute('data-opt-value', opt);

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${item.id}`;
                radio.value = opt;
                radio.id = `q${item.id}_${opt.replace(/\s/g, '_')}`;

                // если уже был выбран ответ ранее (при повторном рендере или после сброса подсветки)
                if (userAnswers[item.id] === opt) {
                    radio.checked = true;
                }

                const label = document.createElement('label');
                label.htmlFor = radio.id;
                label.className = 'option-label';
                label.innerText = opt;

                li.appendChild(radio);
                li.appendChild(label);

                // событие при клике на сам li тоже выбирает радио (удобно)
                li.addEventListener('click', (e) => {
                    // если уже был произведён сабмит, то блокируем изменение ответов после проверки? 
                    // но по условию тест интерактивный: после проверки можно изменить ответы и снова проверить.
                    // Лучше разрешить изменять в любой момент, а при новом клике снимаем "режим проверки"
                    if (submitted) {
                        // если была проверка, после выбора нового ответа сбрасываем подсветку и убираем флаг,
                        // чтобы тест снова был "чистым"
                        resetToActiveMode();
                    }
                    // отмечаем радио
                    radio.checked = true;
                    // сохраняем выбранный ответ в userAnswers
                    userAnswers[item.id] = opt;
                    // убираем подсветку у всех option-item этого вопроса (если есть классы подсветки)
                    const allOptsInQuestion = document.querySelectorAll(`.option-item[data-qid='${item.id}']`);
                    allOptsInQuestion.forEach(optEl => {
                        optEl.classList.remove('correct-highlight', 'wrong-highlight');
                        optEl.classList.remove('disabled-opt');
                    });
                    // скрыть результат при изменении ответов, чтобы не было конфликта
                    if (submitted === true) {
                        submitted = false;
                        resultArea.style.display = 'none';
                    }
                });

                // для радио дополнительно обработчик на изменение (если кликнуть именно по радио)
                radio.addEventListener('change', (e) => {
                    if (submitted) {
                        resetToActiveMode();
                    }
                    userAnswers[item.id] = opt;
                    // убираем подсветку у вариантов этого вопроса
                    const siblings = document.querySelectorAll(`.option-item[data-qid='${item.id}']`);
                    siblings.forEach(optEl => {
                        optEl.classList.remove('correct-highlight', 'wrong-highlight');
                        optEl.classList.remove('disabled-opt');
                    });
                    if (submitted === true) {
                        submitted = false;
                        resultArea.style.display = 'none';
                    }
                });

                optionsList.appendChild(li);
            });

            qCard.appendChild(optionsList);
            questionsContainer.appendChild(qCard);
        });
    }

    // Сброс в активный режим (убираем подсветки, скрываем результаты)
    function resetToActiveMode() {
        submitted = false;
        resultArea.style.display = 'none';
        // очищаем все подсветки у всех option-элементов
        const allOptions = document.querySelectorAll('.option-item');
        allOptions.forEach(opt => {
            opt.classList.remove('correct-highlight', 'wrong-highlight');
            opt.classList.remove('disabled-opt');
        });
        // также можно снять блокировку (просто удаляем классы)
        // но также не забываем, что если пользователь заново выбирает - всё работает
    }

    // Функция проверки ответов, подсветка и вывод результата
    function checkAnswers() {
        // собираем актуальные ответы из DOM (на случай если радиокнопки изменились без триггера, но мы сохраняем при каждом клике)
        // дополнительная синхронизация: проходим по всем radio и записываем выбранные
        for (let i = 0; i < quizData.length; i++) {
            const qid = quizData[i].id;
            const selectedRadio = document.querySelector(`input[name='q${qid}']:checked`);
            if (selectedRadio) {
                userAnswers[qid] = selectedRadio.value;
            } else {
                userAnswers[qid] = null;
            }
        }

        // проверяем, все ли вопросы отвечены
        let allAnswered = true;
        for (let q of quizData) {
            if (!userAnswers[q.id]) {
                allAnswered = false;
                break;
            }
        }

        if (!allAnswered) {
            // показываем сообщение, но без сброса подсветки, просто предупреждение
            resultArea.style.display = 'block';
            resultMessageSpan.innerHTML = "⚠️ Не все вопросы отмечены! ⚠️";
            resultDetailSpan.innerHTML = "Пожалуйста, выбери вариант ответа на каждый вопрос, чтобы проверить знания.";
            // добавляем легкую анимацию, но не считаем ошибкой
            return;
        }

        // производим подсчёт правильных ответов
        let correctCount = 0;
        const total = quizData.length;
        const feedbackPerQuestion = [];

        // сначала снимаем старые подсветки, если были
        const allOptItems = document.querySelectorAll('.option-item');
        allOptItems.forEach(opt => {
            opt.classList.remove('correct-highlight', 'wrong-highlight');
            opt.classList.remove('disabled-opt');
        });

        // для каждого вопроса подсвечиваем правильные и неправильные ответы (пользовательские)
        for (let q of quizData) {
            const userAns = userAnswers[q.id];
            const isCorrect = (userAns && userAns.trim().toLowerCase() === q.correct.trim().toLowerCase());
            if (isCorrect) correctCount++;

            // находим все варианты ответов этого вопроса
            const optionItems = document.querySelectorAll(`.option-item[data-qid='${q.id}']`);
            optionItems.forEach(optEl => {
                const optValue = optEl.getAttribute('data-opt-value');
                // правильный ли это вариант по базе
                const isThisCorrect = (optValue.trim().toLowerCase() === q.correct.trim().toLowerCase());
                // выбран ли пользователем этот вариант
                const isSelectedByUser = (userAns === optValue);

                if (isThisCorrect) {
                    // правильный вариант всегда подсвечиваем зелёным (более прозрачно)
                    optEl.classList.add('correct-highlight');
                }
                if (isSelectedByUser && !isThisCorrect) {
                    // если пользователь выбрал неправильный вариант - красная подсветка
                    optEl.classList.add('wrong-highlight');
                }
                // Добавляем визуальную блокировку? не обязательно, но оставляем кликабельность, чтобы можно было исправить.
                // не добавляем disabled, ибо тест можно пересдать
            });
        }

        // формируем сообщение о результате
        let resultMsg = '';
        let detailMsg = '';
        if (correctCount === total) {
            resultMsg = '🎉 ИДЕАЛЬНО! ТЫ ЗНАЕШЬ ЛЕГЕНДУ! 🎉';
            detailMsg = `Правильных ответов: ${correctCount} из ${total}. Ты настоящий фанат Dan Games!`;
        } else if (correctCount >= 1) {
            resultMsg = `✅ ${correctCount} из ${total} правильных. Неплохо!`;
            detailMsg = `Ты ответил(а) верно на ${correctCount} вопрос${correctCount === 1 ? '' : 'а'}. Пересмотри легендарные стримы!`;
        } else {
            resultMsg = '❌ Увы, пока 0 правильных... ❌';
            detailMsg = 'Попробуй ещё раз, изучи историю канала Dan Games и возвращайся!';
        }

        // показать панель результатов
        resultArea.style.display = 'block';
        resultMessageSpan.innerHTML = resultMsg;
        resultDetailSpan.innerHTML = detailMsg;

        submitted = true;
    }

    // функция для полной перезагрузки подсветок при повторной проверке - reset лишь снимает флаги, но при вызове check всё обновляется
    // Добавим событие на кнопку проверки
    submitBtn.addEventListener('click', () => {
        // перед проверкой синхронизируем userAnswers с текущим состоянием radio
        for (let q of quizData) {
            const selected = document.querySelector(`input[name='q${q.id}']:checked`);
            if (selected) {
                userAnswers[q.id] = selected.value;
            } else {
                userAnswers[q.id] = null;
            }
        }
        checkAnswers();
    });

    // инициализация
    renderQuestions();

    // по умолчанию после рендера userAnswers синхронизируются, если ничего не выбрано - всё null
    // добавим небольшую инициализацию: прослушивание изменений радиокнопок, чтобы при ручном клике обновить сохранение
    function bindLiveRadioEvents() {
        // но радиокнопки динамические, используем делегирование через родителя
        questionsContainer.addEventListener('change', (e) => {
            if (e.target && e.target.type === 'radio') {
                const radio = e.target;
                const nameAttr = radio.name; // q1, q2
                const qid = parseInt(nameAttr.substring(1));
                if (!isNaN(qid)) {
                    const selectedValue = radio.value;
                    userAnswers[qid] = selectedValue;
                    // если был режим проверки, то сбросить флаг и убрать окно результата
                    if (submitted) {
                        resetToActiveMode();
                    }
                    // также убираем подсветки у всех вариантов этого вопроса
                    const allOptsInQuestion = document.querySelectorAll(`.option-item[data-qid='${qid}']`);
                    allOptsInQuestion.forEach(optEl => {
                        optEl.classList.remove('correct-highlight', 'wrong-highlight');
                    });
                }
            }
        });
    }
    bindLiveRadioEvents();

    // На случай ручного клика по .option-item, который не вызывает change у radio иногда? 
    // но обработчик на li уже вызывает radio.checked и сам триггерит change, так что ок.
    // а также если нажали на label, сработает клик по радио и change.
    // дополнительно добавим сброс подсветки при клике на любой вариант, если тест был завершён
    // делаем через делегирование на questionsContainer на класс option-item
    questionsContainer.addEventListener('click', (e) => {
        // поиск ближайшего option-item
        const optionItem = e.target.closest('.option-item');
        if (optionItem && submitted) {
            resetToActiveMode();
        }
    });
</script>
</body>
</html>
