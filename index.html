<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanChat Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0d0f; --panel: #16191d; --accent: #00a2ff; --text: #ffffff; --side-w: 280px; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        #sidebar { width: var(--side-w); background: var(--panel); border-right: 1px solid #2d3239; display: flex; flex-direction: column; }
        .my-profile { padding: 20px; background: #1c2127; border-bottom: 1px solid #2d3239; text-align: center; }
        .my-id-label { font-size: 28px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        
        #contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 15px; border-bottom: 1px solid #1f2329; cursor: pointer; display: flex; align-items: center; gap: 12px; position: relative; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; margin-right: 5px; display: inline-block; }
        .status-online { background: #00ff88; box-shadow: 0 0 5px #00ff88; }

        #main-content { flex: 1; display: flex; flex-direction: column; background: #0f1216; }
        header { background: var(--panel); padding: 15px 25px; border-bottom: 1px solid #2d3239; display: flex; justify-content: space-between; align-items: center; }
        .call-btn { background: #2d3239; border: 1px solid #00ff88; color: #00ff88; padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px; border-radius: 12px; position: relative; }
        .msg.me { align-self: flex-end; background: #005bb5; }
        .msg.other { align-self: flex-start; background: #23282e; }

        /* Emoji Picker */
        #emoji-picker { position: absolute; bottom: 80px; left: 20px; background: #1c2127; border: 1px solid #444; border-radius: 10px; padding: 10px; display: none; grid-template-columns: repeat(5, 1fr); gap: 5px; z-index: 1000; }
        .emoji-item { cursor: pointer; font-size: 20px; padding: 5px; border-radius: 5px; }
        .emoji-item:hover { background: #333; }

        /* Call Modal */
        #call-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .call-av { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #00ff88; margin-bottom: 20px; object-fit: cover; }
        
        .input-area { background: var(--panel); padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #2d3239; position: relative; }
        .hidden { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="call-modal">
        <img id="call-av-img" class="call-av" src="">
        <h2 id="call-nick-display">Имя</h2>
        <p id="call-status">Вызов...</p>
        <div style="display:flex; gap:30px; margin-top:30px;">
            <button onclick="toggleMic()" id="mic-btn" style="padding:20px; border-radius:50%; border:none; background:#444; font-size:24px; cursor:pointer;">🎙️</button>
            <button onclick="endCall()" style="padding:20px; border-radius:50%; border:none; background:#ff4444; font-size:24px; cursor:pointer;">📞</button>
        </div>
    </div>

    <div id="auth-screen" style="position:fixed; inset:0; background:#0b0d0f; z-index:20000; display:flex; align-items:center; justify-content:center;">
        <div style="background:var(--panel); padding:30px; border-radius:24px; text-align:center; width:340px; border:1px solid #2d3239;">
            <h2>DanChat</h2>
            <img id="preview-av" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid var(--accent); margin-bottom:10px;">
            <br><label style="color:var(--accent); cursor:pointer; font-size:12px;">ЗАГРУЗИТЬ ФОТО<input type="file" id="av-file" class="hidden" onchange="previewFile(this, 'preview-av')"></label>
            <input type="text" id="nick" placeholder="Ник" maxlength="20" style="width:100%; padding:12px; margin:10px 0; background:#000; border:1px solid #333; color:white; border-radius:8px;">
            <input type="password" id="pass" placeholder="Пароль" style="width:100%; padding:12px; margin:10px 0; background:#000; border:1px solid #333; color:white; border-radius:8px;">
            <button onclick="handleAuth()" style="width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">ВОЙТИ</button>
            <p onclick="isReg=!isReg; this.innerText=isReg?'Уже есть аккаунт?':'Нужен аккаунт?'" style="cursor:pointer; font-size:12px; color:#666; margin-top:10px;">Нужен аккаунт?</p>
        </div>
    </div>

    <div id="sidebar" class="hidden">
        <div class="my-profile">
            <div style="font-size:11px; opacity:0.5">ВАШ ID:</div>
            <div id="my-id-display" class="my-id-label">000-000</div>
            <b id="my-nick-label"></b>
        </div>
        <div id="contact-list"></div>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <div id="header-info"><b>Выберите чат</b></div>
            <button class="call-btn" id="header-call-btn" onclick="startCall()" style="display:none;">📞 ЗВОНОК</button>
        </header>
        <div id="chat-window"></div>

        <div id="emoji-picker"></div>

        <div class="input-area">
            <span onclick="toggleEmoji()" style="cursor:pointer; font-size:24px;">😊</span>
            <label style="cursor:pointer; font-size:24px;">📷<input type="file" class="hidden" onchange="sendImage(this)"></label>
            <input type="text" id="msg-input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; border-radius:8px; padding:10px 20px; color:white; cursor:pointer;">></button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE", authDomain: "danblox-e209f.firebaseapp.com", databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com", projectId: "danblox-e209f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myData = {friends:{}}, activeChatId = "global", activePeerNick = "", isReg = true;
        let myPeer, localStream, currentCall;

        // Показ фото
        function previewFile(inp, id) { const r = new FileReader(); r.onload=e=>document.getElementById(id).src=e.target.result; r.readAsDataURL(inp.files[0]); }

        async function handleAuth() {
            const n=document.getElementById('nick').value.trim(), p=document.getElementById('pass').value.trim();
            if(!n) return;
            const s = await db.ref('users/'+n).get();
            if(isReg) {
                const id=Math.floor(100000+Math.random()*899999), user={nick:n, pass:p, av:document.getElementById('preview-av').src, id:id};
                await db.ref('users/'+n).set(user); await db.ref('id_map/'+id).set(n); enter(user);
            } else {
                if(s.exists() && s.val().pass===p) enter(s.val()); else alert("Ошибка!");
            }
        }

        function enter(data) {
            myData=data; 
            if(!myData.friends) myData.friends = {};
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden'); 
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('my-id-display').innerText=data.id; 
            document.getElementById('my-nick-label').innerText=data.nick;
            db.ref('presence/'+myData.nick).set(true); 
            db.ref('presence/'+myData.nick).onDisconnect().remove();
            
            initPeer();
            loadFriends();
            initEmojis();
        }

        function initPeer() {
            myPeer = new Peer(myData.nick);
            myPeer.on('call', async call => {
                const s = await db.ref('users/'+call.peer).get();
                const userData = s.val();
                if(confirm("Вам звонит " + call.peer + ". Ответить?")) {
                    showCallUI(userData, "Входящий звонок...");
                    navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
                        localStream = stream;
                        call.answer(stream);
                        currentCall = call;
                        handleCallStream(call);
                    });
                } else {
                    call.close();
                }
            });
        }

        function loadFriends() {
            db.ref('users/'+myData.nick+'/friends').on('value', async s => {
                const list = document.getElementById('contact-list'); 
                list.innerHTML = `<div class="contact-item" onclick="switchChat('global','Глобальный')"><b>🌍 Глобальный чат</b></div>`;
                myData.friends = s.val() || {};
                for(let fNick in myData.friends){
                    const info = await db.ref('users/'+fNick).get();
                    const d=info.val();
                    const item=document.createElement('div');
                    item.className='contact-item';
                    item.onclick=()=>switchChat(getRoomId(myData.nick, d.nick), d.nick);
                    db.ref('presence/'+d.nick).on('value', st => {
                        const on = st.exists();
                        item.innerHTML=`<img src="${d.av}" style="width:40px;height:40px;border-radius:50%"><div style="flex:1"><b>${d.nick}</b><br><small><span class="status-dot ${on?'status-online':''}"></span>${on?'В сети':'Оффлайн'}</small></div>`;
                    });
                    list.appendChild(item);
                }
            });
        }

        async function startCall() {
            if(!activePeerNick) return;
            // Проверка онлайна перед звонком
            const status = await db.ref('presence/'+activePeerNick).get();
            if(!status.exists()) return alert("Собеседник сейчас не в сети!");

            const s = await db.ref('users/'+activePeerNick).get();
            showCallUI(s.val(), "Вызов...");

            localStream = await navigator.mediaDevices.getUserMedia({audio:true});
            currentCall = myPeer.call(activePeerNick, localStream);
            handleCallStream(currentCall);
        }

        function handleCallStream(call) {
            call.on('stream', remoteStream => {
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.play();
                document.getElementById('call-status').innerText = "Разговор...";
            });
            call.on('close', endCall);
        }

        function showCallUI(user, statusText) {
            document.getElementById('call-modal').style.display='flex';
            document.getElementById('call-av-img').src = user.av;
            document.getElementById('call-nick-display').innerText = user.nick;
            document.getElementById('call-status').innerText = statusText;
        }

        function endCall() {
            if(currentCall) currentCall.close();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            document.getElementById('call-modal').style.display='none';
        }

        function toggleMic() {
            const enabled = localStream.getAudioTracks()[0].enabled;
            localStream.getAudioTracks()[0].enabled = !enabled;
            document.getElementById('mic-btn').style.background = !enabled ? "#444" : "#ff4444";
        }

        function switchChat(id, name) {
            activeChatId=id; activePeerNick=(name==="Глобальный"?"":name);
            document.getElementById('header-info').innerHTML=`<b>${name}</b>`;
            document.getElementById('header-call-btn').style.display = activePeerNick ? "block" : "none";
            document.getElementById('chat-window').innerHTML="";
            db.ref('messages/'+id).off();
            db.ref('messages/'+id).limitToLast(50).on('child_added', s => drawMsg(s.val()));
        }

        function drawMsg(m) {
            const win=document.getElementById('chat-window'), div=document.createElement('div');
            div.className=`msg ${m.sn===myData.nick?'me':'other'}`;
            let content = m.txt ? `<div>${m.txt}</div>` : `<img src="${m.img}" style="max-width:200px;border-radius:8px">`;
            div.innerHTML=`<small style="color:var(--accent);cursor:pointer" onclick="addFriendDirect('${m.sn}')">${m.sn}</small>${content}`;
            win.appendChild(div); win.scrollTop=win.scrollHeight;
        }

        async function addFriendDirect(n) {
            if(n === myData.nick || myData.friends[n]) return;
            await db.ref('users/'+myData.nick+'/friends/'+n).set(true);
            await db.ref('users/'+n+'/friends/'+myData.nick).set(true);
            alert("Контакт добавлен!");
        }

        function sendMsg() {
            const inp=document.getElementById('msg-input'); if(!inp.value.trim()) return;
            db.ref('messages/'+activeChatId).push({sn:myData.nick, txt:inp.value});
            inp.value=""; document.getElementById('emoji-picker').style.display='none';
        }

        function sendImage(inp) {
            const r=new FileReader(); r.onload=e=>db.ref('messages/'+activeChatId).push({sn:myData.nick, img:e.target.result});
            r.readAsDataURL(inp.files[0]);
        }

        function initEmojis() {
            const emojis = ['😀','😂','😍','😎','🔥','👍','💩','🤡','👾','👑'];
            const p = document.getElementById('emoji-picker');
            emojis.forEach(e => {
                const s = document.createElement('span'); s.className='emoji-item'; s.innerText=e;
                s.onclick=()=>{ document.getElementById('msg-input').value += e; };
                p.appendChild(s);
            });
        }
        function toggleEmoji() { const p=document.getElementById('emoji-picker'); p.style.display=p.style.display==='grid'?'none':'grid'; }
        function getRoomId(n1,n2){ return [n1,n2].sort().join("_"); }
    </script>
</body>
</html>
