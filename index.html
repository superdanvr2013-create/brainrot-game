<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanChat Ultimate v3</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0d0f; --panel: #16191d; --accent: #00ff88; --text: #ffffff; --side-w: 320px; --error: #ff4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        /* Стили чата и сообщений */
        #sidebar { width: var(--side-w); background: var(--panel); border-right: 1px solid #2d3239; display: flex; flex-direction: column; }
        .top-nav { padding: 15px; display: flex; gap: 12px; border-bottom: 1px solid #333; align-items: center; }
        .nav-icon { font-size: 20px; cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .nav-icon:hover { opacity: 1; transform: scale(1.1); }

        #contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 15px; border-bottom: 1px solid #1f2329; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .contact-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #333; }
        .contact-info { flex: 1; min-width: 0; }
        .status-dot { font-size: 10px; font-weight: bold; }
        .on { color: var(--accent); } .off { color: #555; }

        #main-content { flex: 1; display: flex; flex-direction: column; background: #0f1216; }
        header { background: var(--panel); padding: 15px 25px; border-bottom: 1px solid #2d3239; display: flex; justify-content: space-between; align-items: center; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; gap: 12px; max-width: 80%; }
        .msg-row.me { flex-direction: row-reverse; align-self: flex-end; }
        .msg-av { width: 38px; height: 38px; border-radius: 50%; cursor: pointer; object-fit: cover; }
        .msg-content { padding: 10px 15px; border-radius: 18px; background: #23282e; }
        .me .msg-content { background: #0078ff; }
        .msg-content img { max-width: 250px; border-radius: 10px; margin-top: 8px; display: block; }

        /* Модалки */
        .custom-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .win-frame { background: var(--panel); padding: 30px; border-radius: 24px; border: 2px solid var(--accent); text-align: center; width: 360px; }
        
        /* Звонок */
        @keyframes blink-red { 0%, 100% { opacity: 1; color: red; } 50% { opacity: 0; } }
        .scary-text { color: red; font-weight: bold; animation: blink-red 0.3s infinite; }

        #input-area { padding: 15px; background: var(--panel); display: flex; align-items: center; gap: 12px; }
        .inp { flex: 1; padding: 12px; background: #0b0d0f; border: 1px solid #333; color: #fff; border-radius: 10px; outline: none; }
        .tool-btn { font-size: 22px; cursor: pointer; }

        #ctx-menu { position: fixed; background: #1c2127; border: 1px solid #444; border-radius: 12px; z-index: 5000; display: none; min-width: 200px; }
        .ctx-item { padding: 12px 18px; cursor: pointer; border-bottom: 1px solid #2d3239; }
        .ctx-item:hover { background: var(--accent); color: #000; }
        
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="closeCtx()" oncontextmenu="return false;">

    <div id="emoji-picker" class="custom-modal" onclick="this.style.display='none'">
        <div class="win-frame" onclick="event.stopPropagation()" style="width:300px; display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">
            <span class="tool-btn" onclick="addEmoji('😊')">😊</span>
            <span class="tool-btn" onclick="addEmoji('😂')">😂</span>
            <span class="tool-btn" onclick="addEmoji('💀')">💀</span>
            <span class="tool-btn" onclick="addEmoji('🔥')">🔥</span>
            <span class="tool-btn" onclick="addEmoji('❤')">❤</span>
            <span class="tool-btn" onclick="addEmoji('🤡')">🤡</span>
            <span class="tool-btn" onclick="addEmoji('✅')">✅</span>
            <span class="tool-btn" onclick="addEmoji('🤔')">🤔</span>
        </div>
    </div>

    <div id="call-modal" class="custom-modal">
        <div class="win-frame" id="call-box">
            <div id="scary-labels" class="hidden" style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <span class="scary-text">НЕ БЕРИ!!!</span>
                <span class="scary-text">НЕ БЕРИ!!!</span>
            </div>
            <img id="call-av" style="width:120px; height:120px; border-radius:50%; border:4px solid var(--accent); object-fit:cover;">
            <h2 id="call-nick" style="margin:20px 0;">...</h2>
            <div id="call-status" style="margin-bottom:15px; color:var(--accent)">Входящий вызов...</div>
            <div id="call-actions" style="display:flex; gap:15px;">
                <button id="accept-btn" class="btn" style="background:var(--accent); color:#000; flex:1" onclick="acceptCall()">ПРИНЯТЬ</button>
                <button id="reject-btn" class="btn" style="background:var(--error); color:#fff; flex:1" onclick="endCall()">ОТКЛОНИТЬ</button>
            </div>
        </div>
    </div>

    <div id="group-modal" class="custom-modal">
        <div class="win-frame">
            <h3>Новая группа</h3>
            <input type="text" id="g-name" class="inp" placeholder="Название"><br>
            <button class="btn" onclick="createGroup()">Создать</button>
            <button class="btn" onclick="hideModal('group-modal')">Отмена</button>
        </div>
    </div>

    <div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:20000; display:flex; align-items:center; justify-content:center;">
        <div class="win-frame">
            <h1 style="color:var(--accent)">DanChat</h1>
            <input type="text" id="auth-n" class="inp" placeholder="Имя">
            <input type="password" id="auth-p" class="inp" placeholder="Пароль">
            <button class="btn" style="background:var(--accent); color:#000; width:100%" onclick="auth()">ВОЙТИ</button>
        </div>
    </div>

    <div id="sidebar" class="hidden">
        <div class="top-nav">
            <span class="nav-icon" onclick="showModal('group-modal')">➕</span>
            <div id="my-nick-display" style="margin-left:auto; font-weight:bold;"></div>
        </div>
        <div id="contact-list"></div>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <div id="chat-info">
                <b id="chat-title">Глобальный чат</b><br>
                <small id="online-count"></small>
            </div>
            <div style="display:flex; gap:10px;">
                <button id="admin-wipe" class="hidden" onclick="fullWipe()" style="background:none; border:none; cursor:pointer;">🗑️</button>
                <button id="call-btn" class="hidden" onclick="startCall()" style="background:var(--accent); border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">📞</button>
            </div>
        </header>
        <div id="chat-window"></div>
        <div id="input-area">
            <span class="tool-btn" onclick="showModal('emoji-picker')">😊</span>
            <span class="tool-btn" onclick="document.getElementById('file-in').click()">📷</span>
            <input type="file" id="file-in" class="hidden" onchange="sendImg(this)">
            <input type="text" id="msg-in" class="inp" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button class="btn" style="background:var(--accent); color:#000" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <div id="ctx-menu">
        <div class="ctx-item" style="color:var(--error)" onclick="deleteMessage()">Удалить сообщение</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE", authDomain: "danblox-e209f.firebaseapp.com", databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com", projectId: "danblox-e209f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const defAv = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        let myData = null, curChat = 'global', curPeer = '', selId = null;

        async function auth() {
            const n = document.getElementById('auth-n').value.trim(), p = document.getElementById('auth-p').value.trim();
            if(!n) return;
            const s = await db.ref('users/'+n).get();
            if(!s.exists()) {
                myData = { nick: n, pass: p, av: defAv, color: '#fff' };
                await db.ref('users/'+n).set(myData);
            } else myData = s.val();
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('my-nick-display').innerText = myData.nick;
            db.ref('presence/'+myData.nick).set(true); db.ref('presence/'+myData.nick).onDisconnect().remove();
            init();
        }

        function init() {
            loadContacts();
            listenCalls();
            switchChat('global', 'Глобальный чат');
            setInterval(() => {
                db.ref('presence').once('value', s => {
                    let c = 0; s.forEach(() => c++);
                    document.getElementById('online-count').innerText = "В сети: " + c;
                });
            }, 3000);
        }

        function loadContacts() {
            db.ref(`users/${myData.nick}/friends`).on('value', async s => {
                const list = document.getElementById('contact-list');
                list.innerHTML = `<div class="contact-item" onclick="switchChat('global','Глобальный чат')"><b>🌍 Глобальный чат</b></div>`;
                const friends = s.val() || {};
                for(let f in friends) {
                    const isG = (friends[f] === 'group');
                    const d = (await db.ref(isG ? 'groups/'+f : 'users/'+f).get()).val();
                    if(!d) continue;
                    const item = document.createElement('div'); item.className = 'contact-item';
                    item.onclick = () => isG ? switchChat(f, d.name) : openPrivate(d.nick);
                    item.innerHTML = `<img src="${d.av || defAv}">
                        <div class="contact-info">
                            <b style="color:${d.color || '#fff'}">${isG ? d.name : d.nick}</b>
                            <div class="status-dot" id="st-${f}">...</div>
                        </div>
                        <span onclick="event.stopPropagation(); removeFriend('${f}')" style="color:red">🗑️</span>`;
                    list.appendChild(item);
                    if(!isG) db.ref('presence/'+f).on('value', p => {
                        const el = document.getElementById('st-'+f);
                        if(el) { el.innerText = p.exists() ? 'ONLINE' : 'OFFLINE'; el.className = 'status-dot '+(p.exists()?'on':'off'); }
                    });
                }
            });
        }

        async function openPrivate(n) {
            if(n === myData.nick) return;
            // АВТО-ДОБАВЛЕНИЕ В КОНТАКТЫ
            await db.ref(`users/${myData.nick}/friends/${n}`).set('user');
            const id = myData.nick < n ? myData.nick+'_'+n : n+'_'+myData.nick;
            switchChat(id, n);
        }

        function switchChat(id, title) {
            curChat = id; curPeer = (id.startsWith('group') || id==='global') ? '' : title;
            document.getElementById('chat-title').innerText = title;
            document.getElementById('call-btn').classList.toggle('hidden', id==='global' || id.startsWith('group'));
            document.getElementById('chat-window').innerHTML = '';
            db.ref('messages/'+id).off();
            db.ref('messages/'+id).on('child_added', s => draw(s.key, s.val()));
        }

        async function draw(mid, m) {
            const win = document.getElementById('chat-window'), row = document.createElement('div');
            const u = (await db.ref('users/'+m.sn).get()).val() || { av: defAv, color: '#fff' };
            row.className = `msg-row ${m.sn===myData.nick?'me':''}`;
            row.oncontextmenu = (e) => { e.preventDefault(); selId = mid; openCtx(e); };
            let content = m.type === 'img' ? `<img src="${m.txt}">` : `<div>${m.txt}</div>`;
            row.innerHTML = `<img src="${u.av || defAv}" class="msg-av" onclick="openPrivate('${m.sn}')">
                <div class="msg-content">
                    <b style="color:${u.color}">${m.sn}</b>${content}
                </div>`;
            win.appendChild(row); win.scrollTop = win.scrollHeight;
        }

        function sendMsg() {
            const i = document.getElementById('msg-in'), t = i.value.trim();
            if(!t) return;
            db.ref('messages/'+curChat).push({ sn: myData.nick, txt: t, type: 'text' });
            i.value = '';
        }

        function sendImg(input) {
            const f = input.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = e => db.ref('messages/'+curChat).push({ sn: myData.nick, txt: e.target.result, type: 'img' });
            r.readAsDataURL(f);
        }

        // --- ЛОГИКА ЗВОНКОВ (ИСПРАВЛЕНО) ---
        function listenCalls() {
            // Слушаем входящие нам
            db.ref(`calls/${myData.nick}`).on('value', async s => {
                const c = s.val();
                if(!c) { hideModal('call-modal'); return; }
                
                const isDeath = (c.from === "Смерть_в_нищете");
                const u = (await db.ref('users/'+c.from).get()).val();
                
                document.getElementById('call-av').src = u.av || defAv;
                document.getElementById('call-nick').innerText = c.from;
                document.getElementById('scary-labels').classList.toggle('hidden', !isDeath);
                
                if(c.status === 'connecting') {
                    document.getElementById('call-status').innerText = "Входящий вызов...";
                } else if(c.status === 'accepted') {
                    document.getElementById('call-status').innerText = "Разговор...";
                }

                if(isDeath) {
                    document.getElementById('call-nick').style.color = 'red';
                    document.getElementById('reject-btn').innerText = "ПРИНЯТЬ";
                    document.getElementById('reject-btn').onclick = acceptCall;
                } else {
                    document.getElementById('call-nick').style.color = 'white';
                    document.getElementById('reject-btn').innerText = "ОТКЛОНИТЬ";
                    document.getElementById('reject-btn').onclick = endCall;
                }
                showModal('call-modal');
            });

            // Слушаем статус нашего исходящего звонка
            db.ref('calls').on('child_added', snap => {
                const c = snap.val();
                if(c && c.from === myData.nick) {
                    const target = snap.key;
                    db.ref(`calls/${target}/status`).on('value', st => {
                        if(st.val() === 'accepted') {
                            document.getElementById('call-status').innerText = "Собеседник принял вызов!";
                        }
                    });
                }
            });
        }

        async function startCall() {
            if(!curPeer) return;
            const u = (await db.ref('users/'+curPeer).get()).val();
            document.getElementById('call-av').src = u.av || defAv;
            document.getElementById('call-nick').innerText = curPeer;
            document.getElementById('call-status').innerText = "Исходящий звонок...";
            document.getElementById('scary-labels').classList.add('hidden');
            showModal('call-modal');
            
            // Создаем запись звонка у того, кому звоним
            await db.ref(`calls/${curPeer}`).set({ from: myData.nick, status: 'connecting' });
        }

        async function acceptCall() {
            const s = await db.ref(`calls/${myData.nick}`).get();
            if(s.exists()) {
                await db.ref(`calls/${myData.nick}`).update({ status: 'accepted' });
                document.getElementById('call-status').innerText = "Соединение установлено";
            }
        }

        function endCall() {
            db.ref(`calls/${myData.nick}`).remove();
            if(curPeer) db.ref(`calls/${curPeer}`).remove();
            hideModal('call-modal');
        }

        // --- ВСПОМОГАТЕЛЬНОЕ ---
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }
        function addEmoji(e) { document.getElementById('msg-in').value += e; hideModal('emoji-picker'); }
        async function removeFriend(id) { if(confirm("Удалить?")) await db.ref(`users/${myData.nick}/friends/${id}`).remove(); }
        function openCtx(e) { const m = document.getElementById('ctx-menu'); m.style.display='block'; m.style.left=e.pageX+'px'; m.style.top=e.pageY+'px'; }
        function closeCtx() { document.getElementById('ctx-menu').style.display='none'; }
        function deleteMessage() { db.ref('messages/'+curChat+'/'+selId).remove(); }
        async function createGroup() {
            const n = document.getElementById('g-name').value;
            const id = 'group'+Date.now();
            await db.ref('groups/'+id).set({ name: n, owner: myData.nick, members: {[myData.nick]: true} });
            await db.ref(`users/${myData.nick}/friends/${id}`).set('group');
            hideModal('group-modal');
        }
    </script>
</body>
</html>
