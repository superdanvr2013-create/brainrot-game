<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox PVP: Arena Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; touch-action: none; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; background: rgba(0,0,0,0.8); }
        
        /* Таблицы данных */
        .info-panel { position: absolute; background: rgba(0,0,0,0.7); color: white; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); font-size: 13px; z-index: 500; }
        #online-list { top: 10px; left: 10px; min-width: 150px; }
        #leaderboard { top: 10px; right: 10px; min-width: 150px; border-color: gold; }
        
        .panel-h { margin: 0 0 8px 0; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 4px; font-weight: bold; }
        .p-row { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 4px; }
        .hp-text { color: #4ade80; font-weight: bold; }

        #ui-layer { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; pointer-events: none; }
        .hp-main-container { width: 300px; height: 30px; border: 3px solid #000; background: #222; border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        #hp-bar { background: linear-gradient(90deg, #ff0000, #ff5f6d); width: 100%; height: 100%; transition: 0.2s; }
        
        #mobile-controls { position: absolute; bottom: 40px; left: 40px; display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; }
        .m-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        
        #action-btns { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 15px; }
        .action-circle { width: 85px; height: 85px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        
        #death-screen { display: none; background: rgba(150, 0, 0, 0.95); flex-direction: column; }
        .btn-main { padding: 15px 40px; background: #fff; color: #f00; border: none; cursor: pointer; border-radius: 10px; font-weight: bold; font-size: 20px; box-shadow: 0 4px 0 #ddd; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="online-list" class="info-panel">
        <div class="panel-h">ONLINE [<span id="player-count">0</span>]</div>
        <div id="players-inner"></div>
    </div>

    <div id="leaderboard" class="info-panel">
        <div class="panel-h" style="color: gold;">🏆 TOP KILLS</div>
        <div id="lb-list">Загрузка...</div>
    </div>

    <div id="login-screen" class="screen">
        <div style="background:#fff; padding:40px; border-radius:25px; text-align:center;">
            <h2 style="margin-top:0;">ARENA PVP v2.5</h2>
            <input type="text" id="nick-input" placeholder="НИКНЕЙМ" maxlength="12" style="padding:15px; width:220px; font-size:18px; text-align:center; border:2px solid #ccc; border-radius:10px;"><br><br>
            <button class="btn-main" style="background:#e63946; color:#fff;" onclick="checkAndStart()">ВОЙТИ В ИГРУ</button>
        </div>
    </div>

    <div id="death-screen" class="screen">
        <h1 style="color:white; font-size:60px; margin-bottom:20px;">ВЫ ПОГИБЛИ</h1>
        <button class="btn-main" onclick="respawn()">ВОЗРОДИТЬСЯ</button>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="hp-main-container"><div id="hp-bar"></div></div>
    </div>

    <div id="mobile-controls" class="hidden">
        <div></div><div class="m-btn" id="btn-w">W</div><div></div>
        <div class="m-btn" id="btn-a">A</div><div class="m-btn" id="btn-s">S</div><div class="m-btn" id="btn-d">D</div>
    </div>

    <div id="action-btns" class="hidden">
        <div class="action-circle" style="background:rgba(33, 150, 243, 0.6);" id="btn-jump">JUMP</div>
        <div class="action-circle" style="background:rgba(244, 67, 54, 0.8);" id="btn-attack">ATTACK</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let scene, camera, renderer, myModel, mySwordPivot;
        let myID = 'u' + Math.floor(Math.random() * 1000000);
        let myNick = "", myHP = 100, inGame = false, isDead = false;
        let otherPlayers = {}, moveState = { f: false, b: false, l: false, r: false };
        let vy = 0, canJump = true, camAzimuth = 0, camElevation = 0.5, camDist = 12;
        let isAttacking = false;
        const MAP_LIMIT = 245;

        function createSword() {
            const group = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.6, 0.04), new THREE.MeshStandardMaterial({color: 0xeeeeee, metalness: 0.9}));
            blade.position.y = 0.8;
            const guard = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 0.15), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.45), new THREE.MeshStandardMaterial({color: 0x331100}));
            handle.position.y = -0.2;
            group.add(blade, guard, handle);
            group.rotation.x = Math.PI / 2;
            group.position.set(0.65, 0.9, 0.1); 
            return group;
        }

        function createModel(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), new THREE.MeshStandardMaterial({color: color}));
            body.position.y = 0.6;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.65, 0.65), new THREE.MeshStandardMaterial({color: 0xffe0bd}));
            head.position.y = 1.55;
            const aL = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1, 0.35), new THREE.MeshStandardMaterial({color: color}));
            aL.position.set(-0.65, 0.6, 0);
            const aR = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1, 0.35), new THREE.MeshStandardMaterial({color: color}));
            aR.position.set(0.65, 0.6, 0);
            g.add(body, head, aL, aR);
            return g;
        }

        function buildMap() {
            // Земля с текстурой сетки (визуально лучше)
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x27ae60}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);

            // Границы
            const fenceMat = new THREE.MeshStandardMaterial({color: 0xff0000, transparent: true, opacity: 0.3});
            for(let i=0; i<4; i++) {
                const fence = new THREE.Mesh(new THREE.BoxGeometry(500, 15, 1), fenceMat);
                fence.position.y = 7.5;
                if(i==0) fence.position.z = 250; if(i==1) fence.position.z = -250;
                if(i==2) { fence.position.x = 250; fence.rotation.y = Math.PI/2; }
                if(i==3) { fence.position.x = -250; fence.rotation.y = Math.PI/2; }
                scene.add(fence);
            }

            // Объекты: Скалы и деревья
            for(let i=0; i<50; i++) {
                const x = (Math.random()-0.5)*400;
                const z = (Math.random()-0.5)*400;
                if(Math.abs(x) < 10 && Math.abs(z) < 10) continue;

                if(Math.random() > 0.5) { // Скала
                    const rock = new THREE.Mesh(
                        new THREE.BoxGeometry(2 + Math.random()*5, 1 + Math.random()*8, 2 + Math.random()*5),
                        new THREE.MeshStandardMaterial({color: 0x7f8c8d})
                    );
                    rock.position.set(x, rock.geometry.parameters.height/2, z);
                    scene.add(rock);
                } else { // Дерево
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 4), new THREE.MeshStandardMaterial({color: 0x4d2600}));
                    trunk.position.set(x, 2, z);
                    const leaves = new THREE.Mesh(new THREE.SphereGeometry(2, 6, 6), new THREE.MeshStandardMaterial({color: 0x1e8449}));
                    leaves.position.set(x, 5, z);
                    scene.add(trunk, leaves);
                }
            }
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x81ecec);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6); sun.position.set(50, 100, 50); scene.add(sun);

            buildMap();

            myModel = createModel(0x0984e3);
            mySwordPivot = new THREE.Group();
            mySwordPivot.add(createSword());
            myModel.add(mySwordPivot);
            scene.add(myModel);

            // Таблица лидеров
            db.ref('leaderboard').orderByValue().limitToLast(10).on('value', snap => {
                const list = document.getElementById('lb-list');
                let items = [];
                snap.forEach(s => items.push({n: s.key, k: s.val()}));
                list.innerHTML = items.reverse().map(i => `<div class="p-row"><span>${i.n}</span><span>${i.k}</span></div>`).join('');
            });

            // Список игроков и проверка смерти
            db.ref('players/' + myID).onDisconnect().remove();
            db.ref('players').on('value', snap => {
                const data = snap.val() || {};
                const inner = document.getElementById('players-inner');
                let html = "";
                let count = 0;

                Object.keys(otherPlayers).forEach(id => { if(!data[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }});

                Object.keys(data).forEach(id => {
                    count++;
                    const pData = data[id];
                    html += `<div class="p-row"><span>${pData.n}</span><span class="hp-text">${pData.hp}%</span></div>`;

                    if(id === myID) {
                        myHP = pData.hp;
                        // ФИКС БАГА: если сервер говорит, что мы мертвы - мы умираем.
                        if(myHP <= 0 && !isDead && inGame) triggerDeath();
                        return;
                    }

                    if(!otherPlayers[id]) {
                        const g = createModel(0xd63031);
                        const sp = new THREE.Group(); sp.add(createSword()); g.add(sp);
                        scene.add(g); otherPlayers[id] = g;
                    }
                    const p = otherPlayers[id];
                    p.position.lerp(new THREE.Vector3(pData.x, pData.y, pData.z), 0.25);
                    p.rotation.y = pData.ry || 0;
                    
                    const sp = p.children.find(c => c.type === "Group");
                    if(sp) sp.position.z = pData.at ? -1.3 : 0;

                    if(pData.hp <= 0) { p.rotation.z = Math.PI/2; p.position.y = 0.4; } 
                    else { p.rotation.z = 0; p.position.y = pData.y; }
                });
                inner.innerHTML = html;
                document.getElementById('player-count').innerText = count;
            });

            animate();
        }

        function triggerDeath() {
            isDead = true;
            document.getElementById('death-screen').style.display = 'flex';
            myModel.rotation.z = Math.PI/2;
            myModel.position.y = 0.4;
        }

        window.respawn = () => {
            isDead = false; myHP = 100;
            document.getElementById('death-screen').style.display = 'none';
            myModel.rotation.z = 0;
            myModel.position.set((Math.random()-0.5)*40, 0, (Math.random()-0.5)*40);
            db.ref('players/' + myID).update({hp: 100, x: myModel.position.x, z: myModel.position.z});
        };

        function attack() {
            if(isDead || isAttacking) return;
            isAttacking = true;
            mySwordPivot.position.z = -1.2;
            db.ref('players/' + myID + '/at').set(true);

            setTimeout(() => { 
                mySwordPivot.position.z = 0; 
                isAttacking = false; 
                db.ref('players/' + myID + '/at').set(false);
            }, 180);

            Object.keys(otherPlayers).forEach(id => {
                if(myModel.position.distanceTo(otherPlayers[id].position) < 4.5) {
                    db.ref('players/' + id).once('value', s => {
                        const target = s.val();
                        if(target && target.hp > 0) {
                            db.ref('players/' + id + '/hp').transaction(h => {
                                let nh = (h || 100) - 15;
                                if(nh <= 0) db.ref('leaderboard/' + myNick).transaction(k => (k || 0) + 1);
                                return Math.max(0, nh);
                            });
                        }
                    });
                }
            });
        }

        function animate() {
            if(!inGame) return;
            requestAnimationFrame(animate);

            if(!isDead) {
                const dir = new THREE.Vector3();
                if(moveState.f) dir.z -= 1; if(moveState.b) dir.z += 1;
                if(moveState.l) dir.x -= 1; if(moveState.r) dir.x += 1;
                if(dir.length() > 0) {
                    dir.applyAxisAngle(new THREE.Vector3(0,1,0), camAzimuth);
                    const nx = myModel.position.x + dir.normalize().x * 0.25;
                    const nz = myModel.position.z + dir.z * 0.25;
                    if(Math.abs(nx) < MAP_LIMIT) myModel.position.x = nx;
                    if(Math.abs(nz) < MAP_LIMIT) myModel.position.z = nz;
                    myModel.rotation.y = Math.atan2(dir.x, dir.z);
                }
                myModel.position.y += vy;
                if(myModel.position.y > 0) { vy -= 0.02; canJump = false; }
                else { myModel.position.y = 0; vy = 0; canJump = true; }
            }

            camera.position.x = myModel.position.x + camDist * Math.sin(camAzimuth) * Math.cos(camElevation);
            camera.position.y = myModel.position.y + camDist * Math.sin(camElevation) + 1.8;
            camera.position.z = myModel.position.z + camDist * Math.cos(camAzimuth) * Math.cos(camElevation);
            
            if(camDist < 1) { camera.position.copy(myModel.position).add(new THREE.Vector3(0, 1.6, 0)); myModel.visible = false; } 
            else { myModel.visible = true; }
            camera.lookAt(myModel.position.x, myModel.position.y + 1.5, myModel.position.z);

            document.getElementById('hp-bar').style.width = myHP + "%";
            db.ref('players/' + myID).update({ x: myModel.position.x, y: myModel.position.y, z: myModel.position.z, ry: myModel.rotation.y, n: myNick, hp: myHP, at: isAttacking, lastSeen: Date.now() });
            renderer.render(scene, camera);
        }

        window.checkAndStart = () => {
            const val = document.getElementById('nick-input').value.trim();
            if(!val) return; myNick = val;
            document.getElementById('login-screen').classList.add('hidden');
            ['ui-layer', 'mobile-controls', 'action-btns'].forEach(id => document.getElementById(id).classList.remove('hidden'));
            inGame = true; init();
        };

        window.onmousedown = (e) => { if(e.button === 0 && inGame) attack(); if(e.button === 2) window.isR = true; };
        window.onmouseup = () => window.isR = false;
        window.onmousemove = (e) => { if(window.isR) { camAzimuth -= e.movementX * 0.008; camElevation = Math.max(-0.4, Math.min(1.4, camElevation + e.movementY * 0.008)); }};
        window.onwheel = (e) => camDist = Math.max(0, Math.min(35, camDist + e.deltaY * 0.025));
        window.oncontextmenu = (e) => e.preventDefault();

        const handleKeys = (c, v) => {
            if(c === 'KeyW') moveState.f = v; if(c === 'KeyS') moveState.b = v;
            if(c === 'KeyA') moveState.l = v; if(c === 'KeyD') moveState.r = v;
            if(c === 'Space' && v && canJump && !isDead) vy = 0.42;
        };
        window.onkeydown = (e) => handleKeys(e.code, true);
        window.onkeyup = (e) => handleKeys(e.code, false);

        const bind = (id, k) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); if(!isDead) moveState[k] = true; };
            el.onpointerup = () => moveState[k] = false;
        };
        bind('btn-w','f'); bind('btn-s','b'); bind('btn-a','l'); bind('btn-d','r');
        document.getElementById('btn-jump').onpointerdown = () => { if(canJump && !isDead) vy = 0.42; };
        document.getElementById('btn-attack').onpointerdown = attack;
    </script>
</body>
</html>
