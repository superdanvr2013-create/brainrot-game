<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Steal A Brainrot - Stable</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; touch-action: none; }
        #stats-ui { position: absolute; top: 10px; left: 10px; font-size: 24px; color: #0f0; z-index: 10; font-weight: bold; text-shadow: 2px 2px #000; }
        #menu { position: absolute; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #000; }
        .window { background: #111; padding: 30px; border: 3px solid #0f0; border-radius: 20px; text-align: center; color: #fff; }
        input { padding: 10px; width: 200px; background: #222; color: #fff; border: 1px solid #0f0; margin-bottom: 15px; }
        #interaction-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; text-align: center; display: none; pointer-events: none; }
        .prompt-btn { background: #0f0; color: black; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 20px; border: 2px solid white; pointer-events: auto; cursor: pointer; }
        #jump-btn { width: 80px; height: 80px; background: rgba(0, 136, 255, 0.5); border-radius: 50%; position: absolute; bottom: 40px; right: 40px; border: 2px solid #fff; pointer-events: auto; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #sidebar { position: absolute; right: 10px; top: 10px; width: 220px; z-index: 10; pointer-events: auto; }
        .panel { background: rgba(0,0,0,0.8); border: 1px solid #0f0; padding: 10px; color: #0f0; border-radius: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="stats-ui" class="hidden">CASH: <span id="cash-val">25</span>$</div>

<div id="menu">
    <div class="window">
        <h1 style="color: #0f0;">STEAL A BRAINROT</h1>
        <input type="text" id="nick-input" placeholder="НИК..." maxlength="12"><br>
        <button id="start-btn" style="padding:12px 40px; background:#0f0; cursor:pointer; font-weight:bold; border:none; border-radius:5px;">ИГРАТЬ</button>
    </div>
</div>

<div id="interaction-ui">
    <div id="interact-text" style="color: white; margin-bottom: 5px; font-weight: bold; text-shadow: 2px 2px #000; font-size: 18px;"></div>
    <button id="main-act-btn" class="prompt-btn">ДЕЙСТВИЕ (E)</button>
</div>

<div id="mobile-ui" class="hidden">
    <div id="jump-btn">JUMP</div>
</div>

<div id="sidebar" class="hidden">
    <div class="panel"><b>ИГРОКИ:</b> <div id="player-list"></div></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const firebaseConfig = {
        apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
        authDomain: "danblox-e209f.firebaseapp.com",
        databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
        projectId: "danblox-e209f",
        storageBucket: "danblox-e209f.firebasestorage.app",
        messagingSenderId: "828099060847",
        appId: "1:828099060847:web:9bb0bebc8c02833ce7d99a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let scene, camera, renderer, controls, myModel;
    let myID = 'u' + Math.floor(Math.random() * 1000000);
    let myNick, myCash = 25, otherPlayers = {}, otherBases = {}, robots = {};
    let moveDir = new THREE.Vector3(), velocity = new THREE.Vector3(), canJump = true;
    let myBaseObj = null, activeInteractBot = null, myBasePos = {x:0, z:0};
    let colliders = [];

    const BOT_TYPES = {
        blue: { color: 0x00aaff, price: 25, income: 1, name: "Обычный" },
        green: { color: 0x00ff00, price: 100, income: 5, name: "Зеленый" },
        red: { color: 0xff0000, price: 250, income: 10, name: "Красный" }
    };

    const BASE_SPOTS = [];
    for(let i=0; i<5; i++) BASE_SPOTS.push({x: -35, z: -80 + (i*40)}); 
    for(let i=0; i<5; i++) BASE_SPOTS.push({x: 35, z: -80 + (i*40)});

    function createBox(w, h, d, x, y, z, color, opacity = 1, isCollider = false) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color, transparent: opacity < 1, opacity }));
        mesh.position.set(x, y, z); scene.add(mesh);
        if(isCollider) colliders.push(mesh);
        return mesh;
    }

    function createBase(nick, pos) {
        const group = new THREE.Group(); group.position.set(pos.x, 0, pos.z);
        createBox(20, 0.2, 20, 0, 0.1, 0, 0x222222).parent = group;
        const w1 = createBox(20, 6, 0.5, 0, 3, -10, 0x444444, 1, true); group.add(w1);
        const w2 = createBox(0.5, 6, 20, -10, 3, 0, 0x444444, 1, true); group.add(w2);
        const w3 = createBox(0.5, 6, 20, 10, 3, 0, 0x444444, 1, true); group.add(w3);
        const laser = createBox(19, 6, 0.1, 0, 3, 10, 0xff0000, 0); group.add(laser);
        const pad = createBox(3, 0.2, 3, 8, 0.2, 8, 0xffff00); group.add(pad);
        const slots = [];
        for(let i=0; i<5; i++) slots.push({ pos: new THREE.Vector3(pos.x - 6 + (i*3), 0.8, pos.z - 5), occupied: false, botID: null });
        scene.add(group);
        return { group, slots, laser, pad, laserActive: false };
    }

    function initGame() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1));

        createBox(2000, 0.2, 2000, 0, 0, 0, 0x1a5e1a); // Поле
        createBox(12, 0.2, 350, 0, 0.15, 0, 0xff0000); // Дорожка
        
        // Стены карты
        createBox(200, 20, 1, 0, 10, 180, 0, 0, true); createBox(200, 20, 1, 0, 10, -180, 0, 0, true);
        createBox(1, 20, 360, 100, 10, 0, 0, 0, true); createBox(1, 20, 360, -100, 10, 0, 0, 0, true);

        myModel = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 1.2), new THREE.MeshStandardMaterial({color: 0x00ff00}));
        scene.add(myModel);

        db.ref('player_count').transaction(c => {
            const index = (c || 0) % 10;
            myBasePos = BASE_SPOTS[index];
            myBaseObj = createBase(myNick, myBasePos);
            myModel.position.set(myBasePos.x, 1, myBasePos.z + 5);
            return (c || 0) + 1;
        });

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;

        db.ref('players').on('value', s => {
            const data = s.val() || {};
            const list = document.getElementById('player-list'); list.innerHTML = '';
            Object.keys(data).forEach(id => {
                list.innerHTML += `<div><b>${data[id].n}</b>: ${data[id].c}$</div>`;
                if(id !== myID && !otherPlayers[id]) {
                    otherPlayers[id] = createBox(1.2, 2, 1.2, 0, 1, 0, 0x0088ff);
                    otherBases[id] = createBase(data[id].n, data[id].bp);
                }
                if(id !== myID && otherPlayers[id]) {
                    otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
                    otherBases[id].laser.material.opacity = data[id].la ? 0.6 : 0;
                }
            });
        });

        db.ref('robots').on('value', s => {
            const data = s.val() || {};
            Object.keys(data).forEach(id => {
                if(!robots[id]) {
                    const b = BOT_TYPES[data[id].type] || BOT_TYPES.blue;
                    robots[id] = { mesh: createBox(1, 1.5, 1, 0, 0.75, 0, b.color), info: b, ...data[id] };
                }
                robots[id].mesh.position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
                robots[id].owner = data[id].owner;
            });
            Object.keys(robots).forEach(id => { if(!data[id]) { scene.remove(robots[id].mesh); delete robots[id]; }});
        });

        // Спавн ботов без точек в ID
        setInterval(() => {
            if(Object.keys(robots).length < 12) {
                const safeID = 'bot' + Date.now() + Math.floor(Math.random() * 1000); 
                const type = Object.keys(BOT_TYPES)[Math.floor(Math.random()*3)];
                db.ref('robots/' + safeID).set({ x: 0, y: 0.75, z: -160, type: type, owner: null });
            }
        }, 4000);

        loop();
    }

    function loop() {
        requestAnimationFrame(loop);
        if(!myBaseObj) return;

        moveDir.set(0,0,0);
        if(keys['KeyW']) moveDir.z = -1; if(keys['KeyS']) moveDir.z = 1;
        if(keys['KeyA']) moveDir.x = -1; if(keys['KeyD']) moveDir.x = 1;
        
        let quat = new THREE.Quaternion(); camera.getWorldQuaternion(quat);
        moveDir.applyQuaternion(quat); moveDir.y = 0; moveDir.normalize();

        const next = myModel.position.clone().add(moveDir.multiplyScalar(0.25));
        let canMove = true;
        colliders.forEach(c => {
            const b = new THREE.Box3().setFromObject(c);
            if(b.intersectsBox(new THREE.Box3().setFromCenterAndSize(next, new THREE.Vector3(1.2, 2, 1.2)))) canMove = false;
        });
        if(canMove) myModel.position.copy(next);

        velocity.y -= 0.012; myModel.position.y += velocity.y;
        if(myModel.position.y < 1) { myModel.position.y = 1; velocity.y = 0; canJump = true; }

        controls.target.copy(myModel.position); controls.update();

        const worldPad = new THREE.Vector3(); myBaseObj.pad.getWorldPosition(worldPad);
        if(myModel.position.distanceTo(worldPad) < 2.5 && !myBaseObj.laserActive) {
            myBaseObj.laserActive = true;
            setTimeout(() => { if(myBaseObj) myBaseObj.laserActive = false; }, 30000);
        }

        activeInteractBot = null; let found = false;
        Object.keys(robots).forEach(id => {
            const b = robots[id];
            if(!b.owner) {
                const newZ = (b.z || 0) + 0.12;
                db.ref('robots/' + id).update({ z: newZ });
                if(newZ > 160) db.ref('robots/' + id).remove();
            }
            const dist = myModel.position.distanceTo(b.mesh.position);
            if(dist < 5) {
                activeInteractBot = id; found = true;
                document.getElementById('interaction-ui').style.display = 'block';
                const txt = b.owner === myID ? "ВАШ (Собрать прибыль)" : (b.owner ? "ЧУЖОЙ (Украсть!)" : "ДИКИЙ (Купить)");
                document.getElementById('interact-text').innerText = txt;
            }
        });
        if(!found) document.getElementById('interaction-ui').style.display = 'none';

        db.ref('players/' + myID).update({ x: myModel.position.x, y: myModel.position.y, z: myModel.position.z, c: myCash, n: myNick, bp: myBasePos, la: myBaseObj.laserActive });
    }

    const keys = {};
    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.code === 'KeyE') handleAction();
        if(e.code === 'Space' && canJump) { velocity.y = 0.3; canJump = false; }
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function handleAction() {
        if(!activeInteractBot) return;
        const b = robots[activeInteractBot];
        if(!b.owner && myCash >= b.info.price) {
            const slot = myBaseObj.slots.find(s => !s.occupied);
            if(slot) {
                myCash -= b.info.price; slot.occupied = true; slot.botID = activeInteractBot;
                db.ref('robots/' + activeInteractBot).update({ owner: myID, x: slot.pos.x, z: slot.pos.z });
            }
        } else if (b.owner === myID) {
            myCash += b.info.income;
        } else if (b.owner) {
            const slot = myBaseObj.slots.find(s => !s.occupied);
            if(slot) {
                slot.occupied = true; slot.botID = activeInteractBot;
                db.ref('robots/' + activeInteractBot).update({ owner: myID, x: slot.pos.x, z: slot.pos.z });
            }
        }
        document.getElementById('cash-val').innerText = myCash;
    }

    document.getElementById('start-btn').onclick = () => {
        myNick = document.getElementById('nick-input').value.trim() || "Player";
        document.getElementById('menu').style.display = 'none';
        ['stats-ui', 'mobile-ui', 'sidebar'].forEach(id => document.getElementById(id).classList.remove('hidden'));
        initGame();
    };
    document.getElementById('main-act-btn').onclick = handleAction;
    document.getElementById('jump-btn').onclick = () => { if(canJump) { velocity.y = 0.3; canJump = false; } };
</script>
</body>
</html>
