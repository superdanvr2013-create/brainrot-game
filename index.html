<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>DanChat Elite v7.0 - GOD MODE EDITION</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        /* =========================================
           ULTRA-PREMIUM CSS STYLES (NEON THEME)
           ========================================= */
        :root { 
            --bg: #050608; 
            --panel: #0d1117; 
            --accent: #00ff88; 
            --accent-glow: rgba(0, 255, 136, 0.3);
            --text: #e6edf3; 
            --side-w: 350px; 
            --error: #ff3366; 
            --error-glow: rgba(255, 51, 102, 0.4);
            --blue: #00a2ff; 
            --blue-glow: rgba(0, 162, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --anim-speed: 0.4s;
        }

        * { 
            box-sizing: border-box; 
            outline: none; 
            user-select: none;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
            letter-spacing: -0.01em;
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(var(--bg), var(--accent), var(--bg)); 
            border-radius: 10px; 
        }

        /* Анимированный задний фон для всего приложения */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(0,255,136,0.03) 0%, rgba(5,6,8,1) 70%);
            z-index: -1;
            animation: bgPulse 15s infinite alternate ease-in-out;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(2%, 2%); }
        }

        /* --- SIDEBAR (БОКОВАЯ ПАНЕЛЬ) --- */
        #sidebar { 
            width: var(--side-w); 
            background: var(--panel); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            z-index: 1000;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            transition: var(--anim-speed);
        }

        .sidebar-header { 
            padding: 25px; 
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
        }

        .brand-zone {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .brand-logo {
            width: 45px;
            height: 45px;
            background: var(--accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
            transform: rotate(-10deg);
        }

        .nav-row { 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .nav-btn { 
            font-size: 18px; 
            cursor: pointer; 
            opacity: 0.6; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .nav-btn:hover { 
            opacity: 1; 
            color: var(--accent);
            transform: translateY(-2px);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        #contact-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px;
        }

        .contact-card { 
            padding: 12px 15px; 
            margin-bottom: 8px;
            border-radius: 15px;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            transition: all 0.3s;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .contact-card:hover { 
            background: var(--glass);
            border-color: var(--border);
            transform: translateX(5px);
        }

        .contact-card.active {
            background: rgba(0, 255, 136, 0.05);
            border-color: rgba(0, 255, 136, 0.2);
        }

        .contact-card.active::before {
            content: "";
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 4px;
            background: var(--accent);
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 10px var(--accent);
        }

        .contact-av-wrap { position: relative; }
        
        .contact-av { 
            width: 50px; 
            height: 50px; 
            border-radius: 16px; 
            object-fit: cover; 
            background: #000;
            border: 1px solid var(--border);
        }

        .status-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 3px solid var(--panel);
        }
        .status-badge.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .status-badge.offline { background: #333; }

        .contact-meta { flex: 1; min-width: 0; }
        .contact-name { display: block; font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-sub { font-size: 11px; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

        /* --- MAIN CHAT AREA --- */
        #main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            position: relative; 
        }

        header { 
            height: 85px;
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(15px);
            padding: 0 30px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 500;
        }

        .header-left { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .header-title { font-size: 18px; font-weight: 800; color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }
        .header-desc { font-size: 11px; opacity: 0.5; font-weight: 600; letter-spacing: 1px; }

        .header-actions { display: flex; gap: 12px; }

        .h-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .h-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent-glow); border-color: var(--accent); }
        .h-btn.call-red { background: var(--error); border-color: var(--error); color: #fff; }
        .h-btn.call-red:hover { box-shadow: 0 0 20px var(--error-glow); }

        /* --- VOICE GRID --- */
        #voice-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 20px; 
            padding: 25px; 
            background: linear-gradient(180deg, rgba(0, 255, 136, 0.05) 0%, transparent 100%);
            border-bottom: 1px solid var(--accent);
            max-height: 300px; 
            overflow-y: auto;
            animation: slideDown 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .voice-user-node { 
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
            transition: 0.4s;
            position: relative;
        }

        .voice-user-av {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #1f2329;
            transition: 0.3s;
        }

        .speaking .voice-user-av {
            border-color: var(--accent);
            box-shadow: 0 0 25px var(--accent), inset 0 0 10px var(--accent);
            transform: scale(1.08);
        }

        .mute-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            color: var(--error);
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        /* --- MESSAGES --- */
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
        }

        .msg-wrap { 
            display: flex; 
            gap: 15px; 
            max-width: 85%; 
            animation: msgFadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both; 
        }

        @keyframes msgFadeIn { 
            from { opacity: 0; transform: translateY(20px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        .msg-wrap.me { flex-direction: row-reverse; align-self: flex-end; }

        .msg-avatar { 
            width: 44px; 
            height: 44px; 
            border-radius: 14px; 
            object-fit: cover; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        .msg-bubble { 
            padding: 14px 20px; 
            border-radius: 20px; 
            background: var(--panel); 
            border: 1px solid var(--border);
            position: relative; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .me .msg-bubble { 
            background: linear-gradient(135deg, var(--blue) 0%, #0055ff 100%); 
            color: #fff; 
            border: none;
            box-shadow: 0 10px 20px var(--blue-glow);
            border-top-right-radius: 4px;
        }

        .msg-wrap:not(.me) .msg-bubble { border-top-left-radius: 4px; }

        .msg-info { 
            margin-bottom: 6px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 12px;
        }

        .msg-author { font-weight: 900; letter-spacing: 0.5px; }
        .admin-label { 
            background: var(--error); 
            color: #fff; 
            padding: 2px 8px; 
            border-radius: 6px; 
            font-size: 9px; 
            font-weight: 800;
            box-shadow: 0 0 10px var(--error-glow);
        }

        .msg-text { font-size: 15px; line-height: 1.6; word-break: break-word; }

        /* --- INPUT AREA --- */
        #input-zone { 
            padding: 25px 30px; 
            background: rgba(13, 17, 23, 0.9);
            border-top: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            backdrop-filter: blur(20px);
        }

        .input-box { 
            flex: 1; 
            padding: 16px 25px; 
            background: #050608; 
            border: 1px solid var(--border); 
            color: #fff; 
            border-radius: 16px; 
            font-size: 15px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-box:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .send-btn { 
            width: 54px;
            height: 54px;
            background: var(--accent); 
            color: #000; 
            border: none; 
            border-radius: 16px; 
            cursor: pointer; 
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .send-btn:hover { transform: scale(1.05) rotate(5deg); background: #fff; }

        /* --- MODALS (GLASSMORPHISM) --- */
        .modal-overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            z-index: 5000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(12px); 
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-win { 
            background: rgba(20, 25, 35, 0.8); 
            padding: 45px; 
            border-radius: 35px; 
            border: 1px solid var(--accent); 
            width: 450px; 
            text-align: center;
            position: relative;
            box-shadow: 0 25px 80px rgba(0,0,0,0.8);
            animation: modalPop 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.27);
        }

        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .glass-win h2 { color: var(--accent); margin-bottom: 25px; letter-spacing: 2px; }

        .form-input { 
            width: 100%; 
            padding: 15px; 
            background: rgba(0,0,0,0.4); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            color: #fff; 
            margin-bottom: 15px;
        }

        .main-btn {
            background: var(--accent);
            color: #000;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .main-btn:hover { box-shadow: 0 0 30px var(--accent-glow); letter-spacing: 1px; }

        /* Контекстное меню */
        #context-menu {
            position: fixed;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 15px;
            z-index: 10000;
            display: none;
            min-width: 220px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .ctx-btn {
            padding: 15px 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }
        .ctx-btn:last-child { border-bottom: none; }
        .ctx-btn:hover { background: var(--accent); color: #000; }
        .ctx-btn.danger { color: var(--error); }
        .ctx-btn.danger:hover { background: var(--error); color: #fff; }

        .hidden { display: none !important; }

        /* Админ-кнопка Очистки Чата */
        .admin-clear-btn {
            color: var(--error);
            border-color: var(--error-glow);
        }
        .admin-clear-btn:hover {
            background: var(--error);
            color: #fff;
            box-shadow: 0 0 20px var(--error-glow);
        }
    </style>
</head>
<body onclick="hideCtx()">

    <div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:90000; display:flex; align-items:center; justify-content:center;">
        <div class="glass-win" style="border-color: var(--blue);">
            <div class="brand-logo" style="margin: 0 auto 20px; transform: rotate(0); width: 60px; height: 60px; font-size: 24px; background: var(--blue);">D</div>
            <h2>DANCHAT ELITE</h2>
            <p style="opacity: 0.4; margin-bottom: 30px; font-size: 12px;">SYSTEM VERSION 7.0.4.2</p>
            <input type="text" id="auth-nick" class="form-input" placeholder="ЛОГИН">
            <input type="password" id="auth-pass" class="form-input" placeholder="ПАРОЛЬ">
            <button class="main-btn" style="background: var(--blue);" onclick="initAuth()">АВТОРИЗАЦИЯ</button>
        </div>
    </div>

    <div id="sidebar" class="hidden">
        <div class="sidebar-header">
            <div class="brand-zone">
                <div class="brand-logo">D</div>
                <div>
                    <div style="font-weight: 900; font-size: 18px; color: var(--accent);">DAN-BOX</div>
                    <div style="font-size: 10px; opacity: 0.5;">ELITE MESSENGER</div>
                </div>
            </div>
            <div class="nav-row">
                <span class="nav-btn" title="Профиль" onclick="openModal('settings-win')">⚙️</span>
                <span class="nav-btn" title="Глобальный Поиск" onclick="searchUsers()">👤</span>
                <span class="nav-btn" title="Новая Группа" onclick="openModal('group-win')">👥</span>
                <div id="my-nick-label" style="margin-left: auto; font-weight: 800; font-size: 12px;"></div>
            </div>
        </div>
        <div id="contact-list"></div>
    </div>

    <div id="main-content" class="hidden">
        <header onclick="showChatDetails()">
            <div class="header-left">
                <div id="header-av-box" style="position:relative;">
                    <img id="chat-icon" src="" class="msg-avatar" style="border-radius: 12px; width: 50px; height: 50px;">
                </div>
                <div>
                    <div id="chat-name" class="header-title">ЗАГРУЗКА...</div>
                    <div id="chat-info-sub" class="header-desc">ПОДКЛЮЧЕНИЕ</div>
                </div>
            </div>
            <div class="header-actions">
                <div id="admin-controls" class="hidden" style="display:flex; gap:10px;">
                    <button class="h-btn admin-clear-btn" onclick="event.stopPropagation(); purgeCurrentChat()">ОЧИСТИТЬ ЧАТ 🗑️</button>
                </div>
                <button id="v-call-toggle" class="h-btn" onclick="event.stopPropagation(); handleVoiceToggle()">ВОЙТИ В ГОЛОС 🎙️</button>
                <button id="p-call-start" class="h-btn hidden" onclick="event.stopPropagation(); initPrivateCall()" style="background: var(--accent); color: #000;">ЗВОНОК 📞</button>
            </div>
        </header>

        <div id="voice-grid" class="hidden"></div>
        <div id="chat-window"></div>

        <div id="action-bar" class="hidden" style="padding: 15px 30px; background: rgba(0,255,136,0.1); border-top: 1px solid var(--accent); display:flex; justify-content: space-between; align-items:center;">
            <div>
                <b id="action-type-label" style="font-size: 10px; color: var(--accent); text-transform:uppercase;"></b>
                <div id="action-preview-text" style="font-size: 13px; opacity: 0.7;"></div>
            </div>
            <span onclick="cancelCurrentAction()" style="cursor:pointer; font-weight:900; font-size: 20px;">✕</span>
        </div>

        <div id="input-zone">
            <span style="font-size: 24px; cursor:pointer;" onclick="openModal('emoji-win')">😊</span>
            <input type="file" id="img-upload-field" class="hidden" onchange="processImageMessage(this)">
            <span style="font-size: 24px; cursor:pointer;" onclick="document.getElementById('img-upload-field').click()">📷</span>
            <input type="text" id="msg-input" class="input-box" placeholder="Напишите что-нибудь..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <div id="settings-win" class="modal-overlay">
        <div class="glass-win">
            <h2>ПРОФИЛЬ</h2>
            <img id="profile-preview" src="" style="width: 120px; height: 120px; border-radius: 20px; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 20px;">
            <input type="file" id="av-file" class="hidden" onchange="previewAvatar(this)">
            <button class="main-btn" style="background: #333; margin-bottom: 15px;" onclick="document.getElementById('av-file').click()">СМЕНИТЬ АВАТАР</button>
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="font-size: 10px; color: var(--accent);">ЦВЕТ ТВОЕГО НИКА</label>
                <input type="color" id="pref-color" class="form-input" style="height: 50px; padding: 5px;">
            </div>
            <div style="text-align: left; margin-bottom: 25px;">
                <label style="font-size: 10px; color: var(--error);">ADMIN ACCESS KEY</label>
                <input type="password" id="admin-pass-key" class="form-input" placeholder="Введите ключ">
            </div>
            <button class="main-btn" onclick="applyProfileSettings()">СОХРАНИТЬ</button>
            <button class="main-btn" style="background: transparent; color: #555;" onclick="closeModal('settings-win')">ОТМЕНА</button>
        </div>
    </div>

    <div id="chat-details-win" class="modal-overlay">
        <div class="glass-win" style="width: 500px;">
            <h2 id="det-name">О ЧАТЕ</h2>
            <div id="members-scroll" style="max-height: 300px; overflow-y: auto; text-align: left; margin-bottom: 20px; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px;">
                </div>
            
            <div id="admin-add-zone" class="hidden" style="border-top: 1px solid var(--border); padding-top: 20px;">
                <div style="font-size: 11px; color: var(--accent); margin-bottom: 10px; text-align: left;">ДОБАВИТЬ НОВОГО УЧАСТНИКА (НИКНЕЙМ):</div>
                <div style="display:flex; gap: 10px;">
                    <input type="text" id="new-member-nick" class="form-input" placeholder="Напр: DanAdmin" style="margin:0;">
                    <button class="main-btn" style="width: 120px;" onclick="addMemberToGroup()">ДОБАВИТЬ</button>
                </div>
            </div>

            <button class="main-btn" style="margin-top: 25px; background: var(--error); color: #fff;" onclick="closeModal('chat-details-win')">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="call-win" class="modal-overlay">
        <div class="glass-win">
            <div id="caller-anim" style="position:relative; width: 150px; height: 150px; margin: 0 auto 30px;">
                <img id="caller-av" src="" class="voice-user-av" style="width:100%; height:100%;">
                <div style="position:absolute; inset: -10px; border: 2px solid var(--accent); border-radius: 50%; animation: ping 1.5s infinite;"></div>
            </div>
            <h1 id="caller-name">ВЫЗОВ...</h1>
            <div id="call-status-label" style="color: var(--accent); font-weight: 800; text-transform:uppercase;">СОЕДИНЕНИЕ</div>
            <div id="call-ui-btns" style="margin-top: 40px; display:flex; gap: 15px; justify-content:center;">
                </div>
        </div>
    </div>

    <div id="group-win" class="modal-overlay">
        <div class="glass-win">
            <h2>НОВАЯ ГРУППА</h2>
            <input type="text" id="group-title-input" class="form-input" placeholder="Название беседы">
            <button class="main-btn" onclick="finalizeGroupCreation()">СОЗДАТЬ БЕСЕДУ</button>
            <button class="main-btn" style="background: transparent; color: #555; margin-top:10px;" onclick="closeModal('group-win')">ОТМЕНА</button>
        </div>
    </div>

    <div id="emoji-win" class="modal-overlay" onclick="closeModal('emoji-win')">
        <div class="glass-win" onclick="event.stopPropagation()" style="width: 380px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px;">
            <span class="nav-btn" onclick="insertEmoji('😊')">😊</span><span class="nav-btn" onclick="insertEmoji('😂')">😂</span>
            <span class="nav-btn" onclick="insertEmoji('💀')">💀</span><span class="nav-btn" onclick="insertEmoji('🔥')">🔥</span>
            <span class="nav-btn" onclick="insertEmoji('🤡')">🤡</span><span class="nav-btn" onclick="insertEmoji('🤡')">❤️</span>
            <span class="nav-btn" onclick="insertEmoji('🤡')">👍</span><span class="nav-btn" onclick="insertEmoji('🤡')">💎</span>
            <span class="nav-btn" onclick="insertEmoji('🤡')">⚡</span><span class="nav-btn" onclick="insertEmoji('🤡')">✅</span>
        </div>
    </div>

    <div id="context-menu">
        <div class="ctx-btn" onclick="actionReply()">Ответить 💬</div>
        <div id="owner-ctx-tools" class="hidden">
            <div class="ctx-btn" onclick="actionEdit()">Изменить 📝</div>
            <div class="ctx-btn danger" onclick="actionDelete()">Удалить 🗑️</div>
        </div>
    </div>

    <script>
        /* =========================================
           CORE JAVASCRIPT LOGIC (ENGINE)
           ========================================= */
        
        const firebaseConfig = { 
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE", 
            authDomain: "danblox-e209f.firebaseapp.com", 
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com", 
            projectId: "danblox-e209f" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DEFAULT_AV = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        // Состояние приложения
        let myData = null, 
            activeChatId = 'global', 
            activePeerNick = '', 
            selectedMsgId = null, 
            selectedMsgData = null;
        
        let editingMode = false, 
            replyTarget = null, 
            voiceActive = false, 
            micMuted = false;
            
        let userStream = null, 
            vAudioCtx = null, 
            vAnalyser = null;

        /* --- АВТОРИЗАЦИЯ И СИСТЕМА ПРИСУТСТВИЯ --- */
        async function initAuth() {
            const nick = document.getElementById('auth-nick').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            if(!nick || !pass) return;

            const snap = await db.ref('users/'+nick).get();
            if(!snap.exists()) {
                myData = { nick: nick, pass: pass, av: DEFAULT_AV, color: '#00ff88', admin: false, friends: { 'global': 'group' } };
                await db.ref('users/'+nick).set(myData);
            } else {
                if(snap.val().pass !== pass) return alert("ОШИБКА: НЕВЕРНЫЙ ПАРОЛЬ");
                myData = snap.val();
            }
            launchApp();
        }

        function launchApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            
            syncProfileUI();
            
            // Онлайн статус
            db.ref('presence/'+myData.nick).set(true);
            db.ref('presence/'+myData.nick).onDisconnect().remove();
            
            setupChatListeners();
            listenToCalls();
            loadChat('global', 'Глобальный Чат');
        }

        function syncProfileUI() {
            const label = document.getElementById('my-nick-label');
            label.innerText = myData.nick;
            label.style.color = myData.color;
            document.getElementById('profile-preview').src = myData.av || DEFAULT_AV;
            document.getElementById('pref-color').value = myData.color;
        }

        /* --- КОНТАКТЫ --- */
        function setupChatListeners() {
            db.ref(`users/${myData.nick}/friends`).on('value', async snap => {
                const list = document.getElementById('contact-list');
                list.innerHTML = '';
                
                // Всегда есть Глобальный Чат
                createContactNode('global', { name: 'Глобальный Чат', av: 'https://cdn-icons-png.flaticon.com/512/814/814513.png' }, true);

                const data = snap.val() || {};
                for(let id in data) {
                    if(id === 'global') continue;
                    const type = data[id];
                    const infoSnap = await db.ref(type === 'group' ? 'groups/'+id : 'users/'+id).get();
                    if(infoSnap.exists()) createContactNode(id, infoSnap.val(), type === 'group');
                }
            });
        }

        function createContactNode(id, info, isGroup) {
            const list = document.getElementById('contact-list');
            const card = document.createElement('div');
            card.className = `contact-card ${activeChatId === id ? 'active' : ''}`;
            card.onclick = () => isGroup ? loadChat(id, info.name) : startPeerChat(id);
            
            card.innerHTML = `
                <div class="contact-av-wrap">
                    <img src="${info.av || DEFAULT_AV}" class="contact-av">
                    <div id="stat-${id}" class="status-badge ${isGroup ? 'online' : 'offline'}"></div>
                </div>
                <div class="contact-meta">
                    <span class="contact-name" style="color: ${info.color || '#fff'}">${isGroup ? info.name : info.nick}</span>
                    <span class="contact-sub">${isGroup ? 'Групповая беседа' : 'Личный чат'}</span>
                </div>
            `;
            list.appendChild(card);
            
            if(!isGroup) {
                db.ref('presence/'+id).on('value', p => {
                    const badge = document.getElementById('stat-'+id);
                    if(badge) badge.className = `status-badge ${p.exists() ? 'online' : 'offline'}`;
                });
            }
        }

        /* --- СИСТЕМА ЧАТА --- */
        async function loadChat(id, title) {
            if(voiceActive) terminateVoiceSession();
            
            activeChatId = id;
            const isBroad = id === 'global' || id.startsWith('group_');
            activePeerNick = isBroad ? '' : title;
            
            document.getElementById('chat-name').innerText = title.toUpperCase();
            document.getElementById('chat-window').innerHTML = '';
            document.getElementById('p-call-start').classList.toggle('hidden', isBroad);
            
            // Проверка прав админа для этого чата
            checkAdminPrivileges(id);

            // Иконка чата
            const infoSnap = await db.ref(isBroad ? (id === 'global' ? null : 'groups/'+id) : 'users/'+activePeerNick).get();
            document.getElementById('chat-icon').src = (infoSnap.exists() ? infoSnap.val().av : null) || DEFAULT_AV;

            db.ref('messages/'+id).off();
            db.ref('messages/'+id).on('child_added', s => drawMessage(s.key, s.val()));
            db.ref('messages/'+id).on('child_removed', s => document.getElementById('msg-'+s.key)?.remove());
            db.ref('messages/'+id).on('child_changed', s => {
                const el = document.getElementById('msg-'+s.key);
                if(el) el.querySelector('.msg-text').innerText = s.val().txt;
            });

            // Синхронизация голоса
            db.ref(`voice_data/${id}`).on('value', rebuildVoiceGrid);
        }

        async function checkAdminPrivileges(chatId) {
            const controls = document.getElementById('admin-controls');
            controls.classList.add('hidden');

            if(myData.admin) {
                controls.classList.remove('hidden'); // Глобальный админ видит всё
                return;
            }

            if(chatId.startsWith('group_')) {
                const gSnap = await db.ref('groups/'+chatId).get();
                if(gSnap.exists() && gSnap.val().owner === myData.nick) {
                    controls.classList.remove('hidden'); // Создатель группы - админ
                }
            }
        }

        async function drawMessage(mid, data) {
            const container = document.getElementById('chat-window');
            const row = document.createElement('div');
            row.id = 'msg-'+mid;
            row.className = `msg-wrap ${data.sn === myData.nick ? 'me' : ''}`;
            
            const uSnap = await db.ref('users/'+data.sn).get();
            const u = uSnap.val() || { av: DEFAULT_AV, color: '#fff' };

            row.oncontextmenu = (e) => {
                e.preventDefault();
                showCtxMenu(e, mid, data);
            };

            let body = data.type === 'img' 
                ? `<img src="${data.txt}" style="max-width:100%; border-radius:12px; cursor:pointer;" onclick="window.open(this.src)">` 
                : `<div class="msg-text">${data.txt}</div>`;

            row.innerHTML = `
                <img src="${u.av || DEFAULT_AV}" class="msg-avatar" onclick="startPeerChat('${data.sn}')">
                <div class="msg-bubble">
                    <div class="msg-info">
                        <span class="msg-author" style="color:${u.color}">${data.sn}</span>
                        ${u.admin ? '<span class="admin-label">MODERATOR</span>' : ''}
                    </div>
                    ${data.rp ? `<div style="padding:5px 10px; background:rgba(0,0,0,0.2); border-radius:8px; font-size:11px; margin-bottom:8px; opacity:0.6; border-left:2px solid var(--accent);">↪ ${data.rp}</div>` : ''}
                    ${body}
                </div>
            `;
            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(!val && !editingMode) return;

            if(editingMode) {
                db.ref(`messages/${activeChatId}/${selectedMsgId}`).update({ txt: val });
            } else {
                db.ref('messages/'+activeChatId).push({
                    sn: myData.nick,
                    txt: val,
                    type: 'text',
                    rp: replyTarget ? (replyTarget.txt.substring(0,40)+'...') : null,
                    time: Date.now()
                });
            }
            input.value = '';
            cancelCurrentAction();
        }

        /* --- НОВАЯ СИСТЕМА АДМИНА: ОЧИСТКА --- */
        async function purgeCurrentChat() {
            if(!confirm("ВЫ УВЕРЕНЫ? Чат будет удален навсегда для ВСЕХ участников!")) return;
            await db.ref('messages/'+activeChatId).remove();
            alert("Чат успешно очищен.");
        }

        /* --- НОВАЯ СИСТЕМА АДМИНА: ДОБАВЛЕНИЕ В ГРУППУ --- */
        async function showChatDetails() {
            const win = document.getElementById('chat-details-win');
            const scroll = document.getElementById('members-scroll');
            const addZone = document.getElementById('admin-add-zone');
            
            scroll.innerHTML = 'Загрузка данных...';
            addZone.classList.add('hidden');
            openModal('chat-details-win');

            if(activeChatId === 'global') {
                document.getElementById('det-name').innerText = "ГЛОБАЛЬНЫЙ ЧАТ";
                const pSnap = await db.ref('presence').get();
                scroll.innerHTML = '';
                pSnap.forEach(u => {
                    scroll.innerHTML += `<div style="padding:10px; border-bottom:1px solid #222;">👤 ${u.key} <span style="float:right; color:var(--accent);">ONLINE</span></div>`;
                });
            } else if(activeChatId.startsWith('group_')) {
                const gSnap = await db.ref('groups/'+activeChatId).get();
                const g = gSnap.val();
                document.getElementById('det-name').innerText = g.name.toUpperCase();
                
                // Проверка: мы ли админ?
                if(g.owner === myData.nick || myData.admin) addZone.classList.remove('hidden');

                scroll.innerHTML = '';
                const mems = g.members || {};
                for(let m in mems) {
                    scroll.innerHTML += `
                        <div style="padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
                            <span>👤 ${m} ${m === g.owner ? '<b style="color:var(--accent)">(Владелец)</b>' : ''}</span>
                            ${(g.owner === myData.nick && m !== myData.nick) ? `<button onclick="kickUser('${m}')" style="color:red; background:none; border:none; cursor:pointer;">Исключить</button>` : ''}
                        </div>`;
                }
            }
        }

        async function addMemberToGroup() {
            const target = document.getElementById('new-member-nick').value.trim();
            if(!target) return;

            const uSnap = await db.ref('users/'+target).get();
            if(!uSnap.exists()) return alert("Пользователь не найден!");

            // Добавляем в список группы
            await db.ref(`groups/${activeChatId}/members/${target}`).set(true);
            // Добавляем чат пользователю
            await db.ref(`users/${target}/friends/${activeChatId}`).set('group');
            
            document.getElementById('new-member-nick').value = '';
            showChatDetails(); // Обновить список
            alert(`${target} добавлен в группу!`);
        }

        /* --- ГОЛОСОВЫЕ ЗВОНКИ --- */
        async function handleVoiceToggle() {
            if(!voiceActive) {
                try {
                    userStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    voiceActive = true;
                    
                    const btn = document.getElementById('v-call-toggle');
                    btn.innerText = "ВЫЙТИ";
                    btn.classList.add('call-red');
                    document.getElementById('voice-grid').classList.remove('hidden');

                    const vRef = db.ref(`voice_data/${activeChatId}/${myData.nick}`);
                    vRef.set({ av: myData.av || DEFAULT_AV, muted: micMuted, speaking: false });
                    vRef.onDisconnect().remove();

                    startVoiceAnalysis();
                } catch(e) { alert("Ошибка микрофона!"); }
            } else {
                terminateVoiceSession();
            }
        }

        function terminateVoiceSession() {
            if(!voiceActive) return;
            voiceActive = false;
            if(userStream) userStream.getTracks().forEach(t => t.stop());
            db.ref(`voice_data/${activeChatId}/${myData.nick}`).remove();
            
            const btn = document.getElementById('v-call-toggle');
            btn.innerText = "ВОЙТИ В ГОЛОС";
            btn.classList.remove('call-red');
            document.getElementById('voice-grid').classList.add('hidden');
        }

        function rebuildVoiceGrid(snap) {
            const grid = document.getElementById('voice-grid');
            grid.innerHTML = '';
            if(!snap.exists() || !voiceActive) return;

            snap.forEach(child => {
                const name = child.key;
                const d = child.val();
                const node = document.createElement('div');
                node.className = `voice-user-node ${d.speaking ? 'speaking' : ''}`;
                node.innerHTML = `
                    ${d.muted ? '<div class="mute-indicator">🎙️❌</div>' : ''}
                    <img src="${d.av}" class="voice-user-av">
                    <div style="font-size: 12px; font-weight: 800;">${name === myData.nick ? 'Я' : name}</div>
                    ${name === myData.nick ? `<button onclick="toggleMute()" style="font-size:10px; padding:3px 8px; border-radius:5px; border:none; cursor:pointer; background:var(--accent);">${micMuted?'ВКЛ':'ВЫКЛ'}</button>` : ''}
                `;
                grid.appendChild(node);
            });
        }

        function toggleMute() {
            micMuted = !micMuted;
            if(userStream) userStream.getAudioTracks()[0].enabled = !micMuted;
            db.ref(`voice_data/${activeChatId}/${myData.nick}/muted`).set(micMuted);
        }

        function startVoiceAnalysis() {
            vAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = vAudioCtx.createMediaStreamSource(userStream);
            vAnalyser = vAudioCtx.createAnalyser();
            vAnalyser.fftSize = 256;
            source.connect(vAnalyser);

            const buffer = new Uint8Array(vAnalyser.frequencyBinCount);
            let state = false;

            const loop = () => {
                if(!voiceActive) return;
                vAnalyser.getByteFrequencyData(buffer);
                let sum = 0; for(let i=0; i<buffer.length; i++) sum += buffer[i];
                let isTalking = (sum / buffer.length) > 15 && !micMuted;

                if(isTalking !== state) {
                    state = isTalking;
                    db.ref(`voice_data/${activeChatId}/${myData.nick}/speaking`).set(state);
                }
                requestAnimationFrame(loop);
            };
            loop();
        }

        /* --- ЛИЧНЫЕ ПРИВАТНЫЕ ЗВОНКИ --- */
        async function initPrivateCall() {
            const target = activePeerNick;
            const tSnap = await db.ref('users/'+target).get();
            
            document.getElementById('caller-av').src = tSnap.val().av || DEFAULT_AV;
            document.getElementById('caller-name').innerText = target;
            document.getElementById('call-status-label').innerText = "ВЫЗОВ...";
            openModal('call-win');

            const ref = db.ref('calls/'+target);
            ref.set({ from: myData.nick, status: 'calling' });
            ref.onDisconnect().remove();

            document.getElementById('call-ui-btns').innerHTML = `<button class="main-btn" style="background:var(--error); color:#fff;" onclick="endCall('${target}')">ОТМЕНА</button>`;
        }

        function listenToCalls() {
            db.ref('calls/'+myData.nick).on('value', async snap => {
                const c = snap.val();
                if(!c) { closeModal('call-win'); return; }

                const uSnap = await db.ref('users/'+c.from).get();
                document.getElementById('caller-av').src = uSnap.val().av || DEFAULT_AV;
                document.getElementById('caller-name').innerText = c.from;
                openModal('call-win');

                const btns = document.getElementById('call-ui-btns');
                if(c.status === 'calling') {
                    document.getElementById('call-status-label').innerText = "ВХОДЯЩИЙ ВЫЗОВ";
                    btns.innerHTML = `
                        <button class="main-btn" onclick="acceptCall('${c.from}')">ПРИНЯТЬ</button>
                        <button class="main-btn" style="background:var(--error); color:#fff;" onclick="endCall('${c.from}')">СБРОС</button>
                    `;
                } else {
                    document.getElementById('call-status-label').innerText = "ИДЕТ РАЗГОВОР";
                    btns.innerHTML = `<button class="main-btn" style="background:var(--error); color:#fff;" onclick="endCall('${c.from}')">ЗАВЕРШИТЬ</button>`;
                }
            });
        }

        function acceptCall(from) {
            db.ref(`calls/${myData.nick}`).update({ status: 'active' });
            db.ref(`calls/${from}`).set({ from: myData.nick, status: 'active' });
        }

        function endCall(target) {
            db.ref(`calls/${myData.nick}`).remove();
            db.ref(`calls/${target}`).remove();
            closeModal('call-win');
        }

        /* --- ДОПОЛНИТЕЛЬНЫЕ ФУНКЦИИ --- */
        async function applyProfileSettings() {
            const key = document.getElementById('admin-pass-key').value;
            const updates = {
                av: document.getElementById('profile-preview').src,
                color: document.getElementById('pref-color').value,
                admin: (key === "DanAdminPanel") // ПАРОЛЬ ТЕПЕРЬ ТАКОЙ
            };
            await db.ref('users/'+myData.nick).update(updates);
            myData = (await db.ref('users/'+myData.nick).get()).val();
            syncProfileUI();
            closeModal('settings-win');
        }

        async function startPeerChat(nick) {
            if(nick === myData.nick) return;
            await db.ref(`users/${myData.nick}/friends/${nick}`).set('user');
            await db.ref(`users/${nick}/friends/${myData.nick}`).set('user');
            const id = myData.nick < nick ? `${myData.nick}_${nick}` : `${nick}_${myData.nick}`;
            loadChat(id, nick);
        }

        async function finalizeGroupCreation() {
            const title = document.getElementById('group-title-input').value.trim();
            if(!title) return;
            const gid = 'group_' + Date.now();
            await db.ref('groups/'+gid).set({
                name: title,
                owner: myData.nick,
                av: DEFAULT_AV,
                members: { [myData.nick]: true }
            });
            await db.ref(`users/${myData.nick}/friends/${gid}`).set('group');
            closeModal('group-win');
        }

        function showCtxMenu(e, mid, data) {
            selectedMsgId = mid; selectedMsgData = data;
            const menu = document.getElementById('context-menu');
            document.getElementById('owner-ctx-tools').classList.toggle('hidden', !(data.sn === myData.nick || myData.admin));
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }

        function actionReply() { 
            replyTarget = selectedMsgData; 
            showActionInfo("ОТВЕТИТЬ", selectedMsgData.txt); 
        }
        function actionEdit() { 
            editingMode = true; 
            document.getElementById('msg-input').value = selectedMsgData.txt; 
            showActionInfo("РЕДАКТИРОВАНИЕ", selectedMsgData.txt); 
        }
        function actionDelete() { 
            if(confirm("Удалить?")) db.ref(`messages/${activeChatId}/${selectedMsgId}`).remove(); 
        }

        function showActionInfo(type, text) {
            document.getElementById('action-bar').classList.remove('hidden');
            document.getElementById('action-type-label').innerText = type;
            document.getElementById('action-preview-text').innerText = text;
        }

        function cancelCurrentAction() { 
            editingMode = false; replyTarget = null; 
            document.getElementById('action-bar').classList.add('hidden'); 
            document.getElementById('msg-input').value = ''; 
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function hideCtx() { document.getElementById('context-menu').style.display = 'none'; }
        function insertEmoji(e) { document.getElementById('msg-input').value += e; }
        
        function previewAvatar(input) {
            const r = new FileReader();
            r.onload = e => document.getElementById('profile-preview').src = e.target.result;
            r.readAsDataURL(input.files[0]);
        }

        function processImageMessage(input) {
            const f = input.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = e => db.ref('messages/'+activeChatId).push({ sn: myData.nick, txt: e.target.result, type: 'img' });
            r.readAsDataURL(f);
        }

        function searchUsers() {
            db.ref('users').once('value', s => {
                const scroll = document.getElementById('members-scroll');
                scroll.innerHTML = '';
                document.getElementById('det-name').innerText = "ПОИСК ЛЮДЕЙ";
                document.getElementById('admin-add-zone').classList.add('hidden');
                s.forEach(u => {
                    if(u.key === myData.nick) return;
                    scroll.innerHTML += `<div onclick="startPeerChat('${u.key}'); closeModal('chat-details-win')" style="padding:15px; border-bottom:1px solid #222; cursor:pointer;">👤 ${u.key}</div>`;
                });
                openModal('chat-details-win');
            });
        }
    </script>
</body>
</html>
