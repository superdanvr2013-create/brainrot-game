<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox: Final Mega Build</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; touch-action: none; user-select: none; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); color: white; }
        .auth-box { background: #1a1a1a; padding: 30px; border-radius: 25px; border: 1px solid #333; text-align: center; width: 300px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; text-align: center; font-size: 16px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 14px; background: #ff0000; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.95); opacity: 0.8; }
        
        #leaderboard { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); color: #ffd700; padding: 12px; border-radius: 10px; border: 1px solid #ffd700; font-size: 13px; z-index: 500; min-width: 140px; }
        #admin-menu { position: absolute; left: 15px; top: 15px; background: rgba(40,0,0,0.9); padding: 15px; border-radius: 12px; border: 2px solid #f00; z-index: 1500; color: white; display: flex; flex-direction: column; gap: 10px; width: 160px; }
        .adm-btn { background: #333; color: white; border: 1px solid #666; padding: 6px; font-size: 11px; cursor: pointer; border-radius: 4px; }
        .adm-btn:hover { background: #444; }

        #mobile-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .joy-pad { position: absolute; bottom: 40px; left: 40px; display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; pointer-events: auto; }
        .act-pad { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 20px; pointer-events: auto; }
        .ctrl-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.5); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; backdrop-filter: blur(5px); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="leaderboard"><b>TOP KILLS</b><hr style="border:0; border-top:1px solid #555;"><div id="lb-inner"></div></div>

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h2 id="auth-title">РЕГИСТРАЦИЯ</h2>
            <input type="text" id="auth-nick" placeholder="Никнейм">
            <input type="password" id="auth-pass" placeholder="Пароль">
            <button class="btn-main" id="auth-btn">ВОЙТИ В ИГРУ</button>
            <p id="auth-toggle-text" style="font-size: 12px; cursor: pointer; color: #888; margin-top: 15px;">Уже есть аккаунт? Войти</p>
        </div>
    </div>

    <div id="admin-menu" class="hidden">
        <b style="color:#f00; text-align:center; font-size:14px;">ADMIN PANEL</b>
        <button class="adm-btn" id="fly-toggle">FLY: OFF</button>
        <div style="font-size:11px; display:flex; justify-content:space-between;">SPD: <span id="v-spd">0.3</span> <span id="v-jmp" style="display:none">0.5</span></div>
        <div style="display:flex; gap:5px;">
            <button class="adm-btn" id="spd-up">SPD +</button><button class="adm-btn" id="spd-down">SPD -</button>
        </div>
        <button class="adm-btn" style="background:#600" id="clear-lb">СБРОСИТЬ ТОП</button>
    </div>

    <div id="mobile-ui" class="hidden">
        <div class="joy-pad">
            <div></div><div class="ctrl-btn" id="m-w">W</div><div></div>
            <div class="ctrl-btn" id="m-a">A</div><div class="ctrl-btn" id="m-s">S</div><div class="ctrl-btn" id="m-d">D</div>
        </div>
        <div class="act-pad">
            <div class="ctrl-btn" id="m-jump" style="background:rgba(0,120,255,0.2); height:60px;">JUMP</div>
            <div class="ctrl-btn" id="m-atk" style="background:rgba(255,0,0,0.2); width:90px; height:90px;">ATTACK</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const REF = db.ref('world_vFinal'); 

        let scene, camera, renderer, myModel, mySword;
        let myID = "", myNick = "", myHP = 100, inGame = false, isDead = false;
        let isRegMode = true, isAtk = false, isFly = false, isRightClick = false;
        let moveSpd = 0.32, jumpPwr = 0.48;
        let otherPlayers = {}, colliders = [];
        let moveState = { f:false, b:false, l:false, r:false };
        let vy = 0, canJump = true, camAzimuth = 0, camDist = 20;

        // Создание 3D интерфейса (Ник и ХП)
        function create3DUI(name) {
            const group = new THREE.Group();
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center';
            ctx.fillText(name, 128, 45);
            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: tex}));
            sprite.position.y = 3.2; sprite.scale.set(3, 1.5, 1);
            group.add(sprite);

            const hpBg = new THREE.Mesh(new THREE.PlaneGeometry(2.1, 0.25), new THREE.MeshBasicMaterial({color: 0x000000}));
            hpBg.position.y = 2.4;
            const hpBar = new THREE.Mesh(new THREE.PlaneGeometry(2, 0.18), new THREE.MeshBasicMaterial({color: 0x00ff00}));
            hpBar.position.set(0, 2.4, 0.01);
            group.add(hpBg, hpBar);
            group.hpBar = hpBar;
            return group;
        }

        function createPlayer(color, name) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.4, 0.6), new THREE.MeshStandardMaterial({color}));
            body.position.y = 0.7;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 1.75;
            group.add(body, head);
            const ui = create3DUI(name);
            group.add(ui); group.ui = ui;
            return group;
        }

        function buildMap() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87ceeb);
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x355e3b}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);

            const addStone = (x, z, s) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(4*s, 3*s, 4*s), new THREE.MeshStandardMaterial({color: 0x888888}));
                m.position.set(x, (3*s)/2, z); scene.add(m);
                colliders.push(new THREE.Box3().setFromObject(m));
            };
            for(let i=0; i<50; i++) addStone((Math.random()-0.5)*250, (Math.random()-0.5)*250, 0.5 + Math.random());
        }

        function startGame() {
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5); sun.position.set(50, 100, 50); scene.add(sun);

            myModel = createPlayer(0x0066ff, myNick);
            myModel.ui.visible = false;
            mySword = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.8, 0.05), new THREE.MeshStandardMaterial({color: 0xdddddd}));
            blade.position.y = 0.9; mySword.add(blade);
            mySword.rotation.x = Math.PI/2; mySword.position.set(0.7, 0.8, 0.3);
            myModel.add(mySword);
            scene.add(myModel);

            REF.child('players').on('value', snap => {
                const players = snap.val() || {};
                const now = Date.now();
                Object.keys(otherPlayers).forEach(id => { if(!players[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }});
                Object.keys(players).forEach(id => {
                    if(id === myID) { myHP = players[id].hp; return; }
                    if(now - players[id].ls > 10000) return;
                    if(!otherPlayers[id]) {
                        otherPlayers[id] = createPlayer(0xff3300, players[id].n || "Player");
                        const s = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.5, 0.05), new THREE.MeshStandardMaterial());
                        s.rotation.x = Math.PI/2; s.position.set(0.7, 0.8, 0.3);
                        otherPlayers[id].add(s); scene.add(otherPlayers[id]);
                    }
                    const p = otherPlayers[id];
                    p.position.lerp(new THREE.Vector3(players[id].x, players[id].y, players[id].z), 0.2);
                    p.rotation.y = players[id].ry;
                    p.children[3].position.z = players[id].at ? 1.5 : 0.3;
                    if(players[id].hp <= 0) p.rotation.z = Math.PI/2; else p.rotation.z = 0;
                    
                    const hF = (players[id].hp || 0) / 100;
                    p.ui.hpBar.scale.x = hF;
                    p.ui.hpBar.material.color.setHex(hF > 0.3 ? 0x00ff00 : 0xff0000);
                });
            });

            db.ref('leaderboard').orderByValue().limitToLast(5).on('value', snap => {
                let h = ""; snap.forEach(s => { h = `<div>${s.key}: ${s.val()}</div>` + h; });
                document.getElementById('lb-inner').innerHTML = h;
            });

            animate();
        }

        function attack() {
            if(isDead || isAtk) return;
            isAtk = true;
            new TWEEN.Tween(mySword.position).to({z: 1.6}, 70).chain(
                new TWEEN.Tween(mySword.position).to({z: 0.3}, 100).onComplete(() => isAtk = false)
            ).start();

            REF.child('players/'+myID).update({ at: true });
            setTimeout(() => REF.child('players/'+myID).update({ at: false }), 150);

            Object.keys(otherPlayers).forEach(id => {
                if(myModel.position.distanceTo(otherPlayers[id].position) < 5) {
                    REF.child('players/'+id).transaction(p => {
                        if(p && p.hp > 0) {
                            p.hp -= 20;
                            if(p.hp <= 0) { p.hp = 0; db.ref('leaderboard/'+myNick).transaction(k => (k||0)+1); }
                        }
                        return p;
                    });
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(inGame && !isDead) {
                const prev = myModel.position.clone();
                const dir = new THREE.Vector3();
                if(moveState.f) dir.z -= 1; if(moveState.b) dir.z += 1;
                if(moveState.l) dir.x -= 1; if(moveState.r) dir.x += 1;
                
                if(dir.length() > 0) {
                    dir.applyAxisAngle(new THREE.Vector3(0,1,0), camAzimuth);
                    myModel.position.add(dir.normalize().multiplyScalar(moveSpd));
                    myModel.rotation.y = Math.atan2(dir.x, dir.z);
                }

                const myBox = new THREE.Box3().setFromObject(myModel);
                colliders.forEach(c => { if(myBox.intersectsBox(c)) myModel.position.copy(prev); });

                if(!isFly) {
                    myModel.position.y += vy;
                    if(myModel.position.y > 0) { vy -= 0.02; canJump = false; }
                    else { myModel.position.y = 0; vy = 0; canJump = true; }
                }
                REF.child('players/'+myID).update({ x: myModel.position.x, y: myModel.position.y, z: myModel.position.z, ry: myModel.rotation.y, ls: Date.now(), hp: myHP, n: myNick });
            }
            camera.position.set(myModel.position.x + camDist * Math.sin(camAzimuth), myModel.position.y + 10, myModel.position.z + camDist * Math.cos(camAzimuth));
            camera.lookAt(myModel.position.x, myModel.position.y + 1, myModel.position.z);
            TWEEN.update(); renderer.render(scene, camera);
        }

        // --- AUTH & WINDOW BINDINGS ---
        window.handleAuth = async () => {
            const n = document.getElementById('auth-nick').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            if(n.length < 2) return alert("Ник слишком короткий");
            if(p.toLowerCase() === "la ginger sekolah") {
                isFly = false; document.getElementById('admin-menu').classList.remove('hidden');
            }
            myNick = n; myID = 'u' + Math.random().toString(36).substr(2, 6);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('mobile-ui').classList.remove('hidden');
            inGame = true; buildMap(); startGame();
            REF.child('players/'+myID).set({ n: myNick, hp: 100, x: 0, y: 0, z: 0, ls: Date.now() });
            REF.child('players/'+myID).onDisconnect().remove();
        };

        window.toggleAuthMode = () => {
            isRegMode = !isRegMode;
            document.getElementById('auth-title').innerText = isRegMode ? "РЕГИСТРАЦИЯ" : "ВХОД";
            document.getElementById('auth-toggle-text').innerText = isRegMode ? "Уже есть аккаунт? Войти" : "Нужен новый аккаунт? Регистрация";
        };

        // Привязка к кнопкам
        document.getElementById('auth-btn').onclick = window.handleAuth;
        document.getElementById('auth-toggle-text').onclick = window.toggleAuthMode;
        
        // Админка
        document.getElementById('fly-toggle').onclick = () => {
            isFly = !isFly; document.getElementById('fly-toggle').innerText = isFly ? "FLY: ON" : "FLY: OFF";
        };
        document.getElementById('spd-up').onclick = () => { moveSpd += 0.1; document.getElementById('v-spd').innerText = moveSpd.toFixed(1); };
        document.getElementById('spd-down').onclick = () => { moveSpd = Math.max(0.1, moveSpd - 0.1); document.getElementById('v-spd').innerText = moveSpd.toFixed(1); };
        document.getElementById('clear-lb').onclick = () => { if(confirm("Очистить таблицу?")) db.ref('leaderboard').remove(); };

        // --- CONTROLS ---
        window.onkeydown = (e) => {
            const k = e.code;
            if(k==='KeyW') moveState.f=true; if(k==='KeyS') moveState.b=true;
            if(k==='KeyA') moveState.l=true; if(k==='KeyD') moveState.r=true;
            if(k==='Space' && canJump) vy = jumpPwr;
        };
        window.onkeyup = (e) => {
            const k = e.code;
            if(k==='KeyW') moveState.f=false; if(k==='KeyS') moveState.b=false;
            if(k==='KeyA') moveState.l=false; if(k==='KeyD') moveState.r=false;
        };
        window.onmousedown = (e) => { if(e.button===2) isRightClick=true; if(e.button===0 && inGame) attack(); };
        window.onmouseup = (e) => { if(e.button===2) isRightClick=false; };
        window.onmousemove = (e) => { if(isRightClick) camAzimuth -= e.movementX * 0.01; };
        window.addEventListener('wheel', e => camDist = Math.max(10, Math.min(60, camDist + e.deltaY * 0.05)), {passive:true});

        const bindM = (id, k) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); moveState[k]=true; };
            el.onpointerup = () => moveState[k]=false;
            el.onpointerleave = () => moveState[k]=false;
        };
        bindM('m-w','f'); bindM('m-s','b'); bindM('m-a','l'); bindM('m-d','r');
        document.getElementById('m-jump').onpointerdown = (e) => { e.preventDefault(); if(canJump) vy = jumpPwr; };
        document.getElementById('m-atk').onpointerdown = (e) => { e.preventDefault(); attack(); };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/20.0.0/tween.umd.js"></script>
</body>
</html>
