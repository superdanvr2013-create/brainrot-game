<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox - Ultra Roblox Tycoon</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; touch-action: none; }
        #stats-ui { position: absolute; top: 10px; left: 10px; z-index: 10; font-weight: bold; pointer-events: none; }
        .stat-label { color: #0f0; font-size: 26px; text-shadow: 2px 2px #000; }
        .rebirth-label { color: #f0f; font-size: 20px; text-shadow: 2px 2px #000; }

        #menu { position: absolute; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); }
        .window { background: #111; padding: 40px; border: 4px solid #0f0; border-radius: 20px; text-align: center; color: #fff; }
        input { padding: 15px; margin: 10px; width: 250px; background: #222; color: #0f0; border: 1px solid #0f0; border-radius: 5px; font-size: 16px; outline: none; }
        button#start-btn { padding: 15px 50px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 18px; margin-top: 15px;}

        #sidebar { position: absolute; right: 10px; top: 10px; width: 200px; z-index: 10; pointer-events: none; }
        .panel { background: rgba(0,0,0,0.8); border: 2px solid #0f0; border-radius: 10px; padding: 10px; color: #fff; pointer-events: auto; }
        #player-list { max-height: 120px; overflow-y: auto; font-size: 14px; margin-top: 5px; }

        #jump-btn { width: 80px; height: 80px; background: rgba(0,136,255,0.5); border-radius: 50%; position: absolute; bottom: 40px; right: 40px; border: 2px solid #fff; pointer-events: auto; display: none; align-items: center; justify-content: center; color: white; font-weight: bold; user-select: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="stats-ui" class="hidden">
    <div class="stat-label">CASH: <span id="cash-val">0</span>$</div>
    <div class="rebirth-label">REBIRTHS: <span id="rebirth-val">0</span></div>
</div>

<div id="menu">
    <div class="window">
        <h1 style="color: #0f0; font-size: 32px;">DANBLOX TYCOON</h1>
        <p>Клон Roblox. Строй базу, делай перерождения.</p>
        <input type="text" id="nick-input" placeholder="НИК (Только ENG)..." maxlength="10"><br>
        <button id="start-btn">ПОСТРОИТЬ ТАЙКУН</button>
    </div>
</div>

<div id="jump-btn">JUMP</div>

<div id="sidebar" class="hidden">
    <div class="panel">
        <b>ОНЛАЙН ИГРОКИ</b>
        <div id="player-list"></div>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- КОНФИГ И БД ---
    const firebaseConfig = {
        apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
        authDomain: "danblox-e209f.firebaseapp.com",
        databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
        projectId: "danblox-e209f",
        storageBucket: "danblox-e209f.firebasestorage.app",
        messagingSenderId: "828099060847",
        appId: "1:828099060847:web:9bb0bebc8c02833ce7d99a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const playersRef = db.ref('players');

    // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
    let scene, camera, renderer, myModel, pivot;
    let myID = 'u' + Math.floor(Math.random() * 1000000);
    let myNick, myCash = 0, myRebirths = 0, otherPlayers = {}, otherBases = {}, activeButtons = [];
    let moveDir = new THREE.Vector3(), velocity = new THREE.Vector3(), canJump = true;
    let myBasePos, myTycoonData = { floor1: false, droppers: [], walls: false }, baseMesh;
    let mapColliders = [], mapBounds = { minX: -55, maxX: 55, minZ: -100, maxZ: 100 };
    let dropReceiver;

    // --- ФИКСИРОВАННЫЕ КООРДИНАТЫ БАЗ (10 мест) ---
    const BASE_SPOTS = [];
    for(let i=0; i<5; i++) BASE_SPOTS.push({ x: -40, z: -80 + (i*40), la: true }); // Слева
    for(let i=0; i<5; i++) BASE_SPOTS.push({ x: 40, z: -80 + (i*40), la: false }); // Справа

    // --- ПОДГОТОВКА СЦЕНЫ ---
    function initScene() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        
        // Карта и Границы
        createBox(1000, 0.2, 1000, 0, 0, 0, 0x1a5e1a); // Трава
        createBox(15, 0.15, 200, 0, 0.1, 0, 0xff0000); // Красная дорожка

        // Невидимые стены границ карты (чтобы не убежать)
        const wallM = new THREE.MeshBasicMaterial({visible:false});
        createBox(120, 20, 1, 0, 10, 105, 0x0, 1, wallM, true); createBox(120, 20, 1, 0, 10, -105, 0x0, 1, wallM, true);
        createBox(1, 20, 210, 60, 10, 0, 0x0, 1, wallM, true); createBox(1, 20, 210, -60, 10, 0, 0x0, 1, wallM, true);
    }

    // --- СОЗДАНИЕ 3D ОБЪЕКТОВ ---
    function createBox(w, h, d, x, y, z, color, opacity = 1, mat = null, isCollider = false) {
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(w, h, d),
            mat || new THREE.MeshStandardMaterial({ color, transparent: opacity < 1, opacity })
        );
        mesh.position.set(x, y, z); scene.add(mesh);
        if(isCollider) mapColliders.push(mesh);
        return mesh;
    }

    function createHumanMesh(color) {
        const g = new THREE.Group();
        const m = new THREE.MeshStandardMaterial({color});
        const body = createBox(1, 1.2, 0.5, 0, 1, 0, color, 1, m); g.add(body);
        const head = createBox(0.6, 0.6, 0.6, 0, 1.8, 0, color, 1, m); g.add(head);
        const leg = createBox(0.4, 0.8, 0.4, -0.3, 0.4, 0, color, 1, m); g.add(leg);
        const legR = leg.clone(); legR.position.x = 0.3; g.add(legR);
        return g;
    }

    function createTycoonBase(pos, nick, isMine) {
        const group = new THREE.Group(); group.position.set(pos.x, 0, pos.z);
        const floor = createBox(25, 0.3, 25, 0, 0.2, 0, 0x333333); group.add(floor); // Фундамент
        
        const sign = new THREE.Mesh(new THREE.BoxGeometry(10, 4, 0.2), new THREE.MeshStandardMaterial({color:0x111}));
        sign.position.set(0, 7, -12); group.add(sign); // Вывеска

        if(isMine) createTycoonButtons(group);

        // Приемник Cash (Collect Zone)
        dropReceiver = createBox(5, 0.5, 5, 0, 0.5, 10, 0x00ff00, 0.5); group.add(dropReceiver);
        
        scene.add(group);
        return { group, droppers: [], rebirthButton: null };
    }

    function createTycoonButtons(baseGroup) {
        createButton(baseGroup, 0, 0.5, -5, "Build Dropper 1 (50$)", 0x00aaff, () => buildDropper(1));
        createButton(baseGroup, -8, 0.5, 8, "Rebirth (Need 1000$)", 0xff00ff, () => handleRebirth());
    }

    function createButton(baseGroup, x, y, z, text, color, action) {
        const btn = createBox(4, 0.2, 4, x, y, z, color); baseGroup.add(btn);
        const btnData = { mesh: btn, action, text, pos: btn.getWorldPosition(new THREE.Vector3()) };
        activeButtons.push(btnData);
        // Тут можно добавить TextSprite над кнопкой
    }

    // --- ЛОГИКА ТАЙКУНА ---
    function buildDropper(level) {
        if(myCash < 50) return; myCash -= 50; updateStats();
        const dropper = createBox(2, 6, 2, -10 + (level*3), 3, -10, 0x444);
        baseMesh.add(dropper);
        setInterval(() => {
            const drop = createBox(0.8, 0.8, 0.8, dropper.position.x, 6, dropper.position.z, 0xffff00);
            baseMesh.add(drop);
            robots.push({mesh: drop, type: 'drop', vy: 0});
        }, 3000);
    }

    function handleRebirth() {
        if(myCash < 1000) return;
        myCash = 0; myRebirths += 1; updateStats();
        playersRef.child(myID).update({ r: myRebirths, c: 0 });
        // Сброс тайкуна, смена скина на розовый, открытие 2 этажа и т.д.
    }

    // --- Firebase Sync ---
    function initFirebase() {
        playersRef.child(myID).onDisconnect().remove();
        playersRef.on('value', s => {
            const data = s.val() || {};
            const list = document.getElementById('player-list'); list.innerHTML = '';
            Object.keys(data).forEach(id => {
                list.innerHTML += `<div><b>${data[id].n}</b>: ${data[id].c}$ (R:${data[id].r})</div>`;
                if(id !== myID && !otherPlayers[id]) {
                    otherPlayers[id] = createHumanMesh(0x0088ff); scene.add(otherPlayers[id]);
                    otherBases[id] = createBase(data[id].n, BASE_SPOTS[data[id].bp]);
                }
                if(id !== myID) otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.3);
            });
            Object.keys(otherPlayers).forEach(id => { if(!data[id]) { scene.remove(otherPlayers[id]); scene.remove(otherBases[id]); delete otherPlayers[id]; }});
        });
    }

    // --- ОСНОВНОЙ ЦИКЛ ГЕЙМПЛЕЯ ---
    function loop() {
        requestAnimationFrame(loop);
        if(!myModel) return;

        // 1. Физика Игрока
        pivot.getWorldQuaternion(camera.quaternion); // Поворот камеры за игроком
        velocity.y -= 0.015; // Гравитация
        moveDir.y = velocity.y;
        
        const nextP = myModel.position.clone().add(moveDir.multiplyScalar(0.25));
        let canMove = true;
        mapColliders.forEach(c => {
            const b = new THREE.Box3().setFromObject(c);
            if(b.intersectsBox(new THREE.Box3().setFromCenterAndSize(nextP, new THREE.Vector3(1.2, 2, 1.2)))) canMove = false;
        });
        
        // Границы карты
        if(nextP.x < mapBounds.minX || nextP.x > mapBounds.maxX || nextP.z < mapBounds.minZ || nextP.z > mapBounds.maxZ) canMove = false;

        if(canMove) myModel.position.copy(nextP);
        if(myModel.position.y <= 1) { myModel.position.y = 1; velocity.y = 0; canJump = true; }

        // 2. Кнопки Тайкуна
        activeButtons.forEach(btn => {
            if(myModel.position.distanceTo(btn.pos) < 3) btn.action();
        });

        // 3. Физика Дропов (Ball physics)
        robots.forEach((d, i) => {
            if(d.type === 'drop') {
                d.vy -= 0.01; d.mesh.position.y += d.vy;
                if(d.mesh.position.y < 0.8) { d.mesh.position.y = 0.8; d.vy = 0; d.mesh.position.z += 0.1; } // Движение по конвейеру
                
                // Сбор Cash
                if(d.mesh.position.distanceTo(dropReceiver.getWorldPosition(new THREE.Vector3())) < 3) {
                    myCash += 1; updateStats(); baseMesh.remove(d.mesh); robots.splice(i,1);
                }
            }
        });

        // 4. Синхронизация своего игрока
        db.ref('players/' + myID).update({ x: myModel.position.x, y: myModel.position.y, z: myModel.position.z, c: myCash, r: myRebirths, la: true, n: myNick });

        renderer.render(scene, camera);
    }

    // --- Вспомогательные ---
    function updateStats() { document.getElementById('cash-val').innerText = myCash; document.getElementById('rebirth-val').innerText = myRebirths; }

    // --- УПРАВЛЕНИЕ ---
    const keys = {};
    window.onkeydown = (e) => {
        if(document.activeElement.tagName === 'INPUT') return;
        if(e.code === 'KeyW') moveDir.z = -1; if(e.code === 'KeyS') moveDir.z = 1;
        if(e.code === 'KeyA') moveDir.x = -1; if(e.code === 'KeyD') moveDir.x = 1;
        if(e.code === 'Space' && canJump) velocity.y = 0.3;
    };
    window.onkeyup = (e) => {
        if(e.code === 'KeyW' || e.code === 'KeyS') moveDir.z = 0;
        if(e.code === 'KeyA' || e.code === 'KeyD') moveDir.x = 0;
    };

    // Старт
    document.getElementById('start-btn').onclick = () => {
        myNick = document.getElementById('nick-input').value.trim() || "Robloxfan";
        document.getElementById('menu').style.display = 'none';
        ['stats-ui', 'sidebar'].forEach(id => document.getElementById(id).classList.remove('hidden'));
        initScene(); initFirebase(); initGame();
    };

    function initGame() {
        pivot = new THREE.Group(); scene.add(pivot);
        pivot.add(camera); camera.position.set(0, 15, 25); camera.lookAt(pivot.position);
        loop();
    }
</script>
</body>
</html>
