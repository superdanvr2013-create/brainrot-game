<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Brainrot Online - Private World</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; }
        #menu { position: absolute; width: 100%; height: 100%; z-index: 100; display: flex; align-items: center; justify-content: center; background: #111; }
        .window { background: #222; padding: 40px; border-radius: 15px; border: 2px solid #ff00ff; text-align: center; box-shadow: 0 0 20px #ff00ff55; }
        input { padding: 12px; margin: 10px; border-radius: 5px; width: 250px; background: #000; color: #ff00ff; border: 1px solid #ff00ff; font-weight: bold; }
        button { padding: 12px 30px; background: #ff00ff; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 18px; }
        #hud { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; z-index: 50; border: 1px solid #ff00ff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="window">
            <h1 style="color: #ff00ff;">BRAINROT: PRIVATE</h1>
            <input type="text" id="nick-input" placeholder="НИК (ЛАТИНИЦА)..."><br>
            <button id="start-btn">ВОЙТИ В МИР</button>
            <p style="font-size: 12px; color: #666; margin-top: 15px;">Теперь это твоя личная комната!</p>
        </div>
    </div>

    <div id="hud" class="hidden">
        <div>НИК: <span id="display-nick" style="color:#ff00ff">?</span></div>
        <div id="status">СТАТУС: ОНЛАЙН</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, pivot, playerModel;
        let gun, playersRef, myID, myNick;
        let otherPlayers = {}; 
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let gameReady = false;

        const startBtn = document.getElementById('start-btn');

        function initNet(nick) {
            myNick = nick.replace(/[^a-zA-Z0-9]/g, "");
            // Уникальный ID для каждой сессии
            myID = 'danvr_' + Math.random().toString(36).substr(2, 9);
            document.getElementById('display-nick').innerText = myNick;

            // Используем уникальное имя узла, чтобы не видеть чужих игроков
            gun = Gun(['https://gun-maniac.herokuapp.com/gun', 'https://relay.peer.ooo/gun']);
            
            // "danvr_secret_room" - это твоя личная комната. Чужаки сюда не попадут.
            playersRef = gun.get('danvr_secret_room_v1').get('players');

            // Получаем данные
            playersRef.map().on((data, id) => {
                if(!data || id === myID || !gameReady) return;
                syncPlayer(id, data);
            });

            // Отправка координат (каждые 40мс для плавности)
            setInterval(() => {
                if(gameReady && pivot) {
                    playersRef.get(myID).put({
                        n: myNick,
                        x: Number(pivot.position.x.toFixed(2)),
                        y: Number(pivot.position.y.toFixed(2)),
                        z: Number(pivot.position.z.toFixed(2)),
                        r: Number(pivot.rotation.y.toFixed(2)),
                        t: Date.now() // Метка времени
                    });
                }
            }, 40);

            // Удаление пропавших (через 3 секунды)
            setInterval(() => {
                const now = Date.now();
                for(let id in otherPlayers) {
                    if(now - otherPlayers[id].lastUpdate > 3000) {
                        scene.remove(otherPlayers[id].mesh);
                        delete otherPlayers[id];
                    }
                }
            }, 1000);
        }

        function syncPlayer(id, data) {
            if(!scene) return;

            if(!otherPlayers[id]) {
                const geometry = new THREE.BoxGeometry(1, 2, 1);
                const material = new THREE.MeshStandardMaterial({color: 0x00ffff});
                const m = new THREE.Mesh(geometry, material);
                m.position.y = 1;
                scene.add(m);
                otherPlayers[id] = { mesh: m, lastUpdate: Date.now() };
            }
            
            // Если данные новые, двигаем куб
            if(data.t > otherPlayers[id].lastUpdate) {
                otherPlayers[id].mesh.position.set(data.x, data.y, data.z);
                otherPlayers[id].mesh.rotation.y = data.r;
                otherPlayers[id].lastUpdate = data.t;
            }
        }

        startBtn.onclick = () => {
            const nick = document.getElementById('nick-input').value.trim();
            if(!nick) return alert("ВВЕДИ НИК!");
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            initGame();
            initNet(nick);
        };

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x110011);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            pivot = new THREE.Group();
            scene.add(pivot);

            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0xff00ff}));
            body.position.y = 1;
            playerModel = new THREE.Group(); 
            playerModel.add(body);
            scene.add(playerModel);

            controls = new PointerLockControls(pivot, document.body);
            document.body.addEventListener('click', () => controls.lock());

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            scene.add(new THREE.GridHelper(200, 50, 0xff00ff, 0x330033));

            window.onkeydown = (e) => { 
                if(e.code === 'KeyW') moveForward = true; 
                if(e.code === 'KeyS') moveBackward = true; 
                if(e.code === 'KeyA') moveLeft = true; 
                if(e.code === 'KeyD') moveRight = true; 
            };
            window.onkeyup = (e) => { 
                if(e.code === 'KeyW') moveForward = false; 
                if(e.code === 'KeyS') moveBackward = false; 
                if(e.code === 'KeyA') moveLeft = false; 
                if(e.code === 'KeyD') moveRight = false; 
            };

            gameReady = true;

            function animate() {
                requestAnimationFrame(animate);
                if (controls.isLocked) {
                    const speed = 0.2;
                    if (moveForward) controls.moveForward(speed);
                    if (moveBackward) controls.moveForward(-speed);
                    if (moveLeft) controls.moveRight(-speed);
                    if (moveRight) controls.moveRight(speed);
                    
                    playerModel.position.copy(pivot.position);
                    playerModel.rotation.y = pivot.rotation.y;
                    
                    const camPos = new THREE.Vector3(0, 5, 10).applyMatrix4(pivot.matrixWorld);
                    camera.position.lerp(camPos, 0.1);
                    camera.lookAt(pivot.position.x, pivot.position.y + 1, pivot.position.z);
                }
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
