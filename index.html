<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DanBlox - Pro Tycoon</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #menu { position: absolute; width: 100%; height: 100%; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #000; }
        .window { background: #111; padding: 30px; border: 3px solid #00ff00; border-radius: 20px; text-align: center; color: #fff; }
        input { padding: 12px; margin: 10px; width: 250px; background: #222; color: #0f0; border: 1px solid #0f0; outline: none; }
        button { padding: 12px 30px; background: #0f0; color: #000; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        
        #sidebar { position: absolute; right: 10px; top: 10px; bottom: 10px; width: 260px; z-index: 500; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .panel { background: rgba(0, 0, 0, 0.8); border: 2px solid #00ff00; border-radius: 10px; padding: 10px; color: #0f0; pointer-events: auto; }
        #player-list { max-height: 100px; overflow-y: auto; font-size: 14px; border-bottom: 1px solid #0f03; }
        #chat-messages { height: 200px; overflow-y: auto; font-size: 13px; color: #fff; margin-bottom: 5px; }
        
        #stats-ui { position: absolute; top: 10px; left: 10px; font-size: 24px; font-weight: bold; color: #0f0; text-shadow: 2px 2px #000; }
        #buy-ui, #sell-ui { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); display: none; z-index: 600; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="stats-ui" class="hidden">CASH: <span id="cash-val">25</span>$</div>

    <div id="menu">
        <div class="window">
            <h1 style="color: #0f0;">DANBLOX TYCOON</h1>
            <input type="text" id="nick-input" placeholder="НИК (ENG)..." maxlength="12"><br>
            <p>Стартовый баланс: 25$</p>
            <button id="start-btn">ВОЙТИ В ИГРУ</button>
        </div>
    </div>

    <div id="buy-ui" class="panel">
        <div id="buy-text">КУПИТЬ РОБОТА</div>
        <button id="buy-btn">КУПИТЬ (E)</button>
    </div>

    <div id="sell-ui" class="panel">
        <button id="sell-btn" style="background: #ff4444;">ПРОДАТЬ РОБОТА (R)</button>
    </div>

    <div id="sidebar" class="hidden">
        <div class="panel">
            <b>ИГРОКИ: <span id="online-count">0</span></b>
            <div id="player-list"></div>
        </div>
        <div class="panel">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" style="width:90%; background:#222; border:1px solid #0f0; color:#fff;" placeholder="Чат...">
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f",
            storageBucket: "danblox-e209f.firebasestorage.app",
            messagingSenderId: "828099060847",
            appId: "1:828099060847:web:9bb0bebc8c02833ce7d99a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const playersRef = db.ref('players');
        const chatRef = db.ref('chat');

        let scene, camera, renderer, controls, pivot, myModel;
        let myID = 'u' + Math.floor(Math.random() * 1000000);
        let myNick, myCash = 25, otherPlayers = {}, otherBases = {}, robots = [];
        let moveF = false, moveB = false, moveL = false, moveR = false, canJump = true, velocity = new THREE.Vector3();
        let myBasePos = { x: 0, z: 0 }, myBaseObj = null;
        let currentNearBot = null, currentNearOwnedBot = null;
        
        const BOT_TYPES = {
            blue: { color: 0x00aaff, price: 25, income: 1, name: "Обычный" },
            green: { color: 0x00ff00, price: 100, income: 5, name: "Продвинутый" },
            red: { color: 0xff0000, price: 250, income: 10, name: "Элитный" },
            purple: { color: 0xaa00ff, price: 500, income: 20, name: "Ультра" }
        };

        function createNickLabel(text, color = '#0f0') {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            ctx.font = 'bold 28px Arial';
            ctx.fillStyle = color; ctx.textAlign = 'center';
            ctx.fillText(text, 128, 45);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            sprite.scale.set(3, 0.75, 1);
            return sprite;
        }

        function createHuman(color, nick) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6), mat); head.position.y = 1.6; group.add(head);
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8,1,0.4), mat); body.position.y = 0.8; group.add(body);
            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), mat); legL.position.set(-0.25,0,0); group.add(legL);
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), mat); legR.position.set(0.25,0,0); group.add(legR);
            const label = createNickLabel(nick, '#fff'); label.position.y = 2.5; group.add(label);
            return group;
        }

        function createBase(nick, pos) {
            const group = new THREE.Group(); group.position.set(pos.x, 0, pos.z);
            const floor = new THREE.Mesh(new THREE.BoxGeometry(20, 0.2, 20), new THREE.MeshStandardMaterial({color: 0x333333}));
            group.add(floor);
            
            // 5 Слотов для роботов
            const slots = [];
            for(let i=0; i<5; i++) {
                const slot = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 3), new THREE.MeshStandardMaterial({color: 0x444}));
                slot.position.set(-6 + (i*3), 0.2, -5);
                group.add(slot);
                slots.push({ pos: new THREE.Vector3(pos.x - 6 + (i*3), 0, pos.z - 5), occupied: false, bot: null });
            }

            const sign = createNickLabel("BASE: " + nick); sign.position.set(0, 5, 0); group.add(sign);
            scene.add(group);
            return { group, slots };
        }

        function initNet(nick) {
            myNick = nick;
            playersRef.once('value', (snap) => {
                let startPos = { x: (Math.random()-0.5)*200, z: (Math.random()-0.5)*200 };
                myBasePos = startPos;
                myModel = createHuman(0x00ff00, myNick); scene.add(myModel);
                myBaseObj = createBase(myNick, myBasePos);
                pivot.position.set(myBasePos.x, 0, myBasePos.z + 12);
            });

            playersRef.on('value', (snap) => {
                const data = snap.val() || {};
                const pList = document.getElementById('player-list');
                pList.innerHTML = '';
                Object.keys(data).forEach(id => {
                    pList.innerHTML += `<div>${data[id].nick}: ${data[id].cash}$</div>`;
                    if(id === myID) return;
                    if(!otherPlayers[id]) {
                        otherPlayers[id] = createHuman(0x0088ff, data[id].nick); scene.add(otherPlayers[id]);
                        otherBases[id] = createBase(data[id].nick, data[id].basePos);
                    }
                    otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
                });
                document.getElementById('online-count').innerText = Object.keys(data).length;
            });

            chatRef.limitToLast(10).on('child_added', s => {
                const m = s.val();
                const box = document.getElementById('chat-messages');
                box.innerHTML += `<div><b>${m.u}:</b> ${m.t}</div>`;
                box.scrollTop = box.scrollHeight;
            });
            playersRef.child(myID).onDisconnect().remove();

            // Доход от роботов каждую секунду
            setInterval(() => {
                let income = 0;
                myBaseObj.slots.forEach(s => { if(s.bot) income += s.bot.income; });
                if(income > 0) {
                    myCash += income;
                    document.getElementById('cash-val').innerText = myCash;
                }
            }, 1000);
        }

        function initGame() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000,1000), new THREE.MeshStandardMaterial({color:0x1a5e1a}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);
            
            const road = new THREE.Mesh(new THREE.PlaneGeometry(12, 1000), new THREE.MeshBasicMaterial({color: 0xcc0000}));
            road.rotation.x = -Math.PI/2; road.position.y = 0.02; scene.add(road);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            pivot = new THREE.Group(); scene.add(pivot);
            controls = new PointerLockControls(pivot, document.body);
            document.body.addEventListener('click', () => { if(!document.activeElement.id.includes('chat')) controls.lock(); });

            // Спавн роботов разных типов
            setInterval(() => {
                const keys = Object.keys(BOT_TYPES);
                const typeKey = keys[Math.floor(Math.random() * keys.length)];
                const config = BOT_TYPES[typeKey];
                
                const bot = createHuman(config.color, config.name, true);
                bot.position.set(0, 0, -300);
                bot.config = config;
                bot.income = config.income;
                bot.targetSlot = null;
                scene.add(bot);
                robots.push(bot);
            }, 7000);

            window.onkeydown = (e) => {
                if(document.activeElement.id==='chat-input') return;
                if(e.code==='KeyW') moveF=true; if(e.code==='KeyS') moveB=true;
                if(e.code==='KeyA') moveL=true; if(e.code==='KeyD') moveR=true;
                if(e.code==='Space' && canJump) { velocity.y = 0.25; canJump = false; }
                
                // Покупка
                if(e.code==='KeyE' && currentNearBot) {
                    const slot = myBaseObj.slots.find(s => !s.occupied);
                    if(slot && myCash >= currentNearBot.config.price) {
                        myCash -= currentNearBot.config.price;
                        document.getElementById('cash-val').innerText = myCash;
                        slot.occupied = true;
                        slot.bot = currentNearBot;
                        currentNearBot.targetSlot = slot;
                        document.getElementById('buy-ui').style.display = 'none';
                    }
                }
                // Продажа
                if(e.code==='KeyR' && currentNearOwnedBot) {
                    const slot = myBaseObj.slots.find(s => s.bot === currentNearOwnedBot);
                    if(slot) {
                        myCash += Math.floor(currentNearOwnedBot.config.price / 2);
                        document.getElementById('cash-val').innerText = myCash;
                        scene.remove(currentNearOwnedBot);
                        slot.occupied = false;
                        slot.bot = null;
                        document.getElementById('sell-ui').style.display = 'none';
                    }
                }
            };
            window.onkeyup = (e) => {
                if(e.code==='KeyW') moveF=false; if(e.code==='KeyS') moveB=false;
                if(e.code==='KeyA') moveL=false; if(e.code==='KeyD') moveR=false;
            };

            document.getElementById('chat-input').onkeydown = (e) => {
                if(e.code==='Enter' && e.target.value.trim()){
                    chatRef.push({ u: myNick, t: e.target.value }); e.target.value = '';
                }
            };

            function animate() {
                requestAnimationFrame(animate);
                if(controls.isLocked) {
                    if(moveF) controls.moveForward(0.2); if(moveB) controls.moveForward(-0.2);
                    if(moveL) controls.moveRight(-0.2); if(moveR) controls.moveRight(0.2);
                    pivot.position.y += velocity.y;
                    if(pivot.position.y > 0) velocity.y -= 0.01; else { pivot.position.y=0; canJump=true; velocity.y=0; }
                    
                    if(myModel) {
                        myModel.position.copy(pivot.position);
                        myModel.rotation.y = pivot.rotation.y;
                        playersRef.child(myID).set({
                            x: pivot.position.x, y: pivot.position.y, z: pivot.position.z,
                            r: pivot.rotation.y, nick: myNick, cash: myCash, basePos: myBasePos
                        });
                    }

                    document.getElementById('buy-ui').style.display = 'none';
                    document.getElementById('sell-ui').style.display = 'none';
                    currentNearBot = null;
                    currentNearOwnedBot = null;

                    robots.forEach((bot, i) => {
                        if(!bot.targetSlot) {
                            bot.position.z += 0.25; // Уменьшенная скорость
                            if(bot.position.z > 300) { scene.remove(bot); robots.splice(i,1); }
                            if(pivot.position.distanceTo(bot.position) < 6) {
                                document.getElementById('buy-text').innerText = `${bot.config.name}: ${bot.config.price}$`;
                                document.getElementById('buy-ui').style.display = 'block';
                                currentNearBot = bot;
                            }
                        } else {
                            bot.position.lerp(bot.targetSlot.pos, 0.05);
                            // Проверка на близость к своему роботу для продажи
                            if(pivot.position.distanceTo(bot.position) < 4) {
                                document.getElementById('sell-ui').style.display = 'block';
                                currentNearOwnedBot = bot;
                            }
                        }
                    });
                }
                const cPos = new THREE.Vector3(0, 8, 15).applyMatrix4(pivot.matrixWorld);
                camera.position.lerp(cPos, 0.1); camera.lookAt(pivot.position.x, pivot.position.y+1, pivot.position.z);
                renderer.render(scene, camera);
            }
            animate();
        }

        document.getElementById('start-btn').onclick = () => {
            const n = document.getElementById('nick-input').value.trim();
            if(!n) return;
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('stats-ui').classList.remove('hidden');
            initGame(); initNet(n);
        };
    </script>
</body>
</html>
