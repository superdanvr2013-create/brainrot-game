<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тест: Легенда канала Dan Games | Супертест</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0e17 0%, #141b2a 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        .quiz-container {
            max-width: 980px;
            width: 100%;
            background: rgba(15, 19, 30, 0.92);
            backdrop-filter: blur(3px);
            border-radius: 2.5rem;
            box-shadow: 0 30px 55px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 210, 90, 0.25);
            overflow: hidden;
            transition: all 0.2s;
        }

        .quiz-header {
            background: linear-gradient(135deg, #281f3c 0%, #1a263b 100%);
            padding: 1.6rem 2rem;
            text-align: center;
            border-bottom: 3px solid #ffb347;
        }

        .quiz-header h1 {
            font-size: 2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFE5B4, #FFA042);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }

        .youtube-link {
            display: inline-block;
            margin-top: 8px;
            font-size: 1rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 20px;
            border-radius: 60px;
            text-decoration: none;
            color: #FFD966;
            transition: 0.2s;
            backdrop-filter: blur(4px);
            border: 1px solid #ffbc6eaa;
        }

        .youtube-link:hover {
            background: #ff5722dd;
            color: white;
            border-color: #ffdd99;
            transform: scale(1.02);
        }

        .questions-area {
            padding: 2rem 2rem 1rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .question-card {
            background: rgba(10, 14, 23, 0.7);
            border-radius: 1.8rem;
            padding: 1.3rem 1.6rem;
            border: 1px solid rgba(255, 180, 70, 0.35);
            transition: 0.2s;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fae9c2;
            margin-bottom: 1.2rem;
            border-left: 5px solid #ffaa44;
            padding-left: 1rem;
            line-height: 1.3;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            list-style: none;
        }

        .option-item {
            display: flex;
            align-items: center;
            background: #0f151f;
            border-radius: 3rem;
            border: 1px solid #2c354d;
            transition: all 0.2s;
            cursor: pointer;
            padding: 0.7rem 1.2rem;
        }

        .option-item:hover {
            background: #192237;
            border-color: #f5a742;
            transform: translateX(4px);
        }

        .option-item input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #8f9bb3;
            border-radius: 50%;
            margin-right: 1rem;
            background: #0b0f18;
            transition: 0.1s;
            cursor: pointer;
        }

        .option-item input[type="radio"]:checked {
            border-color: #ffaa44;
            background-color: #ffaa44;
            box-shadow: 0 0 0 3px rgba(255, 170, 68, 0.3);
        }

        .option-item input[type="radio"]:checked::after {
            content: "";
            display: block;
            width: 0.55rem;
            height: 0.55rem;
            background: #141b2a;
            border-radius: 50%;
            margin: 0.27rem auto;
        }

        .option-label {
            font-size: 1.05rem;
            font-weight: 500;
            color: #eef3ff;
            cursor: pointer;
            flex: 1;
        }

        .action-section {
            padding: 0.5rem 2rem 1.8rem;
            display: flex;
            justify-content: center;
        }

        .check-btn {
            background: linear-gradient(95deg, #FF9F3D, #FF6F2A);
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            color: #181c2c;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            box-shadow: 0 5px 0 #923e0c;
            transform: translateY(-2px);
            width: 100%;
            max-width: 300px;
            letter-spacing: 1px;
        }

        .check-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #923e0c;
        }

        .result-area {
            margin: 0 2rem 2rem 2rem;
            background: #03050ccc;
            border-radius: 1.8rem;
            padding: 1rem 1.8rem;
            backdrop-filter: blur(6px);
            border: 1px solid #ffcb7e;
            transition: 0.2s;
            text-align: center;
        }

        .result-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: #FFE2A4;
            line-height: 1.4;
        }

        .result-detail {
            font-size: 0.95rem;
            color: #c7d2ff;
            margin-top: 8px;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 0.9rem;
            color: #6a7a9e;
            border-top: 1px solid #2a3148;
            margin-top: 0.3rem;
        }

        @media (max-width: 650px) {
            .quiz-container {
                border-radius: 1.8rem;
            }
            .question-text {
                font-size: 1.2rem;
            }
            .option-label {
                font-size: 0.9rem;
            }
            .questions-area {
                padding: 1.2rem;
            }
            .result-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-header">
        <h1>🎮 ТЕСТ: ЛЕГЕНДА DAN GAMES 🎮</h1>
        <a href="https://www.youtube.com/@superdan8459/featured" target="_blank" class="youtube-link" rel="noopener noreferrer">
            📺 проверь, насколько ты хорошо знаешь историю канала 📺
        </a>
    </div>

    <div class="questions-area" id="questionsArea"></div>

    <div class="action-section">
        <button class="check-btn" id="submitQuiz">🔥 ПРОВЕРИТЬ ЗНАНИЯ 🔥</button>
    </div>

    <div class="result-area" id="resultArea" style="display: none;">
        <div class="result-text" id="resultMessage"></div>
        <div class="result-detail" id="resultDetail">⭐ Ты можешь пройти тест заново и улучшить результат ⭐</div>
    </div>
    <footer>
        💡 7 вопросов о легенде Dan Games. Только один вариант верный. Удачи!
    </footer>
</div>

<script>
    // ---------- ПОЛНАЯ БАЗА: 7 ВОПРОСОВ (с двумя новыми) ----------
    const quizData = [
        {
            id: 1,
            question: "С какой игры в роблоксе Dan Games начал свою карьеру?",
            options: ["Doors", "Paradox", "Steal A Brainrot", "Toilet Tower Defense"],
            correct: "Toilet Tower Defense"
        },
        {
            id: 2,
            question: "Какой был канал у Dan кроме Dan Games и NoobikCraft?",
            options: ["NoobikDan", "МегаДэн", "Мега Нубик", "DanTop"],
            correct: "Мега Нубик"
        },
        {
            id: 3,
            question: "Кто самый первый подписчик на канале?",
            options: ["Марк", "Оливер", "Игран", "Ртролик"],
            correct: "Игран"
        },
        {
            id: 4,
            question: "Как зовут Dan Games в реальной жизни?",
            options: ["Денис", "Дима", "Даня", "Давид"],
            correct: "Даня"
        },
        {
            id: 5,
            question: "Нравился ли мне Grow A Garden (оригинальная версия) когда он только появился?",
            options: [
                "Да очень нравился он прикольный!",
                "Не совсем но ближе всего к нравился",
                "почти вообще не нравился dan games старался не играть особо в эту игру"
            ],
            correct: "почти вообще не нравился dan games старался не играть особо в эту игру"
        },
        {
            id: 6,
            question: "Какой скин был у Dan Games когда он играл в ttd?",
            options: ["такой же как сейчас", "бекон", "ниндзя", "Элитный КлокМен"],
            correct: "Элитный КлокМен"
        },
        {
            id: 7,
            question: "Какой ник был у моего второго аккаунта в roblox когда я играл в ttd?",
            options: ["DanVR2013_2", "xxx_secretagent", "DanVR2013_Dev", "DanVRGames2"],
            correct: "xxx_secretagent"
        }
    ];

    // Хранилище выбранных ответов
    let userAnswers = {
        1: null, 2: null, 3: null, 4: null, 5: null, 6: null, 7: null
    };

    let submitted = false;
    const questionsContainer = document.getElementById('questionsArea');
    const submitBtn = document.getElementById('submitQuiz');
    const resultArea = document.getElementById('resultArea');
    const resultMessageSpan = document.getElementById('resultMessage');
    const resultDetailSpan = document.getElementById('resultDetail');

    // Отрисовка всех вопросов
    function renderQuestions() {
        questionsContainer.innerHTML = '';
        quizData.forEach(item => {
            const qCard = document.createElement('div');
            qCard.className = 'question-card';
            qCard.setAttribute('data-qid', item.id);

            const questionTitle = document.createElement('div');
            questionTitle.className = 'question-text';
            questionTitle.innerText = `${item.id}. ${item.question}`;
            qCard.appendChild(questionTitle);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            item.options.forEach(opt => {
                const li = document.createElement('li');
                li.className = 'option-item';
                li.setAttribute('data-qid', item.id);
                li.setAttribute('data-opt-value', opt);

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${item.id}`;
                radio.value = opt;
                // чуть уникальный id, убираем спецсимволы
                const safeOpt = opt.replace(/[^a-zA-Zа-яА-Я0-9]/g, '_');
                radio.id = `q${item.id}_${safeOpt.substring(0, 30)}`;

                if (userAnswers[item.id] === opt) {
                    radio.checked = true;
                }

                const label = document.createElement('label');
                label.htmlFor = radio.id;
                label.className = 'option-label';
                label.innerText = opt;

                li.appendChild(radio);
                li.appendChild(label);

                // клик по li выбирает радио и сбрасывает подсветку/режим
                li.addEventListener('click', (e) => {
                    if (submitted) {
                        resetToActiveMode();
                    }
                    radio.checked = true;
                    userAnswers[item.id] = opt;
                    clearHighlightForQuestion(item.id);
                    if (submitted === true) {
                        submitted = false;
                        resultArea.style.display = 'none';
                    }
                });

                radio.addEventListener('change', () => {
                    if (submitted) {
                        resetToActiveMode();
                    }
                    userAnswers[item.id] = opt;
                    clearHighlightForQuestion(item.id);
                    if (submitted) {
                        submitted = false;
                        resultArea.style.display = 'none';
                    }
                });

                optionsList.appendChild(li);
            });
            qCard.appendChild(optionsList);
            questionsContainer.appendChild(qCard);
        });
    }

    // Сбросить режим проверки (скрыть результат, убрать все визуальные классы)
    function resetToActiveMode() {
        submitted = false;
        resultArea.style.display = 'none';
        const allOptions = document.querySelectorAll('.option-item');
        allOptions.forEach(opt => {
            opt.classList.remove('correct-highlight', 'wrong-highlight');
        });
    }

    function clearHighlightForQuestion(qid) {
        const optsForQuestion = document.querySelectorAll(`.option-item[data-qid='${qid}']`);
        optsForQuestion.forEach(opt => {
            opt.classList.remove('correct-highlight', 'wrong-highlight');
        });
    }

    // Главная проверка: только подсчёт баллов и вывод фразы (без раскрытия правильных ответов)
    function checkAnswersAndShowMessage() {
        // синхронизируем ответы с радиокнопками
        for (let q of quizData) {
            const selectedRadio = document.querySelector(`input[name='q${q.id}']:checked`);
            if (selectedRadio) {
                userAnswers[q.id] = selectedRadio.value;
            } else {
                userAnswers[q.id] = null;
            }
        }

        // проверяем, что все вопросы отвечены
        let allAnswered = true;
        for (let q of quizData) {
            if (!userAnswers[q.id]) {
                allAnswered = false;
                break;
            }
        }

        if (!allAnswered) {
            resultArea.style.display = 'block';
            resultMessageSpan.innerHTML = "❓ НЕ ВСЕ ВОПРОСЫ ОТМЕЧЕНЫ ❓";
            resultDetailSpan.innerHTML = "Пожалуйста, выбери вариант на каждый из 7 вопросов, чтобы узнать результат!";
            return;
        }

        // считаем количество правильных
        let correctCount = 0;
        for (let q of quizData) {
            const userAnsNorm = userAnswers[q.id]?.trim().toLowerCase();
            const correctNorm = q.correct.trim().toLowerCase();
            if (userAnsNorm === correctNorm) {
                correctCount++;
            }
        }

        const total = quizData.length; // total = 7

        // Убираем любую подсветку (полное соответствие условию "не показывай правильные ответы")
        const allOptionsElements = document.querySelectorAll('.option-item');
        allOptionsElements.forEach(opt => {
            opt.classList.remove('correct-highlight', 'wrong-highlight');
        });

        // Генерация финального сообщения в зависимости от количества правильных ответов (адаптируем под 7 вопросов)
        let message = "";
        let subMessage = "";

        if (correctCount === 0) {
            message = "😭 ты вообще не знаешь блогера Dan Games! 😭";
            subMessage = "Пересмотри побольше роликов и возвращайся! 💪";
        }
        else if (correctCount === 2) {
            message = "📺 Не очень, ты не легенда но частично знаешь Dan Games! 📺";
            subMessage = `У тебя ${correctCount} из ${total} правильных. Нужно подтянуть историю канала!`;
        }
        else if (correctCount === 3) {
            message = "⚡ Йоу! ты почти легенда но немного не хватает! ⚡";
            subMessage = `${correctCount}/${total} верных. Ещё немного — и ты станешь настоящим знатоком!`;
        }
        else if (correctCount === 4) {
            message = "🎈 Красава! ты частично легенда! хорошие результаты! 🎈";
            subMessage = `Поздравляю! ${correctCount} из ${total}. Ты хорошо знаешь Dan Games!`;
        }
        else if (correctCount === 5) {
            message = "🎉 Отлично! Ты серьёзно шаришь за Dan Games, почти легенда! 🎉";
            subMessage = `${correctCount}/${total} правильных. Осталось всего немного до идеала!`;
        }
        else if (correctCount === 6) {
            message = "🏆 Вау! Ты настоящий фанат! Один шаг до абсолютной легенды! 🏆";
            subMessage = `У тебя ${correctCount} верных ответов из ${total}. Ты невероятно близок!`;
        }
        else if (correctCount === total) {
            message = "🔥🔥🔥 ЙОООУ! КРАСАВА! ТЫ НАСТОЯЩИЙ ЛЕГЕНДА КАНАЛА! 🔥🔥🔥";
            subMessage = "Идеальный результат! Твоё уважение к Dan Games безгранично! Ты — легенда!";
        }
        else {
            // для 1 правильного:
            if (correctCount === 1) {
                message = "😕 Пока слабовато, ты только начинаешь путь легенды!";
                subMessage = `Всего ${correctCount} верный ответ. Посмотри больше контента Dan Games!`;
            } else {
                message = `🤔 Результат: ${correctCount} из ${total}. Углубляй знания о Dan Games!`;
                subMessage = "Пройди тест ещё раз, чтобы стать легендой!";
            }
        }

        // отображаем панель результата
        resultArea.style.display = 'block';
        resultMessageSpan.innerHTML = message;
        resultDetailSpan.innerHTML = subMessage;

        submitted = true;
    }

    // обработчик на кнопку проверки
    submitBtn.addEventListener('click', () => {
        // если был режим проверки - сбрасываем подсветку, но перед новой проверкой обновим
        if (submitted) {
            resetToActiveMode();
        }
        // пересинхронизируем ответы
        for (let q of quizData) {
            const selectedRadio = document.querySelector(`input[name='q${q.id}']:checked`);
            if (selectedRadio) {
                userAnswers[q.id] = selectedRadio.value;
            } else {
                userAnswers[q.id] = null;
            }
        }
        checkAnswersAndShowMessage();
    });

    // сброс режима при любом новом выборе после проверки
    function bindResetEvents() {
        questionsContainer.addEventListener('click', (e) => {
            const targetItem = e.target.closest('.option-item');
            if (targetItem && submitted) {
                resetToActiveMode();
            }
        });
        questionsContainer.addEventListener('change', (e) => {
            if (e.target && e.target.type === 'radio' && submitted) {
                resetToActiveMode();
            }
        });
    }

    // инициализация
    renderQuestions();
    bindResetEvents();
</script>
</body>
</html>
