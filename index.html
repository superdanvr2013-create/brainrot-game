<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox - PVP Arena</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #87CEEB; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1000; background: rgba(0,0,0,0.8); }
        .window { background: #fff; padding: 30px; border-radius: 20px; border: 5px solid #f00; text-align: center; }
        
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 100; pointer-events: none; }
        .bar { width: 200px; height: 25px; border: 2px solid #000; background: #555; margin: 5px 0; pointer-events: auto; }
        #hp-bar { background: #ff3333; width: 100%; height: 100%; transition: 0.3s; }
        #stamina-bar { background: #ffeb3b; width: 100%; height: 100%; transition: 0.1s; }

        #player-list { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #0f0; padding: 10px; border-radius: 10px; font-weight: bold; min-width: 150px; }
        
        #mobile-controls { position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: repeat(3, 60px); gap: 5px; pointer-events: auto; }
        .m-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.3); border: 2px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; }
        #action-btns { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 10px; }
        .action-circle { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 20px; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="window">
            <h1>DANBLOX PVP</h1>
            <input type="text" id="nick-input" placeholder="ТВОЙ НИК..." maxlength="10" style="padding:10px; font-size:20px; text-align:center;"><br><br>
            <button onclick="startGame()" style="padding:15px 40px; font-size:20px; background:#f00; color:#fff; border:none; border-radius:10px; cursor:pointer;">ИГРАТЬ!</button>
        </div>
    </div>

    <div id="ui-layer" class="hidden">
        <div style="color:white; font-weight:bold;">ЗДОРОВЬЕ:</div>
        <div class="bar"><div id="hp-bar"></div></div>
        <div style="color:white; font-weight:bold;">ЭНЕРГИЯ (SHIFT):</div>
        <div class="bar"><div id="stamina-bar"></div></div>
        <div id="player-list"></div>
    </div>

    <div id="mobile-controls" class="hidden">
        <div></div><div class="m-btn" id="btn-w">W</div><div></div>
        <div class="m-btn" id="btn-a">A</div><div class="m-btn" id="btn-s">S</div><div class="m-btn" id="btn-d">D</div>
    </div>

    <div id="action-btns" class="hidden">
        <div class="action-circle" style="background:#ff9800; width:60px; height:60px;" id="btn-shift">SHIFT</div>
        <div class="action-circle" style="background:#f44336;" id="btn-e">АТАКА</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Конфиг Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f",
            storageBucket: "danblox-e209f.firebasestorage.app",
            messagingSenderId: "828099060847",
            appId: "1:828099060847:web:9bb0bebc8c02833ce7d99a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let scene, camera, renderer, myModel;
        let myID = 'u' + Math.floor(Math.random() * 1000000);
        let myNick = "", myHP = 100, myStamina = 100, isSprinting = false;
        let otherPlayers = {}, moveState = { f: false, b: false, l: false, r: false };
        
        // Переменные для TPS камеры
        let cameraDist = 10, cameraAzimuth = 0, cameraElevation = 0.5;
        let isRightMouseDown = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(50, 100, 50);
            sun.castShadow = true;
            scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));

            // КРАСИВАЯ КАРТА
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x2e7d32}));
            ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(10, 500), new THREE.MeshStandardMaterial({color: 0xd32f2f}));
            road.rotation.x = -Math.PI / 2; road.position.y = 0.05; scene.add(road);

            // Модель нашего игрока
            myModel = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.5), new THREE.MeshStandardMaterial({color: 0x2196f3}));
            body.position.y = 1; body.castShadow = true; myModel.add(body);
            scene.add(myModel);

            // СЕТЬ
            db.ref('players/' + myID).onDisconnect().remove();
            db.ref('players').on('value', snap => {
                const data = snap.val() || {};
                const list = document.getElementById('player-list');
                list.innerHTML = 'ОНЛАЙН:<br>';
                
                Object.keys(data).forEach(id => {
                    const hpDisplay = data[id].hp !== undefined ? data[id].hp : 100;
                    list.innerHTML += `${data[id].n}: ${hpDisplay} HP<br>`;

                    if (id !== myID) {
                        if (!otherPlayers[id]) {
                            const group = new THREE.Group();
                            const b = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.5), new THREE.MeshStandardMaterial({color: 0xf44336}));
                            b.position.y = 1; group.add(b); scene.add(group);
                            otherPlayers[id] = group;
                        }
                        otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
                        otherPlayers[id].visible = (hpDisplay > 0);
                    } else if (data[id].hp < myHP) {
                        myHP = data[id].hp;
                        if(myHP <= 0) respawn();
                    }
                });
            });

            // Управление камерой (Мышь)
            window.addEventListener('mousedown', (e) => { if(e.button === 2) isRightMouseDown = true; });
            window.addEventListener('mouseup', () => isRightMouseDown = false);
            window.addEventListener('mousemove', (e) => {
                if(isRightMouseDown) {
                    cameraAzimuth -= e.movementX * 0.01;
                    cameraElevation = Math.max(0.1, Math.min(1.4, cameraElevation + e.movementY * 0.01));
                }
            });
            window.addEventListener('wheel', (e) => {
                cameraDist = Math.max(5, Math.min(30, cameraDist + e.deltaY * 0.02));
            });

            animate();
        }

        function respawn() {
            alert("ТЫ ПОГИБ!");
            myHP = 100;
            myModel.position.set((Math.random()-0.5)*20, 0, (Math.random()-0.5)*20);
            db.ref('players/' + myID).update({hp: 100});
        }

        function attack() {
            Object.keys(otherPlayers).forEach(id => {
                if(otherPlayers[id].visible && myModel.position.distanceTo(otherPlayers[id].position) < 4) {
                    db.ref('players/' + id + '/hp').transaction(h => (h || 100) - 10);
                }
            });
            // Анимация наклона при ударе
            myModel.rotation.x = 0.3; setTimeout(() => myModel.rotation.x = 0, 100);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!myModel) return;

            let speed = (isSprinting && myStamina > 0) ? 0.4 : 0.15;
            if (isSprinting && myStamina > 0) myStamina -= 0.5; else if(myStamina < 100) myStamina += 0.3;

            const dir = new THREE.Vector3();
            if (moveState.f) dir.z -= 1; if (moveState.b) dir.z += 1;
            if (moveState.l) dir.x -= 1; if (moveState.r) dir.x += 1;

            if (dir.length() > 0) {
                dir.applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraAzimuth);
                myModel.position.add(dir.normalize().multiplyScalar(speed));
                myModel.rotation.y = Math.atan2(dir.x, dir.z);
            }

            // Обновление TPS камеры
            camera.position.x = myModel.position.x + cameraDist * Math.sin(cameraAzimuth) * Math.cos(cameraElevation);
            camera.position.y = myModel.position.y + cameraDist * Math.sin(cameraElevation) + 2;
            camera.position.z = myModel.position.z + cameraDist * Math.cos(cameraAzimuth) * Math.cos(cameraElevation);
            camera.lookAt(myModel.position.x, myModel.position.y + 1, myModel.position.z);

            document.getElementById('hp-bar').style.width = myHP + "%";
            document.getElementById('stamina-bar').style.width = myStamina + "%";

            db.ref('players/' + myID).update({
                x: myModel.position.x, y: myModel.position.y, z: myModel.position.z,
                n: myNick, hp: myHP
            });

            renderer.render(scene, camera);
        }

        // КНОПКИ
        window.startGame = () => {
            myNick = document.getElementById('nick-input').value || "Noob";
            document.getElementById('login-screen').classList.add('hidden');
            ['ui-layer', 'mobile-controls', 'action-btns'].forEach(id => document.getElementById(id).classList.remove('hidden'));
            init();
        };

        const handleKey = (c, v) => {
            if(c === 'KeyW') moveState.f = v; if(c === 'KeyS') moveState.b = v;
            if(c === 'KeyA') moveState.l = v; if(c === 'KeyD') moveState.r = v;
            if(c === 'ShiftLeft') isSprinting = v;
            if(c === 'KeyE' && v) attack();
        };

        window.onkeydown = (e) => handleKey(e.code, true);
        window.onkeyup = (e) => handleKey(e.code, false);
        window.oncontextmenu = (e) => e.preventDefault(); // Чтобы правая кнопка не открывала меню

        // Мобильное
        const bindMob = (id, key) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); moveState[key] = true; };
            el.ontouchend = () => moveState[key] = false;
        };
        bindMob('btn-w', 'f'); bindMob('btn-s', 'b'); bindMob('btn-a', 'l'); bindMob('btn-d', 'r');
        document.getElementById('btn-shift').ontouchstart = () => isSprinting = true;
        document.getElementById('btn-shift').ontouchend = () => isSprinting = false;
        document.getElementById('btn-e').onclick = attack;
    </script>
</body>
</html>
