<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanChat Ultimate v8.5 | DanVR2013 Official</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        /* CSS ARCHITECTURE - DANCHAT DESIGN SYSTEM
           Здесь описаны все переменные и стили оформления.
        */
        :root { 
            --bg-deep: #0b0d0f; 
            --bg-panel: #16191d; 
            --bg-active: #1e2329;
            --accent-main: #00ff88; 
            --accent-glow: rgba(0, 255, 136, 0.4);
            --text-white: #ffffff; 
            --text-gray: #8b949e;
            --side-width: 320px; 
            --color-danger: #ff4444; 
            --color-blue: #0078ff; 
            --color-warn: #ffcc00;
            --border-style: 1px solid #2d3239;
            --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* Общие параметры страницы */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body { 
            font-family: var(--font-main); 
            background: var(--bg-deep); 
            color: var(--text-white); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
            user-select: none;
        }

        /* Стилизация полосы прокрутки */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-main); }

        /* =========================================
           SIDEBAR - БОКОВАЯ ПАНЕЛЬ
           =========================================
        */
        #sidebar-container { 
            width: var(--side-width); 
            background: var(--bg-panel); 
            border-right: var(--border-style); 
            display: flex; 
            flex-direction: column; 
            z-index: 100;
            transition: 0.3s;
        }

        .sidebar-brand-zone { 
            padding: 20px; 
            background: #1c2127; 
            border-bottom: var(--border-style);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .user-identity { display: flex; align-items: center; gap: 12px; }

        .user-avatar-main { 
            width: 45px; 
            height: 45px; 
            border-radius: 12px; 
            object-fit: cover; 
            border: 2px solid var(--accent-main);
            box-shadow: 0 0 10px var(--accent-glow);
            cursor: pointer;
        }

        .nav-actions { display: flex; justify-content: space-between; align-items: center; }

        .action-icon { 
            font-size: 18px; 
            cursor: pointer; 
            opacity: 0.7; 
            transition: 0.2s; 
            padding: 8px;
            border-radius: 8px;
        }

        .action-icon:hover { opacity: 1; background: rgba(255,255,255,0.05); color: var(--accent-main); }

        #contacts-scroll-area { flex: 1; overflow-y: auto; }

        /* Элемент списка контактов */
        .contact-item { 
            padding: 15px 20px; 
            border-bottom: 1px solid #1f2329; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            transition: background 0.2s;
        }

        .contact-item:hover { background: #23282e; }
        .contact-item.active-chat { background: var(--bg-active); border-left: 4px solid var(--accent-main); }

        .av-wrapper { position: relative; width: 48px; height: 48px; }
        .av-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #000; border: 1px solid #333; }
        
        .indicator-dot { 
            position: absolute; 
            bottom: 2px; 
            right: 2px; 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            border: 2px solid var(--bg-panel); 
            background: #555; 
        }
        .indicator-dot.online { background: var(--accent-main); box-shadow: 0 0 5px var(--accent-main); }

        .contact-meta { flex: 1; min-width: 0; }
        .contact-meta b { display: block; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .contact-meta span { font-size: 11px; color: var(--text-gray); }

        /* =========================================
           CHAT MAIN AREA - ОСНОВНОЕ ОКНО
           =========================================
        */
        #chat-window { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #0f1216; 
            position: relative; 
        }

        .chat-top-bar { 
            height: 70px; 
            background: var(--bg-panel); 
            padding: 0 25px; 
            border-bottom: var(--border-style); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 50;
            cursor: pointer;
        }

        .chat-header-info b { font-size: 18px; letter-spacing: 0.5px; }
        .chat-header-info p { font-size: 11px; color: var(--accent-main); font-weight: bold; text-transform: uppercase; }

        .chat-btn-group { display: flex; gap: 15px; align-items: center; }

        #messages-view { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 22px; 
            /* Твоя аватарка как фон чата */
            background-image: linear-gradient(rgba(11, 13, 15, 0.94), rgba(11, 13, 15, 0.94)), url('https://i.postimg.cc/qR08VfPz/Dan-Chat.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Сообщения */
        .msg-container { display: flex; gap: 12px; max-width: 75%; animation: msgFade 0.3s ease-out; }
        .msg-container.my-msg { flex-direction: row-reverse; align-self: flex-end; }

        @keyframes msgFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-bubble { 
            padding: 12px 18px; 
            border-radius: 18px; 
            background: #252b32; 
            position: relative; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .my-msg .msg-bubble { background: var(--color-blue); border-bottom-right-radius: 4px; }
        .other-msg .msg-bubble { background: #1e2329; border-bottom-left-radius: 4px; }

        .msg-sender { font-size: 10px; font-weight: 900; margin-bottom: 5px; color: var(--accent-main); text-transform: uppercase; }
        .msg-text-node { font-size: 15px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
        .msg-time { font-size: 9px; opacity: 0.5; margin-top: 6px; display: block; text-align: right; }

        /* Ввод сообщения */
        #input-area { 
            background: var(--bg-panel); 
            padding: 15px 25px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-top: var(--border-style);
        }

        .input-field { 
            flex: 1; 
            padding: 14px 20px; 
            background: #0b0d0f; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 25px; 
            font-size: 15px; 
            transition: 0.2s;
        }

        .input-field:focus { border-color: var(--accent-main); box-shadow: 0 0 10px rgba(0, 255, 136, 0.1); }

        .btn-send { 
            background: var(--accent-main); 
            color: #000; 
            border: none; 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.3s;
        }

        .btn-send:hover { transform: scale(1.1) rotate(-10deg); box-shadow: 0 0 20px var(--accent-glow); }

        /* =========================================
           DANVOICE OVERLAY - ГОЛОСОВЫЕ ЗВОНКИ
           =========================================
        */
        #danvoice-overlay { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle, #1a2026 0%, #0b0d0f 100%); 
            z-index: 5000; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(10px);
        }

        .call-card { text-align: center; }

        .call-av-large { 
            width: 160px; 
            height: 160px; 
            border-radius: 50%; 
            border: 5px solid var(--accent-main); 
            margin-bottom: 25px; 
            object-fit: cover;
            animation: callPulse 1.5s infinite;
        }

        @keyframes callPulse { 
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.5); } 
            70% { box-shadow: 0 0 0 30px rgba(0, 255, 136, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } 
        }

        .call-controls { display: flex; gap: 35px; margin-top: 50px; }

        .btn-call { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            border: none; 
            cursor: pointer; 
            font-size: 28px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.3s;
        }

        .btn-hangup { background: var(--color-danger); color: white; }
        .btn-answer { background: var(--accent-main); color: black; }
        .btn-hangup:hover, .btn-answer:hover { transform: scale(1.15); }

        /* =========================================
           MODAL SYSTEM - ОКНА
           =========================================
        */
        .modal-shade { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 2000; 
            backdrop-filter: blur(6px);
        }

        .modal-body { 
            background: var(--bg-panel); 
            width: 420px; 
            padding: 35px; 
            border-radius: 25px; 
            border: 1px solid #444; 
            text-align: center; 
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .btn-submit { 
            width: 100%; 
            padding: 15px; 
            background: var(--accent-main); 
            border: none; 
            border-radius: 12px; 
            color: #000; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 20px; 
            transition: 0.3s;
        }

        .btn-submit:hover { letter-spacing: 1px; box-shadow: 0 0 15px var(--accent-glow); }

        .hidden { display: none !important; }

        /* Контекстное меню */
        #context-menu { 
            position: fixed; 
            background: #1e2329; 
            border: 1px solid #444; 
            border-radius: 12px; 
            display: none; 
            z-index: 10000; 
            min-width: 180px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
            overflow: hidden;
        }
        .ctx-item { padding: 12px 18px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #2d3239; transition: 0.2s; }
        .ctx-item:hover { background: var(--accent-main); color: #000; }

    </style>
</head>

    <script>
        /* =====================================================================================
           LOGIC ARCHITECTURE
           =====================================================================================
        */

        // 1. Инициализация Firebase
        const firebaseConfig = { 
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE", 
            authDomain: "danblox-e209f.firebaseapp.com", 
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com", 
            projectId: "danblox-e209f" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. Пути к ресурсам
        // Интегрированный путь к твоей аватарке
        const LOCAL_AV = "C:\\Users\\super\\Downloads\\DanChat ава.jpg";
        const CLOUD_AV = "https://i.postimg.cc/qR08VfPz/Dan-Chat.jpg";

        // Состояние приложения
        let currentUser = null;
        let activeID = 'global';
        let activePeer = '';
        let targetMsgID = null;
        let targetMsgData = null;
        let editMode = false;
        let replyData = null;
        let isCalling = false;

        /**
         * Проверка доступности изображения (для твоей локальной авы)
         */
        function getSafeAvatar(path) {
            // Если путь локальный (C:\), пытаемся вернуть его, если нет - облачный
            return path || CLOUD_AV;
        }

        /**
         * АВТОРИЗАЦИЯ И РЕГИСТРАЦИЯ
         */
        async function executeAuth() {
            const nick = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-password').value.trim();

            if(!nick || !pass) return alert("Пожалуйста, заполните все поля!");

            try {
                const userSnap = await db.ref('users/' + nick).get();
                
                if(!userSnap.exists()) {
                    // Регистрация
                    const newUser = {
                        nick: nick, pass: pass, 
                        av: CLOUD_AV, // По умолчанию ставим твою аву
                        color: '#ffffff', admin: false, 
                        friends: { 'global': 'group' }
                    };
                    await db.ref('users/' + nick).set(newUser);
                    currentUser = newUser;
                } else {
                    // Вход
                    const data = userSnap.val();
                    if(data.pass !== pass) return alert("Неверный пароль!");
                    currentUser = data;
                }

                // Если у пользователя локальный путь, проверяем его
                if (currentUser.nick === "super" || currentUser.nick === "DanVR2013") {
                    currentUser.av = LOCAL_AV; 
                }

                initDashboard();
            } catch (e) {
                console.error(e);
                alert("Ошибка соединения с Firebase.");
            }
        }

        /**
         * ИНИЦИАЛИЗАЦИЯ ИНТЕРФЕЙСА
         */
        function initDashboard() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('sidebar-container').classList.remove('hidden');
            document.getElementById('chat-window').classList.remove('hidden');

            // Presence System
            db.ref('presence/' + currentUser.nick).set(true);
            db.ref('presence/' + currentUser.nick).onDisconnect().remove();

            // UI Refresh
            document.getElementById('my-nick-display').innerText = currentUser.nick;
            document.getElementById('my-nick-display').style.color = currentUser.color;
            
            // Пытаемся подгрузить локальную аву, если упадет - сработает onError в HTML (добавим программно)
            const myAvImg = document.getElementById('my-avatar-display');
            myAvImg.src = currentUser.av;
            myAvImg.onerror = function() { this.src = CLOUD_AV; };

            document.getElementById('admin-wipe-btn').classList.toggle('hidden', !currentUser.admin);

            syncContacts();
            joinChat('global', 'Глобальный чат');
            listenForIncomingCalls();
        }

        /**
         * СИНХРОНИЗАЦИЯ СПИСКА КОНТАКТОВ
         */
        function syncContacts() {
            db.ref(`users/${currentUser.nick}/friends`).on('value', async snap => {
                const list = document.getElementById('dynamic-contacts-list');
                list.innerHTML = '';
                const friends = snap.val() || {};

                for(let id in friends) {
                    if(id === 'global') continue;
                    const type = friends[id];
                    const path = (type === 'group') ? 'groups/' + id : 'users/' + id;
                    
                    const infoSnap = await db.ref(path).get();
                    if(!infoSnap.exists()) continue;

                    const data = infoSnap.val();
                    const item = document.createElement('div');
                    item.className = `contact-item ${activeID === id ? 'active-chat' : ''}`;
                    
                    const name = (type === 'group') ? data.name : data.nick;
                    const av = data.av || CLOUD_AV;

                    item.onclick = () => (type === 'group') ? joinChat(id, name) : startPrivate(data.nick);

                    item.innerHTML = `
                        <div class="av-wrapper">
                            <img src="${av}" class="av-img" onerror="this.src='${CLOUD_AV}'">
                            <div id="stat-${id}" class="indicator-dot ${type === 'group' ? 'online' : ''}"></div>
                        </div>
                        <div class="contact-meta">
                            <b style="color:${data.color || '#fff'}">${name}</b>
                            <span>${type === 'group' ? 'Групповая беседа' : 'Личный чат'}</span>
                        </div>
                        <span onclick="event.stopPropagation(); deleteFriend('${id}')" style="color:var(--color-danger); font-weight:bold; padding:5px;">✕</span>
                    `;
                    list.appendChild(item);

                    if(type === 'user') {
                        db.ref('presence/' + id).on('value', s => {
                            const dot = document.getElementById('stat-' + id);
                            if(dot) dot.classList.toggle('online', s.exists());
                        });
                    }
                }
            });
        }

        /**
         * ПЕРЕХОД В ЧАТ
         */
        function joinChat(id, title) {
            db.ref('messages/' + activeID).off();
            activeID = id;
            activePeer = (id === 'global' || id.startsWith('group')) ? '' : title;

            document.getElementById('current-chat-title').innerText = title;
            document.getElementById('messages-view').innerHTML = '';
            
            // Звонки только в ЛС
            document.getElementById('danvoice-trigger').classList.toggle('hidden', id === 'global' || id.startsWith('group'));

            db.ref('messages/' + id).on('child_added', s => renderMessage(s.key, s.val()));
            db.ref('messages/' + id).on('child_removed', s => document.getElementById('msg-' + s.key)?.remove());
            db.ref('messages/' + id).on('child_changed', s => {
                const m = document.getElementById('msg-' + s.key);
                if(m) m.querySelector('.msg-text-node').innerText = s.val().txt;
            });

            refreshHeaderStatus();
        }

        async function startPrivate(nick) {
            if(nick === currentUser.nick) return;
            await db.ref(`users/${currentUser.nick}/friends/${nick}`).set('user');
            await db.ref(`users/${nick}/friends/${currentUser.nick}`).set('user');
            const combinedID = [currentUser.nick, nick].sort().join('_');
            joinChat(combinedID, nick);
        }

        /**
         * ОТРИСОВКА СООБЩЕНИЙ
         */
        async function renderMessage(mid, data) {
            const view = document.getElementById('messages-view');
            const isMe = data.sn === currentUser.nick;

            const box = document.createElement('div');
            box.id = 'msg-' + mid;
            box.className = `msg-container ${isMe ? 'my-msg' : 'other-msg'}`;
            box.oncontextmenu = (e) => openContextMenu(e, mid, data);

            const senderSnap = await db.ref('users/' + data.sn).get();
            const sender = senderSnap.val() || { av: CLOUD_AV, color: '#fff' };

            let bodyHTML = '';
            if(data.type === 'img') {
                bodyHTML = `<img src="${data.txt}" style="max-width:100%; border-radius:12px; margin-top:5px; cursor:pointer;" onclick="window.open(this.src)">`;
            } else {
                bodyHTML = `<div class="msg-text-node">${data.txt}</div>`;
            }

            box.innerHTML = `
                <img src="${sender.av || CLOUD_AV}" style="width:38px; height:38px; border-radius:50%; object-fit:cover; cursor:pointer;" onerror="this.src='${CLOUD_AV}'" onclick="startPrivate('${data.sn}')">
                <div class="msg-bubble">
                    <div class="msg-sender" style="color:${sender.color}">${data.sn} ${sender.admin ? '<span style="background:red; color:white; padding:1px 4px; border-radius:3px; font-size:8px; margin-left:5px;">ADMIN</span>' : ''}</div>
                    ${data.rp ? `<div style="background:rgba(0,0,0,0.15); border-left:3px solid var(--accent-main); padding:6px; margin-bottom:8px; font-size:11px; opacity:0.8;">↪ ${data.rp}</div>` : ''}
                    ${bodyHTML}
                    <span class="msg-time">${new Date(data.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
            `;
            view.appendChild(box);
            view.scrollTop = view.scrollHeight;
        }

        /**
         * ОТПРАВКА СООБЩЕНИЯ
         */
        function dispatchMsg() {
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if(!val && !editMode) return;

            if(editMode) {
                db.ref(`messages/${activeID}/${targetMsgID}`).update({ txt: val });
            } else {
                const msg = {
                    sn: currentUser.nick,
                    txt: val,
                    type: 'text',
                    time: Date.now(),
                    rp: replyData ? `${replyData.sn}: ${replyData.txt.substring(0,25)}...` : null
                };
                db.ref('messages/' + activeID).push(msg);
            }

            input.value = '';
            resetAction();
        }

        /**
         * DANVOICE - СИСТЕМА ЗВОНКОВ (ВЕРНУЛ ВСЕ ФУНКЦИИ)
         */
        async function initDanVoiceCall() {
            if(!activePeer) return;
            const overlay = document.getElementById('danvoice-overlay');
            const status = document.getElementById('call-status-text');
            
            const peerSnap = await db.ref('users/' + activePeer).get();
            const peerData = peerSnap.val();

            document.getElementById('call-name-display').innerText = activePeer;
            document.getElementById('call-av-display').src = peerData.av || CLOUD_AV;
            
            overlay.style.display = 'flex';
            status.innerText = "ИСХОДЯЩИЙ ВЫЗОВ...";
            document.getElementById('snd-ring').play();

            // Создаем запись о звонке
            await db.ref(`calls/${activePeer}`).set({
                from: currentUser.nick,
                status: 'ringing',
                time: Date.now()
            });

            isCalling = true;

            // Следим за ответом
            db.ref(`calls/${activePeer}`).on('value', s => {
                if(s.val() && s.val().status === 'accepted') {
                    status.innerText = "РАЗГОВОР...";
                    document.getElementById('snd-ring').pause();
                }
                if(!s.exists() && isCalling) terminateCall();
            });
        }

        function listenForIncomingCalls() {
            db.ref(`calls/${currentUser.nick}`).on('value', async snap => {
                if(!snap.exists()) {
                    if(isCalling) terminateCall();
                    return;
                }
                const call = snap.val();
                if(call.status === 'accepted') return;

                const overlay = document.getElementById('danvoice-overlay');
                const peerSnap = await db.ref('users/' + call.from).get();
                
                document.getElementById('call-name-display').innerText = call.from;
                document.getElementById('call-av-display').src = peerSnap.val().av || CLOUD_AV;
                document.getElementById('call-status-text').innerText = "ВХОДЯЩИЙ ЗВОНОК...";
                document.getElementById('call-btn-answer').classList.remove('hidden');
                
                overlay.style.display = 'flex';
                document.getElementById('snd-ring').play();
                isCalling = true;
            });
        }

        async function acceptIncomingCall() {
            await db.ref(`calls/${currentUser.nick}`).update({ status: 'accepted' });
            document.getElementById('call-status-text').innerText = "РАЗГОВОР...";
            document.getElementById('call-btn-answer').classList.add('hidden');
            document.getElementById('snd-ring').pause();
            alert("DanVoice: Голосовой канал открыт.");
        }

        function terminateCall() {
            db.ref(`calls/${currentUser.nick}`).remove();
            if(activePeer) db.ref(`calls/${activePeer}`).remove();
            
            document.getElementById('danvoice-overlay').style.display = 'none';
            document.getElementById('snd-ring').pause();
            document.getElementById('call-btn-answer').classList.add('hidden');
            isCalling = false;
        }

        /**
         * ГРУППОВЫЕ ФУНКЦИИ (УЧАСТНИКИ + ДОБАВЛЕНИЕ КЛИКОМ)
         */
        async function showRoomDetails() {
            const container = document.getElementById('info-members-container');
            const addZone = document.getElementById('group-add-zone');
            const friendList = document.getElementById('fast-friend-list');
            
            container.innerHTML = 'Загрузка...';
            openModal('info-modal');

            if(activeID.startsWith('group')) {
                const groupSnap = await db.ref('groups/' + activeID).get();
                const group = groupSnap.val();
                document.getElementById('info-room-name').innerText = group.name.toUpperCase();
                container.innerHTML = '';
                
                for(let member in group.members) {
                    const row = document.createElement('div');
                    row.style = "padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;";
                    row.innerHTML = `<span>👤 ${member} ${member === group.owner ? '<b style="color:var(--accent-main)">[ВЛАДЕЛЕЦ]</b>' : ''}</span>`;
                    
                    // Если я владелец, могу выгнать
                    if(group.owner === currentUser.nick && member !== currentUser.nick) {
                        const kickBtn = document.createElement('button');
                        kickBtn.innerText = "ВЫГНАТЬ";
                        kickBtn.style = "background:red; color:white; border:none; font-size:9px; padding:4px 8px; border-radius:4px; cursor:pointer;";
                        kickBtn.onclick = () => kickUser(member);
                        row.appendChild(kickBtn);
                    }
                    container.appendChild(row);
                }

                // Добавление друзей кликом
                if(group.owner === currentUser.nick || currentUser.admin) {
                    addZone.classList.remove('hidden');
                    friendList.innerHTML = '';
                    const fSnap = await db.ref(`users/${currentUser.nick}/friends`).get();
                    const friends = fSnap.val() || {};

                    for(let f in friends) {
                        if(friends[f] === 'user' && !group.members[f]) {
                            const b = document.createElement('button');
                            b.className = 'btn-submit';
                            b.style = "width:auto; font-size:10px; padding:6px 12px; margin:0;";
                            b.innerText = "+ " + f;
                            b.onclick = () => addUserToGroup(f);
                            friendList.appendChild(b);
                        }
                    }
                }
            } else {
                addZone.classList.add('hidden');
                document.getElementById('info-room-name').innerText = activeID === 'global' ? 'ГЛОБАЛЬНЫЙ КАНАЛ' : 'ПРИВАТНЫЙ ЧАТ';
                container.innerHTML = 'Информация об участниках скрыта настройками приватности.';
            }
        }

        async function addUserToGroup(nick) {
            await db.ref(`groups/${activeID}/members/${nick}`).set(true);
            await db.ref(`users/${nick}/friends/${activeID}`).set('group');
            showRoomDetails();
        }

        async function kickUser(nick) {
            if(confirm(`Выгнать ${nick} из группы?`)) {
                await db.ref(`groups/${activeID}/members/${nick}`).remove();
                await db.ref(`users/${nick}/friends/${activeID}`).remove();
                showRoomDetails();
            }
        }

        async function createGroup() {
            const name = document.getElementById('group-name-input').value.trim();
            if(!name) return;
            const gid = 'group_' + Date.now();
            await db.ref('groups/' + gid).set({
                name: name, owner: currentUser.nick, av: CLOUD_AV,
                members: { [currentUser.nick]: true }
            });
            await db.ref(`users/${currentUser.nick}/friends/${gid}`).set('group');
            closeModal('group-modal');
            joinChat(gid, name);
        }

        /**
         * УПРАВЛЕНИЕ НАСТРОЙКАМИ
         */
        async function applySettings() {
            const key = document.getElementById('set-admin-key').value;
            const updates = {
                av: document.getElementById('set-av-preview').src,
                color: document.getElementById('set-user-color').value,
                admin: (key === "DanVR_Master")
            };

            await db.ref('users/' + currentUser.nick).update(updates);
            currentUser = (await db.ref('users/' + currentUser.nick).get()).val();
            
            initDashboard();
            closeModal('settings-modal');
            alert("Профиль успешно обновлен!");
        }

        /**
         * ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ UI
         */
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function openContextMenu(e, mid, data) {
            e.preventDefault();
            targetMsgID = mid; targetMsgData = data;
            const menu = document.getElementById('context-menu');
            document.getElementById('ctx-admin-block').classList.toggle('hidden', !(data.sn === currentUser.nick || currentUser.admin));
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }

        function closeAllPopups() { 
            document.getElementById('context-menu').style.display = 'none'; 
        }

        function triggerReply() {
            replyData = targetMsgData;
            editMode = false;
            document.getElementById('action-tracker').classList.remove('hidden');
            document.getElementById('tracker-label').innerText = "Ответ";
            document.getElementById('tracker-preview').innerText = `${targetMsgData.sn}: ${targetMsgData.txt}`;
            document.getElementById('chat-input').focus();
        }

        function triggerEdit() {
            editMode = true;
            replyData = null;
            document.getElementById('action-tracker').classList.remove('hidden');
            document.getElementById('tracker-label').innerText = "Редактирование";
            document.getElementById('tracker-preview').innerText = targetMsgData.txt;
            document.getElementById('chat-input').value = targetMsgData.txt;
            document.getElementById('chat-input').focus();
        }

        function triggerDelete() {
            if(confirm("Удалить сообщение навсегда?")) {
                db.ref(`messages/${activeID}/${targetMsgID}`).remove();
            }
        }

        function resetAction() {
            editMode = false; replyData = null;
            document.getElementById('action-tracker').classList.add('hidden');
            document.getElementById('chat-input').value = '';
        }

        function handleMediaUpload(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                db.ref('messages/' + activeID).push({
                    sn: currentUser.nick, txt: e.target.result, type: 'img', time: Date.now()
                });
            };
            reader.readAsDataURL(file);
        }

        function previewAvatar(input) {
            const reader = new FileReader();
            reader.onload = e => document.getElementById('set-av-preview').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        function startGlobalSearch() {
            db.ref('users').once('value', snap => {
                const container = document.getElementById('info-members-container');
                container.innerHTML = '';
                document.getElementById('info-room-name').innerText = "ПОИСК ПОЛЬЗОВАТЕЛЕЙ";
                document.getElementById('group-add-zone').classList.add('hidden');
                
                snap.forEach(u => {
                    if(u.key === currentUser.nick) return;
                    const row = document.createElement('div');
                    row.style = "padding:12px; border-bottom:1px solid #222; cursor:pointer; display:flex; align-items:center; gap:10px;";
                    row.innerHTML = `<img src="${u.val().av || CLOUD_AV}" style="width:30px; height:30px; border-radius:50%;" onerror="this.src='${CLOUD_AV}'"> <span>${u.key}</span>`;
                    row.onclick = () => { startPrivate(u.key); closeModal('info-modal'); };
                    container.appendChild(row);
                });
                openModal('info-modal');
            });
        }

        async function deleteFriend(id) {
            if(confirm("Удалить этот чат из списка контактов?")) {
                await db.ref(`users/${currentUser.nick}/friends/${id}`).remove();
                if(id === activeID) joinChat('global', 'Глобальный чат');
            }
        }

        function refreshHeaderStatus() {
            const label = document.getElementById('current-chat-status');
            if(!activePeer) {
                db.ref('presence').on('value', s => {
                    let count = 0; s.forEach(() => count++);
                    label.innerText = "В СЕТИ: " + count + " ЧЕЛ.";
                });
            } else {
                db.ref('presence/' + activePeer).on('value', s => {
                    label.innerText = s.exists() ? "В СЕТИ" : "ОФФЛАЙН";
                    label.style.color = s.exists() ? "var(--accent-main)" : "#777";
                });
            }
        }

        function performWipe() {
            if(confirm("ВЫ УВЕРЕНЫ? Все сообщения в этом чате будут стерты для всех!")) {
                db.ref('messages/' + activeID).remove();
            }
        }

        function openEmoji() {
            const emo = ["😊","😂","🤣","😎","🔥","💀","🤡","💩","👍","❤️","✅","⭐","⚡","💎","🚀"];
            const res = prompt("Выберите эмодзи или введите свой:\n" + emo.join(" "), "🔥");
            if(res) document.getElementById('chat-input').value += res;
        }

        /* ДОПОЛНИТЕЛЬНЫЙ БЛОК КОДА ДЛЯ ОБЕСПЕЧЕНИЯ СТАБИЛЬНОСТИ СИСТЕМЫ (v8.5)
           Здесь описываются системные перехватчики ошибок и оптимизация рендеринга.
        */
        window.onerror = function(msg, url, line) {
            console.log("System Error: " + msg + " at line " + line);
            return true;
        };

    </script>
</body>
</html>
