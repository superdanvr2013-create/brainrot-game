<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox PVP: Ultra Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; background: #1a1a1a; touch-action: none; -webkit-user-select: none; user-select: none; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        
        .info-panel { position: absolute; background: rgba(0,0,0,0.7); color: white; padding: 12px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.1); font-size: 13px; z-index: 500; }
        #online-list { top: 15px; left: 15px; min-width: 140px; }
        #leaderboard { top: 15px; right: 15px; min-width: 140px; border-color: #ffd700; }
        
        .hp-ui { position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%); z-index: 100; text-align: center; }
        .hp-bar-bg { width: 280px; height: 25px; background: #333; border: 3px solid #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 0 15px rgba(255,0,0,0.4); }
        #hp-fill { background: linear-gradient(90deg, #ff416c, #ff4b2b); width: 100%; height: 100%; transition: 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        
        #mobile-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .joy-zone { position: absolute; bottom: 40px; left: 40px; display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; pointer-events: auto; }
        .act-zone { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 20px; pointer-events: auto; }
        
        .b-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .b-atk { width: 90px; height: 90px; border-radius: 50%; background: rgba(255,50,50,0.5); border: 4px solid #fff; font-size: 14px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="online-list" class="info-panel"><div style="border-bottom:1px solid #555; padding-bottom:5px; margin-bottom:5px;">ONLINE</div><div id="players-inner"></div></div>
    <div id="leaderboard" class="info-panel"><div style="color:#ffd700; border-bottom:1px solid #555; padding-bottom:5px; margin-bottom:5px;">TOP KILLS</div><div id="lb-list"></div></div>

    <div id="login-screen" class="screen">
        <div style="background:#fff; padding:40px; border-radius:30px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <h1 style="margin:0; color:#ff4b2b; font-size:32px;">DANBLOX PVP</h1>
            <p style="color:#666;">v3.0 Ultra Graphics</p>
            <input type="text" id="nick-input" placeholder="НИКНЕЙМ" maxlength="12" style="padding:15px; width:220px; font-size:18px; text-align:center; border:3px solid #eee; border-radius:12px;"><br><br>
            <button onclick="startGame()" style="padding:15px 45px; background:#ff4b2b; color:#fff; border:none; border-radius:12px; cursor:pointer; font-weight:bold; font-size:20px;">ИГРАТЬ</button>
        </div>
    </div>

    <div id="death-screen" class="screen hidden">
        <div style="text-align:center; color:#fff;">
            <h1 style="font-size:70px; margin:0;">WASTED</h1>
            <button onclick="respawn()" style="padding:20px 50px; font-size:24px; background:#fff; color:#ff4b2b; border:none; border-radius:15px; font-weight:bold; margin-top:20px;">ВОЗРОДИТЬСЯ</button>
        </div>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="hp-ui">
            <div style="color:white; margin-bottom:5px; text-shadow:1px 1px 2px #000;">HEALTH</div>
            <div class="hp-bar-bg"><div id="hp-fill"></div></div>
        </div>
    </div>

    <div id="mobile-ui" class="hidden">
        <div class="joy-zone">
            <div></div><div class="b-btn" id="m-w">W</div><div></div>
            <div class="b-btn" id="m-a">A</div><div class="b-btn" id="m-s">S</div><div class="b-btn" id="m-d">D</div>
        </div>
        <div class="act-zone">
            <div class="b-btn b-atk" id="m-jump" style="background:rgba(50,150,255,0.4); width:70px; height:70px;">JUMP</div>
            <div class="b-btn b-atk" id="m-atk">ATTACK</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let scene, camera, renderer, myModel, mySword;
        let myID = 'u' + Math.random().toString(36).substr(2, 9);
        let myNick = "", myHP = 100, inGame = false, isDead = false;
        let otherPlayers = {}, moveState = { f:false, b:false, l:false, r:false };
        let vy = 0, canJump = true, camAzimuth = 0, camDist = 15, isAtk = false;

        function createDetailedSword() {
            const group = new THREE.Group();
            // Лезвие
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.7, 0.04), new THREE.MeshStandardMaterial({color: 0xe0e0e0, metalness: 0.9, roughness: 0.1}));
            blade.position.y = 0.85;
            // Гарда (Золотая)
            const guard = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.08, 0.15), new THREE.MeshStandardMaterial({color: 0xffd700, metalness: 0.8}));
            // Рукоять (Коричневая)
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.5), new THREE.MeshStandardMaterial({color: 0x5d4037}));
            handle.position.y = -0.25;
            
            group.add(blade, guard, handle);
            group.rotation.x = Math.PI / 2;
            group.position.set(0.65, 0.8, 0.2);
            return group;
        }

        function createPlayer(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), new THREE.MeshStandardMaterial({color}));
            body.position.y = 0.6;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.65, 0.65), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 1.55;
            g.add(body, head);
            return g;
        }

        async function clearOldGhosts() {
            const now = Date.now();
            const snap = await db.ref('players').once('value');
            const data = snap.val();
            if (data) {
                Object.keys(data).forEach(id => {
                    if (now - data[id].lastSeen > 10000) {
                        db.ref('players/' + id).remove();
                    }
                });
            }
        }

        function buildDecor() {
            // Земля с сеткой
            const grid = new THREE.GridHelper(500, 50, 0x000000, 0x000000);
            grid.position.y = 0.01;
            grid.material.opacity = 0.1;
            grid.material.transparent = true;
            scene.add(grid);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x4caf50}));
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            // Объекты
            for(let i=0; i<40; i++) {
                const x = (Math.random()-0.5)*400;
                const z = (Math.random()-0.5)*400;
                if(Math.abs(x)<10 && Math.abs(z)<10) continue;

                if(Math.random() > 0.4) { // Дерево
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 3), new THREE.MeshStandardMaterial({color: 0x3e2723}));
                    trunk.position.set(x, 1.5, z);
                    const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), new THREE.MeshStandardMaterial({color: 0x2e7d32}));
                    leaves.position.set(x, 3.5, z);
                    scene.add(trunk, leaves);
                } else { // Камень
                    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(Math.random()*2), new THREE.MeshStandardMaterial({color: 0x757575}));
                    rock.position.set(x, 0.5, z);
                    scene.add(rock);
                }
            }
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x81d4fa);
            scene.fog = new THREE.Fog(0x81d4fa, 10, 150);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(20, 50, 20);
            scene.add(sun);

            buildDecor();

            myModel = createPlayer(0x1e88e5);
            mySword = createDetailedSword();
            myModel.add(mySword);
            scene.add(myModel);

            db.ref('players').on('value', snap => {
                const data = snap.val() || {};
                const now = Date.now();
                let html = "";

                Object.keys(otherPlayers).forEach(id => {
                    if(!data[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }
                });

                Object.keys(data).forEach(id => {
                    const d = data[id];
                    if (now - d.lastSeen > 10000) return; // Игнорируем призраков

                    if(id === myID) {
                        myHP = d.hp;
                        if(myHP <= 0 && !isDead) triggerDeath();
                        return;
                    }
                    
                    if(!otherPlayers[id]) {
                        otherPlayers[id] = createPlayer(0xe53935);
                        otherPlayers[id].add(createDetailedSword());
                        scene.add(otherPlayers[id]);
                    }

                    const p = otherPlayers[id];
                    p.position.lerp(new THREE.Vector3(d.x, d.y, d.z), 0.2);
                    p.rotation.y = d.ry || 0;
                    
                    const sw = p.children[2];
                    if(sw) sw.position.z = d.at ? -1.2 : 0.2;

                    if(d.hp <= 0) { p.rotation.z = Math.PI/2; p.position.y = 0.3; } 
                    else { p.rotation.z = 0; p.position.y = d.y; }

                    html += `<div>${d.n}: <span style="color:${d.hp>30?'#4caf50':'#f44336'}">${d.hp}%</span></div>`;
                });
                document.getElementById('players-inner').innerHTML = html;
            });

            db.ref('leaderboard').orderByValue().limitToLast(5).on('value', snap => {
                let h = "";
                snap.forEach(s => { h = `<div style="display:flex; justify:space-between"><span>${s.key}</span> <span>${s.val()}</span></div>` + h; });
                document.getElementById('lb-list').innerHTML = h;
            });

            setInterval(() => { if(inGame && !isDead) db.ref('players/' + myID).update({ lastSeen: Date.now() }); }, 2000);
            animate();
        }

        function triggerDeath() {
            isDead = true;
            document.getElementById('death-screen').classList.remove('hidden');
            myModel.rotation.z = Math.PI/2;
            db.ref('players/' + myID).update({ hp: 0 });
        }

        window.respawn = () => {
            isDead = false; myHP = 100;
            document.getElementById('death-screen').classList.add('hidden');
            myModel.rotation.z = 0;
            myModel.position.set((Math.random()-0.5)*30, 0, (Math.random()-0.5)*30);
            db.ref('players/' + myID).update({ hp: 100, x: myModel.position.x, z: myModel.position.z, lastSeen: Date.now() });
        };

        function attack() {
            if(isDead || isAtk) return;
            isAtk = true;
            mySword.position.z = -1.2;
            db.ref('players/' + myID + '/at').set(true);

            setTimeout(() => { 
                mySword.position.z = 0.2; isAtk = false; 
                db.ref('players/' + myID + '/at').set(false);
            }, 150);

            Object.keys(otherPlayers).forEach(id => {
                if(myModel.position.distanceTo(otherPlayers[id].position) < 5) {
                    db.ref('players/' + id).transaction(p => {
                        if (p && p.hp > 0) {
                            p.hp -= 20;
                            if (p.hp <= 0) db.ref('leaderboard/' + myNick).transaction(k => (k||0)+1);
                        }
                        return p;
                    });
                }
            });
        }

        function animate() {
            if(!inGame) return;
            requestAnimationFrame(animate);

            if(!isDead) {
                const move = new THREE.Vector3();
                if(moveState.f) move.z -= 1; if(moveState.b) move.z += 1;
                if(moveState.l) move.x -= 1; if(moveState.r) move.x += 1;
                
                if(move.length() > 0) {
                    move.applyAxisAngle(new THREE.Vector3(0,1,0), camAzimuth);
                    myModel.position.add(move.normalize().multiplyScalar(0.28));
                    myModel.rotation.y = Math.atan2(move.x, move.z);
                }
                
                myModel.position.y += vy;
                if(myModel.position.y > 0) { vy -= 0.022; canJump = false; }
                else { myModel.position.y = 0; vy = 0; canJump = true; }

                db.ref('players/' + myID).update({
                    x: myModel.position.x, y: myModel.position.y, z: myModel.position.z,
                    ry: myModel.rotation.y, n: myNick, hp: myHP, at: isAtk
                });
            }

            camera.position.x = myModel.position.x + camDist * Math.sin(camAzimuth);
            camera.position.y = myModel.position.y + 8;
            camera.position.z = myModel.position.z + camDist * Math.cos(camAzimuth);
            camera.lookAt(myModel.position.x, myModel.position.y + 1, myModel.position.z);

            document.getElementById('hp-fill').style.width = myHP + "%";
            renderer.render(scene, camera);
        }

        window.startGame = async () => {
            myNick = document.getElementById('nick-input').value.trim() || "Pro";
            document.getElementById('login-screen').classList.add('hidden');
            ['ui-layer', 'mobile-ui'].forEach(id => document.getElementById(id).classList.remove('hidden'));
            
            await clearOldGhosts(); // ОЧИСТКА БОТОВ ПЕРЕД СТАРТОМ
            
            inGame = true; init();
            db.ref('players/' + myID).onDisconnect().remove();
        };

        const setupBtn = (id, key) => {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); if(!isDead) moveState[key] = true; };
            const end = (e) => { e.preventDefault(); moveState[key] = false; };
            el.addEventListener('pointerdown', start);
            el.addEventListener('pointerup', end);
            el.addEventListener('pointerleave', end);
        };
        setupBtn('m-w','f'); setupBtn('m-s','b'); setupBtn('m-a','l'); setupBtn('m-d','r');
        
        document.getElementById('m-jump').addEventListener('pointerdown', (e) => { e.preventDefault(); if(canJump && !isDead) vy = 0.45; });
        document.getElementById('m-atk').addEventListener('pointerdown', (e) => { e.preventDefault(); attack(); });

        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveState.f = true; if(e.code === 'KeyS') moveState.b = true;
            if(e.code === 'KeyA') moveState.l = true; if(e.code === 'KeyD') moveState.r = true;
            if(e.code === 'Space' && canJump && !isDead) vy = 0.45;
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveState.f = false; if(e.code === 'KeyS') moveState.b = false;
            if(e.code === 'KeyA') moveState.l = false; if(e.code === 'KeyD') moveState.r = false;
        });
        window.addEventListener('mousedown', (e) => { if(e.button === 0 && inGame) attack(); if(e.button === 2) window.isR = true; });
        window.addEventListener('mouseup', () => window.isR = false);
        window.addEventListener('mousemove', (e) => { if(window.isR) camAzimuth -= e.movementX * 0.01; });
        window.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
