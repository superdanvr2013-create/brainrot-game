<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    let scene, camera, renderer, controls, pivot, playerModel;
    let peer, conn, myID;
    let otherPlayers = {}; 
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let velocity = new THREE.Vector3();
    let zoomDistance = 8;

    const startBtn = document.getElementById('start-btn');
    const statusEl = document.getElementById('status');

    function initNet(nick) {
        // Очищаем ник от пробелов и странных символов
        const cleanNick = nick.replace(/[^a-zA-Z0-9]/g, "");
        myID = cleanNick + "-" + Math.floor(Math.random() * 9000 + 1000);
        
        document.getElementById('display-id').innerText = myID;
        document.getElementById('display-nick').innerText = cleanNick;

        // Инициализируем PeerJS с защитой от ошибок
        peer = new Peer(myID, {
            debug: 2
        });

        peer.on('open', (id) => {
            statusEl.innerText = "Статус: В сети. Жду друга...";
            statusEl.className = "status-wait";
            
            const targetID = document.getElementById('friend-id-input').value.trim();
            if(targetID) {
                statusEl.innerText = "Статус: Подключаюсь к " + targetID;
                connectTo(targetID);
            }
        });

        peer.on('connection', (c) => {
            setupConnection(c);
        });

        peer.on('error', (err) => {
            console.error("PeerJS Error:", err.type);
            if (err.type === 'network') {
                statusEl.innerText = "Ошибка: Сеть (проверь интернет)";
            } else if (err.type === 'unavailable-id') {
                statusEl.innerText = "Ошибка: ID уже занят";
            } else {
                statusEl.innerText = "Ошибка: " + err.type;
            }
            statusEl.className = "status-err";
        });
    }

    function connectTo(id) {
        // Убираем возможные пробелы из ID друга
        const cleanTargetID = id.trim();
        const c = peer.connect(cleanTargetID);
        setupConnection(c);
    }

    function setupConnection(c) {
        conn = c;
        conn.on('open', () => {
            statusEl.innerText = "Статус: СОЕДИНЕНО!";
            statusEl.className = "status-ok";
            
            setInterval(() => {
                if(conn && conn.open) {
                    conn.send({
                        type: 'move',
                        id: myID,
                        x: pivot.position.x,
                        y: pivot.position.y,
                        z: pivot.position.z,
                        ry: pivot.rotation.y
                    });
                }
            }, 30);
        });

        conn.on('data', (data) => {
            if(data.type === 'move') syncRemotePlayer(data);
        });

        conn.on('close', () => {
            statusEl.innerText = "Статус: Соединение потеряно";
            statusEl.className = "status-wait";
        });
    }

    function syncRemotePlayer(data) {
        if(!otherPlayers[data.id]) {
            const material = new THREE.MeshStandardMaterial({color: 0x0077ff});
            const group = createBaconModel(material);
            scene.add(group);
            otherPlayers[data.id] = group;
        }
        const p = otherPlayers[data.id];
        // Плавное перемещение (lerp)
        p.position.lerp(new THREE.Vector3(data.x, data.y, data.z), 0.3);
        p.rotation.y = data.ry;
    }

    // --- Остальной код (initScene, animate и т.д.) оставляем без изменений ---
    startBtn.onclick = () => {
        const nick = document.getElementById('nick-input').value.trim();
        if(!nick) return alert("Введите ник на английском!");
        
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        
        initNet(nick);
        initScene();
    };

    function createBaconModel(material) {
        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.5), material);
        body.position.y = 0.7;
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1.7;
        group.add(body, head);
        return group;
    }

    function initScene() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        pivot = new THREE.Group();
        scene.add(pivot);

        playerModel = createBaconModel(new THREE.MeshStandardMaterial({color: 0xff4444}));
        scene.add(playerModel);

        controls = new PointerLockControls(pivot, document.body);
        document.body.addEventListener('click', () => controls.lock());

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(5, 10, 5);
        scene.add(light);

        scene.add(new THREE.GridHelper(100, 50, 0x00b06f, 0x444444));
        
        window.onkeydown = (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
            if(e.code === 'Space' && pivot.position.y < 0.1) velocity.y = 10;
        };
        window.onkeyup = (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        };

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (controls.isLocked) {
            const dt = 0.016;
            velocity.x -= velocity.x * 10 * dt;
            velocity.z -= velocity.z * 10 * dt;
            velocity.y -= 25 * dt;

            if (moveForward) velocity.z -= 150 * dt;
            if (moveBackward) velocity.z += 150 * dt;
            if (moveLeft) velocity.x -= 150 * dt;
            if (moveRight) velocity.x += 150 * dt;

            controls.moveRight(-velocity.x * dt);
            controls.moveForward(-velocity.z * dt);
            pivot.position.y += velocity.y * dt;
            if (pivot.position.y < 0) { pivot.position.y = 0; velocity.y = 0; }

            playerModel.position.copy(pivot.position);
            playerModel.rotation.y = pivot.rotation.y;

            const cp = new THREE.Vector3(0, 2, zoomDistance).applyMatrix4(pivot.matrixWorld);
            camera.position.lerp(cp, 0.1);
            camera.lookAt(pivot.position.x, pivot.position.y + 1, pivot.position.z);
        }
        renderer.render(scene, camera);
    }
</script>
