<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanChat Pro Edit</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0d0f; --panel: #16191d; --accent: #00a2ff; --text: #ffffff; --side-w: 300px; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        /* Тролль анимация */
        @keyframes warning-blink {
            0%, 100% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .warning-label { color: #ff0000; font-weight: 900; font-size: 20px; animation: warning-blink 0.3s infinite; padding: 0 10px; }
        .death-nick { color: #ff0000; text-shadow: 0 0 15px red; font-size: 24px; font-weight: 900; }

        /* Настройки (Шестеренка) */
        #settings-trigger { position: absolute; bottom: 15px; left: 15px; font-size: 24px; cursor: pointer; opacity: 0.6; transition: 0.3s; z-index: 100; }
        #settings-trigger:hover { opacity: 1; transform: rotate(90deg); color: var(--accent); }

        /* Интерфейс */
        #sidebar { width: var(--side-w); background: var(--panel); border-right: 1px solid #2d3239; display: flex; flex-direction: column; position: relative; }
        #contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 15px; border-bottom: 1px solid #1f2329; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .contact-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        
        #main-content { flex: 1; display: flex; flex-direction: column; background: #0f1216; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg-row { display: flex; gap: 10px; max-width: 85%; margin-bottom: 5px; }
        .msg-row.me { flex-direction: row-reverse; align-self: flex-end; }
        .msg { padding: 10px; border-radius: 12px; background: #23282e; }
        .me .msg { background: var(--accent); }

        /* Модалки */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .win { background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; min-width: 300px; }
        .input-std { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; }
        .btn-std { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="settings-trigger" onclick="openSettings()">⚙️</div>
    
    <div id="settings-modal" class="modal-overlay">
        <div class="win">
            <h3>Настройки профиля</h3>
            <img id="set-av-pre" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
            <input type="file" id="set-file" class="hidden" onchange="updateAvPre(this)">
            <br><button onclick="document.getElementById('set-file').click()" class="btn-std">Сменить фото</button>
            <input type="text" id="set-nick" class="input-std" placeholder="Новое имя">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="saveSettings()" class="btn-std" style="background:var(--accent); color:white; flex:1">Сохранить</button>
                <button onclick="closeSettings()" class="btn-std" style="background:#444; color:white;">Отмена</button>
            </div>
        </div>
    </div>

    <div id="incoming-call-modal" class="modal-overlay">
        <div class="win" style="border-color: #ff0000;">
            <div style="display:flex; align-items:center; justify-content:center;">
                <div id="left-warn" class="warning-label hidden">НЕ БЕРИ!!!</div>
                <img id="inc-av" style="width:100px; height:100px; border-radius:50%; border:3px solid #ff0000;">
                <div id="right-warn" class="warning-label hidden">НЕ БЕРИ!!!</div>
            </div>
            <h2 id="inc-name">...</h2>
            <div style="display:flex; gap:15px; justify-content:center; margin-top:20px;">
                <button onclick="acceptCall()" class="btn-std" style="background:#00ff88;">ПРИНЯТЬ</button>
                <button id="reject-btn" onclick="hangUp()" class="btn-std" style="background:#ff4444; color:white;">ОТКЛОНИТЬ</button>
            </div>
        </div>
    </div>

    <div id="call-modal" class="modal-overlay">
        <div class="win">
            <h2 id="call-peer-name">Звонок...</h2>
            <p id="call-status">Соединение...</p>
            <button onclick="hangUp()" class="btn-std" style="background:#ff4444; color:white; padding:15px 40px;">ЗАВЕРШИТЬ</button>
        </div>
    </div>

    <div id="auth-screen" style="position:fixed; inset:0; background:#0b0d0f; z-index:20000; display:flex; align-items:center; justify-content:center;">
        <div class="win">
            <h2>DanChat</h2>
            <input type="text" id="nick" class="input-std" placeholder="Ваш ник">
            <input type="password" id="pass" class="input-std" placeholder="Пароль">
            <button onclick="handleAuth()" class="btn-std" style="background:var(--accent); color:white; width:100%;">Войти</button>
        </div>
    </div>

    <div id="sidebar" class="hidden">
        <div style="padding:20px; text-align:center; border-bottom:1px solid #333;">
            <img id="my-av-sidebar" src="" style="width:50px; height:50px; border-radius:50%; object-fit:cover;"><br>
            <b id="my-nick-sidebar"></b>
        </div>
        <div id="contact-list"></div>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <b id="chat-title">Глобальный чат</b>
            <button id="call-btn-ui" onclick="startCall()" style="display:none; background:var(--accent); border:none; color:white; border-radius:5px; padding:5px 15px; cursor:pointer;">📞</button>
        </header>
        <div id="chat-window"></div>
        <div style="padding:15px; display:flex; gap:10px; background:var(--panel);">
            <input type="text" id="msg-input" class="input-std" style="margin:0" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" class="btn-std" style="background:var(--accent); color:white;">></button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE", authDomain: "danblox-e209f.firebaseapp.com", databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com", projectId: "danblox-e209f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myData = {}, activeChatId = "global", activePeerNick = "";
        let pc, localStream, incomingData = null;
        const stun = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

        async function handleAuth() {
            const n=document.getElementById('nick').value.trim(), p=document.getElementById('pass').value.trim();
            if(!n) return;
            const s = await db.ref('users/'+n).get();
            if(!s.exists()) {
                const user={nick:n, pass:p, av: "https://cdn-icons-png.flaticon.com/512/149/149071.png", id: Math.floor(100000+Math.random()*899999)};
                await db.ref('users/'+n).set(user); enter(user);
            } else if(s.val().pass === p) enter(s.val());
            else alert("Неверно");
        }

        function enter(data) {
            myData=data;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            updateUI();
            listenCalls();
            loadFriends();
            switchChat('global', 'Глобальный чат');
        }

        function updateUI() {
            document.getElementById('my-av-sidebar').src = myData.av;
            document.getElementById('my-nick-sidebar').innerText = myData.nick;
            document.getElementById('set-av-pre').src = myData.av;
            document.getElementById('set-nick').value = myData.nick;
        }

        // --- НАСТРОЙКИ ---
        function openSettings() { document.getElementById('settings-modal').style.display='flex'; }
        function closeSettings() { document.getElementById('settings-modal').style.display='none'; }
        function updateAvPre(inp) { const r=new FileReader(); r.onload=e=>document.getElementById('set-av-pre').src=e.target.result; r.readAsDataURL(inp.files[0]); }
        async function saveSettings() {
            const newNick = document.getElementById('set-nick').value.trim();
            const newAv = document.getElementById('set-av-pre').src;
            if (newNick !== myData.nick) {
                // Если ник меняется, в идеале нужно пересоздать запись, но для простоты обновим текущую
                alert("Для полной смены ника создайте новый аккаунт. Сейчас обновится только отображение и аватар.");
            }
            await db.ref('users/'+myData.nick).update({ av: newAv });
            myData.av = newAv;
            updateUI();
            closeSettings();
        }

        // --- ЗВУК И WEBRTC ---
        async function initPC(peer) {
            if(pc) pc.close();
            pc = new RTCPeerConnection(stun);
            
            try {
                // ПРИНУДИТЕЛЬНЫЙ ЗАХВАТ МИКРОФОНА
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            } catch(e) { alert("Микрофон не найден!"); return false; }

            pc.ontrack = e => {
                let audio = document.getElementById('remote-audio');
                if(!audio) {
                    audio = document.createElement('audio');
                    audio.id = 'remote-audio';
                    audio.autoplay = true;
                    document.body.appendChild(audio);
                }
                audio.srcObject = e.streams[0];
                // ПРИНУДИТЕЛЬНЫЙ ВЫВОД НА ДИНАМИКИ
                audio.play().catch(() => console.log("Нажмите на экран для активации звука"));
            };

            pc.onicecandidate = e => { if(e.candidate) db.ref(`calls/${peer}/ice/${myData.nick}`).push(e.candidate.toJSON()); };
            return true;
        }

        async function startCall() {
            if(!(await initPC(activePeerNick))) return;
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            db.ref(`calls/${activePeerNick}`).set({ offer: {type:offer.type, sdp:offer.sdp}, from: myData.nick });
            
            db.ref(`calls/${myData.nick}/answer`).on('value', async s => {
                if(s.exists() && pc.signalingState === "have-local-offer") {
                    await pc.setRemoteDescription(new RTCSessionDescription(s.val()));
                }
            });
            db.ref(`calls/${myData.nick}/ice/${activePeerNick}`).on('child_added', s => {
                if(pc) pc.addIceCandidate(new RTCIceCandidate(s.val())).catch(()=>{});
            });
            showCallUI(activePeerNick, "Вызов...");
        }

        function listenCalls() {
            db.ref(`calls/${myData.nick}`).on('value', async s => {
                const c = s.val();
                if(!c) { closeCallUI(); return; }
                if(c.offer && !pc) {
                    incomingData = c;
                    const u = await db.ref('users/'+c.from).get();
                    document.getElementById('inc-av').src = u.val().av;
                    const nameEl = document.getElementById('inc-name');
                    
                    // ТРОЛЛЬ МОД
                    if(c.from === "Смерть_в_нищете") {
                        nameEl.className = "death-nick";
                        nameEl.innerText = "Смерть_в_нищете";
                        document.getElementById('left-warn').classList.remove('hidden');
                        document.getElementById('right-warn').classList.remove('hidden');
                        document.getElementById('reject-btn').style.display = 'none';
                    } else {
                        nameEl.className = "";
                        nameEl.innerText = c.from;
                        document.getElementById('left-warn').classList.add('hidden');
                        document.getElementById('right-warn').classList.add('hidden');
                        document.getElementById('reject-btn').style.display = 'block';
                    }
                    document.getElementById('incoming-call-modal').style.display='flex';
                }
            });
        }

        async function acceptCall() {
            document.getElementById('incoming-call-modal').style.display='none';
            if(!(await initPC(incomingData.from))) return;
            await pc.setRemoteDescription(new RTCSessionDescription(incomingData.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            db.ref(`calls/${incomingData.from}/answer`).set({type:answer.type, sdp:answer.sdp});
            db.ref(`calls/${myData.nick}/ice/${incomingData.from}`).on('child_added', s => {
                if(pc) pc.addIceCandidate(new RTCIceCandidate(s.val())).catch(()=>{});
            });
            showCallUI(incomingData.from, "В разговоре");
        }

        function hangUp() {
            if(incomingData?.from === "Смерть_в_нищете" && document.getElementById('incoming-call-modal').style.display === 'flex') return;
            db.ref(`calls/${myData.nick}`).remove();
            if(activePeerNick) db.ref(`calls/${activePeerNick}`).remove();
            closeCallUI();
        }

        function closeCallUI() {
            if(localStream) localStream.getTracks().forEach(t=>t.stop());
            if(pc) { pc.close(); pc=null; }
            document.querySelectorAll('.modal-overlay').forEach(m => { if(m.id !== 'settings-modal') m.style.display='none'});
        }

        function showCallUI(n, s) {
            document.getElementById('call-modal').style.display='flex';
            document.getElementById('call-peer-name').innerText = n;
            document.getElementById('call-status').innerText = s;
        }

        // --- ЧАТ ---
        function switchChat(id, name) {
            activeChatId=id; activePeerNick=(id==='global'?'':name);
            document.getElementById('chat-title').innerText=name;
            document.getElementById('call-btn-ui').style.display = (id==='global'?'none':'block');
            document.getElementById('chat-window').innerHTML="";
            db.ref('messages/'+id).off();
            db.ref('messages/'+id).on('child_added', s => {
                const m=s.val(), row=document.createElement('div');
                row.className=`msg-row ${m.sn===myData.nick?'me':''}`;
                row.innerHTML=`<div class="msg"><b>${m.sn}</b><br>${m.txt}</div>`;
                document.getElementById('chat-window').appendChild(row);
                document.getElementById('chat-window').scrollTop=99999;
            });
        }

        function sendMsg() {
            const inp=document.getElementById('msg-input');
            if(!inp.value.trim()) return;
            db.ref('messages/'+activeChatId).push({sn:myData.nick, txt:inp.value});
            inp.value="";
        }

        function loadFriends() {
            db.ref('users').on('value', s => {
                const list=document.getElementById('contact-list');
                list.innerHTML='<div class="contact-item" onclick="switchChat(\'global\',\'Глобальный\')">🌍 Глобальный</div>';
                s.forEach(u => {
                    const d=u.val(); if(d.nick===myData.nick) return;
                    const item=document.createElement('div'); item.className='contact-item';
                    item.innerHTML=`<img src="${d.av}"><b>${d.nick}</b>`;
                    item.onclick=()=>switchChat(myData.nick<d.nick?myData.nick+'_'+d.nick:d.nick+'_'+myData.nick, d.nick);
                    list.appendChild(item);
                });
            });
        }
    </script>
</body>
</html>
