<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox PVP: Admin Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; touch-action: none; user-select: none; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .info-panel { position: absolute; background: rgba(20,20,20,0.85); color: #0f0; padding: 15px; border-radius: 12px; border: 1px solid #444; font-family: monospace; z-index: 500; pointer-events: none; }
        #online-list { top: 15px; left: 15px; min-width: 160px; }
        #leaderboard { top: 15px; right: 15px; min-width: 160px; border-color: gold; color: gold; }
        
        /* Admin UI */
        #admin-menu { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: rgba(50,0,0,0.9); padding: 15px; border: 2px solid red; border-radius: 10px; z-index: 1500; display: flex; flex-direction: column; gap: 10px; color: white; }
        .adm-btn { padding: 8px; background: #444; color: white; border: 1px solid #fff; cursor: pointer; font-size: 12px; text-align: center; }
        .adm-btn:active { background: #f00; }

        .hp-container { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 100; }
        .hp-bar { width: 300px; height: 20px; background: #222; border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #hp-fill { background: #f00; width: 100%; height: 100%; transition: 0.2s; }
        
        .joy { position: absolute; bottom: 40px; left: 40px; display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; pointer-events: auto; }
        .act { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="online-list" class="info-panel"><div>[ ONLINE ]</div><div id="players-inner"></div></div>
    <div id="leaderboard" class="info-panel"><div>[ TOP KILLS ]</div><div id="lb-list"></div></div>

    <div id="login-screen" class="screen">
        <div style="text-align:center; background:#222; padding:30px; border-radius:20px; border:1px solid #444;">
            <h1 style="color:#fff; margin:0 0 20px 0;">DANBLOX <span style="color:red;">PVP</span></h1>
            <input type="text" id="nick-input" placeholder="НИКНЕЙМ" maxlength="12" style="padding:12px; width:220px; border-radius:8px; border:none; text-align:center;"><br><br>
            <input type="password" id="admin-input" placeholder="СЕКРЕТНЫЙ КОД" style="padding:10px; width:220px; border-radius:8px; border:none; text-align:center; font-size:12px;"><br>
            <button onclick="startGame()" style="margin-top:20px; padding:12px 60px; background:red; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">ВОЙТИ</button>
        </div>
    </div>

    <div id="admin-menu" class="hidden">
        <b style="text-align:center; color:red;">ADMIN PANEL</b>
        <button class="adm-btn" id="btn-fly">FLY: OFF</button>
        <div style="font-size:10px;">SPEED: <span id="v-spd">0.3</span></div>
        <div style="display:flex; gap:5px;">
            <button class="adm-btn" onclick="adjS(0.1)">+</button><button class="adm-btn" onclick="adjS(-0.1)">-</button>
        </div>
        <div style="font-size:10px;">JUMP: <span id="v-jmp">0.5</span></div>
        <div style="display:flex; gap:5px;">
            <button class="adm-btn" onclick="adjJ(0.1)">+</button><button class="adm-btn" onclick="adjJ(-0.1)">-</button>
        </div>
        <button class="adm-btn" style="background:maroon;" onclick="clearLeaderboard()">CLEAR LB</button>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="hp-container">
            <div id="hp-text" style="color:white; font-size:12px; margin-bottom:5px;">100 / 100</div>
            <div class="hp-bar"><div id="hp-fill"></div></div>
        </div>
    </div>

    <div id="mobile-ui" class="hidden">
        <div class="joy">
            <div></div><div class="btn" id="m-w">W</div><div></div>
            <div class="btn" id="m-a">A</div><div class="btn" id="m-s">S</div><div class="btn" id="m-d">D</div>
        </div>
        <div class="act">
            <div class="btn" id="m-jump" style="background:rgba(0,120,255,0.3)">JUMP</div>
            <div class="btn" id="m-atk" style="background:rgba(255,0,0,0.3); width:90px; height:90px;">ATK</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const P_REF = db.ref('players_v4');

        let scene, camera, renderer, myModel, mySword;
        let myID = 'u' + Math.random().toString(36).substr(2, 9);
        let myNick = "", myHP = 100, inGame = false, isDead = false;
        let isAdmin = false, isFlying = false, moveSpd = 0.3, jumpPwr = 0.5;
        let otherPlayers = {}, moveState = { f:false, b:false, l:false, r:false };
        let vy = 0, canJump = true, camAzimuth = 0, camDist = 16, isAtk = false;

        function createModel(color) {
            const g = new THREE.Group();
            const b = new THREE.Mesh(new THREE.BoxGeometry(1, 1.4, 0.6), new THREE.MeshStandardMaterial({color}));
            b.position.y = 0.7;
            const h = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            h.position.y = 1.75;
            g.add(b, h); return g;
        }

        function createSword() {
            const g = new THREE.Group();
            const bl = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.8, 0.05), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.8}));
            bl.position.y = 0.9;
            const gr = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 0.2), new THREE.MeshStandardMaterial({color: 0xffd700}));
            g.add(bl, gr); g.rotation.x = Math.PI/2; g.position.set(0.7, 0.8, 0.3); return g;
        }

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87ceeb);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6); sun.position.set(50, 100, 50); scene.add(sun);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x3a5f0b}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);

            myModel = createModel(0x0055ff);
            mySword = createSword(); myModel.add(mySword);
            scene.add(myModel);

            P_REF.on('value', snap => {
                const data = snap.val() || {};
                const now = Date.now();
                let html = "";
                Object.keys(otherPlayers).forEach(id => { if(!data[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }});
                Object.keys(data).forEach(id => {
                    const d = data[id];
                    if (now - d.ls > 15000) return; // Увеличил порог, чтобы не было невидимок
                    if(id === myID) { myHP = d.hp ?? 100; return; }
                    if(!otherPlayers[id]) {
                        otherPlayers[id] = createModel(0xff2200);
                        otherPlayers[id].add(createSword());
                        scene.add(otherPlayers[id]);
                    }
                    const p = otherPlayers[id];
                    p.position.lerp(new THREE.Vector3(d.x, d.y, d.z), 0.2);
                    p.rotation.y = d.ry || 0;
                    p.children[2].position.z = d.at ? -1.2 : 0.3;
                    if(d.hp <= 0) { p.rotation.z = Math.PI/2; p.position.y = 0.4; } 
                    else { p.rotation.z = 0; p.position.y = d.y; }
                    html += `<div>${d.n}: ${d.hp}%</div>`;
                });
                document.getElementById('players-inner').innerHTML = html;
            });

            db.ref('leaderboard').orderByValue().limitToLast(5).on('value', snap => {
                let h = ""; snap.forEach(s => { h = `<div>${s.key}: ${s.val()}</div>` + h; });
                document.getElementById('lb-list').innerHTML = h;
            });

            setInterval(() => { if(inGame && !isDead) P_REF.child(myID).update({ ls: Date.now() }); }, 2000);
            animate();
        }

        function attack() {
            if(isDead || isAtk) return;
            isAtk = true; mySword.position.z = -1.2;
            P_REF.child(myID).update({ at: true });
            setTimeout(() => { mySword.position.z = 0.3; isAtk = false; P_REF.child(myID).update({ at: false }); }, 150);

            Object.keys(otherPlayers).forEach(id => {
                if(myModel.position.distanceTo(otherPlayers[id].position) < 5) {
                    P_REF.child(id).transaction(p => {
                        // КРИТИЧЕСКИЙ ФИКС: Урон и килл только если игрок живой
                        if (p && p.hp > 0) {
                            p.hp -= 20;
                            if (p.hp <= 0) {
                                p.hp = 0; // Фиксируем смерть
                                db.ref('leaderboard/' + myNick).transaction(k => (k||0)+1);
                            }
                        }
                        return p;
                    });
                }
            });
        }

        function animate() {
            if(!inGame) return;
            requestAnimationFrame(animate);
            if(!isDead) {
                const move = new THREE.Vector3();
                if(moveState.f) move.z -= 1; if(moveState.b) move.z += 1;
                if(moveState.l) move.x -= 1; if(moveState.r) move.x += 1;
                if(move.length() > 0) {
                    move.applyAxisAngle(new THREE.Vector3(0,1,0), camAzimuth);
                    myModel.position.add(move.normalize().multiplyScalar(moveSpd));
                    myModel.rotation.y = Math.atan2(move.x, move.z);
                }
                
                if(!isFlying) {
                    myModel.position.y += vy;
                    if(myModel.position.y > 0) { vy -= 0.025; canJump = false; }
                    else { myModel.position.y = 0; vy = 0; canJump = true; }
                } else {
                    if(moveState.f) myModel.position.y += 0.1;
                    if(moveState.b) myModel.position.y -= 0.1;
                }
                
                P_REF.child(myID).update({ x: myModel.position.x, y: myModel.position.y, z: myModel.position.z, ry: myModel.rotation.y, n: myNick });
            }
            camera.position.set(myModel.position.x + camDist * Math.sin(camAzimuth), myModel.position.y + 10, myModel.position.z + camDist * Math.cos(camAzimuth));
            camera.lookAt(myModel.position.x, myModel.position.y + 1, myModel.position.z);
            document.getElementById('hp-fill').style.width = myHP + "%";
            document.getElementById('hp-text').innerText = myHP + " / 100";
            renderer.render(scene, camera);
        }

        // Admin Actions
        window.adjS = (v) => { moveSpd = Math.max(0.1, moveSpd + v); document.getElementById('v-spd').innerText = moveSpd.toFixed(1); };
        window.adjJ = (v) => { jumpPwr = Math.max(0.1, jumpPwr + v); document.getElementById('v-jmp').innerText = jumpPwr.toFixed(1); };
        window.clearLeaderboard = () => { if(confirm("Очистить ТОП?")) db.ref('leaderboard').remove(); };

        document.getElementById('btn-fly').onclick = function() {
            isFlying = !isFlying;
            this.innerText = isFlying ? "FLY: ON" : "FLY: OFF";
            this.style.background = isFlying ? "green" : "#444";
        };

        window.startGame = () => {
            myNick = document.getElementById('nick-input').value.trim() || "Pro";
            const pass = document.getElementById('admin-input').value.trim().toLowerCase();
            if(pass === "la ginger sekolah") {
                isAdmin = true;
                document.getElementById('admin-menu').classList.remove('hidden');
            }
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('mobile-ui').classList.remove('hidden');
            inGame = true; init();
            P_REF.child(myID).set({ n: myNick, hp: 100, x: 0, y: 0, z: 0, ls: Date.now() });
            P_REF.child(myID).onDisconnect().remove();
        };

        window.respawn = () => { location.reload(); };

        const setupBtn = (id, k) => {
            const e = document.getElementById(id);
            e.onpointerdown = () => moveState[k] = true;
            e.onpointerup = () => moveState[k] = false;
            e.onpointerleave = () => moveState[k] = false;
        };
        setupBtn('m-w','f'); setupBtn('m-s','b'); setupBtn('m-a','l'); setupBtn('m-d','r');
        document.getElementById('m-jump').onpointerdown = () => { if(canJump) vy = jumpPwr; };
        document.getElementById('m-atk').onpointerdown = attack;

        window.onkeydown = (e) => { 
            if(e.code==='KeyW')moveState.f=true; if(e.code==='KeyS')moveState.b=true; 
            if(e.code==='KeyA')moveState.l=true; if(e.code==='KeyD')moveState.r=true; 
            if(e.code==='Space'&&canJump)vy=jumpPwr;
        };
        window.onkeyup = (e) => { 
            if(e.code==='KeyW')moveState.f=false; if(e.code==='KeyS')moveState.b=false; 
            if(e.code==='KeyA')moveState.l=false; if(e.code==='KeyD')moveState.r=false; 
        };
        window.onmousedown = (e) => { if(e.button===0&&inGame)attack(); if(e.button===2)window.isR=true; };
        window.onmouseup = () => window.isR=false;
        window.onmousemove = (e) => { if(window.isR) camAzimuth -= e.movementX * 0.01; };
        window.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
