<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Brainrot Multiplayer Online</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #111; color: white; }
        #menu { position: absolute; width: 100%; height: 100%; z-index: 100; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); }
        .window { background: #222; padding: 30px; border-radius: 15px; border: 3px solid #00b06f; text-align: center; }
        input { padding: 12px; margin: 10px; border-radius: 5px; border: none; width: 250px; font-size: 16px; background: #333; color: white; }
        button { padding: 12px 30px; background: #00b06f; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #hud { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; z-index: 50; pointer-events: none; }
        .hidden { display: none !important; }
        #status { font-size: 12px; margin-top: 5px; color: #ffcc00; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="window">
            <h1 style="color: #00b06f;">BRAINROT ONLINE</h1>
            <input type="text" id="nick-input" placeholder="Ник (английский)..."><br>
            <input type="text" id="friend-id-input" placeholder="ID друга (необязательно)"><br>
            <button id="start-btn">ИГРАТЬ</button>
        </div>
    </div>

    <div id="hud" class="hidden">
        <div>НИК: <span id="display-nick">?</span></div>
        <div>ТВОЙ ID: <span id="display-id" style="color: #ffcc00;">...</span></div>
        <div id="status">Статус: Загрузка...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, pivot, playerModel;
        let peer, conn, myID;
        let otherPlayers = {}; 
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();

        const startBtn = document.getElementById('start-btn');

        // СЕТЕВАЯ ЛОГИКА
        function initNet(nick) {
            const cleanNick = nick.replace(/[^a-zA-Z0-9]/g, "");
            myID = cleanNick + "-" + Math.floor(Math.random() * 9000 + 1000);
            document.getElementById('display-id').innerText = myID;
            document.getElementById('display-nick').innerText = cleanNick;

            peer = new Peer(myID);

            peer.on('open', () => {
                document.getElementById('status').innerText = "Статус: В сети. Жду друга.";
                const targetID = document.getElementById('friend-id-input').value.trim();
                if(targetID) connectTo(targetID);
            });

            peer.on('connection', (c) => setupConnection(c));
            
            peer.on('error', (err) => {
                document.getElementById('status').innerText = "Ошибка: " + err.type;
                console.error(err);
            });
        }

        function connectTo(id) {
            const c = peer.connect(id.trim());
            setupConnection(c);
        }

        function setupConnection(c) {
            conn = c;
            conn.on('open', () => {
                document.getElementById('status').innerText = "Статус: СОЕДИНЕНО!";
                document.getElementById('status').style.color = "#00ff00";
                setInterval(() => {
                    if(conn && conn.open) {
                        conn.send({id: myID, x: pivot.position.x, y: pivot.position.y, z: pivot.position.z, ry: pivot.rotation.y});
                    }
                }, 40);
            });
            conn.on('data', (data) => syncPlayer(data));
        }

        function syncPlayer(data) {
            if(!otherPlayers[data.id]) {
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.5), new THREE.MeshStandardMaterial({color: 0x0077ff}));
                body.position.y = 0.7;
                group.add(body);
                scene.add(group);
                otherPlayers[data.id] = group;
            }
            otherPlayers[data.id].position.lerp(new THREE.Vector3(data.x, data.y, data.z), 0.4);
            otherPlayers[data.id].rotation.y = data.ry;
        }

        // ИГРА
        startBtn.onclick = () => {
            const nick = document.getElementById('nick-input').value.trim();
            if(!nick) return alert("Введи ник!");
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            initNet(nick);
            initGame();
        };

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            pivot = new THREE.Group();
            scene.add(pivot);

            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.5), new THREE.MeshStandardMaterial({color: 0xff4444}));
            body.position.y = 0.7;
            playerModel = new THREE.Group();
            playerModel.add(body);
            scene.add(playerModel);

            controls = new PointerLockControls(pivot, document.body);
            document.body.addEventListener('click', () => controls.lock());

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x222222}));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            window.onkeydown = (e) => {
                if(e.code === 'KeyW') moveForward = true;
                if(e.code === 'KeyS') moveBackward = true;
                if(e.code === 'KeyA') moveLeft = true;
                if(e.code === 'KeyD') moveRight = true;
            };
            window.onkeyup = (e) => {
                if(e.code === 'KeyW') moveForward = false;
                if(e.code === 'KeyS') moveBackward = false;
                if(e.code === 'KeyA') moveLeft = false;
                if(e.code === 'KeyD') moveRight = false;
            };

            function animate() {
                requestAnimationFrame(animate);
                if (controls.isLocked) {
                    const dt = 0.016;
                    if (moveForward) controls.moveForward(10 * dt);
                    if (moveBackward) controls.moveForward(-10 * dt);
                    if (moveLeft) controls.moveRight(-10 * dt);
                    if (moveRight) controls.moveRight(10 * dt);

                    playerModel.position.copy(pivot.position);
                    playerModel.rotation.y = pivot.rotation.y;

                    const camPos = new THREE.Vector3(0, 2, 8).applyMatrix4(pivot.matrixWorld);
                    camera.position.lerp(camPos, 0.1);
                    camera.lookAt(pivot.position.x, pivot.position.y + 1, pivot.position.z);
                }
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
