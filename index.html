<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox PVP Arena</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #87CEEB; touch-action: none; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1000; background: rgba(0,0,0,0.8); }
        .window { background: #fff; padding: 30px; border-radius: 20px; border: 5px solid #f00; text-align: center; }
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 100; pointer-events: none; }
        .bar { width: 200px; height: 20px; border: 2px solid #000; background: #555; margin: 5px 0; }
        #hp-bar { background: #ff3333; width: 100%; height: 100%; }
        #stamina-bar { background: #ffeb3b; width: 100%; height: 100%; }
        #mobile-controls { position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: repeat(3, 60px); gap: 5px; }
        .m-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.3); border: 2px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; }
        #action-btns { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 10px; }
        .action-circle { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="window">
            <h1>DANBLOX PVP</h1>
            <input type="text" id="nick-input" placeholder="НИК..." maxlength="10" style="padding:10px; font-size:18px;"><br><br>
            <button onclick="startGame()" style="padding:15px 30px; background:#f00; color:#fff; border:none; cursor:pointer;">ИГРАТЬ</button>
        </div>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="bar"><div id="hp-bar"></div></div>
        <div class="bar"><div id="stamina-bar"></div></div>
    </div>

    <div id="mobile-controls" class="hidden">
        <div></div><div class="m-btn" id="btn-w">W</div><div></div>
        <div class="m-btn" id="btn-a">A</div><div class="m-btn" id="btn-s">S</div><div class="m-btn" id="btn-d">D</div>
    </div>

    <div id="action-btns" class="hidden">
        <div class="action-circle" style="background:#2196f3;" id="btn-jump">JUMP</div>
        <div class="action-circle" style="background:#ff9800;" id="btn-shift">SHIFT</div>
        <div class="action-circle" style="background:#f44336;" id="btn-e">АТАКА</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f",
            storageBucket: "danblox-e209f.firebasestorage.app",
            messagingSenderId: "828099060847",
            appId: "1:828099060847:web:9bb0bebc8c02833ce7d99a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let scene, camera, renderer, myModel;
        let myID = 'u' + Math.floor(Math.random() * 1000000);
        let myNick = "", myHP = 100, myStamina = 100;
        let otherPlayers = {}, moveState = { f: false, b: false, l: false, r: false };
        let vy = 0, canJump = true, isSprinting = false, inGame = false;
        let camAzimuth = 0, camElevation = 0.5, camDist = 12;

        function createNameTag(name) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, 256, 64);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(name, 128, 45);
            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            sprite.scale.set(3, 0.75, 1);
            sprite.position.y = 2.5;
            return sprite;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 20, 10);
            scene.add(ambient, sun);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x2e7d32}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(10, 500), new THREE.MeshStandardMaterial({color: 0xd32f2f}));
            road.rotation.x = -Math.PI/2; road.position.y = 0.02; scene.add(road);

            myModel = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.5), new THREE.MeshStandardMaterial({color: 0x2196f3}));
            body.position.y = 1; myModel.add(body);
            myModel.add(createNameTag(myNick));
            scene.add(myModel);

            db.ref('players/' + myID).onDisconnect().remove();
            db.ref('players').on('value', snap => {
                const data = snap.val() || {};
                // Удаляем тех, кто вышел
                Object.keys(otherPlayers).forEach(id => {
                    if(!data[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }
                });
                // Обновляем существующих
                Object.keys(data).forEach(id => {
                    if(id === myID) {
                        if(data[id].hp <= 0 && inGame) backToMenu();
                        myHP = data[id].hp || 100;
                        return;
                    }
                    if(!otherPlayers[id]) {
                        const g = new THREE.Group();
                        g.add(new THREE.Mesh(new THREE.BoxGeometry(1,2,0.5), new THREE.MeshStandardMaterial({color: 0xf44336})));
                        g.children[0].position.y = 1;
                        g.add(createNameTag(data[id].n));
                        scene.add(g); otherPlayers[id] = g;
                    }
                    otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
                });
            });

            animate();
        }

        function backToMenu() {
            inGame = false;
            db.ref('players/' + myID).remove();
            location.reload(); // Простой способ вернуться в меню
        }

        function attack() {
            Object.keys(otherPlayers).forEach(id => {
                if(myModel.position.distanceTo(otherPlayers[id].position) < 4) {
                    db.ref('players/' + id + '/hp').transaction(h => (h || 100) - 10);
                }
            });
        }

        function animate() {
            if(!inGame) return;
            requestAnimationFrame(animate);

            let speed = (isSprinting && myStamina > 0) ? 0.4 : 0.18;
            if(isSprinting && myStamina > 0) myStamina -= 0.6; else if(myStamina < 100) myStamina += 0.4;

            const dir = new THREE.Vector3();
            if(moveState.f) dir.z -= 1; if(moveState.b) dir.z += 1;
            if(moveState.l) dir.x -= 1; if(moveState.r) dir.x += 1;

            if(dir.length() > 0) {
                dir.applyAxisAngle(new THREE.Vector3(0,1,0), camAzimuth);
                myModel.position.add(dir.normalize().multiplyScalar(speed));
                myModel.rotation.y = Math.atan2(dir.x, dir.z);
            }

            // Прыжок
            myModel.position.y += vy;
            if(myModel.position.y > 0) { vy -= 0.012; canJump = false; }
            else { myModel.position.y = 0; vy = 0; canJump = true; }

            // Камера
            camera.position.x = myModel.position.x + camDist * Math.sin(camAzimuth) * Math.cos(camElevation);
            camera.position.y = myModel.position.y + camDist * Math.sin(camElevation) + 2;
            camera.position.z = myModel.position.z + camDist * Math.cos(camAzimuth) * Math.cos(camElevation);
            camera.lookAt(myModel.position.x, myModel.position.y + 1, myModel.position.z);

            document.getElementById('hp-bar').style.width = myHP + "%";
            document.getElementById('stamina-bar').style.width = myStamina + "%";

            db.ref('players/' + myID).update({ x: myModel.position.x, y: myModel.position.y, z: myModel.position.z, n: myNick, hp: myHP });
            renderer.render(scene, camera);
        }

        window.startGame = () => {
            myNick = document.getElementById('nick-input').value || "Noob";
            document.getElementById('login-screen').classList.add('hidden');
            ['ui-layer', 'mobile-controls', 'action-btns'].forEach(id => document.getElementById(id).classList.remove('hidden'));
            inGame = true;
            init();
        };

        window.onkeydown = (e) => {
            if(e.code === 'KeyW') moveState.f = true; if(e.code === 'KeyS') moveState.b = true;
            if(e.code === 'KeyA') moveState.l = true; if(e.code === 'KeyD') moveState.r = true;
            if(e.code === 'Space' && canJump) vy = 0.3;
            if(e.code === 'ShiftLeft') isSprinting = true;
            if(e.code === 'KeyE') attack();
        };
        window.onkeyup = (e) => {
            if(e.code === 'KeyW') moveState.f = false; if(e.code === 'KeyS') moveState.b = false;
            if(e.code === 'KeyA') moveState.l = false; if(e.code === 'KeyD') moveState.r = false;
            if(e.code === 'ShiftLeft') isSprinting = false;
        };

        // Мышь для вращения камеры
        let isRightMB = false;
        window.onmousedown = (e) => { if(e.button === 2) isRightMB = true; };
        window.onmouseup = () => isRightMB = false;
        window.onmousemove = (e) => { if(isRightMB) { camAzimuth -= e.movementX * 0.01; camElevation = Math.max(0.1, Math.min(1.4, camElevation + e.movementY * 0.01)); }};
        window.oncontextmenu = (e) => e.preventDefault();

        // Мобилки
        const bind = (id, k) => { document.getElementById(id).ontouchstart = () => moveState[k] = true; document.getElementById(id).ontouchend = () => moveState[k] = false; };
        bind('btn-w','f'); bind('btn-s','b'); bind('btn-a','l'); bind('btn-d','r');
        document.getElementById('btn-jump').onclick = () => { if(canJump) vy = 0.3; };
        document.getElementById('btn-shift').ontouchstart = () => isSprinting = true;
        document.getElementById('btn-shift').ontouchend = () => isSprinting = false;
        document.getElementById('btn-e').onclick = attack;
    </script>
</body>
</html>
