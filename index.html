<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanChat Pro: Calling & Editing</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0d0f; --panel: #16191d; --accent: #00a2ff; --text: #ffffff; --side-w: 280px; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: var(--side-w); background: var(--panel); border-right: 1px solid #2d3239; display: flex; flex-direction: column; }
        .my-profile { padding: 20px; background: #1c2127; border-bottom: 1px solid #2d3239; text-align: center; }
        .my-id-label { font-size: 24px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        #contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 15px; border-bottom: 1px solid #1f2329; cursor: pointer; display: flex; align-items: center; gap: 12px; position: relative; }
        .contact-item:hover { background: #23282e; }
        .contact-item img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

        /* Main Content */
        #main-content { flex: 1; display: flex; flex-direction: column; background: #0f1216; position: relative; }
        header { background: var(--panel); padding: 12px 20px; border-bottom: 1px solid #2d3239; display: flex; justify-content: space-between; align-items: center; }
        .call-btn { font-size: 20px; cursor: pointer; background: #2d3239; border: none; color: #00ff88; padding: 5px 15px; border-radius: 8px; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Messages */
        .msg { max-width: 70%; padding: 10px; border-radius: 12px; position: relative; min-width: 60px; }
        .msg.me { align-self: flex-end; background: #005bb5; }
        .msg.other { align-self: flex-start; background: #23282e; }
        .sender-name { font-size: 11px; font-weight: bold; margin-bottom: 4px; color: var(--accent); cursor: pointer; }
        .reply-box { font-size: 11px; background: rgba(0,0,0,0.2); padding: 5px; border-left: 3px solid #fff; margin-bottom: 5px; border-radius: 4px; }

        /* Context Menu */
        #ctx-menu { position: fixed; background: #2a2e35; border: 1px solid #444; border-radius: 8px; z-index: 5000; display: none; min-width: 150px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .ctx-item { padding: 10px 15px; cursor: pointer; font-size: 14px; }
        .ctx-item:hover { background: var(--accent); }

        /* Call Modal */
        #call-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .call-window { background: #1c2127; padding: 40px; border-radius: 30px; text-align: center; width: 300px; border: 1px solid #333; }
        .call-av { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #00ff88; margin-bottom: 20px; }
        .call-controls { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* Input Area */
        .input-area { background: var(--panel); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #2d3239; position: relative; }
        #reply-preview { position: absolute; top: -40px; left: 0; right: 0; background: #222; padding: 10px; font-size: 12px; border-top: 2px solid var(--accent); display: none; justify-content: space-between; }

        .hidden { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ctx-menu">
        <div class="ctx-item" onclick="prepareReply()">Ответить</div>
        <div id="my-options" class="hidden">
            <div class="ctx-item" onclick="prepareEdit()">Изменить</div>
            <div class="ctx-item" style="color:#ff4444" onclick="deleteMsg()">Удалить</div>
        </div>
    </div>

    <div id="call-modal">
        <div class="call-window">
            <img id="call-av" class="call-av" src="">
            <h2 id="call-nick">Звонок...</h2>
            <div id="call-timer">00:00</div>
            <div class="call-controls">
                <button class="circle-btn" style="background:#444" onclick="toggleMic()" id="mic-btn">🎙️</button>
                <button class="circle-btn" style="background:#ff4444" onclick="endCall()">📞</button>
            </div>
        </div>
    </div>

    <div id="auth-screen" class="screen" style="position:fixed; inset:0; background:#0b0d0f; z-index:20000; display:flex; align-items:center; justify-content:center;">
        <div class="auth-box" style="background:var(--panel); padding:30px; border-radius:24px; text-align:center; width:320px; border:1px solid #333;">
            <h2>DanChat</h2>
            <img id="preview-av" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; margin-bottom:15px;">
            <input type="file" id="av-file" class="hidden" onchange="previewFile(this)">
            <label for="av-file" style="color:var(--accent); cursor:pointer; font-size:12px;">СМЕНИТЬ АВАТАР</label>
            <input type="text" id="nick" placeholder="Ваш ник" style="width:100%; padding:12px; margin:10px 0; background:#0b0d0f; border:1px solid #333; color:white; border-radius:8px;">
            <input type="password" id="pass" placeholder="Пароль" style="width:100%; padding:12px; margin:10px 0; background:#0b0d0f; border:1px solid #333; color:white; border-radius:8px;">
            <button onclick="handleAuth()" style="width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:10px; cursor:pointer;">ВОЙТИ</button>
        </div>
    </div>

    <div id="sidebar" class="hidden">
        <div class="my-profile">
            <div style="font-size:11px; opacity:0.5">МОЙ ID</div>
            <div class="my-id-label" id="my-id-display">000000</div>
            <b id="my-nick-label"></b>
        </div>
        <div id="contact-list"></div>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <div>
                <b id="active-chat-info">Глобальный чат</b><br>
                <small id="online-status" style="color:#00ff88"></small>
            </div>
            <button class="call-btn" onclick="startCall()">📞 Звонок</button>
        </header>

        <div id="chat-window" onclick="closeCtx()"></div>

        <div id="reply-preview">
            <span id="reply-label"></span>
            <span onclick="cancelSpecial()" style="cursor:pointer">✕</span>
        </div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; border-radius:8px; padding:10px 20px; color:white; cursor:pointer;">></button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myData = {}, activeChatId = "global", activePeerNick = "";
        let selectedMsgId = null, selectedMsgData = null, isEditing = false, replyData = null;

        // AUTH & UTILS
        function previewFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('preview-av').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        async function handleAuth() {
            const nick = document.getElementById('nick').value.trim();
            const pass = document.getElementById('pass').value.trim();
            if(!nick) return;
            const s = await db.ref('users/'+nick).get();
            if(s.exists()){
                if(s.val().pass !== pass) return alert("Неверный пароль!");
                enter(s.val());
            } else {
                const user = { nick, pass, av: document.getElementById('preview-av').src, id: Math.floor(100000+Math.random()*900000) };
                await db.ref('users/'+nick).set(user);
                await db.ref('id_map/'+user.id).set(nick);
                enter(user);
            }
        }

        function enter(data) {
            myData = data;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('my-id-display').innerText = data.id;
            document.getElementById('my-nick-label').innerText = data.nick;
            db.ref('presence/'+myData.nick).set(true);
            db.ref('presence/'+myData.nick).onDisconnect().remove();
            switchChat('global', 'Глобальный чат');
            loadContacts();
        }

        // CONTACTS & REALTIME CHAT
        function loadContacts() {
            db.ref('users/'+myData.nick+'/friends').on('value', async s => {
                const list = document.getElementById('contact-list');
                list.innerHTML = `<div class="contact-item" onclick="switchChat('global','Глобальный')"><img src="https://cdn-icons-png.flaticon.com/512/864/864685.png"><div><b>Глобальный чат</b></div></div>`;
                for(let fNick in s.val()){
                    const info = await db.ref('users/'+fNick).get();
                    if(!info.exists()) continue;
                    const d = info.val();
                    const item = document.createElement('div');
                    item.className = 'contact-item';
                    item.onclick = () => switchChat(getRoomId(myData.nick, d.nick), d.nick);
                    item.innerHTML = `<img src="${d.av}"><div><b>${d.nick}</b><br><small>ID: ${d.id}</small></div>`;
                    list.appendChild(item);
                }
            });
        }

        function getRoomId(n1, n2) { return [n1, n2].sort().join("_"); }

        async function switchChat(id, name) {
            activeChatId = id;
            activePeerNick = (name === 'Глобальный') ? "" : name;
            document.getElementById('active-chat-info').innerText = name;
            document.getElementById('chat-window').innerHTML = "";
            db.ref('messages/'+id).off();
            db.ref('messages/'+id).on('child_added', s => drawMsg(s.key, s.val()));
            db.ref('messages/'+id).on('child_changed', s => {
                const el = document.getElementById('msg-'+s.key);
                if(el) el.querySelector('.txt').innerText = s.val().txt + " (изм.)";
            });
            db.ref('messages/'+id).on('child_removed', s => {
                const el = document.getElementById('msg-'+s.key);
                if(el) el.remove();
            });
        }

        async function clickNick(nick) {
            if(nick === myData.nick) return;
            await db.ref('users/'+myData.nick+'/friends/'+nick).set(true);
            await db.ref('users/'+nick+'/friends/'+myData.nick).set(true);
            switchChat(getRoomId(myData.nick, nick), nick);
        }

        // MESSAGE ACTIONS
        function drawMsg(id, m) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.id = 'msg-' + id;
            div.className = `msg ${m.sn === myData.nick ? 'me' : 'other'}`;
            
            let replyHtml = m.rp ? `<div class="reply-box">↪ ${m.rp}</div>` : "";
            div.innerHTML = `
                <span class="sender-name" onclick="clickNick('${m.sn}')">${m.sn}</span>
                ${replyHtml}
                <div class="txt">${m.txt}</div>
            `;

            div.oncontextmenu = (e) => {
                e.preventDefault();
                openCtx(e, id, m);
            };
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function openCtx(e, id, m) {
            selectedMsgId = id;
            selectedMsgData = m;
            const menu = document.getElementById('ctx-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
            document.getElementById('my-options').className = (m.sn === myData.nick) ? "" : "hidden";
        }

        function closeCtx() { document.getElementById('ctx-menu').style.display = 'none'; }

        function prepareReply() {
            replyData = selectedMsgData;
            isEditing = false;
            document.getElementById('reply-preview').style.display = 'flex';
            document.getElementById('reply-label').innerText = "Ответ " + replyData.sn + ": " + replyData.txt;
            closeCtx();
        }

        function prepareEdit() {
            isEditing = true;
            document.getElementById('msg-input').value = selectedMsgData.txt;
            document.getElementById('reply-preview').style.display = 'flex';
            document.getElementById('reply-label').innerText = "Редактирование...";
            closeCtx();
        }

        function deleteMsg() {
            if(confirm("Удалить сообщение?")) db.ref('messages/'+activeChatId+'/'+selectedMsgId).remove();
            closeCtx();
        }

        function cancelSpecial() {
            isEditing = false; replyData = null;
            document.getElementById('msg-input').value = "";
            document.getElementById('reply-preview').style.display = 'none';
        }

        function sendMsg() {
            const inp = document.getElementById('msg-input');
            const txt = inp.value.trim();
            if(!txt) return;

            if(isEditing) {
                db.ref('messages/'+activeChatId+'/'+selectedMsgId).update({ txt: txt });
            } else {
                db.ref('messages/'+activeChatId).push({
                    sn: myData.nick,
                    txt: txt,
                    rp: replyData ? replyData.txt : null,
                    ts: Date.now()
                });
            }
            inp.value = "";
            cancelSpecial();
        }

        // CALL LOGIC (UI)
        async function startCall() {
            const modal = document.getElementById('call-modal');
            modal.style.display = 'flex';
            if(activePeerNick) {
                const s = await db.ref('users/'+activePeerNick).get();
                document.getElementById('call-av').src = s.val().av;
                document.getElementById('call-nick').innerText = s.val().nick;
            } else {
                document.getElementById('call-nick').innerText = "Групповой звонок";
                document.getElementById('call-av').src = "https://cdn-icons-png.flaticon.com/512/864/864685.png";
            }
            // Здесь должна быть инициализация WebRTC/PeerJS
        }

        function endCall() { document.getElementById('call-modal').style.display = 'none'; }
        function toggleMic() {
            const btn = document.getElementById('mic-btn');
            btn.style.background = (btn.style.background === 'rgb(68, 68, 68)') ? '#ff4444' : '#444';
        }
    </script>
</body>
</html>
