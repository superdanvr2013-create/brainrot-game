<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DanBlox Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #menu { position: absolute; width: 100%; height: 100%; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #111; }
        .window { background: #222; padding: 40px; border: 3px solid #0f0; border-radius: 20px; text-align: center; color: #fff; }
        input { padding: 15px; margin: 10px; width: 250px; background: #000; color: #0f0; border: 1px solid #0f0; outline: none; }
        button { padding: 15px 30px; background: #0f0; color: #000; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        
        #sidebar { position: absolute; right: 10px; top: 10px; bottom: 10px; width: 250px; z-index: 500; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .panel { background: rgba(0, 0, 0, 0.8); border: 2px solid #0f0; border-radius: 10px; padding: 10px; color: #0f0; pointer-events: auto; }
        #player-list { max-height: 120px; overflow-y: auto; margin-top: 5px; border-top: 1px solid #0f04; }
        #chat-messages { height: 250px; overflow-y: auto; color: #fff; font-size: 14px; margin-bottom: 5px; }
        #buy-ui { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="window">
            <h1 style="color: #0f0;">DANBLOX ONLINE</h1>
            <input type="text" id="nick-input" placeholder="ТВОЙ НИК..." maxlength="12"><br>
            <button id="start-btn">ИГРАТЬ</button>
        </div>
    </div>

    <div id="buy-ui" class="panel">
        <button id="buy-bot-btn" style="width:100%">КУПИТЬ РОБОТА (E)</button>
    </div>

    <div id="sidebar" class="hidden">
        <div class="panel">
            <b>ИГРОКИ: <span id="online-count">0</span></b>
            <div id="player-list"></div>
        </div>
        <div class="panel">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" style="width:90%; background:#000; color:#fff; border:1px solid #0f0;" placeholder="Чат...">
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f",
            storageBucket: "danblox-e209f.firebasestorage.app",
            messagingSenderId: "828099060847",
            appId: "1:828099060847:web:9bb0bebc8c02833ce7d99a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const playersRef = db.ref('players');
        const chatRef = db.ref('chat');

        let scene, camera, renderer, controls, pivot, myModel;
        let myID = 'u' + Math.floor(Math.random() * 1000000);
        let myNick, otherPlayers = {}, otherBases = {}, robots = [];
        let moveF, moveB, moveL, moveR, canJump = true, velocity = new THREE.Vector3();
        let myBasePos = { x: (Math.random()-0.5)*180, z: (Math.random()-0.5)*180 };

        function createHuman(color) {
            const g = new THREE.Group();
            const m = new THREE.MeshStandardMaterial({ color: color });
            const h = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6), m); h.position.y = 1.6; g.add(h);
            const b = new THREE.Mesh(new THREE.BoxGeometry(0.8,1,0.4), m); b.position.y = 0.8; g.add(b);
            const l = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), m); l.position.set(-0.25,0.2,0); g.add(l);
            const r = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), m); r.position.set(0.25,0.2,0); g.add(r);
            return g;
        }

        function createBase(pos) {
            const g = new THREE.Group(); g.position.set(pos.x, 0, pos.z);
            const w = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 0.5), new THREE.MeshStandardMaterial({color:0x444}));
            w.position.z = -5; g.add(w);
            scene.add(g); return g;
        }

        function initNet(nick) {
            myNick = nick;
            createBase(myBasePos);
            pivot.position.set(myBasePos.x, 0, myBasePos.z + 8);

            playersRef.on('value', snap => {
                const data = snap.val() || {};
                const list = document.getElementById('player-list');
                list.innerHTML = '';
                Object.keys(data).forEach(id => {
                    list.innerHTML += `<div>${data[id].nick}</div>`;
                    if(id === myID) return;
                    if(!otherPlayers[id]) {
                        otherPlayers[id] = createHuman(0x0088ff);
                        scene.add(otherPlayers[id]);
                        if(data[id].bx) otherBases[id] = createBase({x: data[id].bx, z: data[id].bz});
                    }
                    otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
                });
                document.getElementById('online-count').innerText = Object.keys(data).length;
            });

            chatRef.limitToLast(10).on('child_added', s => {
                const m = s.val();
                const b = document.getElementById('chat-messages');
                b.innerHTML += `<div><b>${m.u}:</b> ${m.t}</div>`;
                b.scrollTop = b.scrollHeight;
            });
            playersRef.child(myID).onDisconnect().remove();
        }

        function initGame() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000,1000), new THREE.MeshStandardMaterial({color:0x228B22}));
            floor.rotation.x = -Math.PI/2; scene.add(floor);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(10, 1000), new THREE.MeshBasicMaterial({color:0xff0000}));
            road.rotation.x = -Math.PI/2; road.position.y = 0.02; scene.add(road);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            pivot = new THREE.Group(); scene.add(pivot);
            myModel = createHuman(0x00ff00); scene.add(myModel);
            controls = new PointerLockControls(pivot, document.body);

            setInterval(() => {
                const bot = createHuman(0xff0000);
                bot.position.set(0, 0, -500); bot.target = null;
                scene.add(bot); robots.push(bot);
            }, 5000);

            window.onkeydown = e => {
                if(document.activeElement.id==='chat-input') return;
                if(e.code==='KeyW') moveF=true; if(e.code==='KeyS') moveB=true;
                if(e.code==='KeyA') moveL=true; if(e.code==='KeyD') moveR=true;
                if(e.code==='Space' && canJump){ velocity.y=0.25; canJump=false; }
                if(e.code==='KeyE' && window.nearBot){
                    window.nearBot.target = new THREE.Vector3(myBasePos.x, 0, myBasePos.z);
                    document.getElementById('buy-ui').style.display='none';
                }
            };
            window.onkeyup = e => {
                if(e.code==='KeyW') moveF=false; if(e.code==='KeyS') moveB=false;
                if(e.code==='KeyA') moveL=false; if(e.code==='KeyD') moveR=false;
            };

            document.getElementById('chat-input').onkeydown = e => {
                if(e.code==='Enter' && e.target.value.trim()){
                    chatRef.push({ u: myNick, t: e.target.value }); e.target.value = '';
                }
            };

            function animate() {
                requestAnimationFrame(animate);
                if(controls.isLocked) {
                    if(moveF) controls.moveForward(0.2); if(moveB) controls.moveForward(-0.2);
                    if(moveL) controls.moveRight(-0.2); if(moveR) controls.moveRight(0.2);
                    pivot.position.y += velocity.y;
                    if(pivot.position.y > 0) velocity.y -= 0.01; else { pivot.position.y=0; canJump=true; velocity.y=0; }
                    myModel.position.copy(pivot.position);
                    playersRef.child(myID).update({ x: pivot.position.x, y: pivot.position.y, z: pivot.position.z, nick: myNick, bx: myBasePos.x, bz: myBasePos.z });
                    
                    document.getElementById('buy-ui').style.display='none'; window.nearBot=null;
                    robots.forEach((bot, i) => {
                        if(!bot.target){
                            bot.position.z += 0.5;
                            if(pivot.position.distanceTo(bot.position)<6){ document.getElementById('buy-ui').style.display='block'; window.nearBot=bot; }
                        } else { bot.position.lerp(bot.target, 0.01); }
                    });
                }
                camera.position.set(pivot.position.x, pivot.position.y+6, pivot.position.z+12);
                camera.lookAt(pivot.position);
                renderer.render(scene, camera);
            }
            animate();
        }

        document.getElementById('start-btn').onclick = () => {
            const n = document.getElementById('nick-input').value.trim();
            if(!n) return;
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            initGame(); initNet(n);
        };
    </script>
</body>
</html>
