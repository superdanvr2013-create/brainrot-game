<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тест: Легенда канала Dan Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b0e16 0%, #161c2a 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        .quiz-container {
            max-width: 920px;
            width: 100%;
            background: rgba(18, 22, 35, 0.9);
            backdrop-filter: blur(3px);
            border-radius: 2.5rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 215, 120, 0.2);
            overflow: hidden;
            transition: all 0.2s;
        }

        .quiz-header {
            background: linear-gradient(135deg, #241c32 0%, #1a2538 100%);
            padding: 1.6rem 2rem;
            text-align: center;
            border-bottom: 3px solid #ffbc6e;
        }

        .quiz-header h1 {
            font-size: 2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFE5B4, #FFA54D);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }

        /* ссылка на YouTube */
        .youtube-link {
            display: inline-block;
            margin-top: 8px;
            font-size: 1rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 18px;
            border-radius: 60px;
            text-decoration: none;
            color: #FFD966;
            transition: 0.2s;
            backdrop-filter: blur(4px);
            border: 1px solid #ffbc6e55;
        }

        .youtube-link:hover {
            background: #ff5722cc;
            color: white;
            border-color: #ffcc88;
            transform: scale(1.02);
        }

        .questions-area {
            padding: 2rem 2rem 1rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .question-card {
            background: rgba(12, 16, 26, 0.7);
            border-radius: 1.8rem;
            padding: 1.3rem 1.6rem;
            border: 1px solid rgba(255, 190, 80, 0.3);
            transition: 0.2s;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: #faebc8;
            margin-bottom: 1.2rem;
            border-left: 5px solid #ffaa44;
            padding-left: 1rem;
            line-height: 1.3;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            list-style: none;
        }

        .option-item {
            display: flex;
            align-items: center;
            background: #10161f;
            border-radius: 3rem;
            border: 1px solid #2a3448;
            transition: all 0.2s;
            cursor: pointer;
            padding: 0.7rem 1.2rem;
        }

        .option-item:hover {
            background: #1c2638;
            border-color: #f5a742;
            transform: translateX(4px);
        }

        .option-item input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #8f9bb3;
            border-radius: 50%;
            margin-right: 1rem;
            background: #0b0f18;
            transition: 0.1s;
            cursor: pointer;
        }

        .option-item input[type="radio"]:checked {
            border-color: #ffaa44;
            background-color: #ffaa44;
            box-shadow: 0 0 0 3px rgba(255, 170, 68, 0.3);
        }

        .option-item input[type="radio"]:checked::after {
            content: "";
            display: block;
            width: 0.55rem;
            height: 0.55rem;
            background: #161c2a;
            border-radius: 50%;
            margin: 0.27rem auto;
        }

        .option-label {
            font-size: 1.05rem;
            font-weight: 500;
            color: #eef3ff;
            cursor: pointer;
            flex: 1;
        }

        .action-section {
            padding: 0.5rem 2rem 1.8rem;
            display: flex;
            justify-content: center;
        }

        .check-btn {
            background: linear-gradient(95deg, #FF9F3D, #FF6F2A);
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            color: #181c2c;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            box-shadow: 0 5px 0 #923e0c;
            transform: translateY(-2px);
            width: 100%;
            max-width: 300px;
            letter-spacing: 1px;
        }

        .check-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #923e0c;
        }

        .result-area {
            margin: 0 2rem 2rem 2rem;
            background: #03050ccc;
            border-radius: 1.8rem;
            padding: 1rem 1.8rem;
            backdrop-filter: blur(6px);
            border: 1px solid #ffcb7e;
            transition: 0.2s;
            text-align: center;
        }

        .result-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: #FFE2A4;
            line-height: 1.4;
        }

        .result-detail {
            font-size: 0.9rem;
            color: #c7d2ff;
            margin-top: 8px;
        }

        /* подсветка после проверки */
        .option-item.correct-highlight {
            background: #1f5437cc;
            border-color: #7be07b;
            box-shadow: 0 0 0 1px #aaffaa;
        }
        .option-item.wrong-highlight {
            background: #752a3bcc;
            border-color: #ff8877;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 0.9rem;
            color: #6a7a9e;
            border-top: 1px solid #2a3148;
            margin-top: 0.3rem;
        }

        @media (max-width: 620px) {
            .quiz-container {
                border-radius: 1.8rem;
            }
            .question-text {
                font-size: 1.2rem;
            }
            .option-label {
                font-size: 0.9rem;
            }
            .questions-area {
                padding: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-header">
        <h1>🎮 ТЕСТ: ЛЕГЕНДА DAN GAMES 🎮</h1>
        <a href="https://www.youtube.com/@superdan8459/featured" target="_blank" class="youtube-link" rel="noopener noreferrer">
            📺 проверь, насколько ты хорошо знаешь историю канала 📺
        </a>
    </div>

    <div class="questions-area" id="questionsArea"></div>

    <div class="action-section">
        <button class="check-btn" id="submitQuiz">🔥 ПРОВЕРИТЬ ЗНАНИЯ 🔥</button>
    </div>

    <div class="result-area" id="resultArea" style="display: none;">
        <div class="result-text" id="resultMessage"></div>
        <div class="result-detail" id="resultDetail">⭐ Ты можешь пройти тест заново и побить рекорд ⭐</div>
    </div>
    <footer>
        💡 Каждый вопрос — только один верный вариант. Жми на ответ и проверь себя!
    </footer>
</div>

<script>
    // ---------- РАСШИРЕННАЯ БАЗА ВОПРОСОВ (5 вопросов) ----------
    const quizData = [
        {
            id: 1,
            question: "С какой игры в роблоксе Dan Games начал свою карьеру?",
            options: ["Doors", "Paradox", "Steal A Brainrot", "Toilet Tower Defense"],
            correct: "Toilet Tower Defense"
        },
        {
            id: 2,
            question: "Какой был канал у Dan кроме Dan Games и NoobikCraft?",
            options: ["NoobikDan", "МегаДэн", "Мега Нубик", "DanTop"],
            correct: "Мега Нубик"
        },
        {
            id: 3,
            question: "Кто самый первый подписчик на канале?",
            options: ["Марк", "Оливер", "Игран", "Ртролик"],
            correct: "Игран"
        },
        {
            id: 4,
            question: "Как зовут Dan Games в реальной жизни?",
            options: ["Денис", "Дима", "Даня", "Давид"],
            correct: "Даня"
        },
        {
            id: 5,
            question: "Нравился ли мне Grow A Garden (оригинальная версия) когда он только появился?",
            options: [
                "Да очень нравился он прикольный!",
                "Не совсем но ближе всего к нравился",
                "почти вообще не нравился dan games старался не играть особо в эту игру"
            ],
            correct: "почти вообще не нравился dan games старался не играть особо в эту игру"
        }
    ];

    // Хранилище выбранных ответов (id вопроса → текст ответа)
    let userAnswers = {
        1: null,
        2: null,
        3: null,
        4: null,
        5: null
    };

    let submitted = false;      // флаг, показывающий что результаты показаны и есть подсветка
    let currentCorrectCount = 0;

    const questionsContainer = document.getElementById('questionsArea');
    const submitBtn = document.getElementById('submitQuiz');
    const resultArea = document.getElementById('resultArea');
    const resultMessageSpan = document.getElementById('resultMessage');
    const resultDetailSpan = document.getElementById('resultDetail');

    // ---------- Отрисовка всех вопросов ----------
    function renderQuestions() {
        questionsContainer.innerHTML = '';
        quizData.forEach(item => {
            const qCard = document.createElement('div');
            qCard.className = 'question-card';
            qCard.setAttribute('data-qid', item.id);

            const questionTitle = document.createElement('div');
            questionTitle.className = 'question-text';
            questionTitle.innerText = `${item.id}. ${item.question}`;
            qCard.appendChild(questionTitle);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            item.options.forEach(opt => {
                const li = document.createElement('li');
                li.className = 'option-item';
                li.setAttribute('data-qid', item.id);
                li.setAttribute('data-opt-value', opt);

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${item.id}`;
                radio.value = opt;
                radio.id = `q${item.id}_${opt.replace(/\s/g, '_').replace(/[^a-zA-Zа-яА-Я0-9_]/g, '')}`;

                // Если уже был сохранён ответ (для обновлений)
                if (userAnswers[item.id] === opt) {
                    radio.checked = true;
                }

                const label = document.createElement('label');
                label.htmlFor = radio.id;
                label.className = 'option-label';
                label.innerText = opt;

                li.appendChild(radio);
                li.appendChild(label);

                // обработчик клика на весь li — выбирает радио и убирает подсветку если был сабмит
                li.addEventListener('click', (e) => {
                    if (submitted) {
                        resetToActiveMode();
                    }
                    radio.checked = true;
                    userAnswers[item.id] = opt;
                    // убираем подсветку у этого вопроса
                    clearHighlightForQuestion(item.id);
                    if (submitted === true) {
                        submitted = false;
                        resultArea.style.display = 'none';
                    }
                });

                radio.addEventListener('change', () => {
                    if (submitted) {
                        resetToActiveMode();
                    }
                    userAnswers[item.id] = opt;
                    clearHighlightForQuestion(item.id);
                    if (submitted) {
                        submitted = false;
                        resultArea.style.display = 'none';
                    }
                });

                optionsList.appendChild(li);
            });

            qCard.appendChild(optionsList);
            questionsContainer.appendChild(qCard);
        });
    }

    // Сброс активного режима: убираем панель результатов, снимаем подсветки
    function resetToActiveMode() {
        submitted = false;
        resultArea.style.display = 'none';
        const allOptions = document.querySelectorAll('.option-item');
        allOptions.forEach(opt => {
            opt.classList.remove('correct-highlight', 'wrong-highlight');
        });
    }

    // снять подсветку с конкретного вопроса
    function clearHighlightForQuestion(qid) {
        const optsForQuestion = document.querySelectorAll(`.option-item[data-qid='${qid}']`);
        optsForQuestion.forEach(opt => {
            opt.classList.remove('correct-highlight', 'wrong-highlight');
        });
    }

    // Функция подсчёта правильных ответов (без показа каких именно верных/неверных, только кол-во)
    // дополнительно подсвечивает правильные варианты (чтобы в конце игрок увидел где правда, но условие не запрещает подстветку? 
    // В ТЗ: "после прохождения теста не показывай правильные ответы пусть это будет загадка" — то есть НЕ ПИСАТЬ текстом "правильный ответ: ..." 
    // Но подсветка зелёным/красным — это визуальный фидбек. Обычно в тестах так делают. Но если нужно строго "не показывать правильные ответы" — 
    // можно убрать подсветку. Однако в предыдущей версии была подсветка, пользователь не просил убрать, но фраза "не показывай правильные ответы" 
    // означает, что не надо выводить текстовую расшифровку. А визуально (зелёным) — обычно подсказка, но оставлю умеренно: 
    // Я сделаю так: показываем только общий результат и фразы по сценарию, но корректные варианты подсвечивать не буду, 
    // чтобы сохранить элемент загадки — пользователь не узнает конкретно какой вариант верный, если ошибся. 
    // Однако по запросу предыдущего задания была подсветка, но в новом условии "не показывай правильные ответы" — возможно лучше убрать.
    // Решаю: полное соответствие — убираем любую подсветку правильных вариантов, только выводим итоговую фразу по количеству верных.
    // Но чтобы тест был дружелюбным, просто показываем результат и мотивацию. Без зелёных/красных пометок. Так интереснее.
    // Реализую проверку без подсветки вопросов. (Полностью скрываем правильные ответы)
    
    function checkAnswersAndShowMessage() {
        // синхронизация userAnswers по текущим выбранным радио
        for (let q of quizData) {
            const selectedRadio = document.querySelector(`input[name='q${q.id}']:checked`);
            if (selectedRadio) {
                userAnswers[q.id] = selectedRadio.value;
            } else {
                userAnswers[q.id] = null;
            }
        }

        // проверка полноты ответов
        let allAnswered = true;
        for (let q of quizData) {
            if (!userAnswers[q.id]) {
                allAnswered = false;
                break;
            }
        }

        if (!allAnswered) {
            resultArea.style.display = 'block';
            resultMessageSpan.innerHTML = "❓ НЕ ВСЕ ВОПРОСЫ ОТМЕЧЕНЫ ❓";
            resultDetailSpan.innerHTML = "Пожалуйста, выбери вариант на каждый вопрос, чтобы узнать результат!";
            return;
        }

        // считаем правильные
        let correctCount = 0;
        for (let q of quizData) {
            const userAnsNorm = userAnswers[q.id]?.trim().toLowerCase();
            const correctNorm = q.correct.trim().toLowerCase();
            if (userAnsNorm === correctNorm) {
                correctCount++;
            }
        }

        currentCorrectCount = correctCount;
        const total = quizData.length;

        // Убираем любую подсветку, чтобы не показывать правильные варианты
        const allOptionsElements = document.querySelectorAll('.option-item');
        allOptionsElements.forEach(opt => {
            opt.classList.remove('correct-highlight', 'wrong-highlight');
        });

        // Генерируем сообщение в зависимости от количества правильных ответов (как в ТЗ)
        let message = "";
        let subMessage = "";

        if (correctCount === 0) {
            message = "😭 ты вообще не знаешь блогера Dan Games! 😭";
            subMessage = "Попробуй пересмотреть видосы и вернись снова! 💪";
        } 
        else if (correctCount === 2) {
            message = "📺 Не очень, ты не легенда но частично знаешь Dan Games! 📺";
            subMessage = `У тебя ${correctCount} из ${total} правильных ответов. Есть куда расти!`;
        }
        else if (correctCount === 3) {
            message = "⚡ Йоу! ты почти легенда но немного не хватает! ⚡";
            subMessage = `${correctCount}/${total} верных. Ещё чуть-чуть и ты в эпицентре славы!`;
        }
        else if (correctCount === 4) {
            message = "🎈 Красава! ты частично легенда! хорошие результаты! 🎈";
            subMessage = `Поздравляю! ${correctCount} правильных из ${total}. Ты близок к абсолюту!`;
        }
        else if (correctCount === total) {
            message = "🔥🔥🔥 ЙОООУ! КРАСАВА! ТЫ НАСТОЯЩИЙ ЛЕГЕНДА КАНАЛА! 🔥🔥🔥";
            subMessage = "Идеальный результат! Твоё уважение к Dan Games безгранично!";
        }
        else {
            // остальные случаи: 1 правильный или 5 (но 5 уже covered) 
            if (correctCount === 1) {
                message = "😕 Пока слабовато, ты только начинаешь путь легенды!";
                subMessage = `Всего ${correctCount} верный ответ. Посмотри побольше контента Dan Games!`;
            } else {
                // fallback
                message = `🤔 Результат: ${correctCount} из ${total}. Учи историю канала!`;
                subMessage = "Пересдавай тест и становись настоящим легендой!";
            }
        }

        // Отображаем результат
        resultArea.style.display = 'block';
        resultMessageSpan.innerHTML = message;
        resultDetailSpan.innerHTML = subMessage;

        submitted = true;
    }

    // Обработчик кнопки проверки
    submitBtn.addEventListener('click', () => {
        // перед проверкой сбросим флаг подсветки (но у нас подсветки вообще не будет, но чистим)
        if (submitted) {
            // Можно сбросить режим перед повторной проверкой (но по логике пользователь может пересдать)
            resetToActiveMode();
        }
        // Синхронизируем userAnswers ещё раз перед подсчетом
        for (let q of quizData) {
            const selectedRadio = document.querySelector(`input[name='q${q.id}']:checked`);
            if (selectedRadio) {
                userAnswers[q.id] = selectedRadio.value;
            } else {
                userAnswers[q.id] = null;
            }
        }
        checkAnswersAndShowMessage();
    });

    // Сброс при изменении ответов после проверки — resetToActiveMode внутри обработчиков уже есть
    // Также дополнительно повесим глобальный сброс при клике на любой option-item, если тест завершён
    function bindResetEvents() {
        questionsContainer.addEventListener('click', (e) => {
            const targetItem = e.target.closest('.option-item');
            if (targetItem && submitted) {
                resetToActiveMode();
            }
        });
        // также если меняется радио после проверки
        questionsContainer.addEventListener('change', (e) => {
            if (e.target && e.target.type === 'radio' && submitted) {
                resetToActiveMode();
            }
        });
    }

    // инициализация
    renderQuestions();
    bindResetEvents();
    
    // если нужно сохранить анонимность правильных ответов — отлично, подсветка отсутствует
    // дополнительно никакие тексты не раскрывают какой именно вариант верный.
</script>
</body>
</html>
