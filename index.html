<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox: Ultimate Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; touch-action: none; user-select: none; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); color: white; }
        .auth-box { background: #222; padding: 30px; border-radius: 20px; border: 1px solid #444; text-align: center; width: 280px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; text-align: center; }
        .btn-main { width: 100%; padding: 12px; background: #ff0000; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .info-panel { position: absolute; background: rgba(0,0,0,0.6); color: #fff; padding: 10px; border-radius: 8px; font-size: 12px; z-index: 500; pointer-events: none; }
        #leaderboard { top: 15px; right: 15px; border: 1px solid gold; }
        
        #mobile-controls { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .joy-pad { position: absolute; bottom: 30px; left: 30px; display: grid; grid-template-columns: repeat(3, 65px); gap: 8px; pointer-events: auto; }
        .act-pad { position: absolute; bottom: 30px; right: 30px; pointer-events: auto; display: flex; flex-direction: column; gap: 15px; }
        .ctrl-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.15); border: 2px solid #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="leaderboard" class="info-panel"><b>TOP KILLS</b><div id="lb-inner"></div></div>

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h2 id="auth-title">РЕГИСТРАЦИЯ</h2>
            <input type="text" id="auth-nick" placeholder="Никнейм">
            <input type="password" id="auth-pass" placeholder="Пароль">
            <button class="btn-main" id="auth-action-btn" onclick="handleAuth()">ВОЙТИ В МИР</button>
            <p style="font-size: 12px; cursor: pointer; color: #aaa; margin-top:15px;" onclick="toggleAuthMode()" id="auth-toggle">Нужен новый аккаунт?</p>
        </div>
    </div>

    <div id="mobile-controls" class="hidden">
        <div class="joy-pad">
            <div></div><div class="ctrl-btn" id="m-w">W</div><div></div>
            <div class="ctrl-btn" id="m-a">A</div><div class="ctrl-btn" id="m-s">S</div><div class="ctrl-btn" id="m-d">D</div>
        </div>
        <div class="act-pad">
            <div class="ctrl-btn" id="m-jump" style="background:rgba(0,150,255,0.4)">JUMP</div>
            <div class="ctrl-btn" id="m-atk" style="background:rgba(255,0,0,0.4); width:85px; height:85px;">ATK</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const WORLD_REF = db.ref('world_v6'); 

        let scene, camera, renderer, myModel, mySword;
        let myID = "", myNick = "", myHP = 100, inGame = false, isDead = false;
        let isRegMode = false, isRightClick = false;
        let otherPlayers = {}, colliders = [];
        let moveState = { f:false, b:false, l:false, r:false };
        let vy = 0, canJump = true, camAzimuth = 0, camDist = 18;

        function createHPBar() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#333'; ctx.fillRect(0,0,128,16);
            ctx.fillStyle = '#f00'; ctx.fillRect(2,2,124,12);
            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: tex}));
            sprite.scale.set(2, 0.25, 1);
            sprite.position.y = 2.2;
            return sprite;
        }

        function createPlayerObject(color, name) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.4, 0.6), new THREE.MeshStandardMaterial({color}));
            body.position.y = 0.7;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 1.75;
            group.add(body, head);
            
            // Ник
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white'; ctx.font = 'Bold 36px Arial'; ctx.textAlign = 'center';
            ctx.fillText(name, 128, 45);
            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: tex}));
            sprite.position.y = 2.8; sprite.scale.set(3, 0.75, 1);
            group.add(sprite);

            // Полоска ХП
            const hpBar = createHPBar();
            group.add(hpBar);
            group.hpBarRef = hpBar;

            return group;
        }

        function buildWorld() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87ceeb);
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x2d4c1e}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);
            
            const addObj = (geo, mat, x, z, sY = 1) => {
                const m = new THREE.Mesh(geo, mat);
                m.position.set(x, (geo.parameters.height * sY)/2, z);
                m.scale.y = sY;
                scene.add(m);
                colliders.push(new THREE.Box3().setFromObject(m));
            };

            const stone = new THREE.MeshStandardMaterial({color: 0x666666});
            for(let i=0; i<30; i++){
                const rx = (Math.random()-0.5)*150, rz = (Math.random()-0.5)*150;
                if(Math.hypot(rx,rz) > 12) addObj(new THREE.BoxGeometry(5, 4, 5), stone, rx, rz, Math.random()+0.5);
            }
        }

        function initGame() {
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5); sun.position.set(10, 50, 10); scene.add(sun);

            myModel = createPlayerObject(0x0066ff, myNick);
            myModel.children[2].visible = false; // Скрыть свой ник/хп для себя
            myModel.children[3].visible = false;
            mySword = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.8, 0.05), new THREE.MeshStandardMaterial({color: 0xffffff}));
            blade.position.y = 0.9;
            mySword.add(blade); mySword.rotation.x = Math.PI/2; mySword.position.set(0.7, 0.8, 0.3);
            myModel.add(mySword);
            scene.add(myModel);

            WORLD_REF.child('players').on('value', snap => {
                const data = snap.val() || {};
                const now = Date.now();
                Object.keys(otherPlayers).forEach(id => { if(!data[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }});
                Object.keys(data).forEach(id => {
                    if(id === myID) { myHP = data[id].hp; return; }
                    if(now - data[id].ls > 8000) return;
                    if(!otherPlayers[id]) {
                        otherPlayers[id] = createPlayerObject(0xff3300, data[id].n);
                        otherPlayers[id].add(new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.5, 0.05), new THREE.MeshStandardMaterial()));
                        otherPlayers[id].children[4].rotation.x = Math.PI/2;
                        scene.add(otherPlayers[id]);
                    }
                    const p = otherPlayers[id];
                    p.position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
                    p.rotation.y = data[id].ry;
                    p.children[4].position.z = data[id].at ? 1.5 : 0.3;
                    
                    // Обновление ХП над головой
                    const hpFactor = (data[id].hp || 0) / 100;
                    p.hpBarRef.material.map.dispose();
                    const canvas = document.createElement('canvas');
                    canvas.width = 128; canvas.height = 16;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#333'; ctx.fillRect(0,0,128,16);
                    ctx.fillStyle = hpFactor > 0.3 ? '#0f0' : '#f00'; 
                    ctx.fillRect(2, 2, 124 * hpFactor, 12);
                    p.hpBarRef.material.map = new THREE.CanvasTexture(canvas);
                });
            });

            animate();
        }

        function attack() {
            if(isDead || isAtk) return;
            window.isAtk = true;
            new TWEEN.Tween(mySword.position).to({z: 1.6}, 80).chain(
                new TWEEN.Tween(mySword.position).to({z: 0.3}, 120).onComplete(() => window.isAtk = false)
            ).start();

            WORLD_REF.child('players/'+myID).update({ at: true });
            setTimeout(() => WORLD_REF.child('players/'+myID).update({ at: false }), 150);

            Object.keys(otherPlayers).forEach(id => {
                if(myModel.position.distanceTo(otherPlayers[id].position) < 5) {
                    WORLD_REF.child('players/'+id).transaction(p => {
                        if(p && p.hp > 0) {
                            p.hp -= 20;
                            if(p.hp <= 0) { p.hp = 0; db.ref('leaderboard/'+myNick).transaction(k => (k||0)+1); }
                        }
                        return p;
                    });
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(inGame && !isDead) {
                const prev = myModel.position.clone();
                const move = new THREE.Vector3();
                if(moveState.f) move.z -= 1; if(moveState.b) move.z += 1;
                if(moveState.l) move.x -= 1; if(moveState.r) move.x += 1;
                
                if(move.length() > 0) {
                    move.applyAxisAngle(new THREE.Vector3(0,1,0), camAzimuth);
                    myModel.position.add(move.normalize().multiplyScalar(0.32));
                    myModel.rotation.y = Math.atan2(move.x, move.z);
                }

                const myBox = new THREE.Box3().setFromObject(myModel);
                colliders.forEach(c => { if(myBox.intersectsBox(c)) myModel.position.copy(prev); });

                myModel.position.y += vy;
                if(myModel.position.y > 0) { vy -= 0.022; canJump = false; }
                else { myModel.position.y = 0; vy = 0; canJump = true; }

                WORLD_REF.child('players/'+myID).update({ x: myModel.position.x, y: myModel.position.y, z: myModel.position.z, ry: myModel.rotation.y, ls: Date.now(), hp: myHP });
            }

            camera.position.set(myModel.position.x + camDist * Math.sin(camAzimuth), myModel.position.y + 10, myModel.position.z + camDist * Math.cos(camAzimuth));
            camera.lookAt(myModel.position.x, myModel.position.y + 1, myModel.position.z);
            TWEEN.update();
            renderer.render(scene, camera);
        }

        // --- AUTH & MISC ---
        window.toggleAuthMode = () => {
            isRegMode = !isRegMode;
            document.getElementById('auth-title').innerText = isRegMode ? "РЕГИСТРАЦИЯ" : "ВХОД";
            document.getElementById('auth-toggle').innerText = isRegMode ? "Уже есть аккаунт? Войти" : "Нужен новый аккаунт?";
        };

        window.handleAuth = async () => {
            const nick = document.getElementById('auth-nick').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            if(nick.length < 2) return;
            myNick = nick; myID = 'u' + Math.random().toString(36).substr(2, 6);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('mobile-controls').classList.remove('hidden');
            inGame = true; buildWorld(); initGame();
            WORLD_REF.child('players/'+myID).set({ n: myNick, hp: 100, x: 0, y: 0, z: 0, ls: Date.now() });
            WORLD_REF.child('players/'+myID).onDisconnect().remove();
        };

        // --- FIXED CONTROLS ---
        window.addEventListener('blur', () => { moveState = {f:false,b:false,l:false,r:false}; });
        window.addEventListener('wheel', e => camDist = Math.max(8, Math.min(45, camDist + e.deltaY * 0.05)), {passive:true});
        
        window.onkeydown = (e) => {
            const k = e.code;
            if(k==='KeyW') moveState.f=true; if(k==='KeyS') moveState.b=true;
            if(k==='KeyA') moveState.l=true; if(k==='KeyD') moveState.r=true;
            if(k==='Space' && canJump) vy = 0.45;
        };
        window.onkeyup = (e) => {
            const k = e.code;
            if(k==='KeyW') moveState.f=false; if(k==='KeyS') moveState.b=false;
            if(k==='KeyA') moveState.l=false; if(k==='KeyD') moveState.r=false;
        };

        window.onmousedown = (e) => { 
            if(e.button === 2) isRightClick = true; 
            if(e.button === 0 && inGame) attack(); 
        };
        window.onmouseup = (e) => { if(e.button === 2) isRightClick = false; };
        window.onmousemove = (e) => { if(isRightClick) camAzimuth -= e.movementX * 0.008; };

        const bind = (id, k) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); moveState[k] = true; };
            el.onpointerup = () => moveState[k] = false;
            el.onpointerleave = () => moveState[k] = false;
        };
        bind('m-w','f'); bind('m-s','b'); bind('m-a','l'); bind('m-d','r');
        document.getElementById('m-jump').onpointerdown = (e) => { e.preventDefault(); if(canJump) vy = 0.45; };
        document.getElementById('m-atk').onpointerdown = (e) => { e.preventDefault(); attack(); };

    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/20.0.0/tween.umd.js"></script>
</body>
</html>
