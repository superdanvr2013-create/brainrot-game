<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox PVP: Anti-Ghost Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; touch-action: none; -webkit-user-select: none; user-select: none; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; background: rgba(0,0,0,0.8); }
        
        .info-panel { position: absolute; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 8px; font-size: 12px; z-index: 500; pointer-events: none; border: 1px solid rgba(255,255,255,0.2); }
        #online-list { top: 10px; left: 10px; min-width: 130px; }
        #leaderboard { top: 10px; right: 10px; min-width: 130px; border-color: gold; }
        
        .hp-box { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); width: 200px; height: 15px; border: 2px solid #fff; background: #222; border-radius: 10px; overflow: hidden; z-index: 100; }
        #hp-bar { background: #ff3e3e; width: 100%; height: 100%; transition: 0.2s; }
        
        #mobile-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .m-joy { position: absolute; bottom: 30px; left: 30px; display: grid; grid-template-columns: repeat(3, 60px); gap: 8px; pointer-events: auto; }
        .m-actions { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        
        .btn { width: 60px; height: 60px; background: rgba(255,255,255,0.15); border: 2px solid #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; }
        .btn-circle { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,60,60,0.4); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="online-list" class="info-panel"><div>ONLINE</div><div id="players-inner"></div></div>
    <div id="leaderboard" class="info-panel"><div style="color:gold">TOP KILLS</div><div id="lb-list"></div></div>

    <div id="login-screen" class="screen">
        <div style="background:#fff; padding:30px; border-radius:15px; text-align:center;">
            <h2 style="margin:0 0 15px 0; color:#333;">DANBLOX PVP</h2>
            <input type="text" id="nick-input" placeholder="ВАШ НИК" maxlength="10" style="padding:10px; width:180px; text-align:center; border:2px solid #ddd; border-radius:8px;"><br><br>
            <button onclick="startGame()" style="padding:12px 25px; background:#ff4757; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">В БОЙ!</button>
        </div>
    </div>

    <div id="death-screen" class="screen hidden">
        <div style="text-align:center; color:#fff;">
            <h1 style="font-size:48px; margin-bottom:20px;">ТЫ ПРОИГРАЛ</h1>
            <button onclick="respawn()" style="padding:15px 40px; font-size:20px; background:#fff; border:none; border-radius:10px; color:#ff4757; font-weight:bold;">ВОЗРОДИТЬСЯ</button>
        </div>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="hp-box"><div id="hp-bar"></div></div>
    </div>

    <div id="mobile-ui" class="hidden">
        <div class="m-joy">
            <div></div><div class="btn" id="m-w">W</div><div></div>
            <div class="btn" id="m-a">A</div><div class="btn" id="m-s">S</div><div class="btn" id="m-d">D</div>
        </div>
        <div class="m-actions">
            <div class="btn btn-circle" id="m-jump" style="background:rgba(30,144,255,0.4)">JUMP</div>
            <div class="btn btn-circle" id="m-atk">ATTACK</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let scene, camera, renderer, myModel, mySword;
        let myID = 'u' + Math.random().toString(36).substr(2, 9);
        let myNick = "", myHP = 100, inGame = false, isDead = false;
        let otherPlayers = {}, moveState = { f:false, b:false, l:false, r:false };
        let vy = 0, canJump = true, camAzimuth = 0, camDist = 14, isAtk = false;

        function createPlayerMesh(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), new THREE.MeshStandardMaterial({color}));
            body.position.y = 0.6;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 1.5;
            g.add(body, head);
            return g;
        }

        function createSwordMesh() {
            const g = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.6, 0.05), new THREE.MeshStandardMaterial({color: 0xeeeeee, metalness: 0.8}));
            blade.position.y = 0.8;
            g.add(blade);
            g.rotation.x = Math.PI/2;
            g.position.set(0.6, 0.8, 0.2);
            return g;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa2d2ff);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5); sun.position.set(10, 20, 10); scene.add(sun);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x4caf50}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);

            myModel = createPlayerMesh(0x2196f3);
            mySword = createSwordMesh();
            myModel.add(mySword);
            scene.add(myModel);

            // Обработка игроков + Очистка призраков
            db.ref('players').on('value', snap => {
                const data = snap.val() || {};
                const now = Date.now();
                const inner = document.getElementById('players-inner');
                let html = "";

                // Удаляем локальные объекты тех, кто пропал из базы
                Object.keys(otherPlayers).forEach(id => {
                    if(!data[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }
                });

                Object.keys(data).forEach(id => {
                    const d = data[id];
                    
                    // ЕСЛИ ИГРОК НЕ ОБНОВЛЯЛСЯ > 10 СЕКУНД - ОН ПРИЗРАК
                    if (now - d.lastSeen > 10000) {
                        if (id !== myID) {
                            if(otherPlayers[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }
                        }
                        return; 
                    }

                    if(id === myID) {
                        myHP = d.hp;
                        if(myHP <= 0 && !isDead) triggerDeath();
                        return;
                    }
                    
                    if(!otherPlayers[id]) {
                        otherPlayers[id] = createPlayerMesh(0xf44336);
                        otherPlayers[id].add(createSwordMesh());
                        scene.add(otherPlayers[id]);
                    }

                    const p = otherPlayers[id];
                    p.position.lerp(new THREE.Vector3(d.x, d.y, d.z), 0.2);
                    p.rotation.y = d.ry || 0;
                    
                    const s = p.children[2];
                    if(s) s.position.z = d.at ? -1.2 : 0.2;

                    if(d.hp <= 0) { p.rotation.z = Math.PI/2; p.position.y = 0.3; } 
                    else { p.rotation.z = 0; p.position.y = d.y; }

                    html += `<div>${d.n}: ${d.hp}%</div>`;
                });
                inner.innerHTML = html;
            });

            db.ref('leaderboard').orderByValue().limitToLast(5).on('value', snap => {
                let h = "";
                snap.forEach(s => { h = `<div>${s.key}: ${s.val()}</div>` + h; });
                document.getElementById('lb-list').innerHTML = h;
            });

            // HEARTBEAT: Каждые 2 секунды говорим серверу, что мы тут
            setInterval(() => {
                if(inGame && !isDead) {
                    db.ref('players/' + myID).update({ lastSeen: Date.now() });
                }
            }, 2000);

            animate();
        }

        function triggerDeath() {
            isDead = true;
            document.getElementById('death-screen').classList.remove('hidden');
            myModel.rotation.z = Math.PI/2;
            db.ref('players/' + myID).update({ hp: 0 });
        }

        window.respawn = () => {
            isDead = false; myHP = 100;
            document.getElementById('death-screen').classList.add('hidden');
            myModel.rotation.z = 0;
            myModel.position.set((Math.random()-0.5)*20, 0, (Math.random()-0.5)*20);
            db.ref('players/' + myID).update({ hp: 100, x: myModel.position.x, z: myModel.position.z, lastSeen: Date.now() });
        };

        function attack() {
            if(isDead || isAtk) return;
            isAtk = true;
            mySword.position.z = -1.2;
            db.ref('players/' + myID + '/at').set(true);

            setTimeout(() => { 
                mySword.position.z = 0.2; isAtk = false; 
                db.ref('players/' + myID + '/at').set(false);
            }, 150);

            // Проверка урона
            Object.keys(otherPlayers).forEach(id => {
                if(myModel.position.distanceTo(otherPlayers[id].position) < 4.5) {
                    // Атакуем через транзакцию (самый надежный метод)
                    db.ref('players/' + id).transaction(playerData => {
                        if (playerData) {
                            if (playerData.hp > 0) {
                                playerData.hp -= 15;
                                if (playerData.hp <= 0) {
                                    db.ref('leaderboard/' + myNick).transaction(k => (k||0) + 1);
                                }
                            }
                        }
                        return playerData;
                    });
                }
            });
        }

        function animate() {
            if(!inGame) return;
            requestAnimationFrame(animate);

            if(!isDead) {
                const move = new THREE.Vector3();
                if(moveState.f) move.z -= 1; if(moveState.b) move.z += 1;
                if(moveState.l) move.x -= 1; if(moveState.r) move.x += 1;
                
                if(move.length() > 0) {
                    move.applyAxisAngle(new THREE.Vector3(0,1,0), camAzimuth);
                    myModel.position.add(move.normalize().multiplyScalar(0.25));
                    myModel.rotation.y = Math.atan2(move.x, move.z);
                }
                
                myModel.position.y += vy;
                if(myModel.position.y > 0) { vy -= 0.02; canJump = false; }
                else { myModel.position.y = 0; vy = 0; canJump = true; }

                // Отправка позиции
                db.ref('players/' + myID).update({
                    x: myModel.position.x, y: myModel.position.y, z: myModel.position.z,
                    ry: myModel.rotation.y, n: myNick, hp: myHP, at: isAtk
                });
            }

            camera.position.x = myModel.position.x + camDist * Math.sin(camAzimuth);
            camera.position.y = myModel.position.y + 7;
            camera.position.z = myModel.position.z + camDist * Math.cos(camAzimuth);
            camera.lookAt(myModel.position.x, myModel.position.y + 1, myModel.position.z);

            document.getElementById('hp-bar').style.width = myHP + "%";
            renderer.render(scene, camera);
        }

        window.startGame = () => {
            myNick = document.getElementById('nick-input').value.trim() || "Guest";
            document.getElementById('login-screen').classList.add('hidden');
            ['ui-layer', 'mobile-ui'].forEach(id => document.getElementById(id).classList.remove('hidden'));
            inGame = true; init();
            db.ref('players/' + myID).onDisconnect().remove();
        };

        const setupBtn = (id, key) => {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); if(!isDead) moveState[key] = true; };
            const end = (e) => { e.preventDefault(); moveState[key] = false; };
            el.addEventListener('pointerdown', start);
            el.addEventListener('pointerup', end);
            el.addEventListener('pointerleave', end);
        };
        setupBtn('m-w','f'); setupBtn('m-s','b'); setupBtn('m-a','l'); setupBtn('m-d','r');
        
        document.getElementById('m-jump').addEventListener('pointerdown', (e) => { e.preventDefault(); if(canJump && !isDead) vy = 0.4; });
        document.getElementById('m-atk').addEventListener('pointerdown', (e) => { e.preventDefault(); attack(); });

        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveState.f = true; if(e.code === 'KeyS') moveState.b = true;
            if(e.code === 'KeyA') moveState.l = true; if(e.code === 'KeyD') moveState.r = true;
            if(e.code === 'Space' && canJump && !isDead) vy = 0.4;
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveState.f = false; if(e.code === 'KeyS') moveState.b = false;
            if(e.code === 'KeyA') moveState.l = false; if(e.code === 'KeyD') moveState.r = false;
        });
        window.addEventListener('mousedown', (e) => { if(e.button === 0 && inGame) attack(); if(e.button === 2) window.isR = true; });
        window.addEventListener('mouseup', () => window.isR = false);
        window.addEventListener('mousemove', (e) => { if(window.isR) camAzimuth -= e.movementX * 0.01; });
        window.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
