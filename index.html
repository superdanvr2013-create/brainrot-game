<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Roblox Web Multiplayer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #111; color: white; }
        #menu { position: absolute; width: 100%; height: 100%; z-index: 100; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); }
        .window { background: #222; padding: 30px; border-radius: 15px; border: 2px solid #00b06f; text-align: center; }
        input { padding: 12px; margin: 10px; border-radius: 5px; border: none; width: 250px; font-size: 16px; }
        button { padding: 12px 30px; background: #00b06f; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Табличка с ID */
        #debug-info { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0,0,0,0.8); padding: 15px; 
            border-radius: 10px; border: 1px solid #00b06f;
            z-index: 50; font-family: monospace;
        }
        .hidden { display: none !important; }
        #player-label { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="window">
            <h1>BRAINROT ONLINE</h1>
            <input type="text" id="nick-input" placeholder="Твой ник (на англ)..." maxlength="10"><br>
            <input type="text" id="friend-id-input" placeholder="ID друга (если хочешь подключиться)"><br>
            <button id="start-btn">ЗАПУСТИТЬ ИГРУ</button>
            <p style="font-size: 12px; color: #888; margin-top: 15px;">После входа твой ID появится в углу экрана</p>
        </div>
    </div>

    <div id="debug-info" class="hidden">
        <div>ВАШ НИК: <span id="my-nick-display">?</span></div>
        <div style="margin-top:5px; color: #ffcc00;">ВАШ ID: <span id="my-id-display">Загрузка...</span></div>
        <div id="status" style="margin-top:5px; font-size: 12px;">Статус: Ожидание...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, pivot, playerModel;
        let peer, conn, myID;
        let otherPlayers = {}; 
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let zoomDistance = 8;

        const startBtn = document.getElementById('start-btn');

        // Логика мультиплеера
        function setupPeer(nick) {
            myID = nick + "-" + Math.floor(Math.random() * 9000 + 1000);
            document.getElementById('my-id-display').innerText = myID;
            document.getElementById('my-nick-display').innerText = nick;

            peer = new Peer(myID);

            peer.on('open', (id) => {
                console.log('Мой ID:', id);
                const friendID = document.getElementById('friend-id-input').value;
                if(friendID) connectTo(friendID);
            });

            peer.on('connection', (c) => {
                handleConnection(c);
            });
        }

        function connectTo(id) {
            const c = peer.connect(id);
            handleConnection(c);
        }

        function handleConnection(c) {
            conn = c;
            conn.on('open', () => {
                document.getElementById('status').innerText = "Статус: СВЯЗЬ УСТАНОВЛЕНА!";
                document.getElementById('status').style.color = "#00ff00";
                
                // Отправляем свои координаты каждые 50мс
                setInterval(() => {
                    if(conn.open) {
                        conn.send({
                            id: myID,
                            x: pivot.position.x,
                            y: pivot.position.y,
                            z: pivot.position.z,
                            ry: pivot.rotation.y
                        });
                    }
                }, 50);
            });

            conn.on('data', (data) => {
                syncPlayer(data);
            });
        }

        function syncPlayer(data) {
            if(!otherPlayers[data.id]) {
                const model = createBacon(0x3366ff); // Другой игрок будет синим
                scene.add(model);
                otherPlayers[data.id] = model;
            }
            otherPlayers[data.id].position.set(data.x, data.y, data.z);
            otherPlayers[data.id].rotation.y = data.ry;
        }

        // --- ДВИЖОК ИГРЫ ---
        startBtn.onclick = () => {
            const nick = document.getElementById('nick-input').value;
            if(!nick) return alert("Введи ник!");
            
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('debug-info').classList.remove('hidden');
            
            setupPeer(nick);
            initGame();
        };

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            pivot = new THREE.Group();
            scene.add(pivot);

            playerModel = createBacon(0xde1b1b);
            scene.add(playerModel);

            controls = new PointerLockControls(pivot, document.body);
            document.body.addEventListener('click', () => controls.lock());

            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100,100), new THREE.MeshStandardMaterial({color: 0x4caf50}));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            setupInput();
            loop();
        }

        function createBacon(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.5), new THREE.MeshStandardMaterial({color: color}));
            body.position.y = 1;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 2;
            group.add(body, head);
            return group;
        }

        function setupInput() {
            document.onkeydown = (e) => {
                if(e.code === 'KeyW') moveForward = true;
                if(e.code === 'KeyS') moveBackward = true;
                if(e.code === 'KeyA') moveLeft = true;
                if(e.code === 'KeyD') moveRight = true;
                if(e.code === 'Space' && pivot.position.y < 0.1) velocity.y = 10;
            };
            document.onkeyup = (e) => {
                if(e.code === 'KeyW') moveForward = false;
                if(e.code === 'KeyS') moveBackward = false;
                if(e.code === 'KeyA') moveLeft = false;
                if(e.code === 'KeyD') moveRight = false;
            };
            document.onwheel = (e) => {
                zoomDistance = Math.min(Math.max(zoomDistance + e.deltaY * 0.01, 4), 15);
            };
        }

        function loop() {
            requestAnimationFrame(loop);
            if (controls.isLocked) {
                const dt = 0.016;
                velocity.x -= velocity.x * 10 * dt;
                velocity.z -= velocity.z * 10 * dt;
                velocity.y -= 25 * dt;

                if (moveForward) velocity.z -= 150 * dt;
                if (moveBackward) velocity.z += 150 * dt;
                if (moveLeft) velocity.x -= 150 * dt;
                if (moveRight) velocity.x += 150 * dt;

                controls.moveRight(-velocity.x * dt);
                controls.moveForward(-velocity.z * dt);
                pivot.position.y += velocity.y * dt;

                if (pivot.position.y < 0) { pivot.position.y = 0; velocity.y = 0; }

                playerModel.position.copy(pivot.position);
                playerModel.rotation.y = pivot.rotation.y;

                const camOffset = new THREE.Vector3(0, 2, zoomDistance).applyMatrix4(pivot.matrixWorld);
                camera.position.lerp(camOffset, 0.1);
                camera.lookAt(pivot.position.x, pivot.position.y + 1.5, pivot.position.z);
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
