<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DanBlox PVP: Mega Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; touch-action: none; -webkit-user-select: none; user-select: none; }
        .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        
        .info-panel { position: absolute; background: rgba(20,20,20,0.8); color: #0f0; padding: 15px; border-radius: 12px; border: 1px solid #333; font-family: monospace; z-index: 500; pointer-events: none; }
        #online-list { top: 15px; left: 15px; min-width: 160px; }
        #leaderboard { top: 15px; right: 15px; min-width: 160px; border-color: gold; color: gold; }
        
        .hp-container { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 100; }
        .hp-bar { width: 300px; height: 25px; background: #222; border: 3px solid #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 0 20px rgba(255,0,0,0.5); }
        #hp-fill { background: linear-gradient(90deg, #ff0000, #ff4d4d); width: 100%; height: 100%; transition: 0.2s; }
        
        #mobile-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .joy { position: absolute; bottom: 40px; left: 40px; display: grid; grid-template-columns: repeat(3, 75px); gap: 10px; pointer-events: auto; }
        .act { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 20px; pointer-events: auto; }
        
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 24px; }
        .btn-atk { width: 100px; height: 100px; border-radius: 50%; background: rgba(255,0,0,0.4); border: 4px solid #fff; }
        
        input { padding: 15px; width: 250px; border-radius: 10px; border: none; font-size: 18px; text-align: center; }
        button.start-btn { padding: 15px 50px; background: #f00; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 20px; margin-top: 20px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="online-list" class="info-panel"><div>[ ONLINE ]</div><div id="players-inner"></div></div>
    <div id="leaderboard" class="info-panel"><div>[ TOP KILLS ]</div><div id="lb-list"></div></div>

    <div id="login-screen" class="screen">
        <div style="text-align:center;">
            <h1 style="color:#fff; font-size:48px; margin-bottom:10px;">DANBLOX <span style="color:red;">PVP</span></h1>
            <input type="text" id="nick-input" placeholder="ВВЕДИ НИК" maxlength="12"><br>
            <button class="start-btn" onclick="startGame()">ИГРАТЬ</button>
        </div>
    </div>

    <div id="death-screen" class="screen hidden">
        <div style="text-align:center; color:#fff;">
            <h1 style="font-size:64px;">ТЫ ПОГИБ</h1>
            <p>Возвращение в меню через 5 секунд...</p>
            <button class="start-btn" onclick="respawn()" style="background:green;">ВОЗРОДИТЬСЯ</button>
        </div>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="hp-container">
            <div id="hp-fill-text" style="color:white; font-weight:bold; margin-bottom:5px;">100 / 100</div>
            <div class="hp-bar"><div id="hp-fill"></div></div>
        </div>
    </div>

    <div id="mobile-ui" class="hidden">
        <div class="joy">
            <div></div><div class="btn" id="m-w">W</div><div></div>
            <div class="btn" id="m-a">A</div><div class="btn" id="m-s">S</div><div class="btn" id="m-d">D</div>
        </div>
        <div class="act">
            <div class="btn btn-atk" id="m-jump" style="width:80px; height:80px; background:rgba(0,100,255,0.4);">JUMP</div>
            <div class="btn btn-atk" id="m-atk">ATTACK</div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        // СМЕНА ПУТИ ДЛЯ ОЧИСТКИ СТАРЫХ БОТОВ
        const PLAYERS_REF = db.ref('players_v4'); 

        let scene, camera, renderer, myModel, mySword, deathTimer;
        let myID = 'u' + Math.random().toString(36).substr(2, 9);
        let myNick = "", myHP = 100, inGame = false, isDead = false;
        let otherPlayers = {}, moveState = { f:false, b:false, l:false, r:false };
        let vy = 0, canJump = true, camAzimuth = 0, camDist = 16, isAtk = false;

        function createSword() {
            const g = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.8, 0.05), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.9}));
            blade.position.y = 0.9;
            const guard = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 0.2), new THREE.MeshStandardMaterial({color: 0xffd700}));
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.6), new THREE.MeshStandardMaterial({color: 0x4e342e}));
            handle.position.y = -0.3;
            g.add(blade, guard, handle);
            g.rotation.x = Math.PI/2; g.position.set(0.7, 0.8, 0.3);
            return g;
        }

        function createHuman(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.4, 0.6), new THREE.MeshStandardMaterial({color}));
            body.position.y = 0.7;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({color: 0xffdbac}));
            head.position.y = 1.75;
            g.add(body, head);
            return g;
        }

        function buildMap() {
            // Красивое небо
            const skyGeo = new THREE.SphereGeometry(400, 32, 32);
            const skyMat = new THREE.ShaderMaterial({
                uniforms: { topColor: { value: new THREE.Color(0x0077ff) }, bottomColor: { value: new THREE.Color(0xffffff) }, offset: { value: 33 }, exponent: { value: 0.6 } },
                vertexShader: `varying vec3 vWorldPosition; void main() { vec4 worldPosition = modelMatrix * vec4( position, 1.0 ); vWorldPosition = worldPosition.xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 ); }`,
                fragmentShader: `uniform vec3 topColor; uniform vec3 bottomColor; uniform float offset; uniform float exponent; varying vec3 vWorldPosition; void main() { float h = normalize( vWorldPosition + offset ).y; gl_FragColor = vec4( mix( bottomColor, topColor, max( pow( max( h, 0.0 ), exponent ), 0.0 ) ), 1.0 ); }`,
                side: THREE.BackSide
            });
            scene.add(new THREE.Mesh(skyGeo, skyMat));

            // Земля
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x2e7d32}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);

            // Декор
            for(let i=0; i<60; i++) {
                const x = (Math.random()-0.5)*300, z = (Math.random()-0.5)*300;
                if(Math.sqrt(x*x+z*z) < 15) continue;
                const h = 2 + Math.random()*3;
                const tree = new THREE.Mesh(new THREE.ConeGeometry(1, h, 8), new THREE.MeshStandardMaterial({color: 0x1b5e20}));
                tree.position.set(x, h/2, z); scene.add(tree);
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.8); light.position.set(50, 100, 50); scene.add(light);

            buildMap();
            myModel = createHuman(0x2962ff);
            mySword = createSword(); myModel.add(mySword);
            scene.add(myModel);

            PLAYERS_REF.on('value', snap => {
                const data = snap.val() || {};
                const now = Date.now();
                let html = "";

                Object.keys(otherPlayers).forEach(id => { if(!data[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }});

                Object.keys(data).forEach(id => {
                    const d = data[id];
                    // Очистка призраков
                    if (now - d.ls > 10000) { if(id !== myID) PLAYERS_REF.child(id).remove(); return; }

                    if(id === myID) {
                        myHP = d.hp ?? 100;
                        if(myHP <= 0 && !isDead) triggerDeath();
                        return;
                    }
                    
                    if(!otherPlayers[id]) {
                        otherPlayers[id] = createHuman(0xd50000);
                        otherPlayers[id].add(createSword());
                        scene.add(otherPlayers[id]);
                    }

                    const p = otherPlayers[id];
                    p.position.lerp(new THREE.Vector3(d.x, d.y, d.z), 0.25);
                    p.rotation.y = d.ry || 0;
                    p.children[2].position.z = d.at ? -1.2 : 0.3;

                    if(d.hp <= 0) { p.rotation.z = Math.PI/2; p.position.y = 0.4; } 
                    else { p.rotation.z = 0; p.position.y = d.y; }

                    html += `<div style="color:${d.hp>30?'#0f0':'#f00'}">${d.n}: ${d.hp}%</div>`;
                });
                document.getElementById('players-inner').innerHTML = html;
            });

            db.ref('leaderboard').orderByValue().limitToLast(5).on('value', snap => {
                let h = ""; snap.forEach(s => { h = `<div>${s.key}: ${s.val()}</div>` + h; });
                document.getElementById('lb-list').innerHTML = h;
            });

            setInterval(() => { if(inGame && !isDead) PLAYERS_REF.child(myID).update({ ls: Date.now() }); }, 2000);
            animate();
        }

        function triggerDeath() {
            isDead = true;
            document.getElementById('death-screen').classList.remove('hidden');
            myModel.rotation.z = Math.PI/2;
            deathTimer = setTimeout(() => { if(isDead) location.reload(); }, 5000);
        }

        window.respawn = () => {
            clearTimeout(deathTimer);
            isDead = false; myHP = 100;
            document.getElementById('death-screen').classList.add('hidden');
            myModel.rotation.z = 0;
            myModel.position.set((Math.random()-0.5)*40, 0, (Math.random()-0.5)*40);
            PLAYERS_REF.child(myID).update({ hp: 100, x: myModel.position.x, z: myModel.position.z });
        };

        function attack() {
            if(isDead || isAtk) return;
            isAtk = true; mySword.position.z = -1.2;
            PLAYERS_REF.child(myID).update({ at: true });
            setTimeout(() => { mySword.position.z = 0.3; isAtk = false; PLAYERS_REF.child(myID).update({ at: false }); }, 150);

            Object.keys(otherPlayers).forEach(id => {
                if(myModel.position.distanceTo(otherPlayers[id].position) < 5) {
                    PLAYERS_REF.child(id).transaction(p => {
                        if (p && p.hp > 0) {
                            p.hp -= 20;
                            if (p.hp <= 0) db.ref('leaderboard/' + myNick).transaction(k => (k||0)+1);
                        }
                        return p;
                    });
                }
            });
        }

        function animate() {
            if(!inGame) return;
            requestAnimationFrame(animate);
            if(!isDead) {
                const move = new THREE.Vector3();
                if(moveState.f) move.z -= 1; if(moveState.b) move.z += 1;
                if(moveState.l) move.x -= 1; if(moveState.r) move.x += 1;
                if(move.length() > 0) {
                    move.applyAxisAngle(new THREE.Vector3(0,1,0), camAzimuth);
                    myModel.position.add(move.normalize().multiplyScalar(0.3));
                    myModel.rotation.y = Math.atan2(move.x, move.z);
                }
                myModel.position.y += vy;
                if(myModel.position.y > 0) { vy -= 0.025; canJump = false; }
                else { myModel.position.y = 0; vy = 0; canJump = true; }
                
                // ВАЖНО: Мы НЕ отправляем HP здесь, чтобы не затирать урон!
                PLAYERS_REF.child(myID).update({ 
                    x: myModel.position.x, y: myModel.position.y, z: myModel.position.z, 
                    ry: myModel.rotation.y, n: myNick, ls: Date.now() 
                });
            }
            camera.position.set(myModel.position.x + camDist * Math.sin(camAzimuth), myModel.position.y + 10, myModel.position.z + camDist * Math.cos(camAzimuth));
            camera.lookAt(myModel.position.x, myModel.position.y + 1, myModel.position.z);
            
            document.getElementById('hp-fill').style.width = myHP + "%";
            document.getElementById('hp-fill-text').innerText = `${myHP} / 100`;
            renderer.render(scene, camera);
        }

        window.startGame = async () => {
            myNick = document.getElementById('nick-input').value.trim() || "Guest";
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('mobile-ui').classList.remove('hidden');
            inGame = true; init();
            PLAYERS_REF.child(myID).set({ n: myNick, hp: 100, x: 0, y: 0, z: 0, ls: Date.now() });
            PLAYERS_REF.child(myID).onDisconnect().remove();
        };

        const setupBtn = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', (e) => { e.preventDefault(); if(!isDead) moveState[key] = true; });
            el.addEventListener('pointerup', () => moveState[key] = false);
            el.addEventListener('pointerleave', () => moveState[key] = false);
        };
        setupBtn('m-w','f'); setupBtn('m-s','b'); setupBtn('m-a','l'); setupBtn('m-d','r');
        document.getElementById('m-jump').onpointerdown = (e) => { e.preventDefault(); if(canJump && !isDead) vy = 0.5; };
        document.getElementById('m-atk').onpointerdown = (e) => { e.preventDefault(); attack(); };

        window.onkeydown = (e) => { if(e.code==='KeyW')moveState.f=true; if(e.code==='KeyS')moveState.b=true; if(e.code==='KeyA')moveState.l=true; if(e.code==='KeyD')moveState.r=true; if(e.code==='Space'&&canJump)vy=0.5; };
        window.onkeyup = (e) => { if(e.code==='KeyW')moveState.f=false; if(e.code==='KeyS')moveState.b=false; if(e.code==='KeyA')moveState.l=false; if(e.code==='KeyD')moveState.r=false; };
        window.onmousedown = (e) => { if(e.button===0&&inGame)attack(); if(e.button===2)window.isR=true; };
        window.onmouseup = () => window.isR=false;
        window.onmousemove = (e) => { if(window.isR) camAzimuth -= e.movementX * 0.01; };
        window.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
