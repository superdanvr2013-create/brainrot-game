<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabyChat Pro: ID & Private</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f0f0f; --panel: #181818; --accent: #ff4444; --text: #e0e0e0; --side-w: 260px; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: var(--side-w); background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #333; font-weight: bold; color: var(--accent); display: flex; justify-content: space-between; align-items: center; }
        #contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .contact-item:hover { background: #252525; }
        .contact-item img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }

        /* Main Chat Area */
        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { background: var(--panel); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Messages */
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 12px; position: relative; cursor: context-menu; border: 1px solid transparent; }
        .msg.me { align-self: flex-end; background: #2b2b2b; border-color: #444; }
        .msg.other { align-self: flex-start; background: #1e1e1e; border-color: #333; }
        .msg .sender { font-size: 10px; color: var(--accent); display: block; margin-bottom: 3px; }
        .msg .reply-content { font-size: 11px; background: rgba(255,255,255,0.05); padding: 5px; border-left: 3px solid var(--accent); margin-bottom: 5px; opacity: 0.7; }

        /* Input & Reply Preview */
        #reply-preview { background: #222; padding: 8px 20px; border-top: 1px solid var(--accent); display: none; justify-content: space-between; font-size: 12px; }
        .input-area { background: var(--panel); padding: 20px; display: flex; gap: 12px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #252525; color: #fff; outline: none; }
        .btn-send { background: var(--accent); border: none; padding: 0 20px; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; }
        .btn-send:disabled { background: #555; }

        /* Auth Screen */
        .screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .auth-box { background: var(--panel); padding: 30px; border-radius: 20px; width: 320px; text-align: center; border: 1px solid #333; }
        .avatar-select { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .avatar-select img { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .avatar-select img.selected { border-color: var(--accent); transform: scale(1.1); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h2 id="auth-title">РЕГИСТРАЦИЯ</h2>
            <div class="avatar-select" id="avatar-list">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=1" class="selected" onclick="selAv(this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=2" onclick="selAv(this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=3" onclick="selAv(this)">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=4" onclick="selAv(this)">
            </div>
            <input type="text" id="nick" placeholder="Ник (макс 20 симв)" maxlength="20">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn-send" style="width:100%; height:45px;" onclick="handleAuth()">ВОЙТИ</button>
            <p style="font-size:12px; color:#777; margin-top:15px; cursor:pointer;" onclick="toggleA()" id="a-toggle">Уже есть аккаунт?</p>
        </div>
    </div>

    <div id="sidebar" class="hidden">
        <div class="sidebar-header">
            <span>КОНТАКТЫ</span>
            <button onclick="addFriend()" style="background:none; border:none; color:var(--accent); font-size:20px; cursor:pointer;">+</button>
        </div>
        <div class="contact-item" onclick="switchChat('global', 'Глобальный чат')">
            <img src="https://cdn-icons-png.flaticon.com/512/864/864685.png">
            <div><b>Глобальный чат</b><br><small>Все пользователи</small></div>
        </div>
        <div id="contact-list"></div>
        <div style="padding:10px; font-size:10px; border-top:1px solid #333;">Ваш ID: <span id="my-id-display" style="color:var(--accent)">...</span></div>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <span id="active-chat-name">Выберите чат</span>
            <span style="font-size:12px; opacity:0.6" id="my-nick-display"></span>
        </header>

        <div id="chat-window"></div>

        <div id="reply-preview">
            <span id="reply-text">Ответ на...</span>
            <span onclick="cancelReply()" style="cursor:pointer; color:var(--accent)">✕</span>
        </div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Введите сообщение...">
            <button class="btn-send" id="btn-send" onclick="sendMsg()">ОТПРАВИТЬ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAocmcoBH2Q8_QENuE9AuaGwtDOSSg-WpE",
            authDomain: "danblox-e209f.firebaseapp.com",
            databaseURL: "https://danblox-e209f-default-rtdb.firebaseio.com",
            projectId: "danblox-e209f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myData = { nick: "", id: "", av: "" };
        let isReg = true;
        let activeChatId = "global";
        let selectedAvatar = "https://api.dicebear.com/7.x/avataaars/svg?seed=1";
        let replyData = null;
        let lastSendTime = 0;

        function selAv(el) {
            document.querySelectorAll('.avatar-select img').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            selectedAvatar = el.src;
        }

        function toggleA() {
            isReg = !isReg;
            document.getElementById('auth-title').innerText = isReg ? "РЕГИСТРАЦИЯ" : "ВХОД";
            document.getElementById('a-toggle').innerText = isReg ? "Уже есть аккаунт?" : "Создать аккаунт";
        }

        async function handleAuth() {
            const nick = document.getElementById('nick').value.trim();
            const pass = document.getElementById('pass').value.trim();
            if(!nick || !pass) return alert("Заполни поля!");
            if(nick.length > 20) return alert("Ник слишком длинный!");

            if(isReg) {
                const newId = Math.floor(100000 + Math.random() * 900000); // Генерим ID типа 123456
                const userObj = { nick, pass, av: selectedAvatar, id: newId };
                await db.ref('users/' + nick).set(userObj);
                await db.ref('id_map/' + newId).set(nick);
                enter(userObj);
            } else {
                const s = await db.ref('users/' + nick).get();
                if(s.exists() && s.val().pass === pass) enter(s.val());
                else alert("Ошибка входа!");
            }
        }

        function enter(data) {
            myData = data;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('my-id-display').innerText = data.id;
            document.getElementById('my-nick-display').innerText = data.nick;
            switchChat('global', 'Глобальный чат');
            loadFriends();
        }

        function addFriend() {
            const fid = prompt("Введите ID пользователя:");
            if(!fid) return;
            db.ref('id_map/' + fid).once('value', s => {
                if(s.exists()) {
                    const fNick = s.val();
                    db.ref('users/' + myData.nick + '/friends/' + fNick).set(true);
                    loadFriends();
                } else alert("ID не найден!");
            });
        }

        function loadFriends() {
            db.ref('users/' + myData.nick + '/friends').on('value', async s => {
                const list = document.getElementById('contact-list');
                list.innerHTML = "";
                for(let fNick in s.val()) {
                    const info = await db.ref('users/' + fNick).get();
                    const d = info.val();
                    const item = document.createElement('div');
                    item.className = 'contact-item';
                    item.onclick = () => switchChat(getRoomId(myData.nick, fNick), fNick);
                    item.innerHTML = `<img src="${d.av}"><div><b>${d.nick}</b><br><small>ID: ${d.id}</small></div>`;
                    list.appendChild(item);
                }
            });
        }

        function getRoomId(n1, n2) { return [n1, n2].sort().join("_"); }

        function switchChat(id, name) {
            activeChatId = id;
            document.getElementById('active-chat-name').innerText = name;
            document.getElementById('chat-window').innerHTML = "";
            db.ref('messages/' + activeChatId).off(); // Отключаем старый слушатель, чтобы не было "кучи сообщений"
            
            db.ref('messages/' + activeChatId).limitToLast(40).on('child_added', s => {
                drawMsg(s.val());
            });
        }

        function drawMsg(m) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${m.sn === myData.nick ? 'me' : 'other'}`;
            
            let replyHtml = m.rp ? `<div class="reply-content">↪ ${m.rp}</div>` : "";
            div.innerHTML = `<span class="sender">${m.sn}</span>${replyHtml}<div>${m.txt}</div>`;
            
            div.oncontextmenu = (e) => {
                e.preventDefault();
                replyData = m;
                document.getElementById('reply-preview').style.display = 'flex';
                document.getElementById('reply-text').innerText = "Ответ для " + m.sn + ": " + m.txt.substring(0,20) + "...";
            };

            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function sendMsg() {
            const now = Date.now();
            if(now - lastSendTime < 2000) return alert("Не спамь! Подожди 2 сек.");
            
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;

            const msg = {
                sn: myData.nick,
                txt: input.value,
                rp: replyData ? replyData.txt : null,
                ts: now
            };

            db.ref('messages/' + activeChatId).push(msg);
            input.value = "";
            cancelReply();
            lastSendTime = now;
        }

        function cancelReply() {
            replyData = null;
            document.getElementById('reply-preview').style.display = 'none';
        }
    </script>
</body>
</html>
