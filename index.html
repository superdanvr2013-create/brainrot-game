<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Brainrot Multiplayer - Ultra Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.3.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: #fff; }
        #menu { position: absolute; width: 100%; height: 100%; z-index: 100; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #222 0%, #000 100%); }
        .window { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 2px solid #00ff88; text-align: center; box-shadow: 0 0 30px rgba(0,255,136,0.2); }
        input { padding: 15px; margin: 10px; border-radius: 8px; border: 1px solid #333; width: 280px; font-size: 16px; background: #000; color: #00ff88; outline: none; }
        input:focus { border-color: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.3); }
        button { padding: 15px 40px; background: #00ff88; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 20px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #00cc6e; transform: scale(1.05); }
        #hud { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 12px; border: 1px solid #333; z-index: 50; pointer-events: none; }
        #status { color: #ffcc00; font-weight: bold; margin-top: 5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="window">
            <h1 style="color: #00ff88; letter-spacing: 2px; margin-top: 0;">BRAINROT ONLINE</h1>
            <input type="text" id="nick-input" placeholder="ТВОЙ НИК (ENG)..."><br>
            <input type="text" id="friend-id-input" placeholder="ID ДРУГА (ЕСЛИ ЕСТЬ)"><br>
            <button id="start-btn">ПОДКЛЮЧИТЬСЯ</button>
            <p style="font-size: 12px; color: #666; margin-top: 20px;">Версия: 1.3.2 STABLE</p>
        </div>
    </div>

    <div id="hud" class="hidden">
        <div style="color: #00ff88; font-size: 18px; margin-bottom: 10px;">СИСТЕМА АКТИВНА</div>
        <div>ID: <span id="display-id" style="color: #fff;">...</span></div>
        <div id="status">СТАТУС: ИНИЦИАЛИЗАЦИЯ</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, pivot, playerModel;
        let peer, conn, myID;
        let otherPlayers = {}; 
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;

        const startBtn = document.getElementById('start-btn');
        const statusEl = document.getElementById('status');

        function initNet(nick) {
            const cleanNick = nick.replace(/[^a-zA-Z0-9]/g, "");
            myID = cleanNick + "-" + Math.floor(Math.random() * 8999 + 1000);
            document.getElementById('display-id').innerText = myID;

            // Используем автоматический выбор сервера (наиболее надежный вариант)
            peer = new Peer(myID);

            peer.on('open', (id) => {
                statusEl.innerText = "СТАТУС: В СЕТИ (ЖДУ)";
                statusEl.style.color = "#00ff88";
                const targetID = document.getElementById('friend-id-input').value.trim();
                if(targetID) connectTo(targetID);
            });

            peer.on('connection', (c) => setupConnection(c));
            
            peer.on('error', (err) => {
                console.error("Сетевая ошибка:", err.type);
                statusEl.innerText = "ОШИБКА: " + err.type.toUpperCase();
                statusEl.style.color = "#ff4444";
                
                // Если ошибка — пробуем пересоздать peer через 3 секунды
                if(err.type === 'network' || err.type === 'server-error') {
                    setTimeout(() => initNet(nick), 3000);
                }
            });
        }

        function connectTo(id) {
            const c = peer.connect(id.trim(), { reliable: true });
            setupConnection(c);
        }

        function setupConnection(c) {
            conn = c;
            conn.on('open', () => {
                statusEl.innerText = "СТАТУС: СОЕДИНЕНО!";
                statusEl.style.color = "#00ff88";
                setInterval(() => {
                    if(conn && conn.open) {
                        conn.send({
                            id: myID, 
                            x: pivot.position.x, 
                            y: pivot.position.y, 
                            z: pivot.position.z, 
                            ry: pivot.rotation.y
                        });
                    }
                }, 50);
            });
            conn.on('data', (data) => syncPlayer(data));
        }

        function syncPlayer(data) {
            if(!otherPlayers[data.id]) {
                const geometry = new THREE.BoxGeometry(1, 2, 1);
                const material = new THREE.MeshStandardMaterial({color: 0x0088ff});
                const m = new THREE.Mesh(geometry, material);
                m.position.y = 1;
                const g = new THREE.Group(); g.add(m);
                scene.add(g);
                otherPlayers[data.id] = g;
            }
            otherPlayers[data.id].position.lerp(new THREE.Vector3(data.x, data.y, data.z), 0.2);
            otherPlayers[data.id].rotation.y = data.ry;
        }

        startBtn.onclick = () => {
            const nick = document.getElementById('nick-input').value.trim();
            if(!nick) return alert("ВВЕДИТЕ НИК!");
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            initNet(nick);
            initGame();
        };

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            pivot = new THREE.Group();
            scene.add(pivot);

            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x00ff88}));
            body.position.y = 1;
            playerModel = new THREE.Group(); 
            playerModel.add(body);
            scene.add(playerModel);

            controls = new PointerLockControls(pivot, document.body);
            document.body.addEventListener('click', () => controls.lock());

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(10, 20, 10);
            scene.add(light);

            const grid = new THREE.GridHelper(200, 40, 0x00ff88, 0x222222);
            scene.add(grid);

            window.onkeydown = (e) => {
                if(e.code === 'KeyW') moveForward = true;
                if(e.code === 'KeyS') moveBackward = true;
                if(e.code === 'KeyA') moveLeft = true;
                if(e.code === 'KeyD') moveRight = true;
            };
            window.onkeyup = (e) => {
                if(e.code === 'KeyW') moveForward = false;
                if(e.code === 'KeyS') moveBackward = false;
                if(e.code === 'KeyA') moveLeft = false;
                if(e.code === 'KeyD') moveRight = false;
            };

            function animate() {
                requestAnimationFrame(animate);
                if (controls.isLocked) {
                    if (moveForward) controls.moveForward(0.2);
                    if (moveBackward) controls.moveForward(-0.2);
                    if (moveLeft) controls.moveRight(-0.2);
                    if (moveRight) controls.moveRight(0.2);
                    playerModel.position.copy(pivot.position);
                    playerModel.rotation.y = pivot.rotation.y;
                    const camPos = new THREE.Vector3(0, 4, 12).applyMatrix4(pivot.matrixWorld);
                    camera.position.lerp(camPos, 0.1);
                    camera.lookAt(pivot.position.x, pivot.position.y + 1, pivot.position.z);
                }
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
